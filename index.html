<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pepe Hook Miner</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; touch-action: none; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>
<script>
const config = {
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    physics: { default: 'arcade' },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);
let plane, hook, targets, scoreText;
let isLaunching = false, isReturning = false, caughtItem = null;
let basePlaneY = 160; 
let hookSpeed = 16; 
let score = 0;

function preload() {
    this.load.crossOrigin = 'anonymous';
    this.load.image('sky', 'pg.jpeg'); 
    this.load.image('pepe', 'pepe.png'); // Твой прозрачный спрайт
    this.load.image('ton', 'ton.png');
    this.load.image('usdt', 'usdt.png');
    this.load.image('not', 'not.png');
    this.load.image('dogs', 'dogs.png');
}

function create() {
    // Фон
    let bg = this.add.image(config.width/2, config.height/2, 'sky');
    let scale = Math.max(config.width / bg.width, config.height / bg.height);
    bg.setScale(scale).setScrollFactor(0);

    // 1. САМОЛЕТ (База) - обрезаем низ, чтобы не двоилась цепь
    plane = this.add.sprite(config.width / 2, basePlaneY, 'pepe');
    plane.setDisplaySize(300, 260).setDepth(20);
    plane.setCrop(0, 0, 1000, 500); // Оставляем только самолет

    // 2. КРЮК (Цепь) - ставим ПОД самолет
    hook = this.add.sprite(config.width / 2, basePlaneY + 40, 'pepe');
    hook.setOrigin(0.5, 0).setDepth(10);
    hook.setDisplaySize(300, 100); // В покое цепь короткая
    hook.setCrop(0, 500, 1000, 1000); // Оставляем только цепь и клешню

    // Невидимый сенсор на кончике клешни
    this.clawSensor = this.add.circle(0, 0, 30, 0xffffff, 0);
    this.physics.add.existing(this.clawSensor);

    // Монетки
    targets = this.physics.add.group();
    for(let i=0; i<8; i++) { spawnCoin(this); }

    scoreText = this.add.text(25, 25, 'SCORE: 0', { 
        fontSize: '32px', fill: '#0f0', fontFamily: 'Courier New', fontWeight: 'bold'
    }).setDepth(30);

    this.input.on('pointerdown', () => { 
        if(!isLaunching && !isReturning) isLaunching = true; 
    });

    this.physics.add.overlap(this.clawSensor, targets, (sensor, target) => {
        if (isLaunching && !caughtItem) { 
            caughtItem = target; 
            isLaunching = false; 
            isReturning = true; 
        }
    });
}

function spawnCoin(scene) {
    let x = Phaser.Math.Between(70, config.width - 70);
    let y = Phaser.Math.Between(config.height * 0.6, config.height - 100);
    let type = Phaser.Utils.Array.GetRandom(['ton', 'usdt', 'not', 'dogs']);
    let coin = targets.create(x, y, type);
    coin.setDisplaySize(80, 80).setOrigin(0.5).setDepth(5); 
    coin.body.setCircle(35); 
}

function update() {
    // Самолет плавно парит на месте
    plane.y = basePlaneY + Math.sin(this.time.now / 500) * 8;
    hook.y = plane.y + 40; // Цепь всегда привязана к животу самолета

    // Обновляем позицию сенсора на конце вытянутой цепи
    this.clawSensor.x = hook.x;
    this.clawSensor.y = hook.y + hook.displayHeight - 40;

    if (isLaunching) {
        // Выбрасываем цепь вниз (увеличиваем длину)
        hook.displayHeight += hookSpeed;
        if (this.clawSensor.y > config.height - 50) {
            isLaunching = false; isReturning = true;
        }
    } 
    else if (isReturning) {
        // Подтягиваем цепь обратно
        hook.displayHeight -= hookSpeed * 0.7;
        
        if (caughtItem) { 
            caughtItem.x = this.clawSensor.x; 
            caughtItem.y = this.clawSensor.y; 
        }
        
        if (hook.displayHeight <= 100) {
            hook.displayHeight = 100;
            isReturning = false;
            if (caughtItem) { 
                score += 100; scoreText.setText('SCORE: ' + score); 
                caughtItem.destroy(); caughtItem = null; spawnCoin(this); 
            }
        }
    }
}
</script>
</body>
</html>
