<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pepe Pilot Fixed</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; touch-action: none; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>
<script>
const config = {
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    physics: { default: 'arcade' },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);
let plane, hook, chainGraphics, targets, scoreText;
let isLaunching = false, isReturning = false, caughtItem = null;
let angle = 0, swingSpeed = 0.03, score = 0;

const HOOK_SPEED = 16;
const PLANE_Y = 160; 

function preload() {
    this.load.crossOrigin = 'anonymous';
    this.load.image('sky', 'pg.jpeg'); 
    this.load.image('pepe', 'pepe.png'); //
    this.load.image('ton', 'ton.png');
    this.load.image('usdt', 'usdt.png');
    this.load.image('not', 'not.png');
    this.load.image('dogs', 'dogs.png');
}

function create() {
    this.add.image(config.width/2, config.height/2, 'sky').setDisplaySize(config.width, config.height);

    // 1. САМОЛЕТ
    plane = this.add.image(config.width / 2, PLANE_Y, 'pepe');
    plane.setDisplaySize(300, 260).setDepth(50).setCrop(0, 0, 1000, 480);

    // 2. ГРАФИКА ЦЕПИ
    chainGraphics = this.add.graphics().setDepth(30);

    // 3. КЛЕШНЯ (Вырезаем желтую часть из твоего файла)
    hook = this.add.sprite(config.width / 2, PLANE_Y + 50, 'pepe');
    hook.setDepth(40).setDisplaySize(100, 90);
    hook.setCrop(300, 600, 400, 400); // Оставляем только желтую клешню
    
    this.physics.add.existing(hook);
    hook.body.setCircle(30, 25, 25);

    targets = this.physics.add.group();
    for(let i=0; i<8; i++) { spawnCoin(this); }

    scoreText = this.add.text(25, 25, 'SCORE: 0', { fontSize: '32px', fill: '#0f0', fontWeight: 'bold' }).setDepth(60);

    this.input.on('pointerdown', () => { 
        if(!isLaunching && !isReturning) isLaunching = true; 
    });

    this.physics.add.overlap(hook, targets, (h, target) => {
        if (isLaunching && !caughtItem) { 
            caughtItem = target; 
            isLaunching = false; 
            isReturning = true; 
        }
    });
}

function spawnCoin(scene) {
    let x = Phaser.Math.Between(100, config.width - 100);
    let y = Phaser.Math.Between(config.height * 0.6, config.height - 120);
    let type = Phaser.Utils.Array.GetRandom(['ton', 'usdt', 'not', 'dogs']);
    let coin = targets.create(x, y, type).setDisplaySize(70, 70);
}

function update() {
    chainGraphics.clear();
    let startX = config.width / 2;
    let startY = PLANE_Y + 30; // Точка под пузом самолета

    if (!isLaunching && !isReturning) {
        // МАЯТНИК: Клешня качается влево-вправо
        angle += swingSpeed;
        if (angle > 1.1 || angle < -1.1) swingSpeed = -swingSpeed;
        
        hook.x = startX + Math.sin(angle) * 80;
        hook.y = startY + Math.cos(angle) * 80;
        hook.rotation = -angle;
    } 
    else if (isLaunching) {
        // ВЫСТРЕЛ: Клешня летит по углу
        hook.x += Math.sin(angle) * HOOK_SPEED;
        hook.y += Math.cos(angle) * HOOK_SPEED;

        if (hook.y > config.height || hook.x < 0 || hook.x > config.width) {
            isLaunching = false; isReturning = true;
        }
    } 
    else if (isReturning) {
        // ВОЗВРАТ: Тянем к самолету
        let dist = Phaser.Math.Distance.Between(hook.x, hook.y, startX, startY);
        let moveAngle = Phaser.Math.Angle.Between(hook.x, hook.y, startX, startY);
        
        hook.x += Math.cos(moveAngle) * (HOOK_SPEED + 5);
        hook.y += Math.sin(moveAngle) * (HOOK_SPEED + 5);

        if (caughtItem) {
            caughtItem.x = hook.x;
            caughtItem.y = hook.y + 20;
        }

        if (dist < 20) {
            isReturning = false;
            if (caughtItem) {
                score += 100; scoreText.setText('SCORE: ' + score);
                caughtItem.destroy(); caughtItem = null; spawnCoin(this);
            }
        }
    }

    // РИСУЕМ ЦЕПЬ (Линия от самолета до клешни)
    chainGraphics.lineStyle(3, 0xdddddd, 1);
    chainGraphics.lineBetween(startX, startY, hook.x, hook.y);
    
    plane.y = PLANE_Y + Math.sin(this.time.now / 600) * 8;
}
</script>
</body>
</html>
