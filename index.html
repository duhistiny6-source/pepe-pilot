<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pepe Pilot: Crypto Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin:0; padding:0; overflow:hidden; background:#000; touch-action: none; font-family: 'Segoe UI', Arial, sans-serif; }
        
        #top-bar { 
            position: fixed; top: 0; left: 0; width: 100%; height: 35px; 
            background: rgba(0, 0, 0, 0.4); z-index: 1000; backdrop-filter: blur(2px);
            display: flex; align-items: center;
        }

        #energy-container {
            position: absolute; left: 12px; color: #0f0; font-size: 13px;
            font-weight: bold; text-shadow: 1px 1px 1px #000;
        }

        #balance-container { 
            width: 100%; display: flex; align-items: center; justify-content: center; 
            gap: 15px; color: #fff; font-size: 11px;
        }

        .balance-item { display: flex; align-items: center; gap: 4px; }
        .coin-icon { width: 14px; height: 14px; }
        
        #recovery-block {
            display: none; position: fixed; 
            top: 40px; left: 12px; z-index: 1001;
            display: flex; flex-direction: column; gap: 4px; align-items: flex-start;
        }

        #timer-display { color: #ff3333; font-size: 10px; text-shadow: 1px 1px 1px #000; }
        #ad-button { background: #ffcc00; color: #000; border: none; padding: 2px 8px; font-size: 10px; font-weight: bold; border-radius: 4px; cursor: pointer; }
        
        #settings-btn { position: fixed; top: 7px; right: 10px; font-size: 18px; cursor: pointer; z-index: 1001; opacity: 0.8; }
        
        #nav-bar { 
            position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%); 
            width: 85%; height: 50px; background: rgba(0, 0, 0, 0.9); border: 1px solid #333; 
            border-radius: 12px; display: flex; justify-content: space-around; align-items: center; 
            z-index: 200; box-shadow: 0 4px 15px rgba(0,0,0,0.5); 
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #fff; font-weight: bold; flex: 1; cursor: pointer; }
        .nav-item span { font-size: 18px; }
        .nav-text { font-size: 8px; margin-top: 1px; color: #bbb; text-transform: uppercase; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; justify-content: center; align-items: center; flex-direction: column; }
        .modal-content { background: #1a1a1a; border: 2px solid #0f0; padding: 25px; border-radius: 20px; text-align: center; color: #fff; width: 280px; }
        
        .task-item { background: #222; border: 1px solid #444; border-radius: 10px; padding: 10px; margin: 10px 0; display: flex; justify-content: space-between; align-items: center; }
        .task-btn { background: #0f0; color: #000; border: none; padding: 6px 12px; border-radius: 5px; font-weight: bold; font-size: 12px; cursor: pointer; }
        .lang-btn { background: #333; color: #0f0; border: 1px solid #0f0; padding: 12px; margin: 10px 0; cursor: pointer; border-radius: 10px; font-weight: bold; width: 100%; }
        #ad-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 3000; color: #fff; justify-content: center; align-items: center; flex-direction: column; }
    </style>
</head>
<body>

<div id="settings-btn" onclick="toggleModal('settings-modal')">⚙️</div>

<div id="top-bar">
    <div id="energy-container">⚡ <span id="energy">100</span></div>
    <div id="balance-container">
        <div class="balance-item"><span>USDT:</span> <span id="money" style="color:#0f0">0.0000</span></div>
        <div class="balance-item">
            <img src="logo..png" class="coin-icon"> <span>PLT:</span> <span id="frog-money" style="color:#ffcc00">0</span>
        </div>
    </div>
</div>

<div id="recovery-block">
    <button id="ad-button" onclick="startAd()">📺 РЕКЛАМА</button>
    <div id="timer-display">Rec: <span id="time-left">02:00:00</span></div>
</div>

<div id="friends-modal" class="modal">
    <div class="modal-content">
        <h3>ДРУЗЬЯ</h3>
        <p style="font-size: 11px; color: #bbb;">Приглашай друзей и получай <span style="color:#0f0">10%</span> от их добычи!</p>
        <div id="ref-link-text" style="background: #222; padding: 10px; border-radius: 10px; margin: 15px 0; font-size: 10px; color: #0f0; word-break: break-all; border: 1px dashed #555;">https://t.me/PepePilotBot?start=user_id</div>
        <button class="lang-btn" onclick="copyRefLink()" style="margin-top: 0;">КОПИРОВАТЬ</button>
        <div style="margin-top:15px; color:#888; cursor:pointer;" onclick="toggleModal('friends-modal')">Закрыть</div>
    </div>
</div>

<div id="settings-modal" class="modal">
    <div class="modal-content">
        <h3>НАСТРОЙКИ</h3>
        <button class="lang-btn" onclick="changeLanguage('ru')">РУССКИЙ</button>
        <button class="lang-btn" onclick="changeLanguage('en')">ENGLISH</button>
        <div style="margin-top:15px; color:#888; cursor:pointer;" onclick="toggleModal('settings-modal')">Закрыть</div>
    </div>
</div>

<div id="tasks-modal" class="modal">
    <div class="modal-content">
        <h3>ЗАДАНИЯ</h3>
        <div class="task-item">
            <div style="text-align: left;">
                <div style="font-size: 13px;">Смотреть рекламу</div>
                <div style="font-size: 11px; color: #0f0;">+100 ⚡ Энергии</div>
            </div>
            <button class="task-btn" onclick="doAdTask()">GO</button>
        </div>
        <div style="margin-top:15px; color:#888; cursor:pointer;" onclick="toggleModal('tasks-modal')">Закрыть</div>
    </div>
</div>

<div id="ad-overlay">
    <h2>СМОТРИМ РОЛИК...</h2>
    <p id="ad-timer">Осталось: 5 сек.</p>
</div>

<div id="nav-bar">
    <div class="nav-item"><span>🛒</span><div class="nav-text">МАГАЗИН</div></div>
    <div class="nav-item" onclick="toggleModal('tasks-modal')"><span>📜</span><div class="nav-text">ЗАДАНИЯ</div></div>
    <div class="nav-item" onclick="toggleModal('friends-modal')"><span>👥</span><div class="nav-text">ДРУЗЬЯ</div></div>
    <div class="nav-item"><span>👛</span><div class="nav-text">КОШЕЛЕК</div></div>
</div>

<script>
const webapp = window.Telegram?.WebApp;
if (webapp) webapp.expand();

function toggleModal(id) {
    const m = document.getElementById(id);
    m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
    if (id === 'friends-modal' && m.style.display === 'flex') {
        const userId = webapp?.initDataUnsafe?.user?.id || "12345";
        document.getElementById('ref-link-text').innerText = `https://t.me/PepePilotBot?start=${userId}`;
    }
}

function copyRefLink() {
    const link = document.getElementById('ref-link-text').innerText;
    navigator.clipboard.writeText(link);
    alert("Ссылка скопирована!");
}

function doAdTask() { toggleModal('tasks-modal'); startAd(); }

const config = {
    type: Phaser.AUTO, width: window.innerWidth, height: window.innerHeight,
    physics: { default: 'arcade' }, scene: { preload, create, update }
};

const game = new Phaser.Game(config);
let plane, hook, rope, targets, bgMusic, isLaunching = false, isReturning = false, caughtItem = null;
let angle = 0, swingSpeed = 0.03, distance = 25, money = 0, frogMoney = 0, energy = 100, recoveryTime = 0;

function preload() {
    this.load.image('sky', 'pg.jpeg');
    this.load.image('hook', 'kleshn.png');
    this.load.image('usdt', 'usdt.png');
    this.load.image('plt', 'logo..png');
    this.load.image('plane', 'pepe.png');
    this.load.audio('theme', 'music.mp3');
}

function create() {
    this.add.image(config.width/2, config.height/2, 'sky').setDisplaySize(config.width, config.height);
    try { bgMusic = this.sound.add('theme', { volume: 0.005, loop: true }); } catch(e){}
    this.input.once('pointerdown', () => { if(bgMusic) bgMusic.play(); });

    targets = this.physics.add.group();
    for(let i=0; i<6; i++) spawn(this);
    rope = this.add.graphics().setDepth(5);
    hook = this.add.sprite(0, 0, 'hook').setDisplaySize(60, 60).setDepth(50);
    this.physics.add.existing(hook);
    plane = this.add.image(config.width/2, 120, 'plane').setDisplaySize(280, 180).setDepth(60);

    this.input.on('pointerdown', (p) => {
        if (p.y < 35 || p.y > config.height - 65) return;
        if (!isLaunching && !isReturning && energy > 0) {
            isLaunching = true; energy--; if(energy<=0) recoveryTime = 7200; updateUI();
        }
    });

    this.physics.add.overlap(hook, targets, (h, item) => {
        if (isLaunching && !caughtItem) { caughtItem = item; isLaunching = false; isReturning = true; }
    });
    setInterval(tick, 1000);
}

function spawn(scene) {
    let x = Phaser.Math.Between(50, config.width - 50);
    let y = Phaser.Math.Between(config.height * 0.45, config.height - 150);
    let type = Math.random() < 0.6 ? 'plt' : 'usdt';
    let coin = targets.create(x, y, type).setDepth(40);
    if (type === 'plt') { coin.setScale(0.10); coin.setTint(0xffffff); } 
    else { coin.setScale(0.12); }
}

function update() {
    plane.y = 120 + Math.sin(this.time.now / 600) * 8;
    let startX = plane.x - 5; let startY = plane.y + 15;
    if (!isLaunching && !isReturning) {
        angle += swingSpeed; if (angle > 0.8 || angle < -0.8) swingSpeed *= -1;
    } else if (isLaunching) {
        distance += 16; if (distance > config.height - 110) { isLaunching = false; isReturning = true; }
    } else if (isReturning) {
        distance -= 8;
        if (distance <= 25) {
            isReturning = false;
            if (caughtItem) {
                if(caughtItem.texture.key === 'plt') frogMoney += 10; else money += 0.0005;
                caughtItem.destroy(); caughtItem = null; spawn(this.scene.scene); updateUI();
            }
        }
    }
    hook.x = startX + Math.sin(angle) * distance;
    hook.y = startY + Math.cos(angle) * distance;
    rope.clear().lineStyle(2, 0xffffff, 0.7).lineBetween(startX, startY, hook.x, hook.y);
    if(caughtItem) { caughtItem.x = hook.x; caughtItem.y = hook.y + 15; }
}

function updateUI() {
    document.getElementById('money').innerText = money.toFixed(4);
    document.getElementById('frog-money').innerText = frogMoney;
    document.getElementById('energy').innerText = energy;
    document.getElementById('recovery-block').style.display = energy <= 0 ? 'flex' : 'none';
}

function tick() {
    if (recoveryTime > 0) {
        recoveryTime--;
        let m = Math.floor(recoveryTime / 60);
        let s = recoveryTime % 60;
        document.getElementById('time-left').innerText = `02:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        if (recoveryTime === 0) { energy = 100; updateUI(); }
    }
}

function startAd() {
    document.getElementById('ad-overlay').style.display = 'flex';
    let c = 5;
    let i = setInterval(() => {
        c--; document.getElementById('ad-timer').innerText = `Осталось: ${c} сек.`;
        if (c <= 0) { 
            clearInterval(i); document.getElementById('ad-overlay').style.display = 'none'; 
            energy = 100; recoveryTime = 0; updateUI(); 
        }
    }, 1000);
}
</script>
</body>
</html>
