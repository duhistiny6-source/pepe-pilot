<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pepe Pilot</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin:0; overflow:hidden; background:#000; touch-action: none; font-family: Arial, sans-serif; }
        #ui { position:fixed; top:12px; left:12px; color:#0f0; font-weight:bold; z-index: 100; pointer-events: none; }
        .stat { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; text-shadow: 1px 1px 2px #000; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; color: #fff; justify-content: center; align-items: center; }
        .modal-content { background: #1a1a1a; border: 2px solid #0f0; padding: 25px; border-radius: 20px; text-align: center; min-width: 280px; }
        
        #nav-bar { position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%); width: 90%; height: 60px; background: rgba(0, 0, 0, 0.9); border: 1px solid #333; border-radius: 15px; display: flex; justify-content: space-around; align-items: center; z-index: 200; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #fff; flex: 1; cursor: pointer; pointer-events: auto; }
        .nav-text { font-size: 9px; margin-top: 4px; color: #bbb; }
    </style>
</head>
<body>

<div id="ui">
    <div class="stat" style="color:#0f0; cursor:pointer; pointer-events:auto;" onclick="openModal('wallet-modal')">💰 БАЛАНС</div>
    <div class="stat" style="color:#ffcc00">⚡ <span id="energy">100</span></div>
</div>

<div id="wallet-modal" class="modal">
    <div class="modal-content">
        <h3>КОШЕЛЕК</h3>
        <p>Frog: <span id="m-frog">0</span> 🐸</p>
        <p>USDT: $<span id="m-usdt">0.0000</span></p>
        <button onclick="closeModal('wallet-modal')" style="background:#333; color:#fff; border:none; padding:10px 20px; border-radius:10px; margin-top:10px;">Закрыть</button>
    </div>
</div>

<div id="tasks-modal" class="modal">
    <div class="modal-content">
        <h3>ЗАДАНИЯ</h3>
        <div style="background:#222; padding:15px; border-radius:10px; margin:10px 0;">
            <p>Подписаться на канал</p>
            <button style="background:#0f0; border:none; padding:5px 15px; border-radius:5px; font-weight:bold;">+50 ⚡</button>
        </div>
        <button onclick="closeModal('tasks-modal')" style="background:#333; color:#fff; border:none; padding:10px 20px; border-radius:10px;">Закрыть</button>
    </div>
</div>

<div id="nav-bar">
    <div class="nav-item"><span>🛒</span><div class="nav-text">МАГАЗИН</div></div>
    <div class="nav-item" onclick="openModal('tasks-modal')"><span>📜</span><div class="nav-text">ЗАДАНИЯ</div></div>
    <div class="nav-item"><span>👥</span><div class="nav-text">ДРУЗЬЯ</div></div>
    <div class="nav-item" onclick="openModal('wallet-modal')"><span>👛</span><div class="nav-text">КОШЕЛЕК</div></div>
</div>

<script>
let frog = 0, usdt = 0, energy = 100;

function openModal(id) {
    document.getElementById('m-frog').innerText = frog;
    document.getElementById('m-usdt').innerText = usdt.toFixed(4);
    document.getElementById(id).style.display = 'flex';
}
function closeModal(id) { document.getElementById(id).style.display = 'none'; }

const config = {
    type: Phaser.AUTO, width: window.innerWidth, height: window.innerHeight,
    physics: { default: 'arcade' }, scene: { preload, create, update }
};
const game = new Phaser.Game(config);
let plane, hook, rope, targets, isLaunching = false, isReturning = false, caughtItem = null;
let angle = 0, swingSpeed = 0.03, distance = 35;

function preload() {
    this.load.image('sky', 'pg.jpeg');
    this.load.image('hook', 'kleshn.png');
    this.load.image('usdt', 'usdt.png');
    this.load.image('pilot_coin', 'logo..png');
    this.load.image('plane', 'pepe.png');
    this.load.audio('music', 'music.mp3');
}

function create() {
    this.add.image(config.width/2, config.height/2, 'sky').setDisplaySize(config.width, config.height);
    
    // Музыка
    try {
        let m = this.sound.add('music', { loop: true, volume: 0.3 });
        this.input.once('pointerdown', () => { if(!m.isPlaying) m.play(); });
    } catch(e) {}

    targets = this.physics.add.group();
    for(let i=0; i<6; i++) spawn(this);

    // Веревка создается ПЕРВОЙ (она будет в самом низу)
    rope = this.add.graphics();
    
    // Самолет (глубина 20)
    plane = this.add.image(config.width/2, 120, 'plane').setDisplaySize(280, 180).setDepth(20);
    
    // Клешня (глубина 30 — ПОВЕРХ веревки и самолета)
    hook = this.add.sprite(0, 0, 'hook').setDisplaySize(60, 60).setDepth(30);
    this.physics.add.existing(hook);

    this.input.on('pointerdown', (p) => {
        if(p.y < 150 || p.y > config.height - 100) return;
        if(!isLaunching && !isReturning && energy > 0) {
            isLaunching = true; energy--; 
            document.getElementById('energy').innerText = energy;
        }
    });

    this.physics.add.overlap(hook, targets, (h, item) => {
        if(isLaunching && !caughtItem) {
            caughtItem = item; 
            caughtItem.body.enable = false;
            isLaunching = false; isReturning = true;
            // Звук захвата (программный «писк», если файла нет)
            beep(400, 0.1);
        }
    });
}

function spawn(scene) {
    let x = Phaser.Math.Between(50, config.width-50);
    let y = Phaser.Math.Between(config.height*0.4, config.height-160);
    let key = (Math.random() > 0.4) ? 'pilot_coin' : 'usdt';
    targets.create(x, y, key).setScale(0.12).setDepth(15);
}

function beep(f, d) {
    let a = new (window.AudioContext || window.webkitAudioContext)();
    let o = a.createOscillator(); o.connect(a.destination);
    o.frequency.value = f; o.start(); o.stop(a.currentTime + d);
}

function update() {
    plane.y = 120 + Math.sin(this.time.now/600)*8;
    let sX = plane.x - 5, sY = plane.y + 25;

    if(!isLaunching && !isReturning) {
        angle += swingSpeed; if(angle > 0.8 || angle < -0.8) swingSpeed *= -1;
    } else if(isLaunching) {
        distance += 15; if(distance > config.height-140) { isLaunching = false; isReturning = true; }
    } else if(isReturning) {
        distance -= 10;
        if(distance <= 35) {
            isReturning = false;
            if(caughtItem) {
                let isFrog = caughtItem.texture.key === 'pilot_coin';
                if(isFrog) frog += 10; else usdt += 0.0005;
                
                // Вылетающие цифры
                let txt = this.add.text(plane.x, plane.y - 40, isFrog ? '+10' : '+0.0005', { 
                    font: 'bold 24px Arial', fill: isFrog ? '#ff0' : '#0f0' 
                }).setDepth(100);
                this.tweens.add({ targets: txt, y: txt.y-100, alpha: 0, duration: 1000, onComplete: () => txt.destroy() });
                
                beep(800, 0.1); // Звук удара
                caughtItem.destroy(); caughtItem = null; spawn(this);
            }
        }
    }

    hook.x = sX + Math.sin(angle) * distance;
    hook.y = sY + Math.cos(angle) * distance;
    hook.rotation = -angle;

    // Очищаем и рисуем нитку так, чтобы она заканчивалась в ЦЕНТРЕ клешни
    rope.clear().lineStyle(2, 0xffffff, 0.7).lineBetween(sX, sY, hook.x, hook.y);

    if(caughtItem) {
        caughtItem.x = hook.x; caughtItem.y = hook.y + 10;
        caughtItem.rotation = hook.rotation;
    }
}
</script>
</body>
</html>
