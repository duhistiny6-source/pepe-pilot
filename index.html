<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pepe Pilot Real Hook</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; touch-action: none; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>
<script>
const config = {
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    physics: { default: 'arcade' },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);
let plane, hook, chainGraphics, targets, scoreText;
let isLaunching = false, isReturning = false, caughtItem = null;
let angle = 0, swingSpeed = 0.035, score = 0;

const HOOK_SPEED = 20;
const PLANE_Y = 150; 

function preload() {
    this.load.crossOrigin = 'anonymous';
    this.load.image('sky', 'pg.jpeg'); 
    this.load.image('pepe', 'pepe.png'); //
    this.load.image('ton', 'ton.png');
    this.load.image('usdt', 'usdt.png');
    this.load.image('not', 'not.png');
    this.load.image('dogs', 'dogs.png');
}

function create() {
    this.add.image(config.width/2, config.height/2, 'sky').setDisplaySize(config.width, config.height);

    // 1. Самолет (База)
    plane = this.add.image(config.width / 2, PLANE_Y, 'pepe');
    plane.setDisplaySize(300, 260).setDepth(30).setCrop(0, 0, 1000, 480);

    // 2. Визуальная нить
    chainGraphics = this.add.graphics().setDepth(10);

    // 3. КЛЕШНЯ (Активный объект)
    hook = this.add.sprite(config.width / 2, PLANE_Y + 50, 'pepe');
    hook.setDepth(25).setDisplaySize(100, 90);
    hook.setCrop(300, 600, 400, 400); // Вырезаем только желтую клешню
    
    this.physics.add.existing(hook);
    hook.body.setCircle(30, 35, 35); // Физика теперь ТОЛЬКО ТУТ

    targets = this.physics.add.group();
    for(let i=0; i<8; i++) { spawnCoin(this); }

    scoreText = this.add.text(25, 25, 'SCORE: 0', { fontSize: '32px', fill: '#0f0', fontWeight: 'bold' }).setDepth(40);

    this.input.on('pointerdown', () => { 
        if(!isLaunching && !isReturning) isLaunching = true; 
    });

    // Монеты ловит только HOOK (клешня)
    this.physics.add.overlap(hook, targets, (h, target) => {
        if (isLaunching && !caughtItem) { 
            caughtItem = target; 
            isLaunching = false; 
            isReturning = true; 
        }
    });
}

function spawnCoin(scene) {
    let x = Phaser.Math.Between(100, config.width - 100);
    let y = Phaser.Math.Between(config.height * 0.6, config.height - 100);
    let type = Phaser.Utils.Array.GetRandom(['ton', 'usdt', 'not', 'dogs']);
    let coin = targets.create(x, y, type).setDisplaySize(70, 70);
    coin.body.setCircle(30);
}

function update() {
    chainGraphics.clear();
    let pivotX = config.width / 2;
    let pivotY = PLANE_Y + 40;

    if (!isLaunching && !isReturning) {
        angle += swingSpeed;
        if (angle > 1.2 || angle < -1.2) swingSpeed = -swingSpeed;
        hook.x = pivotX + Math.sin(angle) * 85;
        hook.y = pivotY + Math.cos(angle) * 85;
        hook.rotation = -angle;
    } 
    else if (isLaunching) {
        hook.x += Math.sin(angle) * HOOK_SPEED;
        hook.y += Math.cos(angle) * HOOK_SPEED;
        if (hook.y > config.height || hook.x < 0 || hook.x > config.width) {
            isLaunching = false; isReturning = true;
        }
    } 
    else if (isReturning) {
        let moveAngle = Phaser.Math.Angle.Between(hook.x, hook.y, pivotX, pivotY);
        hook.x += Math.cos(moveAngle) * (HOOK_SPEED + 5);
        hook.y += Math.sin(moveAngle) * (HOOK_SPEED + 5);
        if (caughtItem) { 
            caughtItem.x = hook.x; 
            caughtItem.y = hook.y + 20; 
        }
        if (Phaser.Math.Distance.Between(hook.x, hook.y, pivotX, pivotY) < 25) {
            isReturning = false;
            if (caughtItem) {
                score += 100; scoreText.setText('SCORE: ' + score);
                caughtItem.destroy(); caughtItem = null; spawnCoin(this);
            }
        }
    }

    // РИСУЕМ ОДНУ ТОНКУЮ НИТЬ
    chainGraphics.lineStyle(2, 0xaaaaaa, 0.8);
    chainGraphics.lineBetween(pivotX, pivotY, hook.x, hook.y);
    
    plane.y = PLANE_Y + Math.sin(this.time.now / 600) * 8;
}
</script>
</body>
</html>
