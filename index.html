<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pepe Pilot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        body { margin:0; padding:0; overflow:hidden; background:#000; touch-action: none; font-family: sans-serif; }
        #top-bar { position: fixed; top: 0; left: 0; width: 100%; height: 40px; background: rgba(0,0,0,0.5); z-index: 1000; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; box-sizing: border-box; }
        #energy-container { color: #0f0; font-size: 14px; font-weight: bold; }
        #balance-container { display: flex; justify-content: center; gap: 15px; color: #fff; font-size: 12px; }
        #settings-btn { font-size: 20px; cursor: pointer; color: white; }
        #nav-bar { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); width: 90%; height: 60px; background: rgba(0,0,0,0.9); border-radius: 15px; display: flex; justify-content: space-around; align-items: center; z-index: 500; border: 1px solid #333; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #fff; cursor: pointer; }
        .nav-item span { font-size: 20px; }
        .nav-text { font-size: 9px; color: #bbb; margin-top: 2px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: #1a1a1a; border: 2px solid #0f0; padding: 20px; border-radius: 20px; text-align: center; width: 80%; color: #fff; }
        .lot-item { background: #222; border: 1px solid #444; border-radius: 12px; padding: 10px; margin: 10px 0; display: flex; align-items: center; justify-content: space-between; }
        .buy-btn { background: #0f0; color: #000; border: none; padding: 7px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="settings-btn" onclick="toggleModal('settings-modal')">⚙️</div>

<div id="top-bar">
    <div id="energy-container">⚡ <span id="energy">100</span></div>
    <div id="balance-container">
        <div>USDT: <span id="money" style="color:#0f0">0.00004</span></div>
        <div>PLT: <span id="frog-money" style="color:#ffcc00">3</span></div>
    </div>
</div>

<div id="nav-bar">
    <div class="nav-item" onclick="toggleModal('shop-modal')"><span>🛒</span><div class="nav-text">АНГАР</div></div>
    <div class="nav-item" onclick="toggleModal('tasks-modal')"><span>📜</span><div class="nav-text">ЗАДАНИЯ</div></div>
    <div class="nav-item" onclick="toggleModal('friends-modal')"><span>👥</span><div class="nav-text">ДРУЗЬЯ</div></div>
    <div class="nav-item" onclick="connectWallet()"><span>👛</span><div class="nav-text">КОШЕЛЕК</div></div>
</div>

<div id="shop-modal" class="modal"><div class="modal-content">
    <h3>АНГАР</h3>
    <div class="lot-item">
        <img src="plane_copper.png" width="45"> <div style="text-align:left; flex:1; margin-left:10px;">МЕДНЫЙ<br><small>10 TON</small></div>
        <button class="buy-btn" onclick="pay(10)">BUY</button>
    </div>
    <div class="lot-item">
        <img src="plane_bronze.png" width="45"> <div style="text-align:left; flex:1; margin-left:10px;">БРОНЗОВЫЙ<br><small>25 TON</small></div>
        <button class="buy-btn" onclick="pay(25)">BUY</button>
    </div>
    <div class="lot-item">
        <img src="plane_gold.png" width="45"> <div style="text-align:left; flex:1; margin-left:10px;">ЗОЛОТОЙ<br><small>50 TON</small></div>
        <button class="buy-btn" onclick="pay(50)">BUY</button>
    </div>
    <div onclick="toggleModal('shop-modal')" style="margin-top:15px; color:#aaa; cursor:pointer;">Закрыть</div>
</div></div>

<div id="settings-modal" class="modal"><div class="modal-content"><h3>НАСТРОЙКИ</h3><button onclick="toggleModal('settings-modal')">ЗАКРЫТЬ</button></div></div>

<script>
    const MY_WALLET = "UQBZ-j9v-Y20h8yrtlahvFOTvaTK8rR1577NBZjK1GKE16_V";
    window.energy = 100; window.plt = 3; window.usdt = 0.00004;
    const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({ manifestUrl: 'https://pepe-pilot.github.io/pepe/tonconnect-manifest.json' });
    function toggleModal(id) { const m = document.getElementById(id); m.style.display = (m.style.display === 'flex') ? 'none' : 'flex'; }
    async function connectWallet() { try { await tonConnectUI.openModal(); } catch(e) {} }
    async function pay(amount) { if(!tonConnectUI.connected) { await connectWallet(); return; } const tx = { validUntil: Math.floor(Date.now()/1000)+60, messages: [{address: MY_WALLET, amount: (amount*1000000000).toString()}] }; try { await tonConnectUI.sendTransaction(tx); } catch(e) {} }
    window.updateUI = function() { document.getElementById('energy').innerText = window.energy; document.getElementById('frog-money').innerText = window.plt; document.getElementById('money').innerText = window.usdt.toFixed(5); };

    // --- ИГРА ---
    const config = { type: Phaser.AUTO, width: window.innerWidth, height: window.innerHeight, physics: { default: 'arcade' }, scene: { preload, create, update } };
    const game = new Phaser.Game(config);
    let plane, hook, rope, targets, isLaunching = false, isReturning = false, caughtItem = null;
    let angle = 0, swingSpeed = 0.015, distance = 25;

    function preload() {
        this.load.image('sky', 'pg.jpeg'); this.load.image('hook', 'kleshn.png');
        this.load.image('usdt', 'usdt.png'); this.load.image('plt', 'logo..png');
        this.load.image('plane', 'pepe.png');
    }

    function create() {
        this.add.image(config.width/2, config.height/2, 'sky').setDisplaySize(config.width, config.height);
        targets = this.physics.add.group();
        for(let i=0; i<6; i++) spawn(this);
        rope = this.add.graphics();
        hook = this.add.sprite(0, 0, 'hook').setDisplaySize(60, 60).setDepth(10);
        this.physics.add.existing(hook);
        plane = this.add.image(config.width/2, 120, 'plane').setDisplaySize(260, 170).setDepth(5);
        this.physics.add.overlap(hook, targets, (h, item) => { if (isLaunching && !caughtItem) { caughtItem = item; item.body.enable = false; isLaunching = false; isReturning = true; } });
        this.input.on('pointerdown', () => { if (!isLaunching && !isReturning && window.energy > 0) { isLaunching = true; window.energy--; window.updateUI(); } });
    }

    function spawn(scene) {
        let x = Phaser.Math.Between(50, config.width - 50);
        let y = Phaser.Math.Between(config.height * 0.45, config.height - 150);
        let type = (Math.random() > 0.7) ? 'plt' : 'usdt';
        targets.create(x, y, type).setScale(0.12).tweens.add({ targets: item, scale: 0.14, duration: 900, yoyo: true, repeat: -1 });
    }

    function update() {
        plane.y = 120 + Math.sin(this.time.now / 600) * 8;
        let startX = plane.x, startY = plane.y + 20;
        if (!isLaunching && !isReturning) { angle += swingSpeed; if (angle > 0.4 || angle < -0.4) swingSpeed *= -1; distance = 25;
        } else if (isLaunching) { distance += 15; if (distance > config.height - 110) { isLaunching = false; isReturning = true; }
        } else if (isReturning) { distance -= 7; if (distance <= 25) { isReturning = false; if (caughtItem) { if(caughtItem.texture.key === 'plt') window.plt += 1; else window.usdt += 0.00001; window.updateUI(); caughtItem.destroy(); caughtItem = null; spawn(this); } } }
        hook.x = startX + Math.sin(angle) * distance; hook.y = startY + Math.cos(angle) * distance;
        
        // ВОССТАНОВЛЕННЫЙ ТРОС ИЗ ИСХОДНИКА
        rope.clear().lineStyle(2, 0xffffff, 0.5).lineBetween(startX, startY, hook.x, hook.y);
        
        if (caughtItem) { caughtItem.x = hook.x; caughtItem.y = hook.y + 10; }
    }
</script>
</body>
</html>
