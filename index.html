<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pepe Moonbix Style</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin:0; overflow:hidden; background:black; touch-action: none; }
        #ui { position:fixed; top:10px; left:10px; color:#0f0; font-family:Arial; font-weight:bold; z-index: 100; pointer-events: none; }
        #shop { position:fixed; bottom:10px; left:10px; z-index: 100; display: flex; }
        button { padding:10px; margin:5px; font-size:14px; background: #222; color: #fff; border: 1px solid #0f0; border-radius: 5px; }
    </style>
</head>
<body>

<div id="ui">
    💰 <span id="money">0</span><br>
    ⚡ <span id="energy">10</span>
</div>

<div id="shop">
    <button onclick="upgrade('chance')">Шанс</button>
    <button onclick="upgrade('speed')">Скорость</button>
    <button onclick="upgrade('power')">Сила</button>
</div>

<script>
const config = {
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    physics: { default:'arcade' },
    scene: { preload, create, update }
};

new Phaser.Game(config);

let plane, hook, rope, targets;
let isLaunching=false, isReturning=false, caughtItem=null;
let angle=0, swingSpeed=0.025, distance = 60;

let money=0, energy=10;
let upgrades = { chance: 0, speed: 0, power: 0 };

const ITEMS = {
    ton:{weight:1, chance:0.9, value:50},
    usdt:{weight:2, chance:0.7, value:100},
    not:{weight:3, chance:0.5, value:200},
    dogs:{weight:5, chance:0.3, value:400}
};

function preload(){
    this.load.image('sky','pg.jpeg');
    this.load.image('pepe','pepe.png'); //
    this.load.image('ton','ton.png');
    this.load.image('usdt','usdt.png');
    this.load.image('not','not.png');
    this.load.image('dogs','dogs.png');
}

function create(){
    this.add.image(config.width/2, config.height/2, 'sky').setDisplaySize(config.width, config.height);

    // 1. ЛИНИЯ-ТРОС (Graphics) - рисуем как в Moonbix
    rope = this.add.graphics().setDepth(30);

    // 2. КЛЕШНЯ
    hook = this.add.sprite(config.width/2, 200, 'pepe');
    hook.setDepth(40).setDisplaySize(90, 80);
    hook.setCrop(300, 600, 400, 400); // Желтая часть

    // 3. САМОЛЕТ
    plane = this.add.image(config.width/2, 120, 'pepe');
    plane.setDisplaySize(260, 220).setDepth(50).setCrop(0, 0, 1000, 480);

    this.physics.add.existing(hook);
    hook.body.setCircle(30, 20, 20);

    targets = this.physics.add.group();
    for(let i=0; i<8; i++) spawn(this);

    this.input.on('pointerdown', () => {
        if(!isLaunching && !isReturning && energy > 0){
            isLaunching = true;
            energy--;
            updateUI();
        }
    });

    this.physics.add.overlap(hook, targets, (h, item) => {
        if(isLaunching && !caughtItem){
            let d = ITEMS[item.texture.key];
            if(Math.random() <= (d.chance + upgrades.chance * 0.05)) { 
                caughtItem = item;
                caughtItem.body.enable = false; 
            }
            isLaunching = false;
            isReturning = true;
        }
    });

    setInterval(() => { if(energy < 10) energy++; updateUI(); }, 4000);
}

function spawn(scene){
    let keys = Object.keys(ITEMS);
    let k = keys[Phaser.Math.Between(0, keys.length - 1)];
    let x = Phaser.Math.Between(60, config.width - 60);
    let y = Phaser.Math.Between(config.height * 0.6, config.height - 60);
    targets.create(x, y, k).setDisplaySize(60, 60);
}

function update(){
    // САМОЛЕТ ПЛАВНО КАЧАЕТСЯ
    plane.y = 120 + Math.sin(this.time.now / 800) * 6;
    let startY = plane.y + 40; // Точка вылета нити

    if(!isLaunching && !isReturning){
        // Свободное качание как в Moonbix
        angle += swingSpeed;
        if(angle > 0.75 || angle < -0.75) swingSpeed *= -1;
        distance = 60;
    }
    else if(isLaunching){
        distance += 12 + (upgrades.speed * 2);
        if(distance > config.height - 100) { isLaunching = false; isReturning = true; }
    }
    else if(isReturning){
        distance -= (10 + upgrades.power * 2);
        if(distance <= 60){
            isReturning = false;
            if(caughtItem){
                money += ITEMS[caughtItem.texture.key].value;
                caughtItem.destroy();
                caughtItem = null;
                spawn(this);
                updateUI();
            }
        }
    }

    // РАСЧЕТ ПОЗИЦИИ КЛЕШНИ
    hook.x = plane.x + Math.sin(angle) * distance;
    hook.y = startY + Math.cos(angle) * distance;
    hook.rotation = -angle;

    // РИСОВАНИЕ ОДНОЙ ЧИСТОЙ НИТИ
    rope.clear();
    rope.lineStyle(2, 0xcccccc, 1); // Тонкая серая нить
    rope.lineBetween(plane.x, startY, hook.x, hook.y);

    if(caughtItem){
        caughtItem.x = hook.x;
        caughtItem.y = hook.y + 25;
    }
}

function updateUI(){
    document.getElementById('money').innerText = money;
    document.getElementById('energy').innerText = energy;
}

window.upgrade = function(type){
    if(money >= 200){
        money -= 200;
        upgrades[type]++;
        updateUI();
    }
}
</script>
</body>
</html>
