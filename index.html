<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pepe Pilot: Crypto Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        body { margin:0; padding:0; overflow:hidden; background:#000; touch-action: none; font-family: 'Segoe UI', Arial, sans-serif; }
        #top-bar { position: fixed; top: 0; left: 0; width: 100%; height: 35px; background: rgba(0, 0, 0, 0.4); z-index: 1000; backdrop-filter: blur(2px); display: flex; align-items: center; }
        
        #energy-container { position: absolute; left: 12px; display: flex; flex-direction: column; align-items: flex-start; }
        #energy-main { color: #0f0; font-size: 13px; font-weight: bold; text-shadow: 1px 1px 1px #000; }
        #energy-info-extra { display: none; margin-top: 2px; } 
        #energy-timer { color: #aaa; font-size: 8px; font-family: monospace; }
        #restore-btn { background: #ffcc00; color: #000; font-size: 7px; padding: 1px 4px; border-radius: 3px; cursor: pointer; font-weight: bold; border: 1px solid #fff; margin-top: 1px; }

        #balance-container { width: 100%; display: flex; align-items: center; justify-content: center; gap: 15px; color: #fff; font-size: 11px; }
        .balance-item { display: flex; align-items: center; gap: 4px; }
        .coin-icon { width: 14px; height: 14px; }
        #settings-btn { position: fixed; top: 7px; right: 10px; font-size: 18px; cursor: pointer; z-index: 1001; opacity: 0.8; color: white; }
        
        #nav-bar { position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%); width: 85%; height: 50px; background: rgba(0, 0, 0, 0.9); border: 1px solid #333; border-radius: 12px; display: flex; justify-content: space-around; align-items: center; z-index: 200; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #fff; font-weight: bold; flex: 1; opacity: 0.9; cursor: pointer; }
        .nav-text { font-size: 8px; margin-top: 1px; color: #bbb; text-transform: uppercase; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; color: #fff; justify-content: center; align-items: center; flex-direction: column; }
        .modal-content { background: #1a1a1a; border: 2px solid #0f0; padding: 25px; border-radius: 20px; text-align: center; min-width: 280px; max-width: 90%; max-height: 80vh; overflow-y: auto; }
        .task-item { background: #222; border: 1px solid #444; border-radius: 10px; padding: 10px; margin: 10px 0; display: flex; justify-content: space-between; align-items: center; }
        .task-info { text-align: left; flex: 1; margin-left: 10px; }
        .task-title { font-size: 13px; font-weight: bold; }
        .task-reward { font-size: 11px; color: #0f0; }
        .task-btn { background: #0f0; color: #000; border: none; padding: 6px 12px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>

<div id="settings-btn" onclick="toggleModal('settings-modal')">⚙️</div>

<div id="top-bar">
    <div id="energy-container">
        <div id="energy-main">⚡ <span id="energy">100</span></div>
        <div id="energy-info-extra">
            <div id="energy-timer">02:00:00</div>
            <div id="restore-btn" onclick="restoreEnergyByAd()">AD ⚡</div>
        </div>
    </div>
    <div id="balance-container">
        <div class="balance-item"><span>USDT:</span> <span id="money" style="color:#0f0">0.0000</span></div>
        <div class="balance-item">
            <img src="logo..png" class="coin-icon"> <span>PLT:</span> <span id="frog-money" style="color:#ffcc00">0</span>
        </div>
    </div>
</div>

<div id="shop-modal" class="modal">
    <div class="modal-content">
        <h3>АНГАР</h3>
        <div class="task-item">
            <img src="plane_copper.png" style="width: 50px;">
            <div class="task-info"><div class="task-title" style="color:#cd7f32">МЕДНЫЙ</div><div class="task-reward">Цена: 10 TON</div></div>
            <button class="task-btn" onclick="buyPlane('copper', 10)">КУПИТЬ</button>
        </div>
        <div class="task-item">
            <img src="plane_bronze.png" style="width: 50px;">
            <div class="task-info"><div class="task-title" style="color:#b08d57">БРОНЗОВЫЙ</div><div class="task-reward">Цена: 25 TON</div></div>
            <button class="task-btn" onclick="buyPlane('bronze', 25)">КУПИТЬ</button>
        </div>
        <div class="task-item">
            <img src="plane_gold.png" style="width: 50px;">
            <div class="task-info"><div class="task-title" style="color:#ffd700">ЗОЛОТОЙ</div><div class="task-reward">Цена: 50 TON</div></div>
            <button class="task-btn" onclick="buyPlane('gold', 50)">КУПИТЬ</button>
        </div>
        <div style="margin-top:15px; color:#888; cursor:pointer;" onclick="toggleModal('shop-modal')">Закрыть</div>
    </div>
</div>

<div id="tasks-modal" class="modal">
    <div class="modal-content">
        <h3>ЗАДАНИЯ</h3>
        <div class="task-item">
            <div class="task-info"><div class="task-title">Подписка на канал</div><div class="task-reward">+100 ⚡ Энергии</div></div>
            <button class="task-btn" onclick="window.open('https://t.me/your_channel')">GO</button>
        </div>
        <div class="task-item">
            <div class="task-info"><div class="task-title">Пригласить 5 друзей</div><div class="task-reward">+500 PLT</div></div>
            <button class="task-btn" onclick="toggleModal('friends-modal')">GO</button>
        </div>
        <div style="margin-top:15px; color:#888; cursor:pointer;" onclick="toggleModal('tasks-modal')">Закрыть</div>
    </div>
</div>

<div id="nav-bar">
    <div class="nav-item" onclick="toggleModal('shop-modal')"><span>🛒</span><div class="nav-text">АНГАР</div></div>
    <div class="nav-item" onclick="toggleModal('tasks-modal')"><span>📜</span><div class="nav-text">ЗАДАНИЯ</div></div>
    <div class="nav-item" onclick="toggleModal('friends-modal')"><span>👥</span><div class="nav-text">ДРУЗЬЯ</div></div>
    <div class="nav-item" onclick="connectWallet()"><span>👛</span><div class="nav-text">КОШЕЛЕК</div></div>
</div>

<script>
    const MY_WALLET = "ТВОЙ_АДРЕС_КОШЕЛЬКА"; // Сюда придут TON
    const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
        manifestUrl: 'https://duhistiny6-source.github.io/pepe-pilot/tonconnect-manifest.json',
        buttonRootId: null
    });

    async function buyPlane(type, amountTon) {
        if (!tonConnectUI.connected) { alert("Подключи кошелек!"); return; }
        const transaction = {
            validUntil: Math.floor(Date.now() / 1000) + 60,
            messages: [{ address: MY_WALLET, amount: (amountTon * 1000000000).toString() }]
        };
        try {
            await tonConnectUI.sendTransaction(transaction);
            alert("Оплата " + amountTon + " TON получена!");
            // Тут логика смены скина самолета
        } catch(e) { alert("Ошибка транзакции"); }
    }

    function toggleModal(id) {
        const m = document.getElementById(id);
        m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
    }
</script>
<script src="game.js"></script>
</body>
</html>
