<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pepe Pilot: Loading Fixed</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin:0; overflow:hidden; background:#000; touch-action: none; font-family: Arial, sans-serif; }
        #ui { position:fixed; top:12px; left:12px; color:#0f0; font-weight:bold; z-index: 100; pointer-events: none; text-shadow: 1px 1px 2px #000; display: flex; flex-direction: column; gap: 5px; }
        #nav-bar { 
            position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%); 
            width: 90%; height: 50px; background: rgba(0, 0, 0, 0.95); 
            border: 1px solid #0f0; border-radius: 12px; 
            display: flex; justify-content: space-around; align-items: center; z-index: 200; 
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #0f0; font-weight: bold; flex: 1; }
        .nav-item span { font-size: 18px; }
        .nav-text { font-size: 8px; text-transform: uppercase; }
        #settings-btn { position: fixed; top: 12px; right: 12px; font-size: 28px; cursor: pointer; z-index: 1001; }
    </style>
</head>
<body>

<div id="settings-btn">⚙️</div>

<div id="ui">
    <div>💰 <span id="money">0.0000</span></div>
    <div>⚡ <span id="energy">100</span>/100</div>
</div>

<div id="nav-bar">
    <div class="nav-item"><span>🛒</span><div class="nav-text">МАГАЗИН</div></div>
    <div class="nav-item"><span>📜</span><div class="nav-text">ЗАДАНИЯ</div></div>
    <div class="nav-item"><span>👥</span><div class="nav-text">ДРУЗЬЯ</div></div>
    <div class="nav-item"><span>👛</span><div class="nav-text">КОШЕЛЕК</div></div>
</div>

<script>
const config = {
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    backgroundColor: '#002200', // Тот самый зеленый фон
    physics: { default: 'arcade' },
    scene: { preload, create, update }
};

const game = new Phaser.Game(config);
let plane, hook, targets, bgMusic;
const COIN_VALUE = 0.0005;

function preload() {
    // --- ЛИНИЯ ЗАГРУЗКИ ---
    let width = this.cameras.main.width;
    let height = this.cameras.main.height;

    // Фон для полоски
    let progressBox = this.add.graphics();
    let progressBar = this.add.graphics();
    progressBox.fillStyle(0x222222, 0.8);
    progressBox.fillRect(width / 2 - 110, height / 2 - 10, 220, 30);

    // Текст процентов
    let percentText = this.make.text({
        x: width / 2,
        y: height / 2 + 35,
        text: '0%',
        style: { font: '18px monospace', fill: '#00ff00' }
    });
    percentText.setOrigin(0.5, 0.5);

    // Слушатель прогресса
    this.load.on('progress', function (value) {
        percentText.setText(parseInt(value * 100) + '%');
        progressBar.clear();
        progressBar.fillStyle(0x00ff00, 1);
        progressBar.fillRect(width / 2 - 100, height / 2, 200 * value, 10);
    });

    // Удаление после загрузки
    this.load.on('complete', function () {
        progressBar.destroy();
        progressBox.destroy();
        percentText.destroy();
    });

    // --- ЗАГРУЗКА РЕСУРСОВ ---
    this.load.image('sky', 'pg.jpeg');
    this.load.image('hook', 'kleshn.png');
    this.load.image('usdt', 'usdt.png');
    this.load.image('plane', 'pepe.png');
    this.load.audio('theme', 'music.mp3');
}

function create() {
    if (this.textures.exists('sky')) {
        this.add.image(config.width / 2, config.height / 2, 'sky').setDisplaySize(config.width, config.height);
    }
    
    // Музыка (0.004 как просил)
    try {
        bgMusic = this.sound.add('theme', { volume: 0.004, loop: true });
    } catch (e) {}

    this.input.once('pointerdown', () => { 
        if (bgMusic && !bgMusic.isPlaying) bgMusic.play();
    });

    // Самолёт Пепе
    if (this.textures.exists('plane')) {
        plane = this.add.image(config.width / 2, 120, 'plane').setDisplaySize(280, 180).setDepth(60);
    }
    
    // Монетки USDT
    targets = this.physics.add.group();
    for(let i = 0; i < 6; i++) {
        let x = Phaser.Math.Between(50, config.width - 50);
        let y = Phaser.Math.Between(config.height * 0.45, config.height - 150);
        let coin = targets.create(x, y, 'usdt').setScale(0.12).setDepth(40);
    }
}

function update() {
    // Анимация покачивания самолёта
    if (plane) plane.y = 120 + Math.sin(this.time.now / 600) * 8;
}
</script>
</body>
</html>
