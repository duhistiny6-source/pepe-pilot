<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pepe Pilot Gold</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; touch-action: none; }
    </style>
</head>
<body>
<script>
const ASSETS_URL = 'https://raw.githubusercontent.com/duhistiny6/pepe-pilot/main/';

const config = {
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    physics: { default: 'arcade' },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);
let plane, clawGraphic, chain, targets, scoreText, timerText;
let isLaunching = false, isReturning = false, caughtItem = null;
let angle = 0, swingSpeed = 0.03, launchSpeed = 15;
let score = 0, timeLeft = 60;

function preload() {
    this.load.crossOrigin = 'anonymous';
    // Пробуем загрузить, но если не выйдет - не беда
    this.load.image('sky', ASSETS_URL + 'g..jpg'); 
    this.load.image('pepe', ASSETS_URL + 'pepe.png');
    this.load.image('ton', ASSETS_URL + 'ton-ecosystem-removebe.png');
}

function create() {
    // 1. ФОН
    if (this.textures.exists('sky')) {
        let bg = this.add.image(config.width/2, config.height/2, 'sky');
        let scale = Math.max(config.width / bg.width, config.height / bg.height);
        bg.setScale(scale);
    } else {
        this.add.rectangle(0, 0, config.width, config.height, 0x1e1e2e).setOrigin(0);
    }
    
    // 2. САМОЛЕТ (ПЕПЕ)
    if (this.textures.exists('pepe')) {
        plane = this.add.sprite(config.width / 2, 120, 'pepe');
    } else {
        // Если картинки нет, рисуем желтый корпус самолета
        plane = this.add.container(config.width / 2, 120);
        let body = this.add.rectangle(0, 0, 100, 40, 0xffcc00, 1).setStrokeStyle(2, 0x000);
        let wing = this.add.rectangle(0, -5, 120, 15, 0xffcc00, 1).setStrokeStyle(2, 0x000);
        plane.add([body, wing]);
    }
    plane.setDepth(10).setDisplaySize(180, 120);

    // Покачивание
    this.tweens.add({ targets: plane, y: 135, duration: 2000, yoyo: true, loop: -1, ease: 'Sine.easeInOut' });
    
    chain = this.add.graphics().setDepth(5);
    clawGraphic = this.add.graphics().setDepth(6);
    this.clawPoint = this.add.circle(config.width/2, 220, 15);
    this.physics.add.existing(this.clawPoint);

    // 3. МОНЕТЫ
    targets = this.physics.add.group();
    for(let i=0; i<6; i++) { spawnCoin(this); }

    // ИНТЕРФЕЙС
    scoreText = this.add.text(20, 30, '💎 Очки: 0', { fontSize: '26px', fill: '#fff', fontStyle: 'bold' });
    timerText = this.add.text(config.width - 170, 30, '⏱ 60 сек', { fontSize: '26px', fill: '#ff0', fontStyle: 'bold' });

    this.time.addEvent({
        delay: 1000,
        callback: () => { if(timeLeft > 0) { timeLeft--; timerText.setText('⏱ ' + timeLeft + ' сек'); } },
        loop: true
    });

    this.input.on('pointerdown', () => { 
        if(!isLaunching && !isReturning && timeLeft > 0) isLaunching = true; 
    });

    this.physics.add.overlap(this.clawPoint, targets, (c, target) => {
        if (isLaunching && !caughtItem) { 
            caughtItem = target; 
            isLaunching = false; 
            isReturning = true; 
        }
    });
}

function spawnCoin(scene) {
    let x = Phaser.Math.Between(50, config.width - 50);
    let y = Phaser.Math.Between(350, config.height - 80);
    
    let coin;
    if (scene.textures.exists('ton')) {
        coin = targets.create(x, y, 'ton');
        coin.setDisplaySize(70, 70);
    } else {
        // Если картинки монеты нет, рисуем красивый золотой круг
        coin = scene.add.circle(x, y, 30, 0xffd700).setStrokeStyle(4, 0xffaa00);
        targets.add(coin);
    }
    coin.setDepth(4);
}

function update() {
    if (timeLeft <= 0) {
        timerText.setText('ФИНИШ!').setScale(1.5);
        return;
    }

    let px = plane.x; 
    let py = plane.y + 40;

    if (!isLaunching && !isReturning) {
        angle += swingSpeed;
        if (Math.abs(angle) > 0.8) swingSpeed = -swingSpeed;
        this.clawPoint.x = px + Math.sin(angle) * 120;
        this.clawPoint.y = py + Math.cos(angle) * 120;
    } else if (isLaunching) {
        this.clawPoint.x += Math.sin(angle) * launchSpeed;
        this.clawPoint.y += Math.cos(angle) * launchSpeed;
        if (this.clawPoint.y > config.height || this.clawPoint.x < 0 || this.clawPoint.x > config.width) {
            isLaunching = false; isReturning = true;
        }
    } else if (isReturning) {
        let tx = px + Math.sin(angle) * 120;
        let ty = py + Math.cos(angle) * 120;
        let dist = Phaser.Math.Distance.Between(this.clawPoint.x, this.clawPoint.y, tx, ty);
        this.clawPoint.x += (tx - this.clawPoint.x) * 0.12;
        this.clawPoint.y += (ty - this.clawPoint.y) * 0.12;
        if (caughtItem) { caughtItem.x = this.clawPoint.x; caughtItem.y = this.clawPoint.y; }
        if (dist < 15) {
            isReturning = false;
            if (caughtItem) { 
                score += 100; scoreText.setText('💎 Очки: ' + score); 
                caughtItem.destroy(); caughtItem = null; spawnCoin(this);
            }
        }
    }

    chain.clear().lineStyle(3, 0xaaaaaa).lineBetween(px, py, this.clawPoint.x, this.clawPoint.y);
    clawGraphic.clear().lineStyle(5, 0xffd700);
    let rot = Phaser.Math.Angle.Between(px, py, this.clawPoint.x, this.clawPoint.y) + Math.PI/2;
    let gap = caughtItem ? 0.2 : 0.7; 
    
    clawGraphic.beginPath();
    clawGraphic.arc(this.clawPoint.x, this.clawPoint.y, 25, rot - gap, rot + gap);
    clawGraphic.strokePath();
    clawGraphic.beginPath();
    clawGraphic.arc(this.clawPoint.x, this.clawPoint.y, 25, rot + Math.PI - gap, rot + Math.PI + gap);
    clawGraphic.strokePath();
}
</script>
</body>
</html>
