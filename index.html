<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pepe Pilot: Gold USDT Collector</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin:0; overflow:hidden; background:black; touch-action: none; }
        #ui { position:fixed; top:10px; left:10px; color:#0f0; font-family:Arial; font-weight:bold; z-index: 100; pointer-events: none; text-shadow: 1px 1px 1px #000; }
        #shop { position:fixed; bottom:10px; left:10px; z-index: 100; display: flex; gap: 5px; }
        button { padding:10px; font-size:14px; background: rgba(34, 34, 34, 0.8); color: #0f0; border: 2px solid #0f0; border-radius: 8px; font-weight: bold; }
        button:active { background: #0f0; color: #000; }
    </style>
</head>
<body>

<div id="ui">
    💰 <span id="money">0</span><br>
    ⚡ <span id="energy">10</span>
</div>

<div id="shop">
    <button onclick="upgrade('chance')">Шанс</button>
    <button onclick="upgrade('speed')">Скорость</button>
    <button onclick="upgrade('power')">Сила</button>
</div>

<script>
// Глобальные переменные игры
let plane, hook, rope, targets, maskShape;
let isLaunching = false, isReturning = false, caughtItem = null;
let angle = 0, swingSpeed = 0.03, distance = 25; 
let money = 0, energy = 10;
let upgrades = { chance: 0, speed: 0, power: 0 };

const config = {
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    physics: { default: 'arcade' },
    scene: { preload, create, update }
};

new Phaser.Game(config);

function preload() {
    this.load.image('sky', 'pg.jpeg');
    this.load.image('plane', 'pepe.png');
    this.load.image('hook', 'kleshn.png');
    this.load.image('usdt', 'usdt.png');
}

function create() {
    this.add.image(config.width / 2, config.height / 2, 'sky').setDisplaySize(config.width, config.height);
    
    rope = this.add.graphics().setDepth(35);

    // 1. Создаем маску для монет (чтобы были круглыми)
    maskShape = this.make.graphics().setDepth(1).fillStyle(0xffffff, 1).fillCircle(0, 0, 27);

    // Клешня
    hook = this.add.sprite(0, 0, 'hook').setDepth(40).setDisplaySize(60, 60); 
    this.physics.add.existing(hook);
    hook.body.setCircle(22); // Компактная физика

    // Самолет (Пепе)
    plane = this.add.image(config.width / 2, 120, 'plane').setDisplaySize(280, 180).setDepth(50);

    targets = this.physics.add.group();
    // Создаем 7 красивых круглых монет
    for(let i = 0; i < 7; i++) spawn(this);

    // Управление
    this.input.on('pointerdown', () => {
        if (!isLaunching && !isReturning && energy > 0) {
            isLaunching = true;
            energy--;
            updateUI();
        }
    });

    // Хватаем монету
    this.physics.add.overlap(hook, targets, (h, item) => {
        if (isLaunching && !caughtItem) {
            // Шанс поимки USDT (базовый 80% + апгрейд)
            if (Math.random() <= (0.8 + upgrades.chance * 0.05)) { 
                caughtItem = item;
                caughtItem.body.enable = false; 
                caughtItem.mask = null; // Убираем маску при захвате, чтобы не багало
            }
            isLaunching = false;
            isReturning = true;
        }
    });

    // Регенерация энергии
    setInterval(() => { if (energy < 10) energy++; updateUI(); }, 4000);
}

function spawn(scene) {
    let x = Phaser.Math.Between(50, config.width - 50);
    let y = Phaser.Math.Between(config.height * 0.5, config.height - 100);
    
    let coin = targets.create(x, y, 'usdt');
    coin.setDisplaySize(55, 55); // Размер монетки
    
    // Применяем маску, делая монетку круглой
    // Нам нужен отдельный экземпляр Graphics для каждой маски, чтобы она спавнилась на монете
    let uniqueMask = scene.make.graphics().fillCircle(x, y, 27).setDepth(1);
    coin.mask = new Phaser.Display.Masks.GeometryMask(scene, uniqueMask);
    
    // Добавляем монетке легкую анимацию пульсации, чтобы она выглядела "живой"
    scene.tweens.add({
        targets: coin,
        scale: 1.1,
        duration: 800 + Math.random() * 400,
        yoyo: true,
        repeat: -1,
        ease: 'Sine.easeInOut'
    });
    
    // Также пульсирует и её маска
    scene.tweens.add({
        targets: uniqueMask,
        scale: 1.1,
        duration: 800 + Math.random() * 400,
        yoyo: true,
        repeat: -1,
        ease: 'Sine.easeInOut'
    });
}

function update() {
    plane.y = 120 + Math.sin(this.time.now / 600) * 8;
    
    let startX = plane.x - 5; 
    let startY = plane.y + 15; 

    if (!isLaunching && !isReturning) {
        angle += swingSpeed;
        if (angle > 0.75 || angle < -0.75) swingSpeed *= -1;
        distance = 25; 
    } else if (isLaunching) {
        distance += 16 + (upgrades.speed * 2.5);
        if (distance > config.height - 100) { isLaunching = false; isReturning = true; }
    } else if (isReturning) {
        distance -= (14 + upgrades.power * 2.5);
        if (distance <= 25) {
            isReturning = false;
            if (caughtItem) {
                money += 100;
                caughtItem.destroy();
                caughtItem = null;
                spawn(this);
                updateUI();
            }
        }
    }

    hook.x = startX + Math.sin(angle) * distance;
    hook.y = startY + Math.cos(angle) * distance;
    hook.rotation = -angle;

    // НИТКА: Используем прошлые правки, чтобы не торчала
    let endX = startX + Math.sin(angle) * (distance - 22);
    let endY = startY + Math.cos(angle) * (distance - 22);

    rope.clear();
    rope.lineStyle(2, 0xffffff, 0.9); 
    rope.lineBetween(startX, startY, endX, endY);

    if (caughtItem) {
        caughtItem.x = hook.x;
        caughtItem.y = hook.y + 20;
        caughtItem.rotation = hook.rotation;
    }
}

function updateUI() {
    document.getElementById('money').innerText = money;
    document.getElementById('energy').innerText = energy;
}

window.upgrade = function(type) {
    if (money >= 200) {
        money -= 200;
        upgrades[type]++;
        updateUI();
    }
}
</script>
</body>
</html>
