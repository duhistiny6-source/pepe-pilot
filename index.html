<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pepe Pilot Fix</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; touch-action: none; }
    </style>
</head>
<body>
<script>
const config = {
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    physics: { default: 'arcade' },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);
let plane, clawGraphic, chain, targets, scoreText, timerText;
let isLaunching = false, isReturning = false, caughtItem = null;
let angle = 0, swingSpeed = 0.025, launchSpeed = 14, returnSpeed = 9;
let score = 0, timeLeft = 60;

function preload() {
    this.load.image('sky', 'https://labs.phaser.io/assets/skies/space3.png');
    // ПРОВЕРЬ ЭТИ ИМЕНА В GITHUB! Если они другие - замени тут.
    this.load.image('pepe', 'images__32_-removebg-preview.png');
    this.load.image('ton', 'ton-ecosystem-removebg-preview.png');
    this.load.image('not', 'images__35_-removebg-preview.png');
    this.load.image('dogs', 'images__33_-removebg-preview.png');
}

function create() {
    this.add.image(config.width/2, config.height/2, 'sky').setAlpha(0.4).setScale(2);
    
    plane = this.add.sprite(config.width / 2, 100, 'pepe').setDepth(10);
    plane.setDisplaySize(200, 200); 
    
    chain = this.add.graphics().setDepth(5);
    clawGraphic = this.add.graphics().setDepth(6);
    
    // Невидимая точка захвата
    this.clawPoint = this.add.circle(config.width/2, 200, 15);
    this.physics.add.existing(this.clawPoint);

    targets = this.physics.add.group();
    const assets = ['ton', 'dogs', 'not'];

    // Равномерно расставляем монетки, чтобы не было кучи
    for(let i=0; i<10; i++) {
        let x = 60 + (i * (config.width - 120) / 9); // Равномерно по ширине
        let y = Phaser.Math.Between(350, config.height - 100);
        let coin = targets.create(x, y, Phaser.Math.RND.pick(assets));
        coin.setDisplaySize(70, 70).setDepth(4);
    }

    scoreText = this.add.text(20, 20, 'Score: 0', { fontSize: '24px', fill: '#fff', fontStyle: 'bold' });
    timerText = this.add.text(config.width - 140, 20, 'Time: 60', { fontSize: '24px', fill: '#ff0', fontStyle: 'bold' });

    this.time.addEvent({
        delay: 1000,
        callback: () => { if(timeLeft > 0) timeLeft--; timerText.setText('Time: ' + timeLeft); },
        loop: true
    });

    this.input.on('pointerdown', () => { if(!isLaunching && !isReturning && timeLeft > 0) isLaunching = true; });

    this.physics.add.overlap(this.clawPoint, targets, (c, target) => {
        if (isLaunching && !caughtItem) {
            caughtItem = target;
            isLaunching = false;
            isReturning = true;
        }
    });
}

function update() {
    if (timeLeft <= 0) return;

    let px = plane.x;
    let py = plane.y + 30;

    if (!isLaunching && !isReturning) {
        angle += swingSpeed;
        if (angle > 0.8 || angle < -0.8) swingSpeed = -swingSpeed;
        this.clawPoint.x = px + Math.sin(angle) * 130;
        this.clawPoint.y = py + Math.cos(angle) * 130;
    } else if (isLaunching) {
        this.clawPoint.x += Math.sin(angle) * launchSpeed;
        this.clawPoint.y += Math.cos(angle) * launchSpeed;
        if (this.clawPoint.y > config.height || this.clawPoint.x < 0 || this.clawPoint.x > config.width) {
            isLaunching = false;
            isReturning = true;
        }
    } else if (isReturning) {
        let tx = px + Math.sin(angle) * 130;
        let ty = py + Math.cos(angle) * 130;
        let dist = Phaser.Math.Distance.Between(this.clawPoint.x, this.clawPoint.y, tx, ty);
        this.clawPoint.x += (tx - this.clawPoint.x) * 0.2;
        this.clawPoint.y += (ty - this.clawPoint.y) * 0.2;
        if (caughtItem) { caughtItem.x = this.clawPoint.x; caughtItem.y = this.clawPoint.y; }
        if (dist < 15) {
            isReturning = false;
            if (caughtItem) { score += 100; scoreText.setText('Score: ' + score); caughtItem.destroy(); caughtItem = null; }
        }
    }

    // РИСУЕМ ЦЕПЬ
    chain.clear().lineStyle(2, 0xaaaaaa).lineBetween(px, py, this.clawPoint.x, this.clawPoint.y);

    // РИСУЕМ НАСТОЯЩУЮ КЛЕШНЮ
    clawGraphic.clear().lineStyle(4, 0xffd700);
    let size = 25;
    let gA = angle + Math.PI/2; 
    // Левый "зуб"
    clawGraphic.beginPath();
    clawGraphic.arc(this.clawPoint.x, this.clawPoint.y, size, gA - 0.5, gA + 0.5);
    clawGraphic.strokePath();
    // Правый "зуб"
    clawGraphic.beginPath();
    clawGraphic.arc(this.clawPoint.x, this.clawPoint.y, size, gA + Math.PI - 0.5, gA + Math.PI + 0.5);
    clawGraphic.strokePath();
}
</script>
</body>
</html>
