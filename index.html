<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pepe Extendable Hook</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; touch-action: none; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>
<script>
const config = {
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    physics: { default: 'arcade' },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);
let plane, hook, targets, scoreText;
let isLaunching = false, isReturning = false, caughtItem = null;
let angle = 0, swingSpeed = 0.03, score = 0;

const EXTEND_SPEED = 10; // Скорость выдвижения
const PLANE_Y = 160; 

function preload() {
    this.load.crossOrigin = 'anonymous';
    this.load.image('sky', 'pg.jpeg'); 
    this.load.image('pepe', 'pepe.png'); //
    this.load.image('ton', 'ton.png');
    this.load.image('usdt', 'usdt.png');
    this.load.image('not', 'not.png');
    this.load.image('dogs', 'dogs.png');
}

function create() {
    this.add.image(config.width/2, config.height/2, 'sky').setDisplaySize(config.width, config.height);

    // 1. Самолет (База)
    plane = this.add.image(config.width / 2, PLANE_Y, 'pepe');
    plane.setDisplaySize(300, 260).setDepth(50).setCrop(0, 0, 1000, 480);

    // 2. ВЫДВИЖНАЯ КЛЕШНЯ
    // Мы создаем её длинной, но прячем под самолет
    hook = this.add.sprite(config.width / 2, PLANE_Y + 35, 'pepe');
    hook.setOrigin(0.5, 0); // Тянется от верхней точки вниз
    hook.setDisplaySize(100, 100); // Начальный размер
    hook.setDepth(40);
    
    // Оставляем видимой только саму клешню и тонкую нить над ней
    hook.setCrop(300, 0, 400, 1000); 

    this.physics.add.existing(hook);

    targets = this.physics.add.group();
    for(let i=0; i<8; i++) { spawnCoin(this); }

    scoreText = this.add.text(25, 25, 'SCORE: 0', { fontSize: '32px', fill: '#0f0', fontWeight: 'bold' }).setDepth(60);

    this.input.on('pointerdown', () => { 
        if(!isLaunching && !isReturning) isLaunching = true; 
    });

    // Монеты ловит только кончик клешни
    this.physics.add.overlap(hook, targets, (h, target) => {
        if (isLaunching && !caughtItem) { 
            caughtItem = target; 
            isLaunching = false; 
            isReturning = true; 
        }
    });
}

function spawnCoin(scene) {
    let x = Phaser.Math.Between(100, config.width - 100);
    let y = Phaser.Math.Between(config.height * 0.65, config.height - 100);
    let type = Phaser.Utils.Array.GetRandom(['ton', 'usdt', 'not', 'dogs']);
    let coin = targets.create(x, y, type).setDisplaySize(70, 70);
    coin.body.setCircle(30);
}

function update() {
    if (!isLaunching && !isReturning) {
        // МАЯТНИК (вращается сама клешня)
        angle += swingSpeed;
        if (angle > 1.1 || angle < -1.1) swingSpeed = -swingSpeed;
        hook.rotation = -angle;
        hook.displayHeight = 100; // Сброс длины
    } 
    else if (isLaunching) {
        // ВЫДВИЖЕНИЕ (клешня растет в длину)
        hook.displayHeight += EXTEND_SPEED;

        if (hook.displayHeight > config.height - PLANE_Y) {
            isLaunching = false; isReturning = true;
        }
    } 
    else if (isReturning) {
        // СЖАТИЕ (клешня укорачивается)
        hook.displayHeight -= EXTEND_SPEED + 5;

        if (caughtItem) {
            // Привязываем монету к самому кончику растянутой клешни
            let tipX = hook.x + Math.sin(angle) * (hook.displayHeight - 20);
            let tipY = hook.y + Math.cos(angle) * (hook.displayHeight - 20);
            caughtItem.x = tipX;
            caughtItem.y = tipY;
        }

        if (hook.displayHeight <= 100) {
            isReturning = false;
            hook.displayHeight = 100;
            if (caughtItem) {
                score += 100; scoreText.setText('SCORE: ' + score);
                caughtItem.destroy(); caughtItem = null; spawnCoin(this);
            }
        }
    }
    
    plane.y = PLANE_Y + Math.sin(this.time.now / 600) * 8;
}
</script>
</body>
</html>
