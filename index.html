<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pepe Pilot</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; touch-action: none; }
    </style>
</head>
<body>
<script>
// ВАЖНО: Твои прямые ссылки из GitHub
const ASSETS_URL = 'https://raw.githubusercontent.com/duhistiny6/pepe-pilot/main/';

const config = {
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    physics: { default: 'arcade' },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);
let plane, clawGraphic, chain, targets, scoreText, timerText;
let isLaunching = false, isReturning = false, caughtItem = null;
let angle = 0, swingSpeed = 0.03, launchSpeed = 12;
let score = 0, timeLeft = 60;

 function preload() {
    this.load.crossOrigin = 'anonymous';

     
    const base = 'https://raw.githubusercontent.com/duhistiny6/pepe-pilot/main/';

    this.load.image('sky', base + 'g..jpg'); 
    this.load.image('pepe', base + 'pepe.png');
    this.load.image('ton', base + 'ton-ecosystem-removebe.png');

     
    this.load.on('filecomplete', (key) => {
        console.log('Загружен файл: ' + key);
    });
}


function create() {
    // Фон
    let bg = this.add.image(config.width/2, config.height/2, 'sky');
    let scale = Math.max(config.width / bg.width, config.height / bg.height);
    bg.setScale(scale);
    
    // Пепе
    plane = this.add.sprite(config.width / 2, 120, 'pepe').setDepth(10);
    plane.setDisplaySize(220, 160); 

    // Добавим анимацию полета (вверх-вниз)
    this.tweens.add({
        targets: plane,
        y: 135,
        duration: 2000,
        yoyo: true,
        loop: -1,
        ease: 'Sine.easeInOut'
    });
    
    chain = this.add.graphics().setDepth(5);
    clawGraphic = this.add.graphics().setDepth(6);
    
    // Точка крюка
    this.clawPoint = this.add.circle(config.width/2, 220, 15);
    this.physics.add.existing(this.clawPoint);

    // Монеты
    targets = this.physics.add.group();
    for(let i=0; i<6; i++) { spawnCoin(); }

    // Тексты
    scoreText = this.add.text(20, 30, 'Очки: 0', { fontSize: '28px', fill: '#fff', stroke: '#000', strokeThickness: 5 });
    timerText = this.add.text(config.width - 180, 30, 'Время: 60', { fontSize: '28px', fill: '#ff0', stroke: '#000', strokeThickness: 5 });

    this.time.addEvent({
        delay: 1000,
        callback: () => { if(timeLeft > 0) { timeLeft--; timerText.setText('Время: ' + timeLeft); } },
        loop: true
    });

    this.input.on('pointerdown', () => { 
        if(!isLaunching && !isReturning && timeLeft > 0) isLaunching = true; 
    });

    this.physics.add.overlap(this.clawPoint, targets, (c, target) => {
        if (isLaunching && !caughtItem) { 
            caughtItem = target; 
            isLaunching = false; 
            isReturning = true; 
        }
    });
}

function spawnCoin() {
    let x = Phaser.Math.Between(50, config.width - 50);
    let y = Phaser.Math.Between(380, config.height - 100);
    let coin = targets.create(x, y, 'ton');
    if(coin) coin.setDisplaySize(70, 70).setDepth(4);
}

function update() {
    if (timeLeft <= 0) {
        timerText.setText('ФИНИШ!');
        return;
    }

    let px = plane.x; 
    let py = plane.y + 40; // Выход веревки из-под самолета

    if (!isLaunching && !isReturning) {
        angle += swingSpeed;
        if (Math.abs(angle) > 0.8) swingSpeed = -swingSpeed;
        this.clawPoint.x = px + Math.sin(angle) * 120;
        this.clawPoint.y = py + Math.cos(angle) * 120;
    } else if (isLaunching) {
        this.clawPoint.x += Math.sin(angle) * launchSpeed;
        this.clawPoint.y += Math.cos(angle) * launchSpeed;
        if (this.clawPoint.y > config.height || this.clawPoint.x < 0 || this.clawPoint.x > config.width) {
            isLaunching = false; isReturning = true;
        }
    } else if (isReturning) {
        let tx = px + Math.sin(angle) * 120;
        let ty = py + Math.cos(angle) * 120;
        let dist = Phaser.Math.Distance.Between(this.clawPoint.x, this.clawPoint.y, tx, ty);
        
        this.clawPoint.x += (tx - this.clawPoint.x) * 0.1;
        this.clawPoint.y += (ty - this.clawPoint.y) * 0.1;
        
        if (caughtItem) { 
            caughtItem.x = this.clawPoint.x; 
            caughtItem.y = this.clawPoint.y; 
        }
        
        if (dist < 15) {
            isReturning = false;
            if (caughtItem) { 
                score += 100; 
                scoreText.setText('Очки: ' + score); 
                caughtItem.destroy(); 
                caughtItem = null; 
                spawnCoin(); // Появляется новая монетка
            }
        }
    }

    // Отрисовка
    chain.clear().lineStyle(3, 0x442200).lineBetween(px, py, this.clawPoint.x, this.clawPoint.y);
    clawGraphic.clear().lineStyle(5, 0xffd700);
    let gA = angle + Math.PI/2; 
    let gap = caughtItem ? 0.2 : 0.7; 
    
    clawGraphic.beginPath();
    clawGraphic.arc(this.clawPoint.x, this.clawPoint.y, 25, gA - gap, gA + gap);
    clawGraphic.strokePath();
    clawGraphic.beginPath();
    clawGraphic.arc(this.clawPoint.x, this.clawPoint.y, 25, gA + Math.PI - gap, gA + Math.PI + gap);
    clawGraphic.strokePath();
}
</script>
</body>
</html>
