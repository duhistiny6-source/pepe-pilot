<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pepe Pilot: Stealth Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        body { margin:0; overflow:hidden; background:#000; touch-action: none; font-family: Arial, sans-serif; }
        
        #balance-trigger { 
            position: fixed; top: 12px; left: 12px; z-index: 100; 
            background: rgba(0, 0, 0, 0.6); border: 2px solid #0f0; 
            border-radius: 50%; width: 55px; height: 55px; 
            display: flex; justify-content: center; align-items: center; 
            font-size: 28px; cursor: pointer; pointer-events: auto;
        }
        #energy-display {
            position: fixed; top: 75px; left: 20px; z-index: 100;
            color: #fff; font-weight: bold; font-size: 18px; text-shadow: 2px 2px 2px #000;
        }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; color: #fff; justify-content: center; align-items: center; flex-direction: column; }
        .modal-content { background: #1a1a1a; border: 2px solid #0f0; padding: 25px; border-radius: 20px; text-align: center; min-width: 280px; }
        .balance-item { display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 24px; margin: 15px 0; color: #0f0; font-weight: bold; }
        
        #nav-bar { position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%); width: 90%; height: 60px; background: rgba(0, 0, 0, 0.9); border: 1px solid #333; border-radius: 15px; display: flex; justify-content: space-around; align-items: center; z-index: 200; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #fff; font-size: 10px; font-weight: bold; flex: 1; cursor: pointer; }
    </style>
</head>
<body>

<div id="balance-trigger" onclick="toggleModal('balance-modal')">💰</div>
<div id="energy-display">⚡ <span id="energy">100</span></div>

<div id="balance-modal" class="modal">
    <div class="modal-content">
        <h2>БАЛАНС</h2>
        <div class="balance-item">💰 <span id="money-modal">0.0000</span></div>
        <div class="balance-item"><img src="logo..png" style="width:32px"> <span id="frog-money-modal">0</span></div>
        <button onclick="toggleModal('balance-modal')" style="margin-top:20px; padding:10px; border:1px solid #0f0; background:#333; color:#fff;">ЗАКРЫТЬ</button>
    </div>
</div>

<div id="nav-bar">
    <div class="nav-item"><span>🛒</span><div>МАГАЗИН</div></div>
    <div class="nav-item" onclick="alert('Задания скоро!')"><span>📜</span><div>ЗАДАНИЯ</div></div>
    <div class="nav-item" onclick="connectWallet()"><span>👛</span><div>КОШЕЛЕК</div></div>
</div>

<script>
let money = 0, frogMoney = 0, energy = 100;
const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({ manifestUrl: 'https://duhistiny6-source.github.io/pepe-pilot/tonconnect-manifest.json' });

function toggleModal(id) {
    const m = document.getElementById(id);
    m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
}

function updateUI() {
    document.getElementById('money-modal').innerText = money.toFixed(4);
    document.getElementById('frog-money-modal').innerText = frogMoney;
    document.getElementById('energy').innerText = energy;
}

const config = {
    type: Phaser.AUTO, width: window.innerWidth, height: window.innerHeight,
    physics: { default: 'arcade' }, scene: { preload, create, update }
};
const game = new Phaser.Game(config);
let plane, hook, targets, isLaunching = false, isReturning = false, caughtItem = null;
let angle = 0, swingSpeed = 0.03, distance = 30;

function preload() {
    this.load.image('sky', 'pg.jpeg');
    this.load.image('hook', 'kleshn.png');
    this.load.image('usdt', 'usdt.png');
    this.load.image('pilot_coin', 'logo..png');
    this.load.image('plane', 'pepe.png');
}

function create() {
    this.add.image(config.width/2, config.height/2, 'sky').setDisplaySize(config.width, config.height);
    targets = this.physics.add.group();
    for(let i=0; i<6; i++) spawn(this);

    hook = this.add.sprite(0, 0, 'hook').setDepth(50).setDisplaySize(60, 60);
    this.physics.add.existing(hook);
    plane = this.add.image(config.width/2, 120, 'plane').setDisplaySize(280, 180).setDepth(60);

    this.input.on('pointerdown', (p) => {
        if (p.y > 100 && !isLaunching && !isReturning && energy > 0) {
            isLaunching = true; energy--; updateUI();
        }
    });

    this.physics.add.overlap(hook, targets, (h, item) => {
        if (isLaunching && !caughtItem) {
            caughtItem = item; caughtItem.body.enable = false;
            isLaunching = false; isReturning = true;
        }
    });
}

function spawn(scene) {
    let x = Phaser.Math.Between(50, config.width-50);
    let y = Phaser.Math.Between(config.height*0.45, config.height-150);
    let key = Phaser.Math.Between(1, 100) <= 60 ? 'pilot_coin' : 'usdt';
    targets.create(x, y, key).setDepth(40).setScale(0.12);
}

function showEffect(scene, val, isFrog) {
    let txt = scene.add.text(plane.x, plane.y, `+${val}`, { font: 'bold 24px Arial', fill: isFrog ? '#ffcc00' : '#00ff00' }).setOrigin(0.5).setDepth(100);
    scene.tweens.add({ targets: txt, y: txt.y - 100, alpha: 0, duration: 800, onComplete: () => txt.destroy() });
}

function update() {
    plane.y = 120 + Math.sin(this.time.now / 600) * 8;
    let startX = plane.x - 5, startY = plane.y + 20; 

    if (!isLaunching && !isReturning) {
        angle += swingSpeed; if (angle > 0.8 || angle < -0.8) swingSpeed *= -1;
    } else if (isLaunching) {
        distance += 16; if (distance > config.height - 110) { isLaunching = false; isReturning = true; }
    } else if (isReturning) {
        distance -= 8;
        if (distance <= 30) {
            isReturning = false;
            if (caughtItem) {
                const isFrog = caughtItem.texture.key === 'pilot_coin';
                if (isFrog) { frogMoney += 10; showEffect(this, 10, true); }
                else { money += 0.0005; showEffect(this, 0.0005, false); }
                caughtItem.destroy(); caughtItem = null; spawn(this); updateUI();
            }
        }
    }
    hook.x = startX + Math.sin(angle) * distance;
    hook.y = startY + Math.cos(angle) * distance;
    hook.rotation = -angle;
    if (caughtItem) { caughtItem.x = hook.x; caughtItem.y = hook.y + 15; }
}

async function connectWallet() { await tonConnectUI.openModal(); }
</script>
</body>
</html>
