 <!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pepe Pilot Crypto Miner</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; touch-action: none; }
    </style>
</head>
<body>
<script>
const config = {
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    physics: { default: 'arcade' },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);
let plane, chainSprite, targets, scoreText, timerText;
let isLaunching = false, isReturning = false, caughtItem = null;
let angle = 0, swingSpeed = 0.03, launchSpeed = 18;
let score = 0, timeLeft = 60;
const coinTypes = ['ton', 'usdt', 'not', 'dogs'];

function preload() {
    this.load.crossOrigin = 'anonymous';
    this.load.image('sky', 'bg.jpg');
    this.load.image('pepe', 'pepe.png');
    this.load.image('chain', 'cep.png'); 
    this.load.image('ton', 'ton.png');
    this.load.image('usdt', 'usdt.png');
    this.load.image('not', 'not.png');
    this.load.image('dogs', 'dogs.png');
}

function create() {
    // 1. ФОН
    let bg = this.add.image(config.width/2, config.height/2, 'sky');
    let scale = Math.max(config.width / bg.width, config.height / bg.height);
    bg.setScale(scale).setScrollFactor(0);
    
    // 2. ЦЕПЬ (Спрайт привязан за верхний центр)
    chainSprite = this.add.sprite(0, 0, 'chain');
    chainSprite.setOrigin(0.5, 0); // ВАЖНО: верх по центру
    chainSprite.setDepth(5);
    
    // Точка захвата
    this.clawPoint = this.add.circle(config.width/2, 300, 25);
    this.physics.add.existing(this.clawPoint);

    // 3. САМОЛЕТ
    plane = this.add.sprite(config.width / 2, 120, 'pepe');
    plane.setDepth(10).setDisplaySize(200, 150);
    this.tweens.add({
        targets: plane, y: 135, duration: 2000, yoyo: true, loop: -1, ease: 'Sine.easeInOut'
    });

    // 4. МОНЕТКИ
    targets = this.physics.add.group();
    for(let i=0; i<7; i++) { spawnCoin(this); }

    // Интерфейс
    scoreText = this.add.text(25, 30, '💎 Очки: 0', { fontSize: '30px', fill: '#fff', stroke: '#000', strokeThickness: 6 });
    timerText = this.add.text(config.width - 200, 30, '⏱ Время: 60', { fontSize: '30px', fill: '#ff0', stroke: '#000', strokeThickness: 6 });

    this.time.addEvent({
        delay: 1000,
        callback: () => { if(timeLeft > 0) { timeLeft--; timerText.setText('⏱ Время: ' + timeLeft); } },
        loop: true
    });

    this.input.on('pointerdown', () => { 
        if(!isLaunching && !isReturning && timeLeft > 0) isLaunching = true; 
    });

    this.physics.add.overlap(this.clawPoint, targets, (c, target) => {
        if (isLaunching && !caughtItem) { 
            caughtItem = target; 
            isLaunching = false; 
            isReturning = true; 
        }
    });
}

function spawnCoin(scene) {
    let x = Phaser.Math.Between(70, config.width - 70);
    let y = Phaser.Math.Between(450, config.height - 100);
    let randomCoin = Phaser.Utils.Array.GetRandom(coinTypes);
    let coin = targets.create(x, y, randomCoin);
    if(coin) {
        coin.setDisplaySize(80, 80).setDepth(4); 
    }
}

function update() {
    if (timeLeft <= 0) return;

    // Точка выхода из самолета
    let px = plane.x; 
    let py = plane.y + 40; 

    if (!isLaunching && !isReturning) {
        angle += swingSpeed;
        if (Math.abs(angle) > 0.8) swingSpeed = -swingSpeed;
        this.clawPoint.x = px + Math.sin(angle) * 160;
        this.clawPoint.y = py + Math.cos(angle) * 160;
    } else if (isLaunching) {
        this.clawPoint.x += Math.sin(angle) * launchSpeed;
        this.clawPoint.y += Math.cos(angle) * launchSpeed;
        if (this.clawPoint.y > config.height || this.clawPoint.x < 0 || this.clawPoint.x > config.width) {
            isLaunching = false; isReturning = true;
        }
    } else if (isReturning) {
        let tx = px + Math.sin(angle) * 160;
        let ty = py + Math.cos(angle) * 160;
        let dist = Phaser.Math.Distance.Between(this.clawPoint.x, this.clawPoint.y, tx, ty);
        this.clawPoint.x += (tx - this.clawPoint.x) * 0.15;
        this.clawPoint.y += (ty - this.clawPoint.y) * 0.15;
        
        if (caughtItem) { 
            caughtItem.x = this.clawPoint.x; 
            caughtItem.y = this.clawPoint.y; 
        }
        
        if (dist < 20) {
            isReturning = false;
            if (caughtItem) { 
                score += 100; scoreText.setText('💎 Очки: ' + score); 
                caughtItem.destroy(); caughtItem = null; spawnCoin(this);
            }
        }
    }

    // ПОЗИЦИЯ И ПОВОРОТ ЦЕПИ
    chainSprite.x = px;
    chainSprite.y = py;
    
    // Рассчитываем угол между самолетом и точкой клешни
    let targetAngle = Phaser.Math.Angle.Between(px, py, this.clawPoint.x, this.clawPoint.y);
    chainSprite.rotation = targetAngle - Math.PI / 2; // Поворачиваем "головой" вниз
    
    // Длина цепи по расстоянию
    let currentDist = Phaser.Math.Distance.Between(px, py, this.clawPoint.x, this.clawPoint.y);
    chainSprite.setDisplaySize(70, currentDist + 20); // 70 - ширина клешни
}
</script>
</body>
</html>
