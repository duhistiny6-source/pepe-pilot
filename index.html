<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pepe Pilot: Crypto Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        body { margin:0; padding:0; overflow:hidden; background:#000; touch-action: none; font-family: 'Segoe UI', Arial, sans-serif; }
        
        #top-bar { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 35px; 
            background: rgba(0, 0, 0, 0.4); 
            z-index: 1000; 
            backdrop-filter: blur(2px);
            display: flex;
            align-items: center;
        }

        #energy-container {
            position: absolute;
            left: 12px;
            color: #0f0;
            font-size: 13px;
            font-weight: bold;
            text-shadow: 1px 1px 1px #000;
        }

        #balance-container { 
            width: 100%;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 15px; 
            color: #fff; 
            font-size: 11px;
        }

        .balance-item { display: flex; align-items: center; gap: 4px; }
        .coin-icon { width: 14px; height: 14px; }
        
        #recovery-block {
            display: none; 
            pointer-events: auto;
            position: fixed; 
            top: 40px; 
            left: 12px;
            z-index: 1001;
            display: flex;
            flex-direction: column;
            gap: 4px;
            align-items: flex-start;
        }

        #timer-display { color: #ff3333; font-size: 10px; text-shadow: 1px 1px 1px #000; display: none; }
        #ad-button { background: #ffcc00; color: #000; border: none; padding: 2px 8px; font-size: 10px; font-weight: bold; border-radius: 4px; cursor: pointer; display: none; }
        
        #settings-btn { position: fixed; top: 7px; right: 10px; font-size: 18px; cursor: pointer; z-index: 1001; opacity: 0.8; }
        
        #nav-bar { position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%); width: 85%; height: 50px; background: rgba(0, 0, 0, 0.9); border: 1px solid #333; border-radius: 12px; display: flex; justify-content: space-around; align-items: center; z-index: 200; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #fff; font-weight: bold; flex: 1; opacity: 0.9; cursor: pointer; }
        .nav-item span { font-size: 18px; }
        .nav-text { font-size: 8px; margin-top: 1px; color: #bbb; text-transform: uppercase; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; color: #fff; justify-content: center; align-items: center; flex-direction: column; }
        .modal-content { background: #1a1a1a; border: 2px solid #0f0; padding: 25px; border-radius: 20px; text-align: center; min-width: 280px; max-width: 90%; }
        
        .task-item { background: #222; border: 1px solid #444; border-radius: 10px; padding: 10px; margin: 10px 0; display: flex; justify-content: space-between; align-items: center; }
        .task-info { text-align: left; }
        .task-title { font-size: 13px; font-weight: bold; color: #fff; }
        .task-reward { font-size: 11px; color: #0f0; }
        .task-btn { background: #0f0; color: #000; border: none; padding: 6px 12px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 12px; }
        
        .lang-btn { background: #333; color: #0f0; border: 1px solid #0f0; padding: 12px 20px; margin: 10px 0; cursor: pointer; border-radius: 10px; font-weight: bold; width: 100%; }
        #ad-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 3000; color: #fff; justify-content: center; align-items: center; flex-direction: column; }
        #ref-link-display { background: #000; padding: 8px; border-radius: 5px; font-size: 10px; color: #0f0; margin: 10px 0; word-break: break-all; border: 1px dashed #444; }
    </style>
</head>
<body>

<div id="settings-btn" onclick="toggleModal('settings-modal')">⚙️</div>

<div id="top-bar">
    <div id="energy-container">⚡ <span id="energy">100</span></div>
    <div id="balance-container">
        <div class="balance-item"><span>USDT:</span> <span id="money" style="color:#0f0">0.0000</span></div>
        <div class="balance-item">
            <img src="logo..png" class="coin-icon"> <span>PLT:</span> <span id="frog-money" style="color:#ffcc00">0</span>
        </div>
    </div>
</div>

<div id="recovery-block">
    <button id="ad-button" onclick="startAd()">📺 РЕКЛАМА</button>
    <div id="timer-display"><span id="txt-recovery">Rec</span>: <span id="time-left">02:00:00</span></div>
</div>

<div id="settings-modal" class="modal">
    <div class="modal-content">
        <h3 id="txt-settings-title">НАСТРОЙКИ</h3>
        <button class="lang-btn" onclick="changeLanguage('ru')">РУССКИЙ</button>
        <button class="lang-btn" onclick="changeLanguage('en')">ENGLISH</button>
        <div style="margin-top:15px; color:#888; cursor:pointer;" onclick="toggleModal('settings-modal')" id="txt-close">Закрыть</div>
    </div>
</div>

<div id="tasks-modal" class="modal">
    <div class="modal-content">
        <h3 id="txt-tasks-title">ЗАДАНИЯ</h3>
        <div class="task-item">
            <div class="task-info">
                <div class="task-title">Посмотреть рекламу</div>
                <div class="task-reward">+100 ⚡ Энергии</div>
            </div>
            <button class="task-btn" onclick="doAdTask()">📺 СМОТРЕТЬ</button>
        </div>
        <div style="margin-top:15px; color:#888; cursor:pointer;" onclick="toggleModal('tasks-modal')">Закрыть</div>
    </div>
</div>

<div id="friends-modal" class="modal">
    <div class="modal-content">
        <h3 id="txt-friends-title">ДРУЗЬЯ</h3>
        <p style="font-size: 11px; color: #ccc;">Твой реф-доход (10%): <span id="ref-bonus-val" style="color:#0f0">0</span></p>
        <div id="ref-link-display">Загрузка ссылки...</div>
        <button class="lang-btn" onclick="shareInvite()" style="background:#0088cc; border:none; color:#fff;">📢 ПРИГЛАСИТЬ</button>
        <button class="lang-btn" onclick="copyLink()">📋 КОПИРОВАТЬ ССЫЛКУ</button>
        <div style="margin-top:15px; color:#888; cursor:pointer;" onclick="toggleModal('friends-modal')">Закрыть</div>
    </div>
</div>

<div id="ad-overlay">
    <h2 id="txt-ad-watching">СМОТРИМ РОЛИК...</h2>
    <p id="ad-timer">Осталось: 5 сек.</p>
</div>

<div id="nav-bar">
    <div class="nav-item"><span>🛒</span><div class="nav-text" id="nav-shop">МАГАЗИН</div></div>
    <div class="nav-item" onclick="toggleModal('tasks-modal')"><span>📜</span><div class="nav-text" id="nav-tasks">ЗАДАНИЯ</div></div>
    <div class="nav-item" onclick="openFriends()"><span>👥</span><div class="nav-text" id="nav-friends">ДРУЗЬЯ</div></div>
    <div class="nav-item" onclick="connectWallet()"><span>👛</span><div class="nav-text" id="nav-wallet">КОШЕЛЕК</div></div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
    manifestUrl: 'https://duhistiny6-source.github.io/pepe-pilot/tonconnect-manifest.json',
    buttonRootId: null
});

// Глобальные данные
let money = 0, frogMoney = 0, energy = 100, recoveryTime = 0, refBonusTotal = 0;
const USDT_VALUE = 0.0005, FROG_VALUE = 10, RECOVERY_DURATION = 7200;

function openFriends() {
    generateRefLink();
    document.getElementById('ref-bonus-val').innerText = refBonusTotal.toFixed(4);
    toggleModal('friends-modal');
}

function generateRefLink() {
    const botUser = "PepePilot_bot"; 
    const uid = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : "guest";
    const link = `https://t.me/${botUser}?start=ref${uid}`;
    document.getElementById('ref-link-display').innerText = link;
    return link;
}

function shareInvite() {
    const link = generateRefLink();
    const text = "Лети со мной в Pepe Pilot! Собирай крипту и получай 10% бонусов! 🚀";
    tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(link)}&text=${encodeURIComponent(text)}`);
}

function copyLink() {
    const link = document.getElementById('ref-link-display').innerText;
    navigator.clipboard.writeText(link).then(() => alert("Ссылка скопирована!"));
}

async function connectWallet() {
    try { await tonConnectUI.connectWallet(); alert("Кошелек подключен!"); } catch (e) { console.error(e); }
}

function toggleModal(id) {
    const m = document.getElementById(id);
    m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
}

function doAdTask() { toggleModal('tasks-modal'); startAd(); }

const translations = {
    ru: { recovery: "Rec", ad_btn: "📺 РЕКЛАМА", settings: "НАСТРОЙКИ", close: "Закрыть", watching: "СМОТРИМ РОЛИК...", left: "Осталось", shop: "МАГАЗИН", tasks: "ЗАДАНИЯ", friends: "ДРУЗЬЯ", wallet: "КОШЕЛЕК" },
    en: { recovery: "Rec", ad_btn: "📺 AD", settings: "SETTINGS", close: "Close", watching: "WATCHING AD...", left: "Left", shop: "SHOP", tasks: "TASKS", friends: "FRIENDS", wallet: "WALLET" }
};

function changeLanguage(lang) {
    const t = translations[lang];
    document.getElementById('txt-recovery').innerText = t.recovery;
    document.getElementById('ad-button').innerText = t.ad_btn;
    document.getElementById('nav-shop').innerText = t.shop;
    document.getElementById('nav-tasks').innerText = t.tasks;
    document.getElementById('nav-friends').innerText = t.friends;
    document.getElementById('nav-wallet').innerText = t.wallet;
    toggleModal('settings-modal');
}

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playBeep(f, d) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.frequency.value = f; g.gain.setValueAtTime(0.005, audioCtx.currentTime);
    o.start(); o.stop(audioCtx.currentTime + d);
}

const config = {
    type: Phaser.AUTO, width: window.innerWidth, height: window.innerHeight,
    physics: { default: 'arcade' }, scene: { preload, create, update }
};

const game = new Phaser.Game(config);
let plane, hook, rope, targets, bgMusic, isLaunching = false, isReturning = false, caughtItem = null, angle = 0, swingSpeed = 0.03, distance = 25;

function preload() {
    this.load.image('sky', 'pg.jpeg');
    this.load.image('hook', 'kleshn.png');
    this.load.image('usdt', 'usdt.png');
    this.load.image('pilot_coin', 'logo..png');
    this.load.image('plane', 'pepe.png');
    this.load.audio('theme', 'music.mp3');
}

function create() {
    this.add.image(config.width/2, config.height/2, 'sky').setDisplaySize(config.width, config.height);
    try { bgMusic = this.sound.add('theme', { volume: 0.004, loop: true }); } catch (e) {}
    this.input.once('pointerdown', () => { if (bgMusic && !bgMusic.isPlaying) bgMusic.play(); });

    targets = this.physics.add.group();
    for(let i=0; i<6; i++) spawn(this);
    rope = this.add.graphics().setDepth(5);
    hook = this.add.sprite(0,0,'hook').setDepth(50).setDisplaySize(60,60);
    this.physics.add.existing(hook);
    plane = this.add.image(config.width/2, 120, 'plane').setDisplaySize(280, 180).setDepth(60);

    this.input.on('pointerdown', (p) => {
        if (document.querySelector('.modal[style*="flex"]') || document.getElementById('ad-overlay').style.display === 'flex') return;
        if (p.y > 80 && p.y < config.height - 80 && !isLaunching && !isReturning && energy > 0) {
            isLaunching = true; energy--; if (energy <= 0) startRecovery(); updateUI();
        }
    });

    this.physics.add.overlap(hook, targets, (h, item) => {
        if (isLaunching && !caughtItem) {
            caughtItem = item; caughtItem.body.enable = false;
            if (caughtItem.pulse) caughtItem.pulse.stop();
            playBeep(400, 0.08); isLaunching = false; isReturning = true;
        }
    });
    setInterval(tick, 1000);
}

function spawn(scene) {
    let x = Phaser.Math.Between(50, config.width - 50);
    let y = Phaser.Math.Between(config.height * 0
