
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pepe Pilot Mega Claw</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; touch-action: none; }
    </style>
</head>
<body>
<script>
// Твой репозиторий GitHub
const ASSETS_URL = 'https://raw.githubusercontent.com/duhistiny6/pepe-pilot/main/';

const config = {
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    physics: { default: 'arcade' },
    roundPixels: true, // ФИКС: Делает монеты и текст ровными
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);
let plane, clawGraphic, chain, targets, scoreText, timerText;
let isLaunching = false, isReturning = false, caughtItem = null;
let angle = 0, swingSpeed = 0.03, launchSpeed = 15;
let score = 0, timeLeft = 60;
const coinKey = 'ton';

function preload() {
    this.load.crossOrigin = 'anonymous';
    // Загружаем файлы (убедись, что они есть на GitHub)
    this.load.image('sky', ASSETS_URL + 'bg.jpg'); 
    this.load.image('pepe', ASSETS_URL + 'pepe.png'); 
    // ВАЖНО: Название файла на GitHub должно быть ТОЧНО таким же
    this.load.image(coinKey, ASSETS_URL + 'ton-ecosystem-removebe.png'); 
}

function create() {
    // 1. ФОН
    let bg = this.add.image(config.width/2, config.height/2, 'sky');
    let scale = Math.max(config.width / bg.width, config.height / bg.height);
    bg.setScale(scale).setScrollFactor(0);
    
    // 2. ПЕПЕ НА САМОЛЕТЕ
    plane = this.add.sprite(config.width / 2, 120, 'pepe');
    plane.setDepth(10).setDisplaySize(200, 150);

    // Анимация покачивания самолета
    this.tweens.add({
        targets: plane, y: 135, duration: 2000, yoyo: true, loop: -1, ease: 'Sine.easeInOut'
    });
    
    // 3. ЦЕПЬ И КЛЕШНИ
    chain = this.add.graphics().setDepth(5);
    clawGraphic = this.add.graphics().setDepth(6);
    
    // Точка захвата (увеличил радиус для физики мощных клешней)
    this.clawPoint = this.add.circle(config.width/2, 220, 25);
    this.physics.add.existing(this.clawPoint);

    // 4. ГРУППА МОНЕТ
    targets = this.physics.add.group();
    for(let i=0; i<6; i++) { spawnCoin(this); }

    // Интерфейс
    scoreText = this.add.text(20, 30, '💎 Очки: 0', { fontSize: '28px', fill: '#fff', stroke: '#000', strokeThickness: 6 });
    timerText = this.add.text(config.width - 180, 30, '⏱ Время: 60', { fontSize: '28px', fill: '#ff0', stroke: '#000', strokeThickness: 6 });

    this.time.addEvent({
        delay: 1000,
        callback: () => { if(timeLeft > 0) { timeLeft--; timerText.setText('⏱ Время: ' + timeLeft); } },
        loop: true
    });

    this.input.on('pointerdown', () => { 
        if(!isLaunching && !isReturning && timeLeft > 0) isLaunching = true; 
    });

    this.physics.add.overlap(this.clawPoint, targets, (c, target) => {
        if (isLaunching && !caughtItem) { 
            caughtItem = target; 
            isLaunching = false; 
            isReturning = true; 
        }
    });
}

function spawnCoin(scene) {
    let x = Phaser.Math.Between(50, config.width - 50);
    let y = Phaser.Math.Between(380, config.height - 100);
    let coin;
    
    if (scene.textures.exists(coinKey)) {
        coin = targets.create(x, y, coinKey);
        coin.setDisplaySize(75, 75); // ФИКС: Сделал монеты ровными и чёткими
    } else {
        coin = scene.add.circle(x, y, 30, 0xffd700).setStrokeStyle(4, 0x000);
        targets.add(coin);
    }
    coin.setDepth(4);
}

function update() {
    if (timeLeft <= 0) {
        timerText.setText('КОНЕЦ!').setScale(1.2);
        return;
    }

    // Выход цепи из-под самолета
    let px = plane.x; 
    let py = plane.y + 40; 

    if (!isLaunching && !isReturning) {
        angle += swingSpeed;
        if (Math.abs(angle) > 0.8) swingSpeed = -swingSpeed;
        this.clawPoint.x = px + Math.sin(angle) * 130;
        this.clawPoint.y = py + Math.cos(angle) * 130;
    } else if (isLaunching) {
        this.clawPoint.x += Math.sin(angle) * launchSpeed;
        this.clawPoint.y += Math.cos(angle) * launchSpeed;
        if (this.clawPoint.y > config.height || this.clawPoint.x < 0 || this.clawPoint.x > config.width) {
            isLaunching = false; isReturning = true;
        }
    } else if (isReturning) {
        let tx = px + Math.sin(angle) * 130;
        let ty = py + Math.cos(angle) * 130;
        let dist = Phaser.Math.Distance.Between(this.clawPoint.x, this.clawPoint.y, tx, ty);
        this.clawPoint.x += (tx - this.clawPoint.x) * 0.15;
        this.clawPoint.y += (ty - this.clawPoint.y) * 0.15;
        if (caughtItem) { caughtItem.x = this.clawPoint.x; caughtItem.y = this.clawPoint.y; }
        if (dist < 15) {
            isReturning = false;
            if (caughtItem) { 
                score += 100; scoreText.setText('💎 Очки: ' + score); 
                caughtItem.destroy(); caughtItem = null; spawnCoin(this);
            }
        }
    }

    // ОТРИСОВКА (Цепь коричневая, жирнее)
    chain.clear().lineStyle(6, 0x4a2c0a).lineBetween(px, py, this.clawPoint.x, this.clawPoint.y);
    
    // ОТРИСОВКА КЛЕШНЕЙ (Золотые дуги, СУПЕР-МОЩНЫЕ)
    clawGraphic.clear().lineStyle(10, 0xffd700); // Увеличил толщину до 10
    let rot = Phaser.Math.Angle.Between(px, py, this.clawPoint.x, this.clawPoint.y) + Math.PI/2;
    let gap = caughtItem ? 0.2 : 0.8; 
    
    // Увеличил радиус дуги до 35 для мощности
    clawGraphic.beginPath();
    clawGraphic.arc(this.clawPoint.x, this.clawPoint.y, 35, rot - gap, rot + gap);
    clawGraphic.strokePath();
    clawGraphic.beginPath();
    clawGraphic.arc(this.clawPoint.x, this.clawPoint.y, 35, rot + Math.PI - gap, rot + Math.PI + gap);
    clawGraphic.strokePath();
}
</script>
</body>
</html>
