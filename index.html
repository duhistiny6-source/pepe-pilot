<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pepe Pilot: New Era</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; touch-action: none; }
    </style>
</head>
<body>
<script>
const config = {
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    physics: { default: 'arcade' },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);
let plane, clawGraphic, chain, targets, scoreText, timerText;
let isLaunching = false, isReturning = false, caughtItem = null;
let angle = 0, swingSpeed = 0.03, launchSpeed = 16, returnSpeed = 11;
let score = 0, timeLeft = 60;

function preload() {
    // ЗАМЕНЯЕМ СТАРЫЕ ФАЙЛЫ НА ТВОИ НОВЫЕ
    this.load.image('sky', '1000004148.jpg'); // Твой новый фон
    this.load.image('pepe', '1000004146.png'); // Твой новый Пепе-самолет
    
    // Монетки (оставляем те же названия, чтобы не ломать логику)
    this.load.image('ton', 'ton-ecosystem-removebg-preview.png');
    this.load.image('not', 'images__35_-removebg-preview.png');
    this.load.image('dogs', 'images__33_-removebg-preview.png');
}

function create() {
    // Настраиваем фон под размер экрана
    let bg = this.add.image(config.width/2, config.height/2, 'sky').setAlpha(0.8);
    let scaleX = config.width / bg.width;
    let scaleY = config.height / bg.height;
    bg.setScale(Math.max(scaleX, scaleY));
    
    // НОВЫЙ ПЕПЕ (в новом самолете)
    plane = this.add.sprite(config.width / 2, 120, 'pepe').setDepth(10);
    plane.setDisplaySize(240, 240); // Оптимальный размер для нового спрайта
    
    chain = this.add.graphics().setDepth(5);
    clawGraphic = this.add.graphics().setDepth(6);
    
    this.clawPoint = this.add.circle(config.width/2, 220, 15);
    this.physics.add.existing(this.clawPoint);

    targets = this.physics.add.group();
    const assets = ['ton', 'dogs', 'not'];

    // Рассыпаем монеты по полю (теперь они не в куче)
    for(let i=0; i<10; i++) {
        let x = Phaser.Math.Between(60, config.width - 60);
        let y = Phaser.Math.Between(380, config.height - 120);
        let coin = targets.create(x, y, Phaser.Math.RND.pick(assets));
        coin.setDisplaySize(80, 80).setDepth(4);
    }

    // Интерфейс
    scoreText = this.add.text(20, 40, 'Score: 0', { fontSize: '28px', fill: '#fff', stroke: '#000', strokeThickness: 4 });
    timerText = this.add.text(config.width - 160, 40, 'Time: 60', { fontSize: '28px', fill: '#ff0', stroke: '#000', strokeThickness: 4 });

    this.time.addEvent({
        delay: 1000,
        callback: () => { if(timeLeft > 0) timeLeft--; timerText.setText('Time: ' + timeLeft); },
        loop: true
    });

    this.input.on('pointerdown', () => { if(!isLaunching && !isReturning && timeLeft > 0) isLaunching = true; });

    this.physics.add.overlap(this.clawPoint, targets, (c, target) => {
        if (isLaunching && !caughtItem) {
            caughtItem = target;
            isLaunching = false;
            isReturning = true;
        }
    });
}

function update() {
    if (timeLeft <= 0) return;

    let px = plane.x;
    let py = plane.y + 20; // Цепь теперь идет чуть ниже центра нового самолета

    if (!isLaunching && !isReturning) {
        angle += swingSpeed;
        if (angle > 0.8 || angle < -0.8) swingSpeed = -swingSpeed;
        this.clawPoint.x = px + Math.sin(angle) * 140;
        this.clawPoint.y = py + Math.cos(angle) * 140;
    } else if (isLaunching) {
        this.clawPoint.x += Math.sin(angle) * launchSpeed;
        this.clawPoint.y += Math.cos(angle) * launchSpeed;
        if (this.clawPoint.y > config.height || this.clawPoint.x < 0 || this.clawPoint.x > config.width) {
            isLaunching = false;
            isReturning = true;
        }
    } else if (isReturning) {
        let tx = px + Math.sin(angle) * 140;
        let ty = py + Math.cos(angle) * 140;
        let dist = Phaser.Math.Distance.Between(this.clawPoint.x, this.clawPoint.y, tx, ty);
        this.clawPoint.x += (tx - this.clawPoint.x) * 0.2;
        this.clawPoint.y += (ty - this.clawPoint.y) * 0.2;
        if (caughtItem) { caughtItem.x = this.clawPoint.x; caughtItem.y = this.clawPoint.y; }
        if (dist < 15) {
            isReturning = false;
            if (caughtItem) { score += 100; scoreText.setText('Score: ' + score); caughtItem.destroy(); caughtItem = null; }
        }
    }

    chain.clear().lineStyle(3, 0xdddddd).lineBetween(px, py, this.clawPoint.x, this.clawPoint.y);
    
    // РИСУЕМ КЛЕШНЮ
    clawGraphic.clear().lineStyle(5, 0xffd700);
    let gA = angle + Math.PI/2; 
    let gap = caughtItem ? 0.3 : 0.8; 
    clawGraphic.beginPath();
    clawGraphic.arc(this.clawPoint.x, this.clawPoint.y, 25, gA - gap, gA + gap);
    clawGraphic.strokePath();
    clawGraphic.beginPath();
    clawGraphic.arc(this.clawPoint.x, this.clawPoint.y, 25, gA + Math.PI - gap, gA + Math.PI + gap);
    clawGraphic.strokePath();
}
</script>
</body>
</html>
