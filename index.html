<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pepe Pilot: Crypto Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin:0; padding:0; overflow:hidden; background:#000; touch-action: none; font-family: 'Segoe UI', Arial, sans-serif; }
        #top-bar { position: fixed; top: 0; left: 0; width: 100%; height: 35px; background: rgba(0, 0, 0, 0.4); z-index: 1000; backdrop-filter: blur(2px); display: flex; align-items: center; }
        #energy-container { position: absolute; left: 12px; color: #0f0; font-size: 13px; font-weight: bold; }
        #balance-container { width: 100%; display: flex; align-items: center; justify-content: center; gap: 15px; color: #fff; font-size: 11px; }
        .balance-item { display: flex; align-items: center; gap: 4px; }
        .coin-icon { width: 14px; height: 14px; }
        #recovery-block { display: none; position: fixed; top: 40px; left: 12px; z-index: 1001; flex-direction: column; gap: 4px; }
        #timer-display { color: #ff3333; font-size: 10px; }
        #ad-button { background: #ffcc00; color: #000; border: none; padding: 2px 8px; font-size: 10px; font-weight: bold; border-radius: 4px; cursor: pointer; }
        #nav-bar { position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%); width: 85%; height: 50px; background: rgba(0, 0, 0, 0.9); border: 1px solid #333; border-radius: 12px; display: flex; justify-content: space-around; align-items: center; z-index: 200; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #fff; font-weight: bold; flex: 1; cursor: pointer; }
        .nav-text { font-size: 8px; margin-top: 1px; color: #bbb; text-transform: uppercase; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: #1a1a1a; border: 2px solid #0f0; padding: 25px; border-radius: 20px; text-align: center; color: #fff; width: 280px; }
        .lang-btn { background: #333; color: #0f0; border: 1px solid #0f0; padding: 10px; margin: 5px 0; width: 100%; border-radius: 10px; font-weight: bold; }
        #ad-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 3000; color: #fff; justify-content: center; align-items: center; flex-direction: column; }
    </style>
</head>
<body>

<div id="top-bar">
    <div id="energy-container">⚡ <span id="energy">100</span></div>
    <div id="balance-container">
        <div class="balance-item"><span>USDT:</span> <span id="money" style="color:#0f0">0.0000</span></div>
        <div class="balance-item"><img src="logo..png" class="coin-icon"> <span>PLT:</span> <span id="frog-money" style="color:#ffcc00">0</span></div>
    </div>
</div>

<div id="recovery-block">
    <button id="ad-button" onclick="startAd()">📺 РЕКЛАМА</button>
    <div id="timer-display">Rec: <span id="time-left">02:00:00</span></div>
</div>

<div id="friends-modal" class="modal">
    <div class="modal-content">
        <h3>ДРУЗЬЯ</h3>
        <p style="font-size: 11px; color: #bbb;">Получай <span style="color:#0f0">10%</span> от их добычи!</p>
        <div style="background: #222; padding: 10px; border-radius: 10px; margin: 10px 0; font-size: 10px; color: #0f0; word-break: break-all;" id="ref-link-text">Загрузка ссылки...</div>
        <button class="lang-btn" onclick="copyRefLink()">КОПИРОВАТЬ</button>
        <div style="margin-top:10px; color:#888; cursor:pointer;" onclick="toggleModal('friends-modal')">Закрыть</div>
    </div>
</div>

<div id="ad-overlay">
    <h2>СМОТРИМ РОЛИК...</h2>
    <p id="ad-timer">5 сек.</p>
</div>

<div id="nav-bar">
    <div class="nav-item"><span>🛒</span><div class="nav-text">МАГАЗИН</div></div>
    <div class="nav-item"><span>📜</span><div class="nav-text">ЗАДАНИЯ</div></div>
    <div class="nav-item" onclick="toggleModal('friends-modal')"><span>👥</span><div class="nav-text">ДРУЗЬЯ</div></div>
    <div class="nav-item"><span>👛</span><div class="nav-text">КОШЕЛЕК</div></div>
</div>

<script>
const webapp = window.Telegram?.WebApp;
if (webapp) webapp.expand();

// АДРЕС ТВОЕГО БУДУЩЕГО СЕРВЕРА
const SERVER_URL = "https://your-server-address.render.com"; 

let userId = webapp?.initDataUnsafe?.user?.id || "local_user";
let startParam = webapp?.initDataUnsafe?.start_param || null;

// Переменные игры
let money = 0, frogMoney = 0, energy = 100, recoveryTime = 0;
const USDT_VALUE = 0.0005, FROG_VALUE = 10;

// Функция отправки данных на сервер
async function sendRewardToServer(type, amount) {
    try {
        const res = await fetch(`${SERVER_URL}/add-reward`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userId, type, amount })
        });
        const data = await res.json();
        return data;
    } catch (e) { console.error("Ошибка связи с сервером"); }
}

// Загрузка данных при старте
async function initUser() {
    try {
        const res = await fetch(`${SERVER_URL}/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userId, inviter: startParam })
        });
        const data = await res.json();
        money = data.balance_usdt;
        frogMoney = data.balance_plt;
        updateUI();
    } catch (e) { console.error("Сервер пока не отвечает"); }
}

function toggleModal(id) {
    const m = document.getElementById(id);
    m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
    if (id === 'friends-modal') {
        document.getElementById('ref-link-text').innerText = `https://t.me/PepePilotBot?start=${userId}`;
    }
}

function copyRefLink() {
    const link = document.getElementById('ref-link-text').innerText;
    navigator.clipboard.writeText(link);
    alert("Ссылка скопирована!");
}

// Игра (Phaser)
const config = {
    type: Phaser.AUTO, width: window.innerWidth, height: window.innerHeight,
    physics: { default: 'arcade' }, scene: { preload, create, update }
};
const game = new Phaser.Game(config);
let plane, hook, rope, targets, isLaunching = false, isReturning = false, caughtItem = null;
let angle = 0, swingSpeed = 0.03, distance = 25;

function preload() {
    this.load.image('sky', 'pg.jpeg');
    this.load.image('hook', 'kleshn.png');
    this.load.image('usdt', 'usdt.png');
    this.load.image('plt', 'logo..png');
    this.load.image('plane', 'pepe.png');
}

function create() {
    this.add.image(config.width/2, config.height/2, 'sky').setDisplaySize(config.width, config.height);
    targets = this.physics.add.group();
    for(let i=0; i<6; i++) spawn(this);
    rope = this.add.graphics().setDepth(5);
    hook = this.add.sprite(0, 0, 'hook').setDisplaySize(60, 60).setDepth(50);
    this.physics.add.existing(hook);
    plane = this.add.image(config.width/2, 120, 'plane').setDisplaySize(280, 180).setDepth(60);

    this.input.on('pointerdown', (p) => {
        if (p.y < 50 || p.y > config.height - 70) return;
        if (!isLaunching && !isReturning && energy > 0) {
            isLaunching = true; energy--; if(energy<=0) recoveryTime = 7200; updateUI();
        }
    });

    this.physics.add.overlap(hook, targets, (h, item) => {
        if (isLaunching && !caughtItem) { caughtItem = item; isLaunching = false; isReturning = true; }
    });
    initUser(); // Пробуем залогиниться
}

function spawn(scene) {
    let x = Phaser.Math.Between(50, config.width - 50);
    let y = Phaser.Math.Between(config.height * 0.45, config.height - 150);
    let type = Math.random() < 0.6 ? 'plt' : 'usdt';
    let coin = targets.create(x, y, type).setDepth(40);
    coin.setScale(type === 'plt' ? 0.10 : 0.12);
}

function update() {
    let startX = plane.x - 5; let startY = plane.y + 15;
    if (!isLaunching && !isReturning) {
        angle += swingSpeed; if (angle > 0.8 || angle < -0.8) swingSpeed *= -1;
    } else if (isLaunching) {
        distance += 16; if (distance > config.height - 110) { isLaunching = false; isReturning = true; }
    } else if (isReturning) {
        distance -= 8;
        if (distance <= 25) {
            isReturning = false;
            if (caughtItem) {
                let type = caughtItem.texture.key;
                let val = (type === 'plt' ? FROG_VALUE : USDT_VALUE);
                
                // Начисляем локально для скорости
                if(type === 'plt') frogMoney += val; else money += val;
                
                // Отправляем на сервер (функция 10% сработает там)
                sendRewardToServer(type, val);
                
                caughtItem.destroy(); caughtItem = null; spawn(this.scene.scene); updateUI();
            }
        }
    }
    hook.x = startX + Math.sin(angle) * distance;
    hook.y = startY + Math.cos(angle) * distance;
    rope.clear().lineStyle(2, 0xffffff, 0.7).lineBetween(startX, startY, hook.x, hook.y);
    if(caughtItem) { caughtItem.x = hook.x; caughtItem.y = hook.y + 15; }
}

function updateUI() {
    document.getElementById('money').innerText = money.toFixed(4);
    document.getElementById('frog-money').innerText = Math.floor(frogMoney);
    document.getElementById('energy').innerText = energy;
    document.getElementById('recovery-block').style.display = energy <= 0 ? 'flex' : 'none';
}

function startAd() {
    document.getElementById('ad-overlay').style.display = 'flex';
    let c = 5;
    let i = setInterval(() => {
        c--; document.getElementById('ad-timer').innerText = c + " сек.";
        if (c <= 0) { 
            clearInterval(i); document.getElementById('ad-overlay').style.display = 'none'; 
            energy = 100; recoveryTime = 0; updateUI(); 
        }
    }, 1000);
}
</script>
</body>
</html>
