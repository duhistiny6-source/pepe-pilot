<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pepe Pilot: Compact UI</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin:0; overflow:hidden; background:black; touch-action: none; }
        #ui { position:fixed; top:12px; left:12px; color:#0f0; font-family: 'Arial', sans-serif; font-weight:bold; z-index: 100; pointer-events: none; text-shadow: 1px 1px 2px #000; font-size: 16px; }
        
        /* Компактный Таб-бар */
        #nav-bar { 
            position: fixed; 
            bottom: 15px; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 85%; 
            height: 55px; /* Уменьшили высоту */
            background: rgba(15, 15, 15, 0.92); 
            border: 1.5px solid #0f0; 
            border-radius: 15px; 
            display: flex; 
            justify-content: space-around; 
            align-items: center; 
            z-index: 200;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.2);
        }
        .nav-item { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            color: #0f0; 
            font-size: 9px; /* Уменьшили текст */
            font-family: Arial; 
            text-transform: uppercase;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .nav-item span { font-size: 20px; margin-bottom: 2px; } /* Уменьшили иконки */
        .nav-item:active { transform: scale(0.9); opacity: 0.7; }
    </style>
</head>
<body>

<div id="ui">
    💰 <span id="money">0</span><br>
    ⚡ <span id="energy">10</span>
</div>

<div id="nav-bar">
    <div class="nav-item" onclick="alert('Shop')"><span>🛒</span>Магазин</div>
    <div class="nav-item" onclick="alert('Tasks')"><span>📜</span>Задания</div>
    <div class="nav-item" onclick="alert('Friends')"><span>👥</span>Друзья</div>
    <div class="nav-item" onclick="alert('Wallet')"><span>👛</span>Кошелек</div>
</div>

<script>
const config = {
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    physics: { default: 'arcade' },
    scene: { preload, create, update }
};

const game = new Phaser.Game(config);

let plane, hook, rope, targets;
let isLaunching = false, isReturning = false, caughtItem = null;
let angle = 0, swingSpeed = 0.03, distance = 25; 
let money = 0, energy = 10;

function preload() {
    this.load.image('sky', 'pg.jpeg');
    this.load.image('plane', 'pepe.png');
    this.load.image('hook', 'kleshn.png');
    this.load.image('usdt', 'usdt.png');
}

function create() {
    this.add.image(config.width / 2, config.height / 2, 'sky').setDisplaySize(config.width, config.height);
    targets = this.physics.add.group();
    for(let i = 0; i < 7; i++) spawn(this);

    rope = this.add.graphics().setDepth(30);

    // Клешня (Слой выше монет)
    hook = this.add.sprite(0, 0, 'hook').setDepth(50);
    hook.setDisplaySize(65, 65); 
    this.physics.add.existing(hook);
    hook.body.setCircle(20); 

    plane = this.add.image(config.width / 2, 120, 'plane').setDisplaySize(280, 180).setDepth(60);

    this.input.on('pointerdown', (pointer) => {
        if (pointer.y < config.height - 80) { // Запрет клика через меню
            if (!isLaunching && !isReturning && energy > 0) {
                isLaunching = true;
                energy--;
                updateUI();
            }
        }
    });

    this.physics.add.overlap(hook, targets, (h, item) => {
        if (isLaunching && !caughtItem) {
            caughtItem = item;
            caughtItem.body.enable = false; 
            if(caughtItem.breath) caughtItem.breath.stop();
            caughtItem.setScale(caughtItem.baseScale);
            caughtItem.setDepth(45); 
            isLaunching = false;
            isReturning = true;
        }
    });

    setInterval(() => { if (energy < 10) energy++; updateUI(); }, 4000);
}

function spawn(scene) {
    let x = Phaser.Math.Between(50, config.width - 50);
    let y = Phaser.Math.Between(config.height * 0.5, config.height - 140);
    let coin = targets.create(x, y, 'usdt').setDepth(40);
    coin.setDisplaySize(55, 55);
    coin.baseScale = coin.scaleX;
    
    coin.breath = scene.tweens.add({
        targets: coin,
        scale: coin.baseScale * 1.01,
        duration: 2000,
        yoyo: true,
        repeat: -1
    });
}

function update() {
    plane.y = 120 + Math.sin(this.time.now / 600) * 8;
    let startX = plane.x - 5; 
    let startY = plane.y + 15; 

    if (!isLaunching && !isReturning) {
        angle += swingSpeed;
        if (angle > 0.8 || angle < -0.8) swingSpeed *= -1;
        distance = 25;
    } else if (isLaunching) {
        distance += 16;
        if (distance > config.height - 100) { isLaunching = false; isReturning = true; }
    } else if (isReturning) {
        distance -= 8; 
        if (distance <= 25) {
            isReturning = false;
            if (caughtItem) {
                money += 100;
                caughtItem.destroy();
                caughtItem = null;
                spawn(this);
                updateUI();
            }
        }
    }

    // Жесткая фиксация размера клешни
    hook.setDisplaySize(65, 65);
    hook.x = startX + Math.sin(angle) * distance;
    hook.y = startY + Math.cos(angle) * distance;
    hook.rotation = -angle;

    let endX = startX + Math.sin(angle) * (distance - 20);
    let endY = startY + Math.cos(angle) * (distance - 20);
    rope.clear().lineStyle(2, 0xffffff, 0.8).lineBetween(startX, startY, endX, endY);

    if (caughtItem) {
        caughtItem.x = hook.x;
        caughtItem.y = hook.y + 12; // Монета внутри
        caughtItem.rotation = hook.rotation;
    }
}

function updateUI() {
    document.getElementById('money').innerText = money;
    document.getElementById('energy').innerText = energy;
}
</script>
</body>
</html>
