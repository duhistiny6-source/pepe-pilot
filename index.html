<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pepe Real Extend</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; touch-action: none; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>
<script>
const config = {
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    physics: { default: 'arcade' },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);
let plane, fullHook, hookMask, targets, scoreText;
let isLaunching = false, isReturning = false, caughtItem = null;
let currentHeight = 0, score = 0;

const SPEED = 14; 
const START_Y = 160; 

function preload() {
    this.load.crossOrigin = 'anonymous';
    this.load.image('sky', 'pg.jpeg'); 
    this.load.image('pepe', 'pepe.png'); // Весь твой файл
    this.load.image('ton', 'ton.png');
    this.load.image('usdt', 'usdt.png');
    this.load.image('not', 'not.png');
    this.load.image('dogs', 'dogs.png');
}

function create() {
    this.add.image(config.width/2, config.height/2, 'sky').setDisplaySize(config.width, config.height);

    // 1. ПОЛНАЯ КЛЕШНЯ С ЦЕПЬЮ (Скрыта изначально)
    // Мы ставим её так, чтобы она начиналась под самолетом
    fullHook = this.add.image(config.width / 2, START_Y + 20, 'pepe');
    fullHook.setOrigin(0.5, 0).setDepth(40).setDisplaySize(160, 600);
    // Обрезаем картинку в спрайте, чтобы видеть только "ножку" и "клешню"
    fullHook.setCrop(300, 480, 400, 520); 

    // 2. МАСКА (Она будет определять, сколько клешни выдвинуто)
    hookMask = this.add.graphics();
    fullHook.setMask(hookMask.createGeometryMask());

    // 3. САМОЛЕТ (Сверху всего)
    plane = this.add.image(config.width / 2, START_Y, 'pepe');
    plane.setDisplaySize(300, 260).setDepth(50).setCrop(0, 0, 1000, 480);

    // Физический сенсор на кончике (невидимый)
    this.sensor = this.add.circle(config.width / 2, START_Y, 30, 0xffffff, 0);
    this.physics.add.existing(this.sensor);

    targets = this.physics.add.group();
    for(let i=0; i<8; i++) { spawnCoin(this); }

    scoreText = this.add.text(25, 25, 'SCORE: 0', { fontSize: '32px', fill: '#0f0', fontWeight: 'bold' }).setDepth(60);

    this.input.on('pointerdown', () => { 
        if(!isLaunching && !isReturning) isLaunching = true; 
    });

    this.physics.add.overlap(this.sensor, targets, (s, target) => {
        if (isLaunching && !caughtItem) { 
            caughtItem = target; 
            isLaunching = false; isReturning = true; 
        }
    });
}

function spawnCoin(scene) {
    let x = Phaser.Math.Between(80, config.width - 80);
    let y = Phaser.Math.Between(config.height * 0.6, config.height - 100);
    let type = Phaser.Utils.Array.GetRandom(['ton', 'usdt', 'not', 'dogs']);
    let coin = targets.create(x, y, type).setDisplaySize(70, 70);
}

function update() {
    // Обновляем маску: рисуем прямоугольник, который "открывает" клешню вниз
    hookMask.clear();
    hookMask.fillStyle(0xffffff);
    hookMask.fillRect(config.width / 2 - 100, START_Y + 20, 200, currentHeight);

    // Привязываем сенсор к кончику видимой части
    this.sensor.y = START_Y + 20 + currentHeight;

    if (isLaunching) {
        currentHeight += SPEED; // Клешня плавно "выползает"
        if (currentHeight > 450) { isLaunching = false; isReturning = true; }
    } 
    else if (isReturning) {
        currentHeight -= SPEED + 4; // Клешня втягивается
        if (caughtItem) {
            caughtItem.x = this.sensor.x;
            caughtItem.y = this.sensor.y + 10;
        }
        if (currentHeight <= 0) {
            currentHeight = 0;
            isReturning = false;
            if (caughtItem) {
                score += 100; scoreText.setText('SCORE: ' + score);
                caughtItem.destroy(); caughtItem = null; spawnCoin(this);
            }
        }
    }
}
</script>
</body>
</html>
