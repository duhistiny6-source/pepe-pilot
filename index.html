<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pepe Chain Hook</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; touch-action: none; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>
<script>
const config = {
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    physics: { default: 'arcade' },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);
let plane, hook, graphics, targets, scoreText;
let isLaunching = false, isReturning = false, caughtItem = null;
let score = 0;

const HOOK_SPEED = 18;
const START_Y = 180; // Позиция самолета

function preload() {
    this.load.crossOrigin = 'anonymous';
    this.load.image('sky', 'pg.jpeg'); 
    this.load.image('pepe', 'pepe.png'); // Твой спрайт
    this.load.image('ton', 'ton.png');
    this.load.image('usdt', 'usdt.png');
    this.load.image('not', 'not.png');
    this.load.image('dogs', 'dogs.png');
}

function create() {
    // Фон
    let bg = this.add.image(config.width/2, config.height/2, 'sky');
    let scale = Math.max(config.width / bg.width, config.height / bg.height);
    bg.setScale(scale).setScrollFactor(0);

    // 1. САМОЛЕТ (База) - всегда на месте
    plane = this.add.image(config.width / 2, START_Y, 'pepe');
    plane.setDisplaySize(320, 280).setDepth(30);
    // Обрезаем только до самолета, чтобы цепь не торчала
    plane.setCrop(0, 0, 1000, 480); 

    // 2. ГРАФИКА ДЛЯ ЦЕПИ (Рисуем линию)
    graphics = this.add.graphics().setDepth(10);

    // 3. КЛЕШНЯ (Кончик, который ловит)
    hook = this.add.sprite(config.width / 2, START_Y + 30, 'pepe');
    hook.setDepth(20).setDisplaySize(120, 100);
    // Показываем только самую нижнюю часть картинки (клешню)
    hook.setCrop(300, 600, 400, 400); 
    hook.setVisible(false);

    // Физика для клешни
    this.physics.add.existing(hook);
    hook.body.setCircle(30, 30, 30);

    // Монетки
    targets = this.physics.add.group();
    for(let i=0; i<8; i++) { spawnCoin(this); }

    scoreText = this.add.text(25, 25, 'SCORE: 0', { 
        fontSize: '32px', fill: '#0f0', fontFamily: 'Courier New', fontWeight: 'bold'
    }).setDepth(40);

    this.input.on('pointerdown', () => { 
        if(!isLaunching && !isReturning) {
            isLaunching = true;
            hook.setVisible(true);
            hook.y = START_Y + 30;
        }
    });

    this.physics.add.overlap(hook, targets, (h, target) => {
        if (isLaunching && !caughtItem) { 
            caughtItem = target; 
            isLaunching = false; 
            isReturning = true; 
        }
    });
}

function spawnCoin(scene) {
    let x = Phaser.Math.Between(80, config.width - 80);
    let y = Phaser.Math.Between(config.height * 0.6, config.height - 100);
    let type = Phaser.Utils.Array.GetRandom(['ton', 'usdt', 'not', 'dogs']);
    let coin = targets.create(x, y, type);
    coin.setDisplaySize(80, 80).setOrigin(0.5).setDepth(5); 
}

function update() {
    graphics.clear();
    let startX = config.width / 2;
    let startY = START_Y + 40;

    if (isLaunching || isReturning) {
        // Рисуем цепь (линию)
        graphics.lineStyle(4, 0x555555, 1);
        graphics.lineBetween(startX, startY, hook.x, hook.y);

        if (isLaunching) {
            hook.y += HOOK_SPEED;
            if (hook.y > config.height - 50) {
                isLaunching = false;
                isReturning = true;
            }
        } else if (isReturning) {
            hook.y -= HOOK_SPEED;
            if (caughtItem) {
                caughtItem.x = hook.x;
                caughtItem.y = hook.y + 20;
            }
            if (hook.y <= startY) {
                isReturning = false;
                hook.setVisible(false);
                if (caughtItem) {
                    score += 100;
                    scoreText.setText('SCORE: ' + score);
                    caughtItem.destroy();
                    caughtItem = null;
                    spawnCoin(this);
                }
            }
        }
    } else {
        // Покачивание самолета для красоты
        plane.y = START_Y + Math.sin(this.time.now / 500) * 5;
    }
}
</script>
</body>
</html>
