<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pepe Pilot New Generation</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background-color: #87CEEB; overflow: hidden; touch-action: none; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>
<script>
const config = {
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    physics: { default: 'arcade' },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);
let plane, targets, scoreText;
let isLaunching = false, isReturning = false, caughtItem = null;
let launchDistance = 0, maxDistance = 450; 
let launchSpeed = 18; 
let score = 0;

function preload() {
    this.load.crossOrigin = 'anonymous';
    this.load.image('sky', 'pg.jpeg'); 
    this.load.image('pepe', 'pepe.png'); // Твой новый спрайт с прикрепленной цепью
    this.load.image('ton', 'ton.png');
    this.load.image('usdt', 'usdt.png');
    this.load.image('not', 'not.png');
    this.load.image('dogs', 'dogs.png');
}

function create() {
    // Фон
    let bg = this.add.image(config.width/2, config.height/2, 'sky');
    let scale = Math.max(config.width / bg.width, config.height / bg.height);
    bg.setScale(scale).setScrollFactor(0);

    // САМОЛЕТ С ЦЕПЬЮ (Origin ставим сверху, чтобы он "вытягивался" вниз)
    plane = this.add.sprite(config.width / 2, 150, 'pepe');
    plane.setOrigin(0.5, 0).setDepth(10);
    // Устанавливаем размер, чтобы цепь была видна
    plane.setDisplaySize(280, 240); 

    // Невидимый сенсор клешни (находится на самом кончике нарисованной цепи)
    this.clawSensor = this.add.circle(0, 0, 35, 0xffffff, 0);
    this.physics.add.existing(this.clawSensor);

    // Монетки
    targets = this.physics.add.group();
    for(let i=0; i<8; i++) { spawnCoin(this); }

    scoreText = this.add.text(25, 25, 'SCORE: 0', { 
        fontSize: '28px', fill: '#0f0', fontFamily: 'Courier New', fontWeight: 'bold',
        stroke: '#000', strokeThickness: 4
    }).setDepth(30);

    this.input.on('pointerdown', () => { 
        if(!isLaunching && !isReturning) isLaunching = true; 
    });

    this.physics.add.overlap(this.clawSensor, targets, (sensor, target) => {
        if (isLaunching && !caughtItem) { 
            caughtItem = target; 
            isLaunching = false; 
            isReturning = true; 
            if (window.navigator.vibrate) window.navigator.vibrate(50); 
        }
    });
}

function spawnCoin(scene) {
    let x = Phaser.Math.Between(70, config.width - 70);
    let y = Phaser.Math.Between(config.height * 0.6, config.height - 100);
    let type = Phaser.Utils.Array.GetRandom(['ton', 'usdt', 'not', 'dogs']);
    let coin = targets.create(x, y, type);
    coin.setDisplaySize(80, 80).setOrigin(0.5).setDepth(5); 
    coin.body.setCircle(35); 
}

function update() {
    // Позиция сенсора всегда на кончике нарисованной цепи
    // 210 - это примерная длина от верха самолета до клешни на твоем фото
    this.clawSensor.x = plane.x;
    this.clawSensor.y = plane.y + plane.displayHeight - 30;

    if (!isLaunching && !isReturning) {
        // Просто летим (можно добавить покачивание)
        plane.y = 150 + Math.sin(this.time.now / 500) * 10;
    } 
    else if (isLaunching) {
        // "Вытягиваем" самолет вниз (эффект полета за монетой)
        plane.y += launchSpeed;
        if (plane.y > config.height - 100) {
            isLaunching = false; isReturning = true;
        }
    } 
    else if (isReturning) {
        plane.y -= launchSpeed * 0.7;
        
        if (caughtItem) { 
            caughtItem.x = this.clawSensor.x; 
            caughtItem.y = this.clawSensor.y; 
        }
        
        if (plane.y <= 150) {
            plane.y = 150;
            isReturning = false;
            if (caughtItem) { 
                score += 100; scoreText.setText('SCORE: ' + score); 
                caughtItem.destroy(); caughtItem = null; spawnCoin(this); 
            }
        }
    }
}
</script>
</body>
</html>
