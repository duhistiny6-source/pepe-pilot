<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pepe Pilot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin:0; padding:0; overflow:hidden; background:#000; touch-action: none; font-family: 'Segoe UI', sans-serif; }
        #top-bar { position: fixed; top: 0; left: 0; width: 100%; height: 40px; background: rgba(0,0,0,0.5); z-index: 1000; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; box-sizing: border-box; }
        #energy-container { color: #0f0; font-size: 14px; font-weight: bold; }
        #balance-container { display: flex; gap: 15px; color: #fff; font-size: 11px; }
        #settings-btn { font-size: 20px; cursor: pointer; color: white; }
        
        #restore-btn { 
            display: none; position: fixed; bottom: 85px; left: 50%; transform: translateX(-50%); 
            background: #ffcc00; color: #000; border: 2px solid #fff; padding: 12px 24px; 
            border-radius: 25px; font-weight: bold; z-index: 500; cursor: pointer; text-align: center;
        }

        #nav-bar { position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%); width: 92%; height: 60px; background: rgba(0,0,0,0.92); border-radius: 18px; display: flex; justify-content: space-around; align-items: center; z-index: 200; border: 1px solid #333; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #fff; flex: 1; cursor: pointer; }
        .nav-text { font-size: 8px; margin-top: 3px; color: #bbb; text-transform: uppercase; font-weight: bold; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: #1a1a1a; border: 2px solid #0f0; padding: 20px; border-radius: 20px; text-align: center; width: 85%; color: #fff; }
        .lot-item { background: #222; border: 1px solid #444; border-radius: 10px; padding: 10px; margin: 8px 0; display: flex; align-items: center; }
        .buy-btn { background: #0f0; color: #000; border: none; padding: 6px 12px; border-radius: 6px; font-weight: bold; margin-left: auto; cursor: pointer; }
        .lot-img { width: 45px; height: auto; margin-right: 10px; }
    </style>
</head>
<body>

<div id="top-bar">
    <div id="energy-container">⚡ <span id="en-val">100</span></div>
    <div id="balance-container">
        <div>USDT: <span id="u-val" style="color:#0f0">0.00004</span></div>
        <div>PLT: <span id="p-val" style="color:#ffcc00">3</span></div>
    </div>
    <div id="settings-btn" onclick="toggleModal('settings-modal')">⚙️</div>
</div>

<div id="restore-btn" onclick="watchAd()">RESTORE ENERGY AD ⚡</div>

<div id="nav-bar">
    <div class="nav-item" onclick="toggleModal('shop-modal')"><span>🛒</span><div class="nav-text" id="t-shop">АНГАР</div></div>
    <div class="nav-item" onclick="toggleModal('tasks-modal')"><span>📜</span><div class="nav-text" id="t-tasks">ЗАДАНИЯ</div></div>
    <div class="nav-item" onclick="toggleModal('rank-modal')"><span>🏆</span><div class="nav-text" id="t-rank">РЕЙТИНГ</div></div>
    <div class="nav-item" onclick="toggleModal('friends-modal')"><span>👥</span><div class="nav-text" id="t-friends">ДРУЗЬЯ</div></div>
    <div class="nav-item" onclick="toggleModal('wallet-modal')"><span>👛</span><div class="nav-text" id="t-wallet">КОШЕЛЕК</div></div>
</div>

<div id="shop-modal" class="modal"><div class="modal-content">
    <h3 id="h-shop">АНГАР</h3>
    <div class="lot-item"><img src="pepe.png" class="lot-img"><div style="text-align:left;"><b id="p1-n">МЕДНЫЙ</b><br><small id="p1-d">+5 PLT | +0.00005 USDT</small></div><button class="buy-btn">10 TON</button></div>
    <div class="lot-item"><img src="pepe.png" class="lot-img"><div style="text-align:left;"><b id="p2-n">БРОНЗОВЫЙ</b><br><small id="p2-d">+10 PLT | +0.0001 USDT</small></div><button class="buy-btn">25 TON</button></div>
    <div class="lot-item"><img src="pepe.png" class="lot-img"><div style="text-align:left;"><b id="p3-n">ЗОЛОТОЙ</b><br><small id="p3-d">+25 PLT | +0.001 USDT</small></div><button class="buy-btn">50 TON</button></div>
    <p onclick="toggleModal('shop-modal')" style="cursor:pointer; color:#aaa;" id="c-2">Закрыть</p>
</div></div>

<script>
    // ТИХИЙ ЗВУКОВОЙ ДВИЖОК
    let audioCtx = null;
    function playBeep(hz, dur, vol = 0.015) {
        try {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.value = hz; gain.gain.value = vol;
            osc.start(); setTimeout(() => osc.stop(), dur * 1000);
        } catch(e){}
    }

    const config = { type: Phaser.AUTO, width: window.innerWidth, height: window.innerHeight, physics: { default: 'arcade' }, scene: { preload, create, update } };
    const game = new Phaser.Game(config);
    let plane, hook, rope, targets, isLaunching = false, isReturning = false, caughtItem = null;
    let angle = 0, swingSpeed = 0.015, distance = 25;

    function preload() {
        this.load.image('sky', 'pg.jpeg'); this.load.image('hook', 'kleshn.png');
        this.load.image('usdt', 'usdt.png'); this.load.image('plt', 'logo..png');
        this.load.image('plane', 'pepe.png');
    }

    function create() {
        this.add.image(config.width/2, config.height/2, 'sky').setDisplaySize(config.width, config.height);
        targets = this.physics.add.group();
        for(let i=0; i<6; i++) spawn(this);
        rope = this.add.graphics().setDepth(5);
        hook = this.add.sprite(0, 0, 'hook').setDepth(50).setDisplaySize(65, 65);
        this.physics.add.existing(hook);
        plane = this.add.image(config.width/2, 120, 'plane').setDisplaySize(280, 180).setDepth(60);

        this.physics.add.overlap(hook, targets, (h, item) => {
            if (isLaunching && !caughtItem) {
                caughtItem = item; item.body.enable = false;
                playBeep(380, 0.06); // СИГНАЛ 1: ЛОВЛЯ (Тихо)
                isLaunching = false; isReturning = true;
            }
        });

        this.input.on('pointerdown', (p) => {
            if (p.y > 60 && p.y < config.height - 80 && !isLaunching && !isReturning && window.energy > 0) {
                isLaunching = true; window.energy--; updateUI();
            }
        });
    }

    function spawn(scene) {
        let x = Phaser.Math.Between(60, config.width - 60);
        let y = Phaser.Math.Between(config.height * 0.5, config.height - 160);
        let type = (Math.random() > 0.3) ? 'plt' : 'usdt';
        let coin = targets.create(x, y, type).setScale(0.12).setDepth(40);
        scene.tweens.add({ targets: coin, scale: 0.14, duration: 1000, yoyo: true, repeat: -1 });
    }

    function update() {
        plane.y = 120 + Math.sin(this.time.now / 600) * 8;
        let startX = plane.x - 5, startY = plane.y + 20;

        if (!isLaunching && !isReturning) {
            angle += swingSpeed; if (angle > 0.4 || angle < -0.4) swingSpeed *= -1; distance = 25;
        } else if (isLaunching) {
            distance += 14; if (distance > config.height - 110) { isLaunching = false; isReturning = true; }
        } else if (isReturning) {
            distance -= 6;
            if (distance <= 25) {
                isReturning = false;
                if (caughtItem) {
                    playBeep(650, 0.08); // СИГНАЛ 2: САМОЛЕТ (Тихо)
                    let isP = caughtItem.texture.key === 'plt';
                    if(isP) window.plt += 1; else window.usdt += 0.00001;
                    updateUI(); caughtItem.destroy(); caughtItem = null; spawn(this);
                }
            }
        }
        hook.x = startX + Math.sin(angle) * distance; hook.y = startY + Math.cos(angle) * distance;
        rope.clear().lineStyle(2, 0xffffff, 0.5).lineBetween(startX, startY, hook.x, hook.y);
        if (caughtItem) { caughtItem.x = hook.x; caughtItem.y = hook.y + 15; }
    }

    // Вспомогательные функции UI...
    function updateUI() {
        document.getElementById('en-val').innerText = window.energy;
        document.getElementById('p-val').innerText = window.plt;
        document.getElementById('u-val').innerText = window.usdt.toFixed(5);
        document.getElementById('restore-btn').style.display = (window.energy <= 0) ? "block" : "none";
    }
    function toggleModal(id) { let m = document.getElementById(id); m.style.display = (m.style.display === 'flex') ? 'none' : 'flex'; }
    function watchAd() { window.energy = 100; updateUI(); }
</script>
</body>
</html>
