<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pepe Fixed Hook</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; touch-action: none; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>
<script>
const config = {
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    physics: { default: 'arcade' },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);
let plane, hook, targets, scoreText;
let isLaunching = false, isReturning = false, caughtItem = null;
let score = 0;

// Настройки скоростей
const HOOK_SPEED = 14;
const BASE_HOOK_HEIGHT = 80; // Начальный размер клешни под самолетом

function preload() {
    this.load.crossOrigin = 'anonymous';
    this.load.image('sky', 'pg.jpeg'); 
    this.load.image('pepe', 'pepe.png'); 
    this.load.image('ton', 'ton.png');
    this.load.image('usdt', 'usdt.png');
    this.load.image('not', 'not.png');
    this.load.image('dogs', 'dogs.png');
}

function create() {
    // Фон
    let bg = this.add.image(config.width/2, config.height/2, 'sky');
    let scale = Math.max(config.width / bg.width, config.height / bg.height);
    bg.setScale(scale).setScrollFactor(0);

    // 1. САМОЛЕТ (Статичный)
    plane = this.add.image(config.width / 2, 160, 'pepe');
    plane.setDisplaySize(300, 260).setDepth(20);
    // Скрываем нижнюю часть оригинальной картинки самолета, чтобы она не мешала
    plane.setCrop(0, 0, 1000, 480); 

    // 2. КРЮК (Выдвижной)
    // Используем ту же картинку, но для цепи
    hook = this.add.tileSprite(config.width / 2, 185, 300, BASE_HOOK_HEIGHT, 'pepe');
    hook.setOrigin(0.5, 0).setDepth(10);
    // Показываем только нижнюю часть картинки (клешню)
    hook.setTilePosition(0, 480); 

    // Невидимая точка захвата (физика)
    this.clawPoint = this.add.circle(0, 0, 30, 0xffffff, 0);
    this.physics.add.existing(this.clawPoint);

    // Монетки
    targets = this.physics.add.group();
    for(let i=0; i<8; i++) { spawnCoin(this); }

    scoreText = this.add.text(25, 25, 'SCORE: 0', { 
        fontSize: '32px', fill: '#0f0', fontFamily: 'Courier New', fontWeight: 'bold'
    }).setDepth(30);

    this.input.on('pointerdown', () => { 
        if(!isLaunching && !isReturning) isLaunching = true; 
    });

    this.physics.add.overlap(this.clawPoint, targets, (claw, target) => {
        if (isLaunching && !caughtItem) { 
            caughtItem = target; 
            isLaunching = false; 
            isReturning = true; 
        }
    });
}

function spawnCoin(scene) {
    let x = Phaser.Math.Between(70, config.width - 70);
    let y = Phaser.Math.Between(config.height * 0.6, config.height - 100);
    let type = Phaser.Utils.Array.GetRandom(['ton', 'usdt', 'not', 'dogs']);
    let coin = targets.create(x, y, type);
    coin.setDisplaySize(80, 80).setOrigin(0.5).setDepth(5); 
    coin.body.setCircle(35); 
}

function update() {
    // Привязываем сенсор к концу выдвинутой цепи
    this.clawPoint.x = hook.x;
    this.clawPoint.y = hook.y + hook.displayHeight - 30;

    if (isLaunching) {
        // Удлиняем цепь
        hook.displayHeight += HOOK_SPEED;
        
        // Если промахнулись или достигли дна
        if (this.clawPoint.y > config.height - 40) {
            isLaunching = false; 
            isReturning = true;
        }
    } 
    else if (isReturning) {
        // Сокращаем цепь
        hook.displayHeight -= HOOK_SPEED;
        
        if (caughtItem) { 
            caughtItem.x = this.clawPoint.x; 
            caughtItem.y = this.clawPoint.y; 
        }
        
        // Вернулись к самолету
        if (hook.displayHeight <= BASE_HOOK_HEIGHT) {
            hook.displayHeight = BASE_HOOK_HEIGHT;
            isReturning = false;
            if (caughtItem) { 
                score += 100; 
                scoreText.setText('SCORE: ' + score); 
                caughtItem.destroy(); 
                caughtItem = null; 
                spawnCoin(this); 
            }
        }
    }
}
</script>
</body>
</html>
