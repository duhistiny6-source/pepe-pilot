<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pepe Pilot</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin:0; overflow:hidden; background:#000; }
        
        /* Статистика сверху */
        #ui { 
            position:fixed; top:12px; left:12px; color:#0f0; font-family: Arial; font-weight:bold; 
            z-index: 100; pointer-events: none; text-shadow: 1px 1px 2px #000;
        }

        /* Навигация снизу - ИСПРАВЛЕНА */
        #nav-bar { 
            position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%); 
            width: 90%; height: 65px; background: rgba(0, 0, 0, 0.9); 
            border: 1px solid #0f0; border-radius: 15px; display: flex; 
            justify-content: space-around; align-items: center; z-index: 200;
        }
        .nav-item { 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; color: #0f0; width: 25%; text-align: center;
        }
        .nav-item span:first-child { font-size: 22px; line-height: 1.2; } /* Иконка */
        .nav-item span:last-child { 
            font-size: 8px; font-weight: bold; text-transform: uppercase; 
            margin-top: 2px; white-space: nowrap; 
        } /* Текст */

        /* Шестеренка */
        #settings-btn {
            position: fixed; top: 12px; right: 12px; width: 35px; height: 35px;
            background: rgba(0,255,0,0.2); border: 1px solid #0f0; border-radius: 50%;
            color: #0f0; font-size: 20px; cursor: pointer; z-index: 150;
            display: flex; justify-content: center; align-items: center;
        }
    </style>
</head>
<body>

<div id="ui">
    <div>💰 <span id="money">0.000</span></div>
    <div>⚡ <span id="energy">100</span>/100</div>
</div>

<div id="settings-btn" onclick="alert('Settings Clicked')">⚙️</div>

<div id="nav-bar">
    <div class="nav-item"><span>🛒</span><span>МАГАЗИН</span></div>
    <div class="nav-item"><span>📜</span><span>ЗАДАНИЯ</span></div>
    <div class="nav-item"><span>👥</span><span>ДРУЗЬЯ</span></div>
    <div class="nav-item"><span>👛</span><span>КОШЕЛЕК</span></div>
</div>

<script>
const config = {
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    physics: { default: 'arcade' },
    scene: { preload, create, update }
};

const game = new Phaser.Game(config);

let plane, hook, rope, targets, money = 0, energy = 100;
let isLaunching = false, isReturning = false, caughtItem = null;
let angle = 0, swingSpeed = 0.03, distance = 25;

function preload() {
    this.load.image('sky', 'pg.jpeg');
    this.load.image('hook', 'kleshn.png');
    this.load.image('usdt', 'usdt.png');
    this.load.image('plane', 'pepe.png');
}

function create() {
    this.add.image(config.width/2, config.height/2, 'sky').setDisplaySize(config.width, config.height);
    
    targets = this.physics.add.group();
    for(let i = 0; i < 6; i++) spawn(this);

    rope = this.add.graphics().setDepth(30);
    hook = this.add.sprite(0, 0, 'hook').setDepth(50).setDisplaySize(60, 60); 
    this.physics.add.existing(hook);

    plane = this.add.image(config.width/2, 120, 'plane').setDisplaySize(280, 180).setDepth(60);

    this.input.on('pointerdown', (p) => {
        if (p.y < config.height - 80 && !isLaunching && !isReturning && energy > 0) {
            isLaunching = true;
            energy--;
            document.getElementById('energy').innerText = energy;
        }
    });

    this.physics.add.overlap(hook, targets, (h, item) => {
        if (isLaunching && !caughtItem) {
            caughtItem = item;
            caughtItem.body.enable = false;
            isLaunching = false; isReturning = true;
        }
    });
}

function spawn(s) {
    let x = Phaser.Math.Between(50, config.width - 50);
    let y = Phaser.Math.Between(config.height * 0.45, config.height - 150);
    targets.create(x, y, 'usdt').setScale(0.12).setDepth(40);
}

function update() {
    let sX = plane.x - 5; let sY = plane.y + 15; 
    if (!isLaunching && !isReturning) {
        angle += swingSpeed;
        if (angle > 0.8 || angle < -0.8) swingSpeed *= -1;
        distance = 25;
    } else if (isLaunching) {
        distance += 16; 
        if (distance > config.height - 110) { isLaunching = false; isReturning = true; }
    } else if (isReturning) {
        distance -= 8; 
        if (distance <= 25) {
            isReturning = false;
            if (caughtItem) {
                money += 0.001; 
                document.getElementById('money').innerText = money.toFixed(3);
                caughtItem.destroy(); caughtItem = null; spawn(this);
            }
        }
    }
    hook.x = sX + Math.sin(angle) * distance;
    hook.y = sY + Math.cos(angle) * distance;
    hook.rotation = -angle;
    rope.clear().lineStyle(2, 0xffffff, 0.7).lineBetween(sX, sY, hook.x, hook.y);
    if (caughtItem) {
        caughtItem.x = hook.x; caughtItem.y = hook.y; caughtItem.rotation = hook.rotation;
    }
}
</script>
</body>
</html>
