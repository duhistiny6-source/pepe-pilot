<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pepe Pilot Matrix Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; touch-action: none; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>
<script>
const config = {
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    physics: { default: 'arcade' },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);
let plane, chainSprite, targets, scoreText, timerText;
let isLaunching = false, isReturning = false, caughtItem = null;
let angle = 0, swingSpeed = 0.025, launchSpeed = 14; 
let score = 0, timeLeft = 60, isGameOver = false;

function preload() {
    this.load.crossOrigin = 'anonymous';
    // Проверь регистр букв на GitHub! (pg.jpeg или pg.jpg?)
    this.load.image('sky', 'pg.jpeg');
    this.load.image('pepe', 'pepe.png');
    this.load.image('chain', 'cep.png'); 
    this.load.image('ton', 'ton.png');
    this.load.image('usdt', 'usdt.png');
    this.load.image('not', 'not.png');
    this.load.image('dogs', 'dogs.png');
}

function create() {
    // 1. ФОН
    if (this.textures.exists('sky')) {
        let bg = this.add.image(config.width/2, config.height/2, 'sky');
        let scale = Math.max(config.width / bg.width, config.height / bg.height);
        bg.setScale(scale).setScrollFactor(0);
    } else {
        // Запасной фон если файл не найден
        this.add.rectangle(0, 0, config.width, config.height, 0x001a00).setOrigin(0);
    }

    // 2. ЦЕПЬ
    chainSprite = this.add.sprite(0, 0, 'chain');
    // Если картинки цепи нет, создаем временную видимость, чтобы не было ошибки
    if (!this.textures.exists('chain')) {
        chainSprite.setVisible(false);
    }
    chainSprite.setOrigin(0.5, 0).setDepth(5);
    
    // Невидимая точка захвата для физики
    this.clawPoint = this.add.circle(config.width/2, 300, 35, 0x00ff00, 0); 
    this.physics.add.existing(this.clawPoint);

    // 3. САМОЛЕТ (Пепе)
    plane = this.add.sprite(config.width / 2, 140, 'pepe');
    plane.setDepth(10).setDisplaySize(220, 160);

    // Анимация покачивания самолета
    this.tweens.add({
        targets: plane,
        y: 170,
        duration: 2000,
        yoyo: true,
        loop: -1,
        ease: 'Sine.easeInOut'
    });

    // 4. МОНЕТКИ (Все 90x90)
    targets = this.physics.add.group();
    for(let i=0; i<8; i++) { spawnCoin(this); }

    // 5. МАТРИЧНЫЙ ТАЙМЕР
    scoreText = this.add.text(20, 20, 'SCORE: 0', { 
        fontSize: '24px', fill: '#0f0', fontFamily: 'Courier New', fontWeight: 'bold' 
    });
    timerText = this.add.text(config.width - 180, 20, 'TIME: 60', { 
        fontSize: '24px', fill: '#0f0', fontFamily: 'Courier New', fontWeight: 'bold' 
    });

    // Логика таймера
    this.time.addEvent({
        delay: 1000,
        callback: () => { 
            if(timeLeft > 0) { 
                timeLeft--; 
                timerText.setText('TIME: ' + timeLeft); 
            } else if (!isGameOver) {
                endGame(this);
            }
        },
        loop: true
    });

    this.input.on('pointerdown', () => { 
        if(!isLaunching && !isReturning && !isGameOver) isLaunching = true; 
    });

    this.physics.add.overlap(this.clawPoint, targets, (c, target) => {
        if (isLaunching && !caughtItem) { 
            caughtItem = target; 
            isLaunching = false; 
            isReturning = true; 
        }
    });
}

function spawnCoin(scene) {
    let x, y, tooClose;
    let attempts = 0;
    do {
        x = Phaser.Math.Between(80, config.width - 80);
        y = Phaser.Math.Between(config.height * 0.55, config.height - 100);
        // Проверка, чтобы монеты не слипались
        tooClose = targets.getChildren().some(c => Phaser.Math.Distance.Between(x, y, c.x, c.y) < 110);
        attempts++;
    } while (tooClose && attempts < 20);

    let randomCoin = Phaser.Utils.Array.GetRandom(['ton', 'usdt', 'not', 'dogs']);
    let coin = targets.create(x, y, randomCoin);
    
    if (coin) {
        coin.setDisplaySize(90, 90).setDepth(4).setOrigin(0.5);
    }
}

function endGame(scene) {
    isGameOver = true;
    scene.physics.pause();
    // Темная плашка в конце
    let overlay = scene.add.rectangle(config.width/2, config.height/2, config.width, config.height, 0x000000, 0.8);
    overlay.setDepth(20);
    
    scene.add.text(config.width/2, config.height/2 - 40, 'TIME IS UP', { 
        fontSize: '48px', fill: '#0f0', fontFamily: 'Courier New' 
    }).setOrigin(0.5).setDepth(21);
    
    scene.add.text(config.width/2, config.height/2 + 40, 'TOTAL: ' + score, { 
        fontSize: '32px', fill: '#fff', fontFamily: 'Courier New' 
    }).setOrigin(0.5).setDepth(21);
}

function update() {
    if (isGameOver) return;

    // ТОЧКА ПРИВЯЗКИ: Центр винта самолета (учитывает покачивание)
    let px = plane.x; 
    let py = plane.y + 82; 

    if (!isLaunching && !isReturning) {
        angle += swingSpeed;
        if (Math.abs(angle) > 0.8) swingSpeed = -swingSpeed;
        this.clawPoint.x = px + Math.sin(angle) * 160;
        this.clawPoint.y = py + Math.cos(angle) * 160;
    } else if (isLaunching) {
        this.clawPoint.x += Math.sin(angle) * launchSpeed;
        this.clawPoint.y += Math.cos(angle) * launchSpeed;
        if (this.clawPoint.y > config.height || this.clawPoint.x < 0 || this.clawPoint.x > config.width) {
            isLaunching = false; isReturning = true;
        }
    } else if (isReturning) {
        let dist = Phaser.Math.Distance.Between(this.clawPoint.x, this.clawPoint.y, px, py);
        // Возврат клешни к носу
        this.clawPoint.x += (px - this.clawPoint.x) * 0.15;
        this.clawPoint.y += (py - this.clawPoint.y) * 0.15;
        
        if (caughtItem) { 
            caughtItem.x = this.clawPoint.x; 
            caughtItem.y = this.clawPoint.y; 
        }
        
        if (dist < 45) {
            isReturning = false;
            if (caughtItem) { 
                score += 100; 
                scoreText.setText('SCORE: ' + score); 
                caughtItem.destroy(); 
                caughtItem = null; 
                spawnCoin(this); 
            }
        }
    }

    // РИСУЕМ ЦЕПЬ
    chainSprite.x = px;
    chainSprite.y = py;
    let angleToClaw = Phaser.Math.Angle.Between(px, py, this.clawPoint.x, this.clawPoint.y);
    chainSprite.rotation = angleToClaw - Math.PI / 2; 
    
    // Растягиваем цепь до клешни
    let currentDist = Phaser.Math.Distance.Between(px, py, this.clawPoint.x, this.clawPoint.y);
    chainSprite.displayWidth = 160; // Жирность троса
    chainSprite.displayHeight = currentDist + 30; 
}
</script>
</body>
</html>
