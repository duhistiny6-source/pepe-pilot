<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pepe Pilot: Mono Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        body { margin:0; padding:0; overflow:hidden; background:#000; touch-action: none; font-family: sans-serif; }
        #top-bar { position: fixed; top: 0; left: 0; width: 100%; height: 40px; background: rgba(0,0,0,0.5); z-index: 1000; display: flex; align-items: center; justify-content: space-between; padding: 0 10px; box-sizing: border-box; }
        
        #energy-block { display: flex; flex-direction: column; align-items: flex-start; min-width: 60px; }
        #energy-val { color: #0f0; font-weight: bold; font-size: 14px; }
        #energy-extra { display: none; }
        #energy-timer { color: #aaa; font-size: 9px; }
        #ad-btn { background: #ffcc00; color: #000; font-size: 8px; padding: 1px 4px; border-radius: 3px; cursor: pointer; font-weight: bold; border: 1px solid #fff; margin-top: 2px; }

        #balances { display: flex; gap: 10px; color: #fff; font-size: 12px; }
        .bal-item { display: flex; align-items: center; gap: 4px; }
        
        #nav-bar { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); width: 90%; height: 60px; background: rgba(0,0,0,0.9); border: 1px solid #333; border-radius: 15px; display: flex; justify-content: space-around; align-items: center; z-index: 2000; }
        .nav-btn { color: #fff; text-align: center; cursor: pointer; flex: 1; }
        .nav-btn span { font-size: 20px; display: block; }
        .nav-label { font-size: 9px; color: #bbb; text-transform: uppercase; margin-top: 2px; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 3000; color: #fff; justify-content: center; align-items: center; }
        .modal-content { background: #1a1a1a; border: 2px solid #0f0; padding: 20px; border-radius: 20px; text-align: center; width: 80%; }
        .task-row { background: #222; margin: 10px 0; padding: 10px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; }
        .buy-btn { background: #0f0; color: #000; border: none; padding: 5px 10px; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

<div id="top-bar">
    <div id="energy-block">
        <div id="energy-val">⚡ <span id="en-num">100</span></div>
        <div id="energy-extra">
            <div id="energy-timer">02:00:00</div>
            <div id="ad-btn" onclick="watchAd()">AD ⚡</div>
        </div>
    </div>
    <div id="balances">
        <div class="bal-item"><span style="color:#0f0">USDT:</span> <span id="u-bal">0.0000</span></div>
        <div class="bal-item"><span style="color:#ffcc00">PLT:</span> <span id="p-bal">0</span></div>
    </div>
</div>

<div id="nav-bar">
    <div class="nav-btn" onclick="openM('shop')"><span>🛒</span><div class="nav-label">АНГАР</div></div>
    <div class="nav-btn" onclick="openM('tasks')"><span>📜</span><div class="nav-label">ЗАДАНИЯ</div></div>
    <div class="nav-btn" onclick="openM('friends')"><span>👥</span><div class="nav-label">ДРУЗЬЯ</div></div>
    <div class="nav-btn" id="wallet-trigger"><span>👛</span><div class="nav-label">КОШЕЛЕК</div></div>
</div>

<div id="m-shop" class="modal"><div class="modal-content">
    <h3>АНГАР</h3>
    <div class="task-row"><span>МЕДНЫЙ</span> <b>10 TON</b> <button class="buy-btn" onclick="pay(10)">BUY</button></div>
    <div class="task-row"><span>БРОНЗОВЫЙ</span> <b>25 TON</b> <button class="buy-btn" onclick="pay(25)">BUY</button></div>
    <div class="task-row"><span>ЗОЛОТОЙ</span> <b>50 TON</b> <button class="buy-btn" onclick="pay(50)">BUY</button></div>
    <button onclick="closeM()">ЗАКРЫТЬ</button>
</div></div>

<div id="m-tasks" class="modal"><div class="modal-content">
    <h3>ЗАДАНИЯ</h3>
    <div class="task-row"><span>Подписка ТГ</span> <b>+100⚡</b> <button class="buy-btn">GO</button></div>
    <button onclick="closeM()">ЗАКРЫТЬ</button>
</div></div>

<div id="game-container"></div>

<script>
// --- ЛОГИКА ИНТЕРФЕЙСА ---
const tg = window.Telegram.WebApp;
tg.expand();

function openM(id) { document.getElementById('m-'+id).style.display = 'flex'; }
function closeM() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }

let energy = 100;
let plt = 0;
let usdt = 0;

function updateUI() {
    document.getElementById('en-num').innerText = energy;
    document.getElementById('energy-extra').style.display = (energy < 100) ? 'block' : 'none';
    document.getElementById('p-bal').innerText = plt;
    document.getElementById('u-bal').innerText = usdt.toFixed(4);
}

function watchAd() { energy = 100; updateUI(); }

// --- TON CONNECT ---
const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
    manifestUrl: 'https://duhistiny6-source.github.io/pepe-pilot/tonconnect-manifest.json',
    buttonRootId: 'wallet-trigger'
});

async function pay(amount) {
    if(!tonConnectUI.connected) { alert("Подключи кошелек!"); return; }
    const tx = {
        validUntil: Math.floor(Date.now()/1000) + 60,
        messages: [{ address: "ТВОЙ_КОШЕЛЕК", amount: (amount * 1000000000).toString() }]
    };
    try { await tonConnectUI.sendTransaction(tx); alert("Успех!"); } catch(e) { alert("Отмена"); }
}

// --- ИГРА (PHASER) ---
const config = {
    type: Phaser.AUTO,
    parent: 'game-container',
    width: window.innerWidth,
    height: window.innerHeight,
    physics: { default: 'arcade' },
    scene: { preload, create, update }
};
const game = new Phaser.Game(config);

let plane, hook, rope, targets, isLaunching = false, isReturning = false, caughtItem = null;
let angle = 0, swingSpeed = 0.02, distance = 30;

function preload() {
    this.load.image('sky', 'pg.jpeg');
    this.load.image('hook', 'kleshn.png');
    this.load.image('coin', 'logo..png');
    this.load.image('usdt_img', 'usdt.png');
    this.load.image('plane', 'pepe.png');
}

function create() {
    this.add.image(config.width/2, config.height/2, 'sky').setDisplaySize(config.width, config.height);
    targets = this.physics.add.group();
    for(let i=0; i<5; i++) spawnCoin(this);

    rope = this.add.graphics();
    plane = this.add.image(config.width/2, 120, 'plane').setDisplaySize(250, 150).setDepth(10);
    hook = this.add.sprite(0, 0, 'hook').setDisplaySize(50, 50).setDepth(5);
    this.physics.add.existing(hook);

    this.physics.add.overlap(hook, targets, (h, item) => {
        if(isLaunching && !caughtItem) {
            caughtItem = item;
            caughtItem.body.enable = false;
            isLaunching = false; isReturning = true;
        }
    });

    this.input.on('pointerdown', () => {
        if(!isLaunching && !isReturning && energy > 0) {
            isLaunching = true;
            energy--;
            updateUI();
        }
    });
}

function spawnCoin(scene) {
    let x = Phaser.Math.Between(50, config.width - 50);
    let y = Phaser.Math.Between(config.height * 0.4, config.height - 150);
    let type = (Math.random() > 0.8) ? 'usdt_img' : 'coin';
    targets.create(x, y, type).setScale(0.12);
}

function update() {
    let startX = plane.x;
    let startY = plane.y + 30;

    if(!isLaunching && !isReturning) {
        angle += swingSpeed;
        if(angle > 0.5 || angle < -0.5) swingSpeed *= -1;
        distance = 30;
    } else if(isLaunching) {
        distance += 12;
        if(distance > config.height - 100) { isLaunching = false; isReturning = true; }
    } else if(isReturning) {
        distance -= 5;
        if(distance <= 30) {
            isReturning = false;
            if(caughtItem) {
                if(caughtItem.texture.key === 'coin') plt += 10; else usdt += 0.001;
                updateUI();
                caughtItem.destroy(); caughtItem = null; spawnCoin(this);
            }
        }
    }

    hook.x = startX + Math.sin(angle) * distance;
    hook.y = startY + Math.cos(angle) * distance;
    hook.rotation = -angle;

    // НИТКА (Ювелирно)
    rope.clear();
    rope.lineStyle(2, 0xffffff, 0.7);
    rope.lineBetween(startX, startY, hook.x, hook.y);

    if(caughtItem) { caughtItem.x = hook.x; caughtItem.y = hook.y + 10; }
}
</script>
</body>
</html>
