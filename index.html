<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pepe Pilot Full Graphics</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; touch-action: none; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>
<script>
/**
 * СОВЕТ: Если GitHub блокирует CORS, браузер показывает "зеленые квадраты".
 * Этот код принудительно пытается загрузить файлы через прокси.
 */
const ASSETS_URL = 'https://raw.githubusercontent.com/duhistiny6/pepe-pilot/main/';

const config = {
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    physics: { default: 'arcade' },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);
let plane, clawGraphic, chain, targets, scoreText, timerText;
let isLaunching = false, isReturning = false, caughtItem = null;
let angle = 0, swingSpeed = 0.04, launchSpeed = 18;
let score = 0, timeLeft = 60;

function preload() {
    // Убираем длинные ссылки и ищем файлы в той же папке
    this.load.image('sky', 'bg.jpg'); 
    this.load.image('pepe', 'pepe.png');
    this.load.image('ton', 'ton-ecosystem-removebe.png');
}

     

function create() {
    // 1. Создаем фон
    let bg = this.add.image(config.width/2, config.height/2, 'sky');
    let scale = Math.max(config.width / bg.width, config.height / bg.height);
    bg.setScale(scale).setScrollFactor(0);

    // 2. Создаем самолет Пепе
    plane = this.add.sprite(config.width / 2, 130, 'pepe');
    plane.setDepth(10).setDisplaySize(220, 160);

    // Легкое покачивание самолета
    this.tweens.add({
        targets: plane,
        y: 150,
        duration: 1500,
        yoyo: true,
        loop: -1,
        ease: 'Sine.easeInOut'
    });

    // 3. Настройка захвата
    chain = this.add.graphics().setDepth(5);
    clawGraphic = this.add.graphics().setDepth(6);
    this.clawPoint = this.add.circle(config.width/2, 230, 15);
    this.physics.add.existing(this.clawPoint);

    // 4. Группа монет
    targets = this.physics.add.group();
    for(let i=0; i<7; i++) { spawnCoin(this); }

    // Интерфейс
    scoreText = this.add.text(25, 25, '💎 Очки: 0', { 
        fontSize: '32px', fill: '#fff', fontStyle: 'bold', stroke: '#000', strokeThickness: 6 
    });
    timerText = this.add.text(config.width - 180, 25, '⏱ 60', { 
        fontSize: '32px', fill: '#ff0', fontStyle: 'bold', stroke: '#000', strokeThickness: 6 
    });

    // Таймер
    this.time.addEvent({
        delay: 1000,
        callback: () => { if(timeLeft > 0) { timeLeft--; timerText.setText('⏱ ' + timeLeft); } },
        loop: true
    });

    // Управление
    this.input.on('pointerdown', () => { 
        if(!isLaunching && !isReturning && timeLeft > 0) isLaunching = true; 
    });

    // Физика столкновений
    this.physics.add.overlap(this.clawPoint, targets, (c, target) => {
        if (isLaunching && !caughtItem) { 
            caughtItem = target; 
            isLaunching = false; 
            isReturning = true; 
        }
    });
}

function spawnCoin(scene) {
    let x = Phaser.Math.Between(60, config.width - 60);
    let y = Phaser.Math.Between(400, config.height - 100);
    let coin = targets.create(x, y, 'ton');
    if(coin) coin.setDisplaySize(80, 80).setDepth(4);
}

function update() {
    if (timeLeft <= 0) {
        if(timeLeft === 0) {
            this.add.text(config.width/2, config.height/2, 'ИГРА ОКОНЧЕНА', { 
                fontSize: '48px', fill: '#fff', stroke: '#000', strokeThickness: 8 
            }).setOrigin(0.5);
            timeLeft = -1;
        }
        return;
    }

    let px = plane.x; 
    let py = plane.y + 40;

    if (!isLaunching && !isReturning) {
        angle += swingSpeed;
        if (Math.abs(angle) > 0.9) swingSpeed = -swingSpeed;
        this.clawPoint.x = px + Math.sin(angle) * 140;
        this.clawPoint.y = py + Math.cos(angle) * 140;
    } else if (isLaunching) {
        this.clawPoint.x += Math.sin(angle) * launchSpeed;
        this.clawPoint.y += Math.cos(angle) * launchSpeed;
        if (this.clawPoint.y > config.height || this.clawPoint.x < 5 || this.clawPoint.x > config.width - 5) {
            isLaunching = false; isReturning = true;
        }
    } else if (isReturning) {
        let tx = px + Math.sin(angle) * 140;
        let ty = py + Math.cos(angle) * 140;
        let dist = Phaser.Math.Distance.Between(this.clawPoint.x, this.clawPoint.y, tx, ty);
        this.clawPoint.x += (tx - this.clawPoint.x) * 0.15;
        this.clawPoint.y += (ty - this.clawPoint.y) * 0.15;
        if (caughtItem) { caughtItem.x = this.clawPoint.x; caughtItem.y = this.clawPoint.y; }
        if (dist < 15) {
            isReturning = false;
            if (caughtItem) { 
                score += 100; scoreText.setText('💎 Очки: ' + score); 
                caughtItem.destroy(); caughtItem = null; spawnCoin(this);
            }
        }
    }

    // Рисуем трос
    chain.clear().lineStyle(3, 0x333333).lineBetween(px, py, this.clawPoint.x, this.clawPoint.y);
    
    // Рисуем золотой крюк
    clawGraphic.clear().lineStyle(5, 0xFFD700);
    let rot = Phaser.Math.Angle.Between(px, py, this.clawPoint.x, this.clawPoint.y) + Math.PI/2;
    let gap = caughtItem ? 0.2 : 0.7; 
    clawGraphic.beginPath().arc(this.clawPoint.x, this.clawPoint.y, 22, rot - gap, rot + gap).strokePath();
    clawGraphic.beginPath().arc(this.clawPoint.x, this.clawPoint.y, 22, rot + Math.PI - gap, rot + Math.PI + gap).strokePath();
}
</script>
</body>
</html>
