<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pepe Pilot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin:0; padding:0; overflow:hidden; background:#000; font-family: sans-serif; }
        /* Верхняя панель */
        #top-bar { position: fixed; top: 0; left: 0; width: 100%; height: 40px; background: rgba(0, 0, 0, 0.6); z-index: 1000; display: flex; align-items: center; justify-content: space-between; padding: 0 10px; box-sizing: border-box; }
        #energy-container { color: #0f0; font-weight: bold; font-size: 14px; }
        #balance-container { display: flex; gap: 15px; color: #fff; font-size: 12px; }
        .coin-icon { width: 14px; height: 14px; vertical-align: middle; }
        /* Нижняя панель */
        #nav-bar { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); width: 90%; height: 60px; background: rgba(0, 0, 0, 0.9); border: 1px solid #333; border-radius: 15px; display: flex; justify-content: space-around; align-items: center; z-index: 2000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #fff; font-size: 8px; cursor: pointer; text-transform: uppercase; }
        .nav-item span { font-size: 20px; margin-bottom: 2px; }
        canvas { display: block; }
    </style>
</head>
<body>

<div id="top-bar">
    <div id="energy-container">⚡ <span id="energy">100</span></div>
    <div id="balance-container">
        <div>USDT: <span id="money" style="color:#0f0">0.0000</span></div>
        <div><img src="logo..png" class="coin-icon"> PLT: <span id="frog-money" style="color:#ffcc00">0</span></div>
    </div>
</div>

<div id="nav-bar">
    <div class="nav-item"><span>🛒</span><div>МАГАЗИН</div></div>
    <div class="nav-item"><span>📜</span><div>ЗАДАНИЯ</div></div>
    <div class="nav-item"><span>👥</span><div>ДРУЗЬЯ</div></div>
    <div class="nav-item"><span>👛</span><div>КОШЕЛЕК</div></div>
</div>

<script src="api.js"></script>
<script src="game.js"></script>

</body>
</html>
