<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pepe Pilot Gold Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; touch-action: none; }
    </style>
</head>
<body>
<script>
const config = {
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    physics: { default: 'arcade' },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);
let plane, chainSprite, targets, scoreText, timerText;
let isLaunching = false, isReturning = false, caughtItem = null;
let angle = 0, swingSpeed = 0.03, launchSpeed = 20;
let score = 0, timeLeft = 60;
const coinTypes = ['ton', 'usdt', 'not', 'dogs'];

function preload() {
    this.load.crossOrigin = 'anonymous';
    // Загружаем твой новый фон pg.jpeg
    this.load.image('sky', 'pg.jpeg');
    this.load.image('pepe', 'pepe.png');
    this.load.image('chain', 'cep.png'); 
    this.load.image('ton', 'ton.png');
    this.load.image('usdt', 'usdt.png');
    this.load.image('not', 'not.png');
    this.load.image('dogs', 'dogs.png');
}

function create() {
    // 1. ФОН БЕЗ ВОДЯНЫХ ЗНАКОВ
    if (this.textures.exists('sky')) {
        let bg = this.add.image(config.width/2, config.height/2, 'sky');
        let scale = Math.max(config.width / bg.width, config.height / bg.height);
        bg.setScale(scale).setScrollFactor(0);
    }

    // 2. ЦЕПЬ (Сделал МАКСИМАЛЬНО ЖИРНОЙ)
    chainSprite = this.add.sprite(0, 0, 'chain');
    chainSprite.setOrigin(0.5, 0); 
    chainSprite.setDepth(5);
    
    // Точка захвата
    this.clawPoint = this.add.circle(config.width/2, 300, 35);
    this.physics.add.existing(this.clawPoint);

    // 3. САМОЛЕТ
    plane = this.add.sprite(config.width / 2, 120, 'pepe');
    plane.setDepth(10).setDisplaySize(200, 150);

    // 4. МОНЕТКИ
    targets = this.physics.add.group();
    for(let i=0; i<8; i++) { spawnCoin(this); }

    // Интерфейс
    scoreText = this.add.text(25, 30, '💎 Очки: 0', { fontSize: '32px', fill: '#fff', stroke: '#000', strokeThickness: 8 });
    timerText = this.add.text(config.width - 220, 30, '⏱ 00:' + timeLeft, { fontSize: '32px', fill: '#ff0', stroke: '#000', strokeThickness: 8 });

    this.time.addEvent({
        delay: 1000,
        callback: () => { if(timeLeft > 0) { timeLeft--; timerText.setText('⏱ 00:' + (timeLeft < 10 ? '0' : '') + timeLeft); } },
        loop: true
    });

    this.input.on('pointerdown', () => { 
        if(!isLaunching && !isReturning && timeLeft > 0) isLaunching = true; 
    });

    this.physics.add.overlap(this.clawPoint, targets, (c, target) => {
        if (isLaunching && !caughtItem) { 
            caughtItem = target; 
            isLaunching = false; 
            isReturning = true; 
        }
    });
}

function spawnCoin(scene) {
    let x = Phaser.Math.Between(80, config.width - 80);
    let y = Phaser.Math.Between(450, config.height - 100);
    let randomCoin = Phaser.Utils.Array.GetRandom(coinTypes);
    
    let coin;
    if (scene.textures.exists(randomCoin)) {
        coin = targets.create(x, y, randomCoin);
        coin.setDisplaySize(100, 100); // Ровные монеты
    } else {
        coin = scene.add.circle(x, y, 40, 0xffd700);
        targets.add(coin);
    }
    coin.setDepth(4).setOrigin(0.5); 
}

function update() {
    if (timeLeft <= 0) return;

    // ПРИВЯЗКА К НОСУ: Сместили точку выхода цепи ниже к винту
    let px = plane.x; 
    let py = plane.y + 85; 

    if (!isLaunching && !isReturning) {
        angle += swingSpeed;
        if (Math.abs(angle) > 0.8) swingSpeed = -swingSpeed;
        this.clawPoint.x = px + Math.sin(angle) * 170;
        this.clawPoint.y = py + Math.cos(angle) * 170;
    } else if (isLaunching) {
        this.clawPoint.x += Math.sin(angle) * launchSpeed;
        this.clawPoint.y += Math.cos(angle) * launchSpeed;
        if (this.clawPoint.y > config.height || this.clawPoint.x < 0 || this.clawPoint.x > config.width) {
            isLaunching = false; isReturning = true;
        }
    } else if (isReturning) {
        let tx = px + Math.sin(angle) * 170;
        let ty = py + Math.cos(angle) * 170;
        let dist = Phaser.Math.Distance.Between(this.clawPoint.x, this.clawPoint.y, tx, ty);
        this.clawPoint.x += (tx - this.clawPoint.x) * 0.15;
        this.clawPoint.y += (ty - this.clawPoint.y) * 0.15;
        
        if (caughtItem) { 
            caughtItem.x = this.clawPoint.x; 
            caughtItem.y = this.clawPoint.y; 
        }
        
        if (dist < 20) {
            isReturning = false;
            if (caughtItem) { 
                score += 100; scoreText.setText('💎 Очки: ' + score); 
                caughtItem.destroy(); caughtItem = null; spawnCoin(this);
            }
        }
    }

    // ВИЗУАЛ ЦЕПИ (УЛЬТРА ЖИРНАЯ)
    chainSprite.x = px;
    chainSprite.y = py;
    let angleRad = Phaser.Math.Angle.Between(px, py, this.clawPoint.x, this.clawPoint.y);
    chainSprite.rotation = angleRad - Math.PI / 2; 
    
    let dist = Phaser.Math.Distance.Between(px, py, this.clawPoint.x, this.clawPoint.y);
    chainSprite.displayWidth = 140; // Ширина клешни и цепи стала мощнее
    chainSprite.displayHeight = dist + 45; 
}
</script>
</body>
</html>
