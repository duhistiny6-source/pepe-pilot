<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pepe Pilot Fixed Logic</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; touch-action: none; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>
<script>
const config = {
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    physics: { default: 'arcade' },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);
let plane, hook, chain, targets, scoreText;
let isLaunching = false, isReturning = false, caughtItem = null;
let angle = 0, swingSpeed = 0.03, score = 0;

const SPEED = 16;
const BASE_PLANE_Y = 160; // Базовая высота самолета

function preload() {
    this.load.crossOrigin = 'anonymous';
    this.load.image('sky', 'pg.jpeg'); 
    this.load.image('pepe', 'pepe.png'); //
    this.load.image('ton', 'ton.png');
    this.load.image('usdt', 'usdt.png');
    this.load.image('not', 'not.png');
    this.load.image('dogs', 'dogs.png');
}

function create() {
    this.add.image(config.width/2, config.height/2, 'sky').setDisplaySize(config.width, config.height);

    // 1. ЦЕПЬ (Спрайт-нить)
    chain = this.add.sprite(config.width / 2, BASE_PLANE_Y, 'pepe');
    chain.setOrigin(0.5, 0).setDepth(30);
    chain.setCrop(495, 480, 10, 100); // Берем только нить из файла

    // 2. КЛЕШНЯ
    hook = this.add.sprite(config.width / 2, BASE_PLANE_Y, 'pepe');
    hook.setOrigin(0.5, 0).setDepth(40).setDisplaySize(100, 90);
    hook.setCrop(300, 600, 400, 400); // Желтый захват

    // 3. САМОЛЕТ
    plane = this.add.image(config.width / 2, BASE_PLANE_Y, 'pepe');
    plane.setDisplaySize(300, 260).setDepth(50).setCrop(0, 0, 1000, 480);

    this.physics.add.existing(hook);
    hook.body.setCircle(35, 15, 15);

    targets = this.physics.add.group();
    for(let i=0; i<8; i++) spawnCoin(this);

    scoreText = this.add.text(25, 25, 'SCORE: 0', { fontSize: '32px', fill: '#0f0', fontWeight: 'bold' }).setDepth(100);

    this.input.on('pointerdown', () => { 
        if(!isLaunching && !isReturning) isLaunching = true; 
    });

    this.physics.add.overlap(hook, targets, (h, target) => {
        if (isLaunching && !caughtItem) { 
            caughtItem = target; 
            isLaunching = false; 
            isReturning = true; 
        }
    });
}

function spawnCoin(scene) {
    let x = Phaser.Math.Between(100, config.width - 100);
    let y = Phaser.Math.Between(config.height * 0.6, config.height - 100);
    let type = Phaser.Utils.Array.GetRandom(['ton', 'usdt', 'not', 'dogs']);
    targets.create(x, y, type).setDisplaySize(70, 70);
}

function update() {
    // 1. ЭФФЕКТ ПАРЕНИЯ САМОЛЕТА
    let hover = Math.sin(this.time.now / 500) * 10;
    plane.y = BASE_PLANE_Y + hover;
    
    // Начало цепи привязано к качающемуся самолету
    let startY = plane.y + 40;
    chain.y = startY;

    if (!isLaunching && !isReturning) {
        // 2. КАЧАНИЕ КЛЕШНИ (Маятник)
        angle += swingSpeed;
        if (angle > 0.8 || angle < -0.8) swingSpeed = -swingSpeed;
        
        chain.rotation = -angle;
        chain.displayHeight = 50;
        
        hook.x = plane.x + Math.sin(angle) * 50;
        hook.y = startY + Math.cos(angle) * 50;
        hook.rotation = -angle;
    } 
    else {
        if (isLaunching) {
            // Выдвижение
            chain.displayHeight += SPEED;
            if (chain.displayHeight > config.height - startY) { 
                isLaunching = false; isReturning = true; 
            }
        } else {
            // Втягивание
            chain.displayHeight -= SPEED + 4;
            if (chain.displayHeight <= 50) {
                isReturning = false;
                if (caughtItem) {
                    score += 100; scoreText.setText('SCORE: ' + score);
                    caughtItem.destroy(); caughtItem = null; spawnCoin(this);
                }
            }
        }

        // Клешня строго следует за длиной цепи
        hook.x = plane.x + Math.sin(angle) * chain.displayHeight;
        hook.y = startY + Math.cos(angle) * chain.displayHeight;
        hook.rotation = -angle;

        // МОНЕТКА ПРИЛИПАЕТ К КЛЕШНЕ
        if (caughtItem) {
            caughtItem.x = hook.x;
            caughtItem.y = hook.y + 35; // Держится за "зубы" клешни
        }
    }
}
</script>
</body>
</html>
