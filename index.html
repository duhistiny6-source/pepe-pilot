<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pepe Pilot Gold</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; touch-action: none; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>
<script>
const config = {
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    physics: { default: 'arcade' },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);
let plane, hook, chainGraphics, targets, scoreText;
let isLaunching = false, isReturning = false, caughtItem = null;
let angle = 0, swingSpeed = 0.03, score = 0;

const HOOK_SPEED = 18;
const PLANE_Y = 160; // Самолет вверху

function preload() {
    this.load.crossOrigin = 'anonymous';
    this.load.image('sky', 'pg.jpeg'); 
    this.load.image('pepe', 'pepe.png'); // Твой основной файл
    this.load.image('ton', 'ton.png');
    this.load.image('usdt', 'usdt.png');
    this.load.image('not', 'not.png');
    this.load.image('dogs', 'dogs.png');
}

function create() {
    // Фон
    let bg = this.add.image(config.width/2, config.height/2, 'sky');
    let scale = Math.max(config.width / bg.width, config.height / bg.height);
    bg.setScale(scale).setScrollFactor(0);

    // 1. Самолет (стоит на месте)
    plane = this.add.image(config.width / 2, PLANE_Y, 'pepe');
    plane.setDisplaySize(300, 260).setDepth(30);
    plane.setCrop(0, 0, 1000, 480); // Оставляем только кабину с пилотом

    // 2. Линия цепи
    chainGraphics = this.add.graphics().setDepth(10);

    // 3. Та самая КЛЕШНЯ
    hook = this.add.sprite(config.width / 2, PLANE_Y + 40, 'pepe');
    hook.setDepth(20).setDisplaySize(110, 100);
    // Вырезаем именно желтую клешню из нижней части твоего рисунка
    hook.setCrop(300, 600, 400, 400); 

    this.physics.add.existing(hook);
    hook.body.setCircle(25, 30, 30);

    // Монетки
    targets = this.physics.add.group();
    for(let i=0; i<8; i++) { spawnCoin(this); }

    scoreText = this.add.text(25, 25, 'SCORE: 0', { 
        fontSize: '32px', fill: '#0f0', fontFamily: 'Courier New', fontWeight: 'bold'
    }).setDepth(40);

    this.input.on('pointerdown', () => { 
        if(!isLaunching && !isReturning) isLaunching = true; 
    });

    this.physics.add.overlap(hook, targets, (h, target) => {
        if (isLaunching && !caughtItem) { 
            caughtItem = target; 
            isLaunching = false; 
            isReturning = true; 
        }
    });
}

function spawnCoin(scene) {
    let x = Phaser.Math.Between(80, config.width - 80);
    let y = Phaser.Math.Between(config.height * 0.6, config.height - 120);
    let type = Phaser.Utils.Array.GetRandom(['ton', 'usdt', 'not', 'dogs']);
    let coin = targets.create(x, y, type);
    coin.setDisplaySize(75, 75).setOrigin(0.5);
    coin.body.setCircle(30);
}

function update() {
    chainGraphics.clear();
    let pivotX = config.width / 2;
    let pivotY = PLANE_Y + 40; // Точка, откуда вылетает цепь

    if (!isLaunching && !isReturning) {
        // Качаемся как маятник
        angle += swingSpeed;
        if (angle > 1.1 || angle < -1.1) swingSpeed = -swingSpeed;
        
        hook.x = pivotX + Math.sin(angle) * 80;
        hook.y = pivotY + Math.cos(angle) * 80;
        hook.rotation = -angle;
    } 
    else if (isLaunching) {
        // Летим за монетой
        hook.x += Math.sin(angle) * HOOK_SPEED;
        hook.y += Math.cos(angle) * HOOK_SPEED;

        if (hook.y > config.height || hook.x < 0 || hook.x > config.width) {
            isLaunching = false; isReturning = true;
        }
    } 
    else if (isReturning) {
        // Тащим обратно
        let moveAngle = Phaser.Math.Angle.Between(hook.x, hook.y, pivotX, pivotY);
        hook.x += Math.cos(moveAngle) * (HOOK_SPEED + 4);
        hook.y += Math.sin(moveAngle) * (HOOK_SPEED + 4);

        if (caughtItem) {
            caughtItem.x = hook.x;
            caughtItem.y = hook.y + 20;
        }

        if (Phaser.Math.Distance.Between(hook.x, hook.y, pivotX, pivotY) < 20) {
            isReturning = false;
            if (caughtItem) {
                score += 100; scoreText.setText('SCORE: ' + score);
                caughtItem.destroy(); caughtItem = null; spawnCoin(this);
            }
        }
    }

    // Рисуем цепь (одну!)
    chainGraphics.lineStyle(3, 0x999999, 1);
    chainGraphics.lineBetween(pivotX, pivotY, hook.x, hook.y);
    
    // Самолет просто парит
    plane.y = PLANE_Y + Math.sin(this.time.now / 600) * 10;
}
</script>
</body>
</html>
