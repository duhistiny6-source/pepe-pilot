<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pepe Pilot Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; touch-action: none; }
    </style>
</head>
<body>
<script>
const config = {
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    physics: { default: 'arcade', arcade: { debug: false } },
    render: { pixelArt: false, antialias: true }, // Чтобы монеты были чёткими
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);
let plane, clawContainer, chain, targets, scoreText;
let isLaunching = false, isReturning = false, caughtItem = null;
let angle = 0, swingSpeed = 0.02, launchSpeed = 15, returnSpeed = 10;
let score = 0;

function preload() {
    this.load.image('sky', 'https://labs.phaser.io/assets/skies/space3.png');
    // Используем твои точные имена файлов из репозитория
    this.load.image('pepe', 'images__32_-removebg-preview.png');
    this.load.image('ton', 'ton-ecosystem-removebg-preview.png');
    this.load.image('not', 'images__35_-removebg-preview.png');
    this.load.image('dogs', 'images__33_-removebg-preview.png');
}

function create() {
    this.add.image(config.width/2, config.height/2, 'sky').setAlpha(0.5).setScale(2);
    
    // ПЕПЕ
    plane = this.add.sprite(config.width / 2, 90, 'pepe').setDepth(10);
    plane.setDisplaySize(200, 200); 

    // ЦЕПЬ И КЛЕШНЯ
    chain = this.add.graphics().setDepth(5);
    
    // Создаем контейнер для клешни (левая и правая створка)
    clawContainer = this.add.container(config.width/2, 200);
    let leftClaw = this.add.graphics().lineStyle(4, 0xffd700).arc(0, 0, 20, 1.5, 3.5).strokePath();
    let rightClaw = this.add.graphics().lineStyle(4, 0xffd700).arc(0, 0, 20, -0.5, 1.5).strokePath();
    clawContainer.add([leftClaw, rightClaw]);
    clawContainer.setDepth(6);
    this.physics.add.existing(clawContainer);
    clawContainer.body.setCircle(20, -20, -20);

    // МОНЕТЫ
    targets = this.physics.add.group();
    const assets = ['ton', 'dogs', 'not'];
    for(let i=0; i<10; i++) {
        let x = Phaser.Math.Between(50, config.width - 50);
        let y = Phaser.Math.Between(350, config.height - 100);
        let coin = targets.create(x, y, Phaser.Math.RND.pick(assets));
        coin.setDisplaySize(70, 70); // Чёткий фиксированный размер
        coin.setDepth(4);
    }

    scoreText = this.add.text(20, 20, 'Score: 0', { fontSize: '32px', fill: '#fff', fontStyle: 'bold' });

    this.input.on('pointerdown', () => { 
        if(!isLaunching && !isReturning) isLaunching = true; 
    });

    // Логика захвата
    this.physics.add.overlap(clawContainer, targets, (claw, target) => {
        if (isLaunching && !caughtItem) {
            caughtItem = target;
            isLaunching = false;
            isReturning = true;
            // Визуальное "захватывание" (сближаем створки можно добавить позже)
        }
    });
}

function update() {
    let pivotX = plane.x;
    let pivotY = plane.y + 40;

    if (!isLaunching && !isReturning) {
        angle += swingSpeed;
        if (angle > 0.8 || angle < -0.8) swingSpeed = -swingSpeed;
        clawContainer.x = pivotX + Math.sin(angle) * 120;
        clawContainer.y = pivotY + Math.cos(angle) * 120;
        clawContainer.rotation = -angle;
    } else if (isLaunching) {
        clawContainer.x += Math.sin(angle) * launchSpeed;
        clawContainer.y += Math.cos(angle) * launchSpeed;

        if (clawContainer.y > config.height || clawContainer.x < 0 || clawContainer.x > config.width) {
            isLaunching = false;
            isReturning = true;
        }
    } else if (isReturning) {
        let tx = pivotX + Math.sin(angle) * 120;
        let ty = pivotY + Math.cos(angle) * 120;
        let dist = Phaser.Math.Distance.Between(clawContainer.x, clawContainer.y, tx, ty);

        clawContainer.x += (tx - clawContainer.x) / dist * returnSpeed;
        clawContainer.y += (ty - clawContainer.y) / dist * returnSpeed;

        if (caughtItem) {
            caughtItem.x = clawContainer.x;
            caughtItem.y = clawContainer.y;
        }

        if (dist < 15) {
            isReturning = false;
            if (caughtItem) {
                score += 100;
                scoreText.setText('Score: ' + score);
                caughtItem.destroy();
                caughtItem = null;
            }
        }
    }

    // Рисуем цепь
    chain.clear();
    chain.lineStyle(3, 0xcccccc, 1);
    chain.lineBetween(pivotX, pivotY, clawContainer.x, clawContainer.y);
}
</script>
</body>
</html>
