<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pepe Pilot PRO</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>

<style>
body {margin:0;background:#000;color:#fff;font-family:Arial}

#top-bar{
position:fixed;top:0;width:100%;
display:flex;justify-content:space-between;
padding:6px 10px;background:rgba(0,0,0,0.6);
z-index:1000
}

#bag{cursor:pointer;background:#111;padding:6px 10px;border-radius:10px}

#actions{
position:fixed;
bottom:80px;
width:100%;
display:flex;
justify-content:center;
gap:10px;
}

.btn{
background:#0f0;
color:#000;
padding:10px 15px;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.modal{
display:none;
position:fixed;
width:100%;height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;align-items:center;
z-index:2000
}

.modal-content{
background:#1a1a1a;
padding:20px;border-radius:15px;
border:1px solid #0f0;
text-align:center
}
</style>
</head>

<body>

<div id="top-bar">
<div>⚡ <span id="energy">100</span></div>
<div id="bag" onclick="toggleModal('bag-modal')">👜</div>
</div>

<div id="actions">
<div class="btn" onclick="rewardEnergy()">⚡ +Энергия</div>
<div class="btn" onclick="openChest()">🎁 Сундук</div>
<div class="btn" onclick="dailyBonus()">📅 Бонус</div>
</div>

<div id="bag-modal" class="modal">
<div class="modal-content">
<h3>Баланс</h3>
<div>PLT: <span id="plt">0</span></div>
<div>USDT: <span id="usdt">0</span></div>
<br>
<div class="btn" onclick="invite()">👥 Пригласить</div>
<br><br>
<button onclick="toggleModal('bag-modal')">Закрыть</button>
</div>
</div>

<script src="api.js"></script>
<script src="game.js"></script>

</body>
</html>
