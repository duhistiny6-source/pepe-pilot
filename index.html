<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pepe Pilot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        body { margin:0; padding:0; overflow:hidden; background:#000; touch-action: none; font-family: 'Segoe UI', sans-serif; }
        
        /* Верхняя панель */
        #top-bar { position: fixed; top: 0; left: 0; width: 100%; height: 40px; background: rgba(0,0,0,0.6); z-index: 1000; display: flex; align-items: center; padding: 0 10px; box-sizing: border-box; }
        #energy-container { color: #0f0; font-size: 14px; font-weight: bold; flex: 1; }
        #balance-container { display: flex; gap: 15px; color: #fff; font-size: 12px; flex: 3; justify-content: center; }
        .stat-val { color: #ffcc00; font-weight: bold; }
        #settings-btn { color: #888; font-size: 20px; cursor: pointer; }

        /* Нижняя панель навигации */
        #nav-bar { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); width: 90%; height: 60px; background: rgba(0, 0, 0, 0.9); border: 1px solid #333; border-radius: 15px; display: flex; justify-content: space-around; align-items: center; z-index: 500; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #888; cursor: pointer; text-decoration: none; }
        .nav-item.active { color: #fff; }
        .nav-icon { font-size: 20px; margin-bottom: 2px; }
        .nav-text { font-size: 9px; text-transform: uppercase; font-weight: bold; }

        /* Модальные окна */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: #1a1a1a; border: 2px solid #0f0; padding: 20px; border-radius: 20px; text-align: center; width: 85%; max-width: 320px; box-shadow: 0 0 20px rgba(0,255,0,0.2); }
        
        .hangar-item { background: #2a2a2a; border-radius: 12px; padding: 12px; margin: 10px 0; display: flex; justify-content: space-between; align-items: center; border: 1px solid #444; }
        .hangar-info { text-align: left; }
        .hangar-name { font-weight: bold; font-size: 14px; margin-bottom: 2px; }
        .hangar-price { color: #0f0; font-size: 11px; }
        
        .buy-btn { background: #0f0; color: #000; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; font-size: 12px; cursor: pointer; }
        .close-link { color: #888; margin-top: 15px; cursor: pointer; display: block; font-size: 14px; }
        
        #timer-display { font-size: 24px; color: #0f0; margin: 15px 0; font-family: monospace; }
    </style>
</head>
<body>

<div id="top-bar">
    <div id="energy-container">⚡ <span id="energy">100</span></div>
    <div id="balance-container">
        <div>USDT: <span id="money" class="stat-val">0.00000</span></div>
        <div>PLT: <span id="frog-money" class="stat-val">0</span></div>
    </div>
    <div id="settings-btn">⚙️</div>
</div>

<div id="shop-modal" class="modal">
    <div class="modal-content">
        <h2 style="margin-top:0">АНГАР</h2>
        <div class="hangar-item">
            <div class="hangar-info">
                <div class="hangar-name" style="color:#cd7f32">МЕДНЫЙ</div>
                <div class="hangar-price">Цена: 10 USDT</div>
            </div>
            <button class="buy-btn" onclick="buyPlane('copper', 10)">КУПИТЬ</button>
        </div>
        <div class="hangar-item">
            <div class="hangar-info">
                <div class="hangar-name" style="color:#b08d57">БРОНЗОВЫЙ</div>
                <div class="hangar-price">Цена: 25 USDT</div>
            </div>
            <button class="buy-btn" onclick="buyPlane('bronze', 25)">КУПИТЬ</button>
        </div>
        <div class="hangar-item">
            <div class="hangar-info">
                <div class="hangar-name" style="color:#ffd700">ЗОЛОТОЙ</div>
                <div class="hangar-price">Цена: 50 USDT</div>
            </div>
            <button class="buy-btn" onclick="buyPlane('gold', 50)">КУПИТЬ</button>
        </div>
        <span class="close-link" onclick="toggleModal('shop-modal')">Закрыть</span>
    </div>
</div>

<div id="energy-modal" class="modal">
    <div class="modal-content">
        <h3>НЕТ ЭНЕРГИИ</h3>
        <p style="font-size:12px; color:#ccc">Восстановление через:</p>
        <div id="timer-display">02:00:00</div>
        <button class="buy-btn" style="width:100%" onclick="watchAd()">📺 СМОТРЕТЬ РЕКЛАМУ</button>
        <span class="close-link" onclick="toggleModal('energy-modal')">Закрыть</span>
    </div>
</div>

<div id="nav-bar">
    <div class="nav-item" onclick="toggleModal('shop-modal')">
        <span class="nav-icon">🛒</span>
        <span class="nav-text">Магазин</span>
    </div>
    <div class="nav-item">
        <span class="nav-icon">📜</span>
        <span class="nav-text">Задания</span>
    </div>
    <div class="nav-item">
        <span class="nav-icon">👥</span>
        <span class="nav-text">Друзья</span>
    </div>
    <div class="nav-item" onclick="connectWallet()">
        <span class="nav-icon">👛</span>
        <span class="nav-text">Кошелек</span>
    </div>
</div>

<script src="api.js"></script>
<script src="game.js"></script>
</body>
</html>
