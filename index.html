<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pepe Pilot Ultra Fix</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; touch-action: none; }
        canvas { display: block; }
    </style>
</head>
<body>
<script>
const config = {
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    physics: { default: 'arcade' },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);
let plane, chainSprite, targets, scoreText, timerText;
let isLaunching = false, isReturning = false, caughtItem = null;
let angle = 0, swingSpeed = 0.025, launchSpeed = 12; // ЗАМЕДЛИЛИ СКОРОСТЬ
let score = 0, timeLeft = 60;
const coinTypes = ['ton', 'usdt', 'not', 'dogs'];

function preload() {
    this.load.crossOrigin = 'anonymous';
    this.load.image('sky', 'pg.jpeg');
    this.load.image('pepe', 'pepe.png');
    this.load.image('chain', 'cep.png'); 
    this.load.image('ton', 'ton.png');
    this.load.image('usdt', 'usdt.png');
    this.load.image('not', 'not.png');
    this.load.image('dogs', 'dogs.png');
}

function create() {
    // 1. ФОН
    let bg = this.add.image(config.width/2, config.height/2, 'sky');
    let scale = Math.max(config.width / bg.width, config.height / bg.height);
    bg.setScale(scale).setScrollFactor(0);

    // 2. ЦЕПЬ (Сделали ЖИРНОЙ и ПРИВЯЗАЛИ)
    chainSprite = this.add.sprite(0, 0, 'chain');
    chainSprite.setOrigin(0.5, 0); 
    chainSprite.setDepth(5);
    
    // Точка захвата
    this.clawPoint = this.add.circle(config.width/2, 300, 35);
    this.physics.add.existing(this.clawPoint);

    // 3. САМОЛЕТ
    plane = this.add.sprite(config.width / 2, 140, 'pepe');
    plane.setDepth(10).setDisplaySize(220, 160);

    // Плавное покачивание самолета
    this.tweens.add({
        targets: plane,
        y: 160,
        duration: 2500,
        yoyo: true,
        loop: -1,
        ease: 'Sine.easeInOut'
    });

    // 4. МОНЕТКИ (Теперь КРАСИВЫЕ и РОВНЫЕ)
    targets = this.physics.add.group();
    for(let i=0; i<7; i++) { spawnCoin(this); }

    // Интерфейс
    scoreText = this.add.text(25, 30, '💎 Очки: 0', { fontSize: '30px', fill: '#fff', stroke: '#000', strokeThickness: 6 });
    timerText = this.add.text(config.width - 200, 30, '⏱ 00:' + timeLeft, { fontSize: '30px', fill: '#ff0', stroke: '#000', strokeThickness: 6 });

    this.time.addEvent({
        delay: 1000,
        callback: () => { if(timeLeft > 0) { timeLeft--; timerText.setText('⏱ 00:' + (timeLeft < 10 ? '0' : '') + timeLeft); } },
        loop: true
    });

    this.input.on('pointerdown', () => { 
        if(!isLaunching && !isReturning && timeLeft > 0) isLaunching = true; 
    });

    this.physics.add.overlap(this.clawPoint, targets, (c, target) => {
        if (isLaunching && !caughtItem) { 
            caughtItem = target; 
            isLaunching = false; 
            isReturning = true; 
        }
    });
}

function spawnCoin(scene) {
    let x, y, tooClose;
    // Проверка, чтобы монетки не лепились друг к другу
    do {
        x = Phaser.Math.Between(100, config.width - 100);
        y = Phaser.Math.Between(config.height * 0.6, config.height - 120);
        tooClose = targets.getChildren().some(c => Phaser.Math.Distance.Between(x, y, c.x, c.y) < 100);
    } while (tooClose);

    let randomCoin = Phaser.Utils.Array.GetRandom(coinTypes);
    let coin = targets.create(x, y, randomCoin);
    
    // ФИКС: Делаем монетки идеально круглыми 90x90
    coin.setDisplaySize(90, 90);
    coin.setDepth(4).setOrigin(0.5); 
}

function update() {
    if (timeLeft <= 0) return;

    // ПРИВЯЗКА К НОСУ (ЧЕТКО ПОД ВИНТОМ)
    let px = plane.x; 
    let py = plane.y + 70; // Координата выхода цепи из носа

    if (!isLaunching && !isReturning) {
        angle += swingSpeed;
        if (Math.abs(angle) > 0.8) swingSpeed = -swingSpeed;
        this.clawPoint.x = px + Math.sin(angle) * 160;
        this.clawPoint.y = py + Math.cos(angle) * 160;
    } else if (isLaunching) {
        this.clawPoint.x += Math.sin(angle) * launchSpeed;
        this.clawPoint.y += Math.cos(angle) * launchSpeed;
        if (this.clawPoint.y > config.height || this.clawPoint.x < 0 || this.clawPoint.x > config.width) {
            isLaunching = false; isReturning = true;
        }
    } else if (isReturning) {
        let tx = px + Math.sin(angle) * 160;
        let ty = py + Math.cos(angle) * 160;
        let dist = Phaser.Math.Distance.Between(this.clawPoint.x, this.clawPoint.y, tx, ty);
        this.clawPoint.x += (tx - this.clawPoint.x) * 0.12;
        this.clawPoint.y += (ty - this.clawPoint.y) * 0.12;
        
        if (caughtItem) { 
            caughtItem.x = this.clawPoint.x; 
            caughtItem.y = this.clawPoint.y; 
        }
        
        if (dist < 15) {
            isReturning = false;
            if (caughtItem) { 
                score += 100; scoreText.setText('💎 Очки: ' + score); 
                caughtItem.destroy(); caughtItem = null; spawnCoin(this);
            }
        }
    }

    // ВИЗУАЛ ЦЕПИ (ФИКС: ТОЛЩИНА 150 И ПРИВЯЗКА)
    chainSprite.x = px;
    chainSprite.y = py;
    let angleRad = Phaser.Math.Angle.Between(px, py, this.clawPoint.x, this.clawPoint.y);
    chainSprite.rotation = angleRad - Math.PI / 2; 
    
    let dist = Phaser.Math.Distance.Between(px, py, this.clawPoint.x, this.clawPoint.y);
    chainSprite.displayWidth = 150; // Жирный трос
    chainSprite.displayHeight = dist + 40; 
}
</script>
</body>
</html>
