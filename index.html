<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pepe Pilot Debug</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin:0; padding:0; overflow:hidden; background:#111; font-family: sans-serif; }
        
        /* СТАТИСТИКА */
        #game-ui {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
        }
        .stats {
            position: absolute; top: 10px; left: 10px; color: #0f0;
            font-weight: bold; text-shadow: 2px 2px #000; font-size: 18px;
        }

        /* НАСТРОЙКИ */
        #settings-btn {
            position: absolute; top: 10px; right: 10px; width: 42px; height: 42px;
            background: rgba(0, 255, 0, 0.3); border: 2px solid #0f0; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; pointer-events: auto; font-size: 24px; color: #0f0;
        }

        /* НИЖНЯЯ ПАНЕЛЬ */
        #nav-bar { 
            position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); 
            width: 92%; height: 70px; background: rgba(0, 20, 0, 0.95); 
            border: 2px solid #0f0; border-radius: 18px; 
            display: grid; grid-template-columns: repeat(4, 1fr);
            align-items: center; pointer-events: auto;
        }
        .nav-item { 
            display: flex; flex-direction: column; align-items: center; color: #0f0; 
        }
        .nav-item i { font-style: normal; font-size: 24px; margin-bottom: 2px; }
        .nav-item span { font-size: 8px; font-weight: bold; }

        /* ОКНО НАСТРОЕК */
        #modal {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 240px; background: #000; border: 3px solid #0f0; border-radius: 20px;
            padding: 20px; color: #0f0; text-align: center; pointer-events: auto; z-index: 100;
        }
        .lang-btn {
            background: #040; color: #0f0; border: 1px solid #0f0; padding: 12px;
            margin: 8px; width: 90px; border-radius: 8px; font-weight: bold;
        }
    </style>
</head>
<body>

<div id="game-ui">
    <div class="stats">
        💰 <span id="money">0.000</span><br>
        ⚡ <span id="energy">100</span>/100
    </div>

    <div id="settings-btn" onclick="toggleModal()">⚙️</div>

    <div id="nav-bar">
        <div class="nav-item"><i>🛒</i><span id="l-shop">МАГАЗИН</span></div>
        <div class="nav-item"><i>📜</i><span id="l-tasks">ЗАДАНИЯ</span></div>
        <div class="nav-item"><i>👥</i><span id="l-friends">ДРУЗЬЯ</span></div>
        <div class="nav-item"><i>👛</i><span id="l-wallet">КОШЕЛЕК</span></div>
    </div>
</div>

<div id="modal">
    <h2 id="l-settings">НАСТРОЙКИ</h2>
    <button class="lang-btn" onclick="setLang('ru')">RU 🇷🇺</button>
    <button class="lang-btn" onclick="setLang('en')">EN 🇺🇸</button>
    <div onclick="toggleModal()" style="margin-top:20px; color:red; font-size:12px;">[ ЗАКРЫТЬ ]</div>
</div>

<script>
const config = {
    type: Phaser.CANVAS, // Принудительно используем Canvas для старых телефонов
    width: window.innerWidth,
    height: window.innerHeight,
    backgroundColor: '#002200', // Темно-зеленый фон вместо черного
    physics: { default: 'arcade' },
    scene: { preload, create, update }
};

const game = new Phaser.Game(config);
let plane, hook, rope, targets, money=0, energy=100, angle=0, dist=30, isMoving=false;

function toggleModal() {
    const m = document.getElementById('modal');
    m.style.display = (m.style.display === 'block') ? 'none' : 'block';
}

function setLang(id) {
    const l = { ru: ["Магазин","Задания","Друзья","Кошелек","Настройки"], en: ["Shop","Tasks","Friends","Wallet","Settings"] }[id];
    document.getElementById('l-shop').innerText = l[0];
    document.getElementById('l-tasks').innerText = l[1];
    document.getElementById('l-friends').innerText = l[2];
    document.getElementById('l-wallet').innerText = l[3];
    document.getElementById('l-settings').innerText = l[4];
    toggleModal();
}

function preload() {
    // Временно создаем графику вместо загрузки файлов для проверки
    // Если это заработает — значит ошибка в именах твоих картинок!
}

function create() {
    // Создаем "самолет" (желтый прямоугольник)
    plane = this.add.rectangle(config.width/2, 120, 100, 50, 0xffff00);
    
    // Создаем "крюк" (зеленый квадрат)
    hook = this.add.rectangle(0, 0, 30, 30, 0x00ff00);
    this.physics.add.existing(hook);
    
    targets = this.physics.add.group();
    for(let i=0; i<5; i++) {
        let x = Phaser.Math.Between(50, config.width - 50);
        let y = Phaser.Math.Between(300, config.height - 150);
        let coin = this.add.circle(x, y, 15, 0x00ffff); // Голубые монетки
        targets.add(coin);
    }

    rope = this.add.graphics();

    this.input.on('pointerdown', (p) => {
        if (p.y > 150 && p.y < config.height - 100 && !isMoving && energy > 0) {
            isMoving = true;
            energy--;
            document.getElementById('energy').innerText = energy;
        }
    });

    this.physics.add.overlap(hook, targets, (h, coin) => {
        if (isMoving && !hook.caught) {
            hook.caught = coin;
            isMoving = false;
        }
    });
}

function update() {
    let sX = plane.x; let sY = plane.y + 10;
    if (!isMoving && !hook.returning) {
        angle += 0.04; dist = 30;
    } else if (isMoving) {
        dist += 12;
        if (dist > config.height - 150) isMoving = false;
    } else {
        dist -= 8;
        if (dist <= 30) {
            hook.returning = false;
            if (hook.caught) {
                money += 0.001; hook.caught.destroy(); hook.caught = null;
                document.getElementById('money').innerText = money.toFixed(3);
                // Спавним новую монетку
                let nx = Phaser.Math.Between(50, config.width - 50);
                let ny = Phaser.Math.Between(300, config.height - 150);
                targets.add(this.add.circle(nx, ny, 15, 0x00ffff));
            }
        }
    }
    if (dist > 30 && !isMoving) hook.returning = true;

    hook.x = sX + Math.sin(angle) * dist;
    hook.y = sY + Math.cos(angle) * dist;
    rope.clear().lineStyle(2, 0x00ff00, 1).lineBetween(sX, sY, hook.x, hook.y);
    if (hook.caught) { hook.caught.x = hook.x; hook.caught.y = hook.y; }
}
</script>
</body>
</html>
