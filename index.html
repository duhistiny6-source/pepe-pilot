 <!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pepe Moonbix Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>body { margin: 0; background-color: #020205; overflow: hidden; }</style>
</head>
<body>
<script>
const config = {
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    physics: { default: 'arcade' },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);
let plane, claw, chain, targets, scoreText;
let isLaunching = false, isReturning = false;
let angle = 0, swingSpeed = 0.02, launchSpeed = 8, returnSpeed = 0.15;
let score = 0;

function preload() {
    // Используем качественный фон космоса
    this.load.image('sky', 'https://labs.phaser.io/assets/skies/space3.png');
    
    // ВНИМАНИЕ: Загрузи свои файлы в GitHub и укажи здесь их названия
    // Если они лежат в той же папке, что и index.html, пути будут такими:
    this.load.image('pepe', 'pepe.png'); // Твой Пепе в самолете
    this.load.image('ton', 'ton.png');   // Лого TON
    this.load.image('not', 'not.png');   // Лого NOT
    this.load.image('dogs', 'dogs.png'); // Лого DOGS
}

function create() {
    this.add.image(config.width/2, config.height/2, 'sky').setAlpha(0.5);
    
    // Пепе теперь выглядит круто
    plane = this.add.sprite(config.width / 2, 100, 'pepe').setScale(0.5).setDepth(5);
    
    // Клешня (сделаем её золотистой и заметной)
    claw = this.add.circle(config.width / 2, 180, 15, 0xffcc00).setDepth(4);
    chain = this.add.graphics().setDepth(3);
    
    targets = this.physics.add.group();
    const assets = ['ton', 'not', 'dogs'];

    // Раскладываем монеты аккуратно, как в Moonbix
    for(let i=0; i<10; i++) {
        let x = Phaser.Math.Between(80, config.width - 80);
        let y = Phaser.Math.Between(300, config.height - 150);
        
        let type = Phaser.Math.RND.pick(assets);
        let coin = targets.create(x, y, type);
        coin.setDisplaySize(70, 70); // Крупные монеты!
        coin.setCircle(35); // Физика по форме монеты
    }

    scoreText = this.add.text(config.width/2, 40, '0', { 
        fontSize: '48px', fill: '#fff', fontStyle: 'bold', fontFamily: 'Arial'
    }).setOrigin(0.5);

    this.input.on('pointerdown', () => { if(!isLaunching && !isReturning) isLaunching = true; });
}

function update() {
    if (!isLaunching && !isReturning) {
        angle += swingSpeed;
        if (angle > 0.8 || angle < -0.8) swingSpeed = -swingSpeed;
        claw.x = plane.x + Math.sin(angle) * 120;
        claw.y = plane.y + Math.cos(angle) * 120;
    } else if (isLaunching) {
        claw.x += Math.sin(angle) * launchSpeed;
        claw.y += Math.cos(angle) * launchSpeed;
        
        this.physics.overlap(claw, targets, (c, target) => {
            score += 10;
            scoreText.setText(score);
            target.destroy();
            isLaunching = false;
            isReturning = true;
        });

        if (claw.y > config.height || claw.x < 0 || claw.x > config.width) {
            isLaunching = false;
            isReturning = true;
        }
    } else if (isReturning) {
        let tx = plane.x + Math.sin(angle) * 120;
        let ty = plane.y + Math.cos(angle) * 120;
        claw.x += (tx - claw.x) * returnSpeed;
        claw.y += (ty - claw.y) * returnSpeed;
        if (Phaser.Math.Distance.Between(claw.x, claw.y, tx, ty) < 10) isReturning = false;
    }

    chain.clear();
    chain.lineStyle(4, 0xffd700, 0.8);
    chain.lineBetween(plane.x, plane.y + 20, claw.x, claw.y);
}
</script>
</body>
</html>
