<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pepe Pilot: Crypto Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin:0; overflow:hidden; background:#000; touch-action: none; font-family: Arial, sans-serif; }
        #ui { position:fixed; top:12px; left:12px; color:#0f0; font-weight:bold; z-index: 100; pointer-events: none; text-shadow: 1px 1px 2px #000; }
        
        .balance-item { display: flex; align-items: center; gap: 5px; font-size: 14px; pointer-events: auto; cursor: pointer; color: #0f0; margin-bottom: 5px; }
        .energy-display { font-size: 18px; color: #ffcc00; display: flex; align-items: center; gap: 5px; }

        #settings-btn { position: fixed; top: 12px; right: 12px; font-size: 28px; cursor: pointer; z-index: 1001; filter: drop-shadow(1px 1px 2px #000); pointer-events: auto; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; color: #fff; justify-content: center; align-items: center; }
        .modal-content { background: #1a1a1a; border: 2px solid #0f0; padding: 25px; border-radius: 20px; text-align: center; min-width: 280px; }
        
        .lang-btn { background: #333; color: #0f0; border: 1px solid #0f0; padding: 12px 20px; margin: 10px 0; cursor: pointer; border-radius: 10px; font-weight: bold; width: 100%; }
        
        #nav-bar { position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%); width: 85%; height: 50px; background: rgba(0, 0, 0, 0.9); border: 1px solid #333; border-radius: 12px; display: flex; justify-content: space-around; align-items: center; z-index: 200; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #fff; flex: 1; cursor: pointer; }
        .nav-text { font-size: 8px; color: #bbb; text-transform: uppercase; }
    </style>
</head>
<body>

<div id="settings-btn" onclick="toggleModal('settings-modal')">⚙️</div>

<div id="ui">
    <div class="balance-item" onclick="toggleModal('balance-modal')">💰 <span id="txt-balance-nav">БАЛАНС</span></div>
    <div class="energy-display">⚡ <span id="energy">100</span></div>
</div>

<div id="settings-modal" class="modal">
    <div class="modal-content">
        <h3>НАСТРОЙКИ / SETTINGS</h3>
        <button class="lang-btn" onclick="setLang('ru')">РУССКИЙ</button>
        <button class="lang-btn" onclick="setLang('en')">ENGLISH</button>
        <div style="margin-top:15px; color:#888; cursor:pointer;" onclick="toggleModal('settings-modal')">Закрыть</div>
    </div>
</div>

<div id="balance-modal" class="modal">
    <div class="modal-content">
        <h3 id="txt-balance-title">ВАШИ АКТИВЫ</h3>
        <div style="text-align:left; background:#222; padding:10px; border-radius:10px; margin-bottom:10px;">
            <div style="font-size:12px; color:#aaa;">Frog Pilot</div>
            <div style="font-size:20px; color:#ffcc00;"><span id="modal-frog">0</span> 🐸</div>
        </div>
        <div style="text-align:left; background:#222; padding:10px; border-radius:10px;">
            <div style="font-size:12px; color:#aaa;">USDT</div>
            <div style="font-size:20px; color:#0f0">$<span id="modal-usdt">0.0000</span></div>
        </div>
        <div style="margin-top:15px; color:#888; cursor:pointer;" onclick="toggleModal('balance-modal')">Закрыть</div>
    </div>
</div>

<div id="nav-bar">
    <div class="nav-item"><span>🛒</span><div class="nav-text">МАГАЗИН</div></div>
    <div class="nav-item" onclick="alert('Задания скоро!')"><span>📜</span><div class="nav-text">ЗАДАНИЯ</div></div>
    <div class="nav-item"><span>👥</span><div class="nav-text">ДРУЗЬЯ</div></div>
    <div class="nav-item"><span>👛</span><div class="nav-text">КОШЕЛЕК</div></div>
</div>

<script>
let money = 0, frogMoney = 0, energy = 100;
const USDT_VAL = 0.0005, FROG_VAL = 10;

function toggleModal(id) {
    const m = document.getElementById(id);
    if(id === 'balance-modal') {
        document.getElementById('modal-frog').innerText = frogMoney;
        document.getElementById('modal-usdt').innerText = money.toFixed(4);
    }
    m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
}

function setLang(l) {
    document.getElementById('txt-balance-nav').innerText = (l === 'ru') ? 'БАЛАНС' : 'BALANCE';
    toggleModal('settings-modal');
}

const config = {
    type: Phaser.AUTO, width: window.innerWidth, height: window.innerHeight,
    physics: { default: 'arcade' }, scene: { preload, create, update }
};
const game = new Phaser.Game(config);
let plane, hook, rope, targets, isLaunching = false, isReturning = false, caughtItem = null;
let angle = 0, swingSpeed = 0.03, distance = 30;

function preload() {
    this.load.image('sky', 'pg.jpeg');
    this.load.image('hook', 'kleshn.png');
    this.load.image('usdt', 'usdt.png');
    this.load.image('pilot_coin', 'logo..png');
    this.load.image('plane', 'pepe.png');
}

function create() {
    this.add.image(config.width/2, config.height/2, 'sky').setDisplaySize(config.width, config.height);
    targets = this.physics.add.group();
    for(let i = 0; i < 6; i++) spawn(this);

    // Важно: сначала создаем веревку, потом клешню
    rope = this.add.graphics().setDepth(5);
    hook = this.add.sprite(0, 0, 'hook').setDepth(10).setDisplaySize(65, 65);
    this.physics.add.existing(hook);
    
    plane = this.add.image(config.width/2, 120, 'plane').setDisplaySize(280, 180).setDepth(20);

    this.input.on('pointerdown', (p) => {
        if (p.y < 150 || p.y > config.height - 80) return;
        if (!isLaunching && !isReturning && energy > 0) { 
            isLaunching = true; energy--; 
            document.getElementById('energy').innerText = energy;
        }
    });

    this.physics.add.overlap(hook, targets, (h, item) => {
        if (isLaunching && !caughtItem) {
            caughtItem = item; caughtItem.body.enable = false;
            isLaunching = false; isReturning = true;
            beep(440, 0.05); // Сигнал ловли
        }
    });
}

function spawn(scene) {
    let x = Phaser.Math.Between(50, config.width - 50);
    let y = Phaser.Math.Between(config.height * 0.4, config.height - 150);
    let key = (Phaser.Math.Between(0, 1) > 0.4) ? 'pilot_coin' : 'usdt';
    let coin = targets.create(x, y, key).setDepth(8).setScale(0.12);
}

function showValue(scene, val, isFrog) {
    let txt = scene.add.text(plane.x, plane.y - 30, `+${val}`, { 
        font: 'bold 28px Arial', fill: isFrog ? '#ffcc00' : '#0f0', stroke: '#000', strokeThickness: 4
    }).setDepth(100).setOrigin(0.5);
    scene.tweens.add({ targets: txt, y: txt.y - 100, alpha: 0, duration: 1000, onComplete: () => txt.destroy() });
}

// Встроенный генератор звука (не требует файлов)
function beep(freq, dur) {
    let ctx = new (window.AudioContext || window.webkitAudioContext)();
    let osc = ctx.createOscillator();
    let g = ctx.createGain();
    osc.connect(g); g.connect(ctx.destination);
    osc.frequency.value = freq;
    g.gain.setValueAtTime(0.02, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + dur);
    osc.start(); osc.stop(ctx.currentTime + dur);
}

function update() {
    plane.y = 120 + Math.sin(this.time.now / 600) * 8;
    let sX = plane.x - 5, sY = plane.y + 20;

    if (!isLaunching && !isReturning) {
        angle += swingSpeed; if (angle > 0.8 || angle < -0.8) swingSpeed *= -1;
    } else if (isLaunching) {
        distance += 15; if (distance > config.height - 130) { isLaunching = false; isReturning = true; }
    } else if (isReturning) {
        distance -= 10; 
        if (distance <= 30) {
            isReturning = false;
            if (caughtItem) {
                let isF = caughtItem.texture.key === 'pilot_coin';
                if(isF) { frogMoney += FROG_VAL; showValue(this, FROG_VAL, true); }
                else { money += USDT_VAL; showValue(this, USDT_VAL.toFixed(4), false); }
                beep(880, 0.1); // Сигнал удара о самолет
                caughtItem.destroy(); caughtItem = null; spawn(this);
            }
        }
    }

    hook.x = sX + Math.sin(angle) * distance;
    hook.y = sY + Math.cos(angle) * distance;
    hook.rotation = -angle;

    // Секрет: рисуем нитку ДО ЦЕНТРА клешни, но за счет setDepth(5) она прячется ЗА клешню (depth 10)
    rope.clear().lineStyle(2, 0xffffff, 0.8).lineBetween(sX, sY, hook.x, hook.y);
    
    if (caughtItem) { 
        caughtItem.x = hook.x; caughtItem.y = hook.y + 15; 
        caughtItem.rotation = hook.rotation; 
    }
}
</script>
</body>
</html>
