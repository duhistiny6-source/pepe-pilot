

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pepe Pilot Gold Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>body { margin: 0; background-color: #000; overflow: hidden; touch-action: none; }</style>
</head>
<body>
<script>
const config = {
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    backgroundColor: '#000',
    physics: { default: 'arcade' },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);
let plane, claw, chain, targets, scoreText, bg;
let isLaunching = false, isReturning = false;
let angle = 0, swingSpeed = 0.012, launchSpeed = 4, returnSpeed = 0.07;
let scoreTON = 0;

function preload() {
    // Загружаем графику
    this.load.image('sky', 'https://labs.phaser.io/assets/skies/space3.png');
    this.load.image('pepe', 'https://labs.phaser.io/assets/sprites/phaser-dude.png'); // Заглушка Пепе
    this.load.image('coin', 'https://labs.phaser.io/assets/sprites/coin.png');
    this.load.image('bear', 'https://labs.phaser.io/assets/sprites/slime.png'); // Заглушка Медведя
}

function create() {
    // Добавляем фон
    bg = this.add.tileSprite(0, 0, config.width, config.height, 'sky').setOrigin(0, 0);
    
    // Пилот Пепе
    plane = this.add.sprite(config.width / 2, 60, 'pepe').setScale(1.5).setDepth(3);
    
    // Цепь и клешня
    chain = this.add.graphics().setDepth(1);
    claw = this.add.circle(config.width / 2, 120, 12, 0xffd700).setDepth(2);
    
    targets = this.physics.add.group();
    
    // Генерируем монеты и врагов
    for(let i=0; i<15; i++) {
        let x = Phaser.Math.Between(50, config.width - 50);
        let y = Phaser.Math.Between(250, config.height - 100);
        let isBear = Math.random() > 0.7;
        
        let item = targets.create(x, y, isBear ? 'bear' : 'coin').setScale(isBear ? 1.2 : 0.8);
        item.setData('type', isBear ? 'bear' : 'coin');
    }

    scoreText = this.add.text(20, 20, 'Balance: 0 TON', { 
        fontSize: '24px', 
        fill: '#00ff00', 
        fontStyle: 'bold',
        stroke: '#000',
        strokeThickness: 4
    });

    this.input.on('pointerdown', () => { if(!isLaunching && !isReturning) isLaunching = true; });
}

function update() {
    // Анимация фона
    bg.tilePositionY -= 0.5;

    if (!isLaunching && !isReturning) {
        angle += swingSpeed;
        if (angle > 0.8 || angle < -0.8) swingSpeed = -swingSpeed;
        claw.x = plane.x + Math.sin(angle) * 80;
        claw.y = plane.y + Math.cos(angle) * 80;
    } else if (isLaunching) {
        claw.x += Math.sin(angle) * launchSpeed;
        claw.y += Math.cos(angle) * launchSpeed;
        
        targets.children.iterate(child => {
            if (child && child.active && Phaser.Geom.Intersects.CircleToCircle(claw, child)) {
                let type = child.getData('type');
                if(type === 'bear') scoreTON -= 0.01;
                else scoreTON += 0.005;
                
                scoreText.setText('Balance: ' + scoreTON.toFixed(3) + ' TON');
                child.destroy();
                isLaunching = false;
                isReturning = true;
            }
        });

        if (claw.y > config.height || claw.x < 0 || claw.x > config.width) {
            isLaunching = false;
            isReturning = true;
        }
    } else if (isReturning) {
        let targetX = plane.x + Math.sin(angle) * 80;
        let targetY = plane.y + Math.cos(angle) * 80;
        claw.x += (targetX - claw.x) * returnSpeed;
        claw.y += (targetY - claw.y) * returnSpeed;
        let dist = Phaser.Math.Distance.Between(claw.x, claw.y, targetX, targetY);
        if (dist < 3) isReturning = false;
    }

    chain.clear();
    chain.lineStyle(3, 0xffffff, 0.5);
    chain.lineBetween(plane.x, plane.y, claw.x, claw.y);
}
</script>
</body>
</html>
