<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pepe Claw Final</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin:0; overflow:hidden; background:black; touch-action: none; }
        #ui { position:fixed; top:10px; left:10px; color:#0f0; font-family:Arial; font-weight:bold; z-index: 100; pointer-events: none; }
        #shop { position:fixed; bottom:10px; left:10px; z-index: 100; display: flex; }
        button { padding:10px; margin:5px; font-size:14px; background: #222; color: #fff; border: 1px solid #0f0; }
    </style>
</head>
<body>

<div id="ui">
    💰 <span id="money">0</span><br>
    ⚡ <span id="energy">10</span>
</div>

<div id="shop">
    <button onclick="upgrade('chance')">Шанс</button>
    <button onclick="upgrade('speed')">Скорость</button>
    <button onclick="upgrade('power')">Сила</button>
</div>

<script>
const config = {
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    physics: { default:'arcade' },
    scene: { preload, create, update }
};

const game = new Phaser.Game(config);

let plane, hook, chainGraphics, targets;
let isLaunching=false, isReturning=false, caughtItem=null;
let angle=0, swingSpeed=0.03, currentLen = 70;

let money=0;
let energy=10;
let upgrades = { chance: 0, speed: 0, power: 0 };

const ITEMS = {
    ton:{weight:1, chance:0.9, value:50},
    usdt:{weight:2, chance:0.7, value:100},
    not:{weight:3, chance:0.5, value:200},
    dogs:{weight:5, chance:0.3, value:400}
};

function preload(){
    this.load.image('sky','pg.jpeg');
    this.load.image('pepe','pepe.png'); //
    this.load.image('ton','ton.png');
    this.load.image('usdt','usdt.png');
    this.load.image('not','not.png');
    this.load.image('dogs','dogs.png');
}

function create(){
    this.add.image(config.width/2, config.height/2, 'sky').setDisplaySize(config.width, config.height);

    // 1. ГРАФИКА ДЛЯ ТРОСА (Вместо белой палки - будет золотая нить)
    chainGraphics = this.add.graphics().setDepth(30);

    // 2. КЛЕШНЯ
    hook = this.add.sprite(config.width/2, 200, 'pepe');
    hook.setDepth(40).setDisplaySize(100, 90);
    hook.setCrop(300, 600, 400, 400); // Берем желтый захват

    // 3. САМОЛЕТ
    plane = this.add.image(config.width/2, 130, 'pepe');
    plane.setDisplaySize(280, 240).setDepth(50).setCrop(0, 0, 1000, 480);

    this.physics.add.existing(hook);
    hook.body.setCircle(35, 15, 15);

    targets = this.physics.add.group();
    for(let i=0; i<8; i++) spawn(this);

    this.input.on('pointerdown', () => {
        if(!isLaunching && !isReturning && energy > 0){
            isLaunching = true;
            energy--;
            updateUI();
        }
    });

    this.physics.add.overlap(hook, targets, (h, item) => {
        if(isLaunching && !caughtItem){
            let d = ITEMS[item.texture.key];
            let finalChance = d.chance + upgrades.chance * 0.05;
            if(Math.random() <= finalChance) { 
                caughtItem = item;
                caughtItem.body.enable = false; 
            }
            isLaunching = false;
            isReturning = true;
        }
    });

    setInterval(() => { if(energy < 10) energy++; updateUI(); }, 3000);
}

function spawn(scene){
    let keys = Object.keys(ITEMS);
    let k = keys[Phaser.Math.Between(0, keys.length - 1)];
    let x = Phaser.Math.Between(80, config.width - 80);
    let y = Phaser.Math.Between(config.height * 0.6, config.height - 80);
    targets.create(x, y, k).setDisplaySize(65, 65);
}

function update(){
    // САМОЛЕТ ПАРИТ
    plane.y = 130 + Math.sin(this.time.now / 600) * 10;
    let startY = plane.y + 40;

    if(!isLaunching && !isReturning){
        // КАЧАНИЕ
        angle += swingSpeed;
        if(angle > 0.8 || angle < -0.8) swingSpeed *= -1;
        currentLen = 70;
    }
    else if(isLaunching){
        // ВЫЛЕТ
        currentLen += 14 + upgrades.speed * 2;
        if(currentLen > config.height - startY) { isLaunching = false; isReturning = true; }
    }
    else if(isReturning){
        // ВОЗВРАТ
        currentLen -= (10 + upgrades.power * 2);
        if(currentLen <= 70){
            isReturning = false;
            if(caughtItem){
                money += ITEMS[caughtItem.texture.key].value;
                caughtItem.destroy();
                caughtItem = null;
                spawn(this);
                updateUI();
            }
        }
    }

    // ОБНОВЛЕНИЕ ПОЗИЦИИ КЛЕШНИ
    hook.x = plane.x + Math.sin(angle) * currentLen;
    hook.y = startY + Math.cos(angle) * currentLen;
    hook.rotation = -angle;

    // РИСУЕМ ТРОС (Очищаем и рисуем заново каждый кадр)
    chainGraphics.clear();
    chainGraphics.lineStyle(3, 0xFFD700, 1); // Золотистый цвет (под цвет клешни)
    chainGraphics.lineBetween(plane.x, startY, hook.x, hook.y);

    if(caughtItem){
        caughtItem.x = hook.x;
        caughtItem.y = hook.y + 35;
    }
}

function updateUI(){
    const moneyEl = document.getElementById('money');
    const energyEl = document.getElementById('energy');
    if(moneyEl) moneyEl.innerText = money;
    if(energyEl) energyEl.innerText = energy;
}

window.upgrade = function(type){
    let cost = 200;
    if(money >= cost){
        money -= cost;
        upgrades[type]++;
        updateUI();
    }
}
</script>
</body>
</html>
