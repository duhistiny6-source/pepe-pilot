<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pepe Farmer Gold</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background-color: #87CEEB; overflow: hidden; touch-action: none; }
    </style>
</head>
<body>
<script>
const config = {
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    physics: { default: 'arcade' },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);
let plane, clawGraphic, chain, targets, scoreText, timerText;
let isLaunching = false, isReturning = false, caughtItem = null;
let angle = 0, swingSpeed = 0.03, launchSpeed = 15, returnSpeed = 10;
let score = 0, timeLeft = 60;

function preload() {
    // ЗАГРУЗКА ТВОИХ НОВЫХ КАРТИНОК
    this.load.image('farm_bg', '1000004148.jpg'); // Новый фон
    this.load.image('pepe_biplane', '1000004146.png'); // Новый Пепе
    
    // Монетки (проверь, чтобы эти файлы были в GitHub!)
    this.load.image('ton', 'ton-ecosystem-removebg-preview.png');
    this.load.image('not', 'images__35_-removebg-preview.png');
    this.load.image('dogs', 'images__33_-removebg-preview.png');
}

function create() {
    // Устанавливаем фон правильно
    let bg = this.add.image(config.width/2, config.height/2, 'farm_bg');
    let scale = Math.max(config.width / bg.width, config.height / bg.height);
    bg.setScale(scale).setScrollFactor(0);
    
    // НОВЫЙ ПЕПЕ НА БИПЛАНЕ
    plane = this.add.sprite(config.width / 2, 120, 'pepe_biplane').setDepth(10);
    plane.setDisplaySize(220, 150); // Подобрал размер под биплан
    
    chain = this.add.graphics().setDepth(5);
    clawGraphic = this.add.graphics().setDepth(6);
    
    // Точка, откуда вылетает клешня (снизу самолета)
    this.clawPoint = this.add.circle(config.width/2, 200, 10);
    this.physics.add.existing(this.clawPoint);

    targets = this.physics.add.group();
    const assets = ['ton', 'dogs', 'not'];

    // Раскидываем монетки по полю
    for(let i=0; i<12; i++) {
        let x = Phaser.Math.Between(50, config.width - 50);
        let y = Phaser.Math.Between(350, config.height - 100);
        let coin = targets.create(x, y, Phaser.Math.RND.pick(assets));
        coin.setDisplaySize(70, 70).setDepth(4);
    }

    // Тексты
    scoreText = this.add.text(20, 30, 'Очки: 0', { fontSize: '28px', fill: '#fff', stroke: '#000', strokeThickness: 5 });
    timerText = this.add.text(config.width - 160, 30, 'Время: 60', { fontSize: '28px', fill: '#ffff00', stroke: '#000', strokeThickness: 5 });

    this.time.addEvent({
        delay: 1000,
        callback: () => { if(timeLeft > 0) timeLeft--; timerText.setText('Время: ' + timeLeft); },
        loop: true
    });

    this.input.on('pointerdown', () => { if(!isLaunching && !isReturning && timeLeft > 0) isLaunching = true; });

    this.physics.add.overlap(this.clawPoint, targets, (c, target) => {
        if (isLaunching && !caughtItem) {
            caughtItem = target;
            isLaunching = false;
            isReturning = true;
        }
    });
}

function update() {
    if (timeLeft <= 0) return;

    let px = plane.x;
    let py = plane.y + 30; // Цепь идет от нижней части самолета

    if (!isLaunching && !isReturning) {
        angle += swingSpeed;
        if (angle > 0.8 || angle < -0.8) swingSpeed = -swingSpeed;
        this.clawPoint.x = px + Math.sin(angle) * 130;
        this.clawPoint.y = py + Math.cos(angle) * 130;
    } else if (isLaunching) {
        this.clawPoint.x += Math.sin(angle) * launchSpeed;
        this.clawPoint.y += Math.cos(angle) * launchSpeed;
        if (this.clawPoint.y > config.height || this.clawPoint.x < 0 || this.clawPoint.x > config.width) {
            isLaunching = false;
            isReturning = true;
        }
    } else if (isReturning) {
        let tx = px + Math.sin(angle) * 130;
        let ty = py + Math.cos(angle) * 130;
        let dist = Phaser.Math.Distance.Between(this.clawPoint.x, this.clawPoint.y, tx, ty);
        this.clawPoint.x += (tx - this.clawPoint.x) * 0.2;
        this.clawPoint.y += (ty - this.clawPoint.y) * 0.2;
        if (caughtItem) { caughtItem.x = this.clawPoint.x; caughtItem.y = this.clawPoint.y; }
        if (dist < 15) {
            isReturning = false;
            if (caughtItem) { score += 100; scoreText.setText('Очки: ' + score); caughtItem.destroy(); caughtItem = null; }
        }
    }

    // Рисуем цепь
    chain.clear().lineStyle(3, 0x444444).lineBetween(px, py, this.clawPoint.x, this.clawPoint.y);
    
    // Рисуем золотую клешню (две дуги)
    clawGraphic.clear().lineStyle(6, 0xffd700);
    let gA = angle + Math.PI/2; 
    let gap = caughtItem ? 0.2 : 0.8; 
    clawGraphic.beginPath();
    clawGraphic.arc(this.clawPoint.x, this.clawPoint.y, 25, gA - gap, gA + gap);
    clawGraphic.strokePath();
    clawGraphic.beginPath();
    clawGraphic.arc(this.clawPoint.x, this.clawPoint.y, 25, gA + Math.PI - gap, gA + Math.PI + gap);
    clawGraphic.strokePath();
}
</script>
</body>
</html>
