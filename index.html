<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pepe Pilot Matrix Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; touch-action: none; }
        canvas { display: block; }
    </style>
</head>
<body>
<script>
const config = {
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    physics: { default: 'arcade' },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);
let plane, chainSprite, targets, scoreText, timerText;
let isLaunching = false, isReturning = false, caughtItem = null;
let angle = 0, swingSpeed = 0.025, launchSpeed = 14; 
let score = 0, timeLeft = 60, isGameOver = false;

function preload() {
    this.load.crossOrigin = 'anonymous';
    this.load.image('sky', 'pg.jpeg');
    this.load.image('pepe', 'pepe.png');
    this.load.image('chain', 'cep.png'); 
    this.load.image('ton', 'ton.png');
    this.load.image('usdt', 'usdt.png');
    this.load.image('not', 'not.png');
    this.load.image('dogs', 'dogs.png');
}

function create() {
    // 1. ФОН
    let bg = this.add.image(config.width/2, config.height/2, 'sky');
    let scale = Math.max(config.width / bg.width, config.height / bg.height);
    bg.setScale(scale).setScrollFactor(0);

    // 2. ЦЕПЬ (ЖИРНАЯ И ПРИВЯЗАННАЯ)
    chainSprite = this.add.sprite(0, 0, 'chain');
    chainSprite.setOrigin(0.5, 0); 
    chainSprite.setDepth(5);
    
    this.clawPoint = this.add.circle(config.width/2, 300, 35);
    this.physics.add.existing(this.clawPoint);

    // 3. САМОЛЕТ (Плавное покачивание)
    plane = this.add.sprite(config.width / 2, 140, 'pepe');
    plane.setDepth(10).setDisplaySize(220, 160);
    this.tweens.add({
        targets: plane, y: 170, duration: 2000, yoyo: true, loop: -1, ease: 'Sine.easeInOut'
    });

    // 4. МОНЕТКИ (Все одного размера 90x90)
    targets = this.physics.add.group();
    for(let i=0; i<8; i++) { spawnCoin(this); }

    // 5. МАТРИЧНЫЙ ТАЙМЕР
    scoreText = this.add.text(20, 20, 'SCORE: 0', { fontSize: '28px', fill: '#0f0', fontFamily: 'Courier New', fontWeight: 'bold' });
    timerText = this.add.text(config.width - 180, 20, 'TIME: 60', { fontSize: '28px', fill: '#0f0', fontFamily: 'Courier New', fontWeight: 'bold' });

    this.time.addEvent({
        delay: 1000,
        callback: () => { 
            if(timeLeft > 0) { 
                timeLeft--; 
                timerText.setText('TIME: ' + timeLeft); 
            } else if (!isGameOver) {
                endGame(this);
            }
        },
        loop: true
    });

    this.input.on('pointerdown', () => { 
        if(!isLaunching && !isReturning && !isGameOver) isLaunching = true; 
    });

    this.physics.add.overlap(this.clawPoint, targets, (c, target) => {
        if (isLaunching && !caughtItem) { 
            caughtItem = target; 
            isLaunching = false; 
            isReturning = true; 
        }
    });
}

function spawnCoin(scene) {
    let x, y, tooClose;
    do {
        x = Phaser.Math.Between(80, config.width - 80);
        y = Phaser.Math.Between(config.height * 0.6, config.height - 100);
        tooClose = targets.getChildren().some(c => Phaser.Math.Distance.Between(x, y, c.x, c.y) < 110);
    } while (tooClose);

    let randomCoin = Phaser.Utils.Array.GetRandom(['ton', 'usdt', 'not', 'dogs']);
    let coin = targets.create(x, y, randomCoin);
    coin.setDisplaySize(90, 90).setDepth(4).setOrigin(0.5); 
}

function endGame(scene) {
    isGameOver = true;
    scene.physics.pause();
    scene.add.rectangle(config.width/2, config.height/2, config.width, config.height, 0x000000, 0.7).setDepth(20);
    scene.add.text(config.width/2, config.height/2 - 50, 'GAME OVER', { fontSize: '64px', fill: '#0f0', fontFamily: 'Courier New' }).setOrigin(0.5).setDepth(21);
    scene.add.text(config.width/2, config.height/2 + 50, 'COINS: ' + score, { fontSize: '32px', fill: '#fff' }).setOrigin(0.5).setDepth(21);
}

function update() {
    if (isGameOver) return;

    // ПРИВЯЗКА К НОСУ: Центрируем трос по винту
    let px = plane.x; 
    let py = plane.y + 85; 

    if (!isLaunching && !isReturning) {
        angle += swingSpeed;
        if (Math.abs(angle) > 0.8) swingSpeed = -swingSpeed;
        this.clawPoint.x = px + Math.sin(angle) * 160;
        this.clawPoint.y = py + Math.cos(angle) * 160;
    } else if (isLaunching) {
        this.clawPoint.x += Math.sin(angle) * launchSpeed;
        this.clawPoint.y += Math.cos(angle) * launchSpeed;
        if (this.clawPoint.y > config.height || this.clawPoint.x < 0 || this.clawPoint.x > config.width) {
            isLaunching = false; isReturning = true;
        }
    } else if (isReturning) {
        let dist = Phaser.Math.Distance.Between(this.clawPoint.x, this.clawPoint.y, px, py + 160);
        this.clawPoint.x += (px + Math.sin(angle)*160 - this.clawPoint.x) * 0.15;
        this.clawPoint.y += (py + Math.cos(angle)*160 - this.clawPoint.y) * 0.15;
        
        if (caughtItem) { caughtItem.x = this.clawPoint.x; caughtItem.y = this.clawPoint.y; }
        if (dist < 30) {
            isReturning = false;
            if (caughtItem) { score += 100; scoreText.setText('SCORE: ' + score); caughtItem.destroy(); caughtItem = null; spawnCoin(this); }
        }
    }

    // ВИЗУАЛ ЦЕПИ (ЖИРНЫЙ ТРОС)
    chainSprite.x = px;
    chainSprite.y = py;
    chainSprite.rotation = Phaser.Math.Angle.Between(px, py, this.clawPoint.x, this.clawPoint.y) - Math.PI / 2; 
    chainSprite.displayWidth = 160; 
    chainSprite.displayHeight = Phaser.Math.Distance.Between(px, py, this.clawPoint.x, this.clawPoint.y) + 40; 
}
</script>
</body>
</html>
