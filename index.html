<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game UI</title>

<style>
body {
    margin:0;
    overflow:hidden;
    background:#000;
    font-family: Arial;
}

#ui {
    position:fixed;
    top:12px;
    left:12px;
    z-index:100;
    display:flex;
    flex-direction:column;
    gap:8px;
}

#bag-btn {
    cursor:pointer;
    font-size:16px;
    background:rgba(0,0,0,0.6);
    padding:8px 12px;
    border-radius:10px;
    border:1px solid #00ff88;
    display:flex;
    align-items:center;
    gap:8px;
    color:#00ff88;
}

#energy-block {
    font-size:15px;
    color:#ffcc00;
    margin-left:4px;
}

/* Модалка */
.modal {
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    z-index:2000;
    color:#fff;
    justify-content:center;
    align-items:center;
}

.modal-content {
    background:#111;
    padding:20px;
    border-radius:12px;
    border:1px solid #00ff88;
    width:300px;
}

.close-btn {
    margin-top:15px;
    padding:6px 10px;
    cursor:pointer;
    background:#00ff88;
    color:#000;
    border:none;
    border-radius:6px;
}
</style>
</head>

<body>

<!-- UI -->
<div id="ui">
    <div id="bag-btn" onclick="openBag()">
        👜 Баланс: <span id="balance">0</span>
    </div>

    <div id="energy-block">
        ⚡ Энергия: <span id="energy">100</span>
    </div>
</div>

<!-- Мешок / инвентарь -->
<div class="modal" id="bag-modal">
    <div class="modal-content">
        <h3>Ваш баланс</h3>
        <p>Frog: <span id="frog">0</span></p>
        <p>Pilot: <span id="pilot">0</span></p>
        <p>USDT: <span id="usdt">0</span></p>

        <button class="close-btn" onclick="closeBag()">Закрыть</button>
    </div>
</div>

<script>
// Баланс
let frog = 0;
let pilot = 0;
let usdt = 0;
let energy = 100;

// Обновление UI
function updateUI() {
    document.getElementById("frog").innerText = frog;
    document.getElementById("pilot").innerText = pilot;
    document.getElementById("usdt").innerText = usdt;
    document.getElementById("energy").innerText = energy;

    // общий баланс (пример)
    document.getElementById("balance").innerText = frog + pilot + usdt;
}

// Открыть мешок
function openBag() {
    document.getElementById("bag-modal").style.display = "flex";
}

// Закрыть
function closeBag() {
    document.getElementById("bag-modal").style.display = "none";
}

// Пример начисления (можешь вызвать из игры)
function addRewards() {
    frog += Math.floor(Math.random() * 5);
    pilot += Math.floor(Math.random() * 3);
    usdt += Math.floor(Math.random() * 2);

    energy -= 1;
    if (energy < 0) energy = 0;

    updateUI();
}

// тест: каждые 2 сек добавляет
setInterval(addRewards, 2000);

updateUI();
</script>

</body>
</html>
