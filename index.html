<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Frog Pilot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin:0; padding:0; overflow:hidden; background:#000; touch-action: none; font-family: 'Segoe UI', sans-serif; }
        #top-bar { position: fixed; top: 0; left: 0; width: 100%; height: 40px; background: rgba(0,0,0,0.5); z-index: 1000; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; box-sizing: border-box; }
        #energy-container { color: #0f0; font-size: 14px; font-weight: bold; }
        #balance-container { display: flex; gap: 15px; color: #fff; font-size: 11px; }
        
        #nav-bar { position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%); width: 90%; height: 55px; background: rgba(0,0,0,0.9); border-radius: 15px; display: flex; justify-content: space-around; align-items: center; z-index: 200; border: 1px solid #333; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #fff; flex: 1; cursor: pointer; }
        .nav-text { font-size: 7px; margin-top: 2px; color: #bbb; text-transform: uppercase; font-weight: bold; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: #1a1a1a; border: 2px solid #0f0; padding: 20px; border-radius: 20px; text-align: center; width: 85%; color: #fff; box-sizing: border-box; }
        .buy-btn { background: #0f0; color: #000; border: none; padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; font-size: 14px; }
        
        .invite-box { background: #222; padding: 15px; border-radius: 15px; margin-top: 15px; border: 1px dashed #0f0; }
        .ref-link { font-size: 10px; color: #0f0; word-break: break-all; margin: 10px 0; background: #000; padding: 8px; border-radius: 5px; }
    </style>
</head>
<body>

<div id="top-bar">
    <div id="energy-container">⚡ <span id="en-val">100</span></div>
    <div id="balance-container">
        <div>USDT: <span id="u-val" style="color:#0f0">0.00004</span></div>
        <div>PLT: <span id="p-val" style="color:#ffcc00">3</span></div>
    </div>
</div>

<div id="nav-bar">
    <div class="nav-item" onclick="toggleModal('shop-modal')"><span>🛒</span><div class="nav-text">АНГАР</div></div>
    <div class="nav-item" onclick="toggleModal('tasks-modal')"><span>📜</span><div class="nav-text">ЗАДАНИЯ</div></div>
    <div class="nav-item" onclick="toggleModal('rank-modal')"><span>🏆</span><div class="nav-text">РЕЙТИНГ</div></div>
    <div class="nav-item" onclick="toggleModal('friends-modal')"><span>👥</span><div class="nav-text">ДРУЗЬЯ</div></div>
    <div class="nav-item" onclick="toggleModal('wallet-modal')"><span>👛</span><div class="nav-text">КОШЕЛЕК</div></div>
</div>

<div id="friends-modal" class="modal">
    <div class="modal-content">
        <h3>ДРУЗЬЯ</h3>
        <p>Приглашай друзей и получай бонусы!</p>
        <div class="invite-box">
            <div id="ref-link-text" class="ref-link">Загрузка ссылки...</div>
            <button class="buy-btn" onclick="inviteFriend()">ПРИГЛАСИТЬ ДРУГА</button>
        </div>
        <p onclick="toggleModal('friends-modal')" style="cursor:pointer; color:#aaa; margin-top:15px;">Закрыть</p>
    </div>
</div>

<div id="shop-modal" class="modal"><div class="modal-content"><h3>АНГАР</h3><p>Скоро в продаже самолеты</p><button class="buy-btn" onclick="toggleModal('shop-modal')">ЗАКРЫТЬ</button></div></div>
<div id="tasks-modal" class="modal"><div class="modal-content"><h3>ЗАДАНИЯ</h3><p>Список пуст</p><button class="buy-btn" onclick="toggleModal('tasks-modal')">ОК</button></div></div>
<div id="rank-modal" class="modal"><div class="modal-content"><h3>РЕЙТИНГ</h3><p>Ты в топе!</p><button class="buy-btn" onclick="toggleModal('rank-modal')">ОК</button></div></div>
<div id="wallet-modal" class="modal"><div class="modal-content"><h3>КОШЕЛЕК</h3><p>Подключи TON кошелек</p><button class="buy-btn" onclick="toggleModal('wallet-modal')">ОК</button></div></div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // НАСТРОЙКИ (БЕЗ ТОКЕНОВ!)
    const botUsername = "PepePilot_bot"; // Твой основной юзернейм
    const userId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : "0";
    
    // Ссылка на WebApp (нужно настроить /newapp в BotFather с коротким именем 'game')
    const inviteURL = `https://t.me/${botUsername}/game?startapp=${userId}`;
    document.getElementById('ref-link-text').innerText = inviteURL;

    function inviteFriend() {
        const msg = encodeURIComponent("Летай со мной в Frog Pilot! 🐸 Собирай монеты и качайся!");
        const fullUrl = `https://t.me/share/url?url=${inviteURL}&text=${msg}`;
        tg.openTelegramLink(fullUrl);
    }

    function toggleModal(id) {
        let m = document.getElementById(id);
        m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
    }

    // ИГРА (PHASER)
    const config = {
        type: Phaser.AUTO,
        width: window.innerWidth,
        height: window.innerHeight,
        physics: { default: 'arcade' },
        scene: { preload, create, update }
    };
    const game = new Phaser.Game(config);

    let plane, hook, rope, targets, isLaunching = false, isReturning = false, caughtItem = null;
    let angle = 0, swingSpeed = 0.015, distance = 25;

    function preload() {
        this.load.image('sky', 'pg.jpeg');
        this.load.image('hook', 'kleshn.png');
        this.load.image('usdt', 'usdt.png');
        this.load.image('plt', 'logo..png');
        this.load.image('plane', 'pepe.png');
    }

    function create() {
        this.add.image(config.width/2, config.height/2, 'sky').setDisplaySize(config.width, config.height);
        targets = this.physics.add.group();
        for(let i=0; i<5; i++) spawn(this);
        
        rope = this.add.graphics();
        hook = this.add.sprite(0, 0, 'hook').setDepth(50).setDisplaySize(60, 60);
        this.physics.add.existing(hook);
        plane = this.add.image(config.width/2, 120, 'plane').setDisplaySize(250, 150).setDepth(60);

        this.physics.add.overlap(hook, targets, (h, item) => {
            if (isLaunching && !caughtItem) {
                caughtItem = item;
                item.body.enable = false;
                isLaunching = false;
                isReturning = true;
            }
        });

        this.input.on('pointerdown', (p) => {
            if (!isLaunching && !isReturning && p.y > 150) {
                isLaunching = true;
            }
        });
    }

    function spawn(scene) {
        let x = Phaser.Math.Between(50, config.width - 50);
        let y = Phaser.Math.Between(config.height * 0.4, config.height - 150);
        let type = (Math.random() > 0.5) ? 'plt' : 'usdt';
        targets.create(x, y, type).setScale(0.12).setDepth(40);
    }

    function update() {
        let startX = plane.x;
        let startY = plane.y + 20;

        if (!isLaunching && !isReturning) {
            angle += swingSpeed;
            if (angle > 0.5 || angle < -0.5) swingSpeed *= -1;
        } else if (isLaunching) {
            distance += 12;
            if (distance > config.height - 100) { isLaunching = false; isReturning = true; }
        } else if (isReturning) {
            distance -= 8;
            if (distance <= 25) {
                isReturning = false;
                if (caughtItem) {
                    caughtItem.destroy();
                    caughtItem = null;
                    spawn(this);
                }
            }
        }

        hook.x = startX + Math.sin(angle) * distance;
        hook.y = startY + Math.cos(angle) * distance;
        hook.rotation = -angle;

        rope.clear().lineStyle(2, 0xffffff, 0.5);
        rope.lineBetween(startX, startY, hook.x, hook.y);

        if (caughtItem) {
            caughtItem.x = hook.x;
            caughtItem.y = hook.y + 10;
        }
    }
</script>
</body>
</html>
