<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pepe Pilot: Gold Collector</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background-color: #010103; overflow: hidden; touch-action: none; }
    </style>
</head>
<body>
<script>
const config = {
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    physics: { default: 'arcade' },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);
let plane, claw, chain, targets, scoreText;
let isLaunching = false, isReturning = false;
let angle = 0, swingSpeed = 0.015, launchSpeed = 8, returnSpeed = 0.15;
let score = 0;

function preload() {
    // Загружаем фон
    this.load.image('sky', 'https://labs.phaser.io/assets/skies/space3.png');
    
    // ПРИВЯЗЫВАЕМ ТВОИ ФАЙЛЫ (названия точно как в твоем GitHub)
    this.load.image('pepe', 'images (32).jpeg'); 
    this.load.image('ton_coin', 'ton-ecosystem.jpg'); 
    this.load.image('dogs_coin', 'images (33).jpeg'); 
    this.load.image('not_coin', 'images (35).jpeg');
}

function create() {
    // Фон
    this.add.image(config.width/2, config.height/2, 'sky').setAlpha(0.3).setScale(1.5).setDepth(0);
    
    // Пепе-пилот
    plane = this.add.sprite(config.width / 2, 100, 'pepe').setScale(0.6).setDepth(5);
    
    // Золотая клешня и цепь
    claw = this.add.circle(config.width / 2, 180, 18, 0xffd700).setDepth(4);
    chain = this.add.graphics().setDepth(3);
    
    targets = this.physics.add.group();
    const assets = ['ton_coin', 'dogs_coin', 'not_coin'];

    // Генерация монет
    for(let i=0; i<12; i++) {
        let attempts = 0;
        let x, y;
        do {
            x = Phaser.Math.Between(80, config.width - 80);
            y = Phaser.Math.Between(320, config.height - 180);
            attempts++;
        } while (this.physics.overlapCirc(x, y, 60) && attempts < 15);

        let type = Phaser.Math.RND.pick(assets);
        let coin = targets.create(x, y, type);
        coin.setDisplaySize(75, 75); 
        coin.setData('val', type === 'ton_coin' ? 50 : 10);
    }

    // Счет
    scoreText = this.add.text(config.width/2, 45, '0', { 
        fontSize: '56px', fill: '#fff', fontStyle: 'bold', fontFamily: 'Arial Black'
    }).setOrigin(0.5).setDepth(10);

    this.input.on('pointerdown', () => { if(!isLaunching && !isReturning) isLaunching = true; });
}

function update() {
    if (!isLaunching && !isReturning) {
        angle += swingSpeed;
        if (angle > 0.8 || angle < -0.8) swingSpeed = -swingSpeed;
        claw.x = plane.x + Math.sin(angle) * 120;
        claw.y = plane.y + Math.cos(angle) * 120;
    } else if (isLaunching) {
        claw.x += Math.sin(angle) * launchSpeed;
        claw.y += Math.cos(angle) * launchSpeed;
        
        targets.children.iterate(child => {
            if (child && child.active && Phaser.Geom.Intersects.CircleToCircle(claw, child)) {
                score += child.getData('val');
                scoreText.setText(score);
                child.destroy();
                isLaunching = false;
                isReturning = true;
            }
        });

        if (claw.y > config.height || claw.x < 0 || claw.x > config.width) {
            isLaunching = false;
            isReturning = true;
        }
    } else if (isReturning) {
        let tx = plane.x + Math.sin(angle) * 120;
        let ty = plane.y + Math.cos(angle) * 120;
        claw.x += (tx - claw.x) * returnSpeed;
        claw.y += (ty - claw.y) * returnSpeed;
        if (Phaser.Math.Distance.Between(claw.x, claw.y, tx, ty) < 10) isReturning = false;
    }

    chain.clear();
    chain.lineStyle(5, 0xffd700, 0.9); 
    chain.lineBetween(plane.x, plane.y + 20, claw.x, claw.y);
}
</script>
</body>
</html>
