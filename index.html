<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pepe Pilot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin:0; padding:0; overflow:hidden; background:#000; touch-action: none; font-family: 'Segoe UI', sans-serif; }
        #top-bar { position: fixed; top: 0; left: 0; width: 100%; height: 40px; background: rgba(0,0,0,0.5); z-index: 1000; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; box-sizing: border-box; }
        #energy-container { color: #0f0; font-size: 14px; font-weight: bold; }
        #balance-container { display: flex; gap: 15px; color: #fff; font-size: 11px; }
        #settings-btn { font-size: 20px; cursor: pointer; color: white; }
        
        #restore-btn { 
            display: none; position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); 
            background: #ffcc00; color: #000; border: 2px solid #fff; padding: 10px 20px; 
            border-radius: 20px; font-weight: bold; z-index: 500; cursor: pointer;
        }

        #nav-bar { position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%); width: 90%; height: 55px; background: rgba(0,0,0,0.9); border-radius: 15px; display: flex; justify-content: space-around; align-items: center; z-index: 200; border: 1px solid #333; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #fff; flex: 1; cursor: pointer; }
        .nav-text { font-size: 7px; margin-top: 2px; color: #bbb; text-transform: uppercase; font-weight: bold; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: #1a1a1a; border: 2px solid #0f0; padding: 20px; border-radius: 20px; text-align: center; width: 85%; color: #fff; box-sizing: border-box; }
        .buy-btn { background: #0f0; color: #000; border: none; padding: 10px 15px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

<div id="top-bar">
    <div id="energy-container">⚡ <span id="en-val">100</span></div>
    <div id="balance-container">
        <div>USDT: <span id="u-val" style="color:#0f0">0.00004</span></div>
        <div>PLT: <span id="p-val" style="color:#ffcc00">3</span></div>
    </div>
    <div id="settings-btn" onclick="toggleModal('settings-modal')">⚙️</div>
</div>

<div id="restore-btn" onclick="watchAd()">RESTORE ENERGY AD ⚡</div>

<div id="nav-bar">
    <div class="nav-item" onclick="toggleModal('shop-modal')"><span>🛒</span><div class="nav-text">АНГАР</div></div>
    <div class="nav-item" onclick="toggleModal('tasks-modal')"><span>📜</span><div class="nav-text">ЗАДАНИЯ</div></div>
    <div class="nav-item" onclick="toggleModal('rank-modal')"><span>🏆</span><div class="nav-text">РЕЙТИНГ</div></div>
    <div class="nav-item" onclick="toggleModal('friends-modal')"><span>👥</span><div class="nav-text">ДРУЗЬЯ</div></div>
    <div class="nav-item" onclick="toggleModal('wallet-modal')"><span>👛</span><div class="nav-text">КОШЕЛЕК</div></div>
</div>

<div id="settings-modal" class="modal"><div class="modal-content"><h3>НАСТРОЙКИ</h3><button class="buy-btn" onclick="toggleModal('settings-modal')">ЗАКРЫТЬ</button></div></div>
<div id="shop-modal" class="modal"><div class="modal-content"><h3>МАГАЗИН</h3><button class="buy-btn" onclick="toggleModal('shop-modal')">ЗАКРЫТЬ</button></div></div>
<div id="tasks-modal" class="modal"><div class="modal-content"><h3>ЗАДАНИЯ</h3><button class="buy-btn" onclick="toggleModal('tasks-modal')">ЗАКРЫТЬ</button></div></div>
<div id="rank-modal" class="modal"><div class="modal-content"><h3>РЕЙТИНГ</h3><button class="buy-btn" onclick="toggleModal('rank-modal')">ЗАКРЫТЬ</button></div></div>
<div id="friends-modal" class="modal"><div class="modal-content"><h3>ДРУЗЬЯ</h3><button class="buy-btn" onclick="toggleModal('friends-modal')">ЗАКРЫТЬ</button></div></div>
<div id="wallet-modal" class="modal"><div class="modal-content"><h3>КОШЕЛЕК</h3><button class="buy-btn" onclick="toggleModal('wallet-modal')">ЗАКРЫТЬ</button></div></div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // --- НАСТРОЙКИ СЕРВЕРА ---
    const SERVER_URL = "https://pepe-pilot.onrender.com"; // Проверь этот URL!
    const userId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : "local_user";

    // Переменные баланса
    window.energy = 100;
    window.plt = 3;
    window.usdt = 0.00004;

    // Функция загрузки из базы
    async function loadData() {
        try {
            const response = await fetch(`${SERVER_URL}/api/user/${userId}`);
            if (response.ok) {
                const data = await response.json();
                window.energy = data.energy !== undefined ? data.energy : 100;
                window.plt = data.plt !== undefined ? data.plt : 3;
                window.usdt = data.usdt !== undefined ? data.usdt : 0.00004;
                updateUI(false); 
            }
        } catch (e) { console.log("БД недоступна, играем локально"); }
    }

    // Функция сохранения в базу
    async function saveData() {
        try {
            await fetch(`${SERVER_URL}/api/save`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    userId: userId,
                    energy: window.energy,
                    plt: window.plt,
                    usdt: window.usdt
                })
            });
        } catch (e) { console.error("Ошибка сохранения"); }
    }

    function updateUI(shouldSave = true) {
        document.getElementById('en-val').innerText = window.energy;
        document.getElementById('p-val').innerText = window.plt;
        document.getElementById('u-val').innerText = window.usdt.toFixed(5);
        document.getElementById('restore-btn').style.display = (window.energy <= 0) ? "block" : "none";
        
        if (shouldSave) saveData();
    }

    function toggleModal(id) {
        const m = document.getElementById(id);
        m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
    }

    function watchAd() {
        window.energy = 100;
        updateUI();
    }

    // Загружаем данные при старте
    loadData();

    // --- ФИЗИКА ИГРЫ (ТВОЙ ОРИГИНАЛЬНЫЙ КОД) ---
    const config = {
        type: Phaser.AUTO,
        width: window.innerWidth,
        height: window.innerHeight,
        physics: { default: 'arcade' },
        scene: { preload, create, update }
    };

    const game = new Phaser.Game(config);
    let plane, hook, rope, targets;
    let isLaunching = false, isReturning = false, caughtItem = null;
    let angle = 0, swingSpeed = 0.015, distance = 25;

    function preload() {
        this.load.image('sky', 'pg.jpeg'); 
        this.load.image('hook', 'kleshn.png');
        this.load.image('usdt', 'usdt.png'); 
        this.load.image('plt', 'logo..png');
        this.load.image('plane', 'pepe.png');
    }

    function create() {
        this.add.image(config.width/2, config.height/2, 'sky').setDisplaySize(config.width, config.height);
        targets = this.physics.add.group();
        for(let i=0; i<6; i++) spawn(this);

        rope = this.add.graphics().setDepth(5);
        hook = this.add.sprite(0, 0, 'hook').setDepth(50).setDisplaySize(65, 65);
        this.physics.add.existing(hook);

        plane = this.add.image(config.width/2, 120, 'plane').setDisplaySize(280, 180).setDepth(60);

        this.physics.add.overlap(hook, targets, (h, item) => {
            if (isLaunching && !caughtItem) {
                caughtItem = item;
                item.body.enable = false;
                isLaunching = false;
                isReturning = true;
            }
        });

        this.input.on('pointerdown', (pointer) => {
            if (pointer.y > 60 && pointer.y < config.height - 80 && !isLaunching && !isReturning && window.energy > 0) {
                isLaunching = true;
                window.energy--;
                updateUI();
            }
        });
    }

    function spawn(scene) {
        let x = Phaser.Math.Between(60, config.width - 60);
        let y = Phaser.Math.Between(config.height * 0.5, config.height - 130);
        let type = (Math.random() > 0.3) ? 'plt' : 'usdt';
        let item = targets.create(x, y, type);
        item.setScale(0.11).setDepth(40);
    }

    function update() {
        let startX = plane.x - 5;
        let startY = plane.y + 20;

        if (!isLaunching && !isReturning) {
            angle += swingSpeed;
            if (angle > 0.4 || angle < -0.4) swingSpeed *= -1;
        } else if (isLaunching) {
            distance += 14;
            if (distance > config.height - 110) {
                isLaunching = false;
                isReturning = true;
            }
        } else if (isReturning) {
            distance -= 6;
            if (distance <= 25) {
                isReturning = false;
                if (caughtItem) {
                    if (caughtItem.texture.key === 'plt') window.plt += 1;
                    else window.usdt += 0.00001;
                    
                    updateUI();
                    caughtItem.destroy();
                    caughtItem = null;
                    spawn(this);
                }
            }
        }

        hook.x = startX + Math.sin(angle) * distance;
        hook.y = startY + Math.cos(angle) * distance;
        hook.rotation = -angle;

        rope.clear();
        rope.lineStyle(2, 0xffffff, 0.6);
        rope.lineBetween(startX, startY, hook.x, hook.y);

        if (caughtItem) {
            caughtItem.x = hook.x;
            caughtItem.y = hook.y + 15;
        }
    }
</script>
</body>
</html>
