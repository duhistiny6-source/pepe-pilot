<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pepe Pilot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        body { margin:0; padding:0; overflow:hidden; background:#000; touch-action: none; font-family: 'Segoe UI', Arial, sans-serif; }
        #top-bar { position: fixed; top: 0; left: 0; width: 100%; height: 35px; background: rgba(0, 0, 0, 0.4); z-index: 1000; backdrop-filter: blur(2px); display: flex; align-items: center; }
        
        #energy-block { position: absolute; left: 12px; display: flex; flex-direction: column; line-height: 1.1; top: 3px; }
        #energy-main { color: #0f0; font-size: 13px; font-weight: bold; text-shadow: 1px 1px 1px #000; }
        #energy-info-extra { display: none; margin-top: 1px; } /* Скрыто, пока 100% */
        #energy-timer { color: #aaa; font-size: 8px; font-family: monospace; }
        #restore-btn { background: #ffcc00; color: #000; font-size: 7px; padding: 1px 4px; border-radius: 3px; cursor: pointer; font-weight: bold; border: 1px solid #fff; margin-top: 1px; }

        #balance-container { width: 100%; display: flex; align-items: center; justify-content: center; gap: 15px; color: #fff; font-size: 11px; }
        .bal-item { display: flex; align-items: center; gap: 3px; }
        .c-icon { width: 14px; height: 14px; }
        #settings-btn { position: fixed; top: 7px; right: 10px; font-size: 18px; cursor: pointer; z-index: 1001; opacity: 0.8; color: white; }
        
        #nav-bar { position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%); width: 85%; height: 50px; background: rgba(0, 0, 0, 0.9); border: 1px solid #333; border-radius: 12px; display: flex; justify-content: space-around; align-items: center; z-index: 200; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #fff; flex: 1; cursor: pointer; }
        .nav-text { font-size: 8px; margin-top: 1px; color: #bbb; text-transform: uppercase; font-weight: bold; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; color: #fff; justify-content: center; align-items: center; }
        .modal-content { background: #1a1a1a; border: 2px solid #0f0; padding: 25px; border-radius: 20px; text-align: center; width: 85%; max-height: 80vh; overflow-y: auto; }
        .lot-row { background: #222; border: 1px solid #444; border-radius: 10px; padding: 10px; margin: 10px 0; display: flex; justify-content: space-between; align-items: center; }
        .btn { background: #0f0; color: #000; border: none; padding: 6px 12px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 11px; }
        .lang-btn { background: #333; color: #0f0; border: 1px solid #0f0; padding: 10px; margin: 5px 0; cursor: pointer; border-radius: 10px; width: 100%; font-weight: bold; }
    </style>
</head>
<body>

<div id="settings-btn" onclick="toggleModal('settings-modal')">⚙️</div>

<div id="top-bar">
    <div id="energy-block">
        <div id="energy-main">⚡ <span id="en-val">100</span></div>
        <div id="energy-info-extra">
            <div id="energy-timer">02:00:00</div>
            <div id="restore-btn" onclick="restoreEnergyAd()">AD ⚡</div>
        </div>
    </div>
    <div id="balance-container">
        <div class="bal-item"><span>USDT:</span> <span id="m-val" style="color:#0f0">0.00000</span></div>
        <div class="bal-item"><img src="logo..png" class="c-icon"> <span>PLT:</span> <span id="p-val" style="color:#ffcc00">0</span></div>
    </div>
</div>

<div id="settings-modal" class="modal"><div class="modal-content">
    <h3 id="txt-sett-title">НАСТРОЙКИ</h3>
    <button class="lang-btn" onclick="changeLanguage('ru')">РУССКИЙ</button>
    <button class="lang-btn" onclick="changeLanguage('en')">ENGLISH</button>
    <p onclick="toggleModal('settings-modal')" id="txt-close-sett" style="margin-top:15px; cursor:pointer; color:#aaa;">Закрыть</p>
</div></div>

<div id="shop-modal" class="modal"><div class="modal-content">
    <h3 id="txt-shop-title">АНГАР</h3>
    <div class="lot-row">
        <img src="plane_copper.png" style="width:50px;">
        <div style="text-align:left; flex:1; padding-left:10px;"><div style="color:#cd7f32; font-weight:bold;">МЕДНЫЙ</div><div>10 TON</div><small class="bonus-txt">+10 PLT | +0.0001 USDT</small></div>
        <button class="btn buy-txt" onclick="pay(10)">КУПИТЬ</button>
    </div>
    <div class="lot-row">
        <img src="plane_bronze.png" style="width:50px;">
        <div style="text-align:left; flex:1; padding-left:10px;"><div style="color:#b08d57; font-weight:bold;">БРОНЗОВЫЙ</div><div>25 TON</div><small class="bonus-txt">+25 PLT | +0.0005 USDT</small></div>
        <button class="btn buy-txt" onclick="pay(25)">КУПИТЬ</button>
    </div>
    <div class="lot-row">
        <img src="plane_gold.png" style="width:50px;">
        <div style="text-align:left; flex:1; padding-left:10px;"><div style="color:#ffd700; font-weight:bold;">ЗОЛОТОЙ</div><div>50 TON</div><small class="bonus-txt">+50 PLT | +0.001 USDT</small></div>
        <button class="btn buy-txt" onclick="pay(50)">КУПИТЬ</button>
    </div>
    <p onclick="toggleModal('shop-modal')" class="txt-close" style="margin-top:15px; cursor:pointer; color:#aaa;">Закрыть</p>
</div></div>

<div id="nav-bar">
    <div class="nav-item" onclick="toggleModal('shop-modal')"><span>🛒</span><div class="nav-text" id="nav-shop">АНГАР</div></div>
    <div class="nav-item"><span>📜</span><div class="nav-text">ЗАДАНИЯ</div></div>
    <div class="nav-item"><span>👥</span><div class="nav-text">ДРУЗЬЯ</div></div>
    <div class="nav-item" onclick="connectWallet()"><span>👛</span><div class="nav-text">КОШЕЛЕК</div></div>
</div>

<script>
    // --- ПЕРЕВОДЫ (Логика восстановлена) ---
    const translations = {
        ru: { settings: "НАСТРОЙКИ", shop: "АНГАР", tasks: "ЗАДАНИЯ", close: "Закрыть", buy: "КУПИТЬ" },
        en: { settings: "SETTINGS", shop: "HANGAR", tasks: "TASKS", close: "Close", buy: "BUY" }
    };

    function changeLanguage(lang) {
        const t = translations[lang];
        document.getElementById('txt-sett-title').innerText = t.settings;
        document.getElementById('txt-shop-title').innerText = t.shop;
        document.getElementById('nav-shop').innerText = t.shop;
        document.getElementById('txt-close-sett').innerText = t.close;
        document.querySelectorAll('.txt-close').forEach(el => el.innerText = t.close);
        document.querySelectorAll('.buy-txt').forEach(el => el.innerText = t.buy);
    }
</script>

<script>
    // --- ЛОГИКА АПИ И ЭНЕРГИИ ---
    const tg = window.Telegram.WebApp;
    tg.expand();
    window.energy = 100; window.plt = 3; window.usdt = 0.00004;
    const MY_WALLET = "UQBZ-j9v-Y20h8yrtlahvFOTvaTK8rR1577NBZjK1GKE16_V";

    const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
        manifestUrl: 'https://duhistiny6-source.github.io/pepe-pilot/tonconnect-manifest.json'
    });

    function toggleModal(id) {
        const m = document.getElementById(id);
        m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
    }

    async function connectWallet() { try { await tonConnectUI.openModal(); } catch(e) {} }

    async function pay(amount) {
        if(!tonConnectUI.connected) { await connectWallet(); return; }
        const tx = { validUntil: Math.floor(Date.now()/1000)+60, messages: [{address: MY_WALLET, amount: (amount*1000000000).toString()}] };
        try { await tonConnectUI.sendTransaction(tx); } catch(e) {}
    }

    window.updateUI = function() {
        document.getElementById('en-val').innerText = window.energy;
        document.getElementById('p-val').innerText = window.plt;
        document.getElementById('m-val').innerText = window.usdt.toFixed(5);
        // Скрываем, если 100, показываем под молнией, если меньше.
        document.getElementById('energy-info-extra').style.display = (window.energy < 100) ? 'block' : 'none';
    };

    function restoreEnergyAd() { window.energy = 100; window.updateUI(); }

    // --- ИГРА (Механика и эффекты) ---
    const config = {
        type: Phaser.AUTO, width: window.innerWidth, height: window.innerHeight,
        physics: { default: 'arcade' }, scene: { preload, create, update }
    };
    const game = new Phaser.Game(config);
    let plane, hook, rope, targets, bgMusic, beepSound, isLaunching = false, isReturning = false, caughtItem = null;
    let angle = 0, swingSpeed = 0.015, distance = 25;

    function preload() {
        this.load.image('sky', 'pg.jpeg');
        this.load.image('hook', 'kleshn.png');
        this.load.image('usdt_img', 'usdt.png');
        this.load.image('plt_img', 'logo..png');
        this.load.image('plane', 'pepe.png');
        this.load.audio('theme', 'music.mp3');
        this.load.audio('beep', 'beep.mp3');
    }

    function create() {
        this.add.image(config.width/2, config.height/2, 'sky').setDisplaySize(config.width, config.height);
        try { bgMusic = this.sound.add('theme', { volume: 0.1, loop: true }); beepSound = this.sound.add('beep', { volume: 0.5 }); } catch(e){}
        
        targets = this.physics.add.group();
        for(let i=0; i<6; i++) spawn(this);

        rope = this.add.graphics().setDepth(5);
        hook = this.add.sprite(0, 0, 'hook').setDisplaySize(60, 60).setDepth(20);
        this.physics.add.existing(hook);
        plane = this.add.image(config.width/2, 120, 'plane').setDisplaySize(250, 160).setDepth(10);

        this.physics.add.overlap(hook, targets, (h, item) => {
            if (isLaunching && !caughtItem) {
                caughtItem = item; caughtItem.body.enable = false;
                isLaunching = false; isReturning = true;
                if(beepSound) beepSound.play();
                // ВЫЛЕТ ЦИФР
                let isPlt = (item.texture.key === 'plt_img');
                let t = isPlt ? "+10 PLT" : "+0.0001 USDT";
                let col = isPlt ? "#ffcc00" : "#00ff00";
                let txt = this.add.text(item.x, item.y, t, { fontSize:'22px', fill:col, fontWeight:'bold' }).setDepth(100);
                this.tweens.add({targets: txt, y: txt.y - 120, alpha: 0, duration: 1000, onComplete: () => txt.destroy() });
            }
        });

        this.input.on('pointerdown', () => {
            if(!isLaunching && !isReturning && window.energy > 0) {
                isLaunching = true; window.energy--; window.updateUI();
                if(bgMusic && !bgMusic.isPlaying) bgMusic.play();
            }
        });
    }

    function spawn(scene) {
        let x = Phaser.Math.Between(50, config.width - 50);
        let y = Phaser.Math.Between(config.height * 0.45, config.height - 150);
        let type = (Math.random() > 0.7) ? 'plt_img' : 'usdt_img';
        let item = targets.create(x, y, type).setScale(0.12).setDepth(15);
        scene.tweens.add({ targets: item, scale: 0.15, duration: 900, yoyo: true, repeat: -1 });
    }

    function update() {
        plane.y = 120 + Math.sin(this.time.now / 600) * 8;
        let startX = plane.x - 5, startY = plane.y + 25;

        if (!isLaunching && !isReturning) {
            angle += swingSpeed; if (angle > 0.5 || angle < -0.5) swingSpeed *= -1; distance = 25;
        } else if (isLaunching) {
            distance += 14; if (distance > config.height - 110) { isLaunching = false; isReturning = true; }
        } else if (isReturning) {
            distance -= 4; // Скорость возврата
            if (distance <= 25) {
                isReturning = false;
                if (caughtItem) { caughtItem.destroy(); caughtItem = null; spawn(this); }
            }
        }
        hook.x = startX + Math.sin(angle) * distance;
        hook.y = startY + Math.cos(angle) * distance;
        hook.rotation = -angle;

        rope.clear().lineStyle(2, 0xffffff, 0.6).lineBetween(startX, startY, startX + Math.sin(angle) * (distance - 20), startY + Math.cos(angle) * (distance - 20));
        if (caughtItem) { caughtItem.x = hook.x; caughtItem.y = hook.y + 10; }
    }
</script>
</body>
</html>
