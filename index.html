<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pepe Pilot: Final Fix</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin:0; overflow:hidden; background:#000; touch-action: none; }
        #ui { position:fixed; top:12px; left:12px; color:#0f0; font-family: Arial; font-weight:bold; z-index: 100; pointer-events: none; text-shadow: 1px 1px 2px #000; }
        #nav-bar { 
            position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%); 
            width: 82%; height: 50px; background: rgba(0, 0, 0, 0.9); 
            border: 1px solid #0f0; border-radius: 12px; display: flex; 
            justify-content: space-around; align-items: center; z-index: 200;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #0f0; font-size: 8px; font-weight: bold; }
        .nav-item span { font-size: 18px; }
    </style>
</head>
<body>

<div id="ui">
    💰 <span id="money">0</span><br>
    ⚡ <span id="energy">10</span>
</div>

<div id="nav-bar">
    <div class="nav-item"><span>🛒</span>МАГАЗИН</div>
    <div class="nav-item"><span>📜</span>ЗАДАНИЯ</div>
    <div class="nav-item"><span>👥</span>ДРУЗЬЯ</div>
    <div class="nav-item"><span>👛</span>КОШЕЛЕК</div>
</div>

<script>
const config = {
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    physics: { default: 'arcade' },
    scene: { preload, create, update }
};

const game = new Phaser.Game(config);

let plane, hook, rope, targets, bgMusic;
let isLaunching = false, isReturning = false, caughtItem = null;
let angle = 0, swingSpeed = 0.03, distance = 25; 
let money = 0, energy = 10;

function preload() {
    // Загрузка ресурсов
    this.load.image('sky', 'pg.jpeg'); 
    this.load.image('plane', 'pepe.png');
    this.load.image('hook', 'kleshn.png');
    this.load.image('usdt', 'usdt.png');
    this.load.audio('theme', 'music.mp3');
}

function create() {
    this.add.image(config.width / 2, config.height / 2, 'sky').setDisplaySize(config.width, config.height);

    // Музыка: создаем и сразу настраиваем
    bgMusic = this.sound.add('theme', { volume: 0, loop: true });

    // Самый быстрый способ включить звук - через стандартный EventListener
    const startAudio = () => {
        if (bgMusic && !bgMusic.isPlaying) {
            bgMusic.play();
            this.tweens.add({ targets: bgMusic, volume: 0.4, duration: 500 });
        }
        window.removeEventListener('pointerdown', startAudio);
        window.removeEventListener('touchstart', startAudio);
    };
    window.addEventListener('pointerdown', startAudio);
    window.addEventListener('touchstart', startAudio);

    targets = this.physics.add.group();
    for(let i = 0; i < 6; i++) spawn(this);

    rope = this.add.graphics().setDepth(30);
    
    // Клешня: строгая фиксация размера
    hook = this.add.sprite(0, 0, 'hook').setDepth(50);
    hook.setDisplaySize(60, 60); 
    this.physics.add.existing(hook);
    hook.body.setCircle(25); 

    plane = this.add.image(config.width / 2, 120, 'plane').setDisplaySize(280, 180).setDepth(60);

    this.input.on('pointerdown', (pointer) => {
        if (pointer.y < config.height - 80 && !isLaunching && !isReturning && energy > 0) {
            isLaunching = true;
            energy--;
            updateUI();
        }
    });

    this.physics.add.overlap(hook, targets, (h, item) => {
        if (isLaunching && !caughtItem) {
            caughtItem = item;
            caughtItem.body.enable = false; // Отключаем физику монетки
            if(caughtItem.breath) caughtItem.breath.stop(); // Останавливаем анимацию
            caughtItem.setDepth(45); 
            isLaunching = false;
            isReturning = true;
        }
    });

    setInterval(() => { if (energy < 10) energy++; updateUI(); }, 4000);
}

function spawn(scene) {
    let x = Phaser.Math.Between(50, config.width - 50);
    let y = Phaser.Math.Between(config.height * 0.45, config.height - 150);
    let coin = targets.create(x, y, 'usdt').setDepth(40);
    if (coin) {
        coin.setDisplaySize(50, 50);
        coin.breath = scene.tweens.add({
            targets: coin, scale: 1.1, duration: 1000, yoyo: true, repeat: -1
        });
    }
}

function update() {
    plane.y = 120 + Math.sin(this.time.now / 600) * 8;
    let startX = plane.x - 5; 
    let startY = plane.y + 15; 

    if (!isLaunching && !isReturning) {
        angle += swingSpeed;
        if (angle > 0.8 || angle < -0.8) swingSpeed *= -1;
        distance = 25;
    } else if (isLaunching) {
        distance += 16;
        if (distance > config.height - 110) { isLaunching = false; isReturning = true; }
    } else if (isReturning) {
        distance -= 9; 
        if (distance <= 25) {
            isReturning = false;
            if (caughtItem) {
                money += 100;
                caughtItem.destroy();
                caughtItem = null;
                spawn(this);
                updateUI();
            }
        }
    }

    // ФИКСАЦИЯ КЛЕШНИ
    hook.setDisplaySize(60, 60);
    hook.x = startX + Math.sin(angle) * distance;
    hook.y = startY + Math.cos(angle) * distance;
    hook.rotation = -angle;

    let endX = startX + Math.sin(angle) * (distance - 15);
    let endY = startY + Math.cos(angle) * (distance - 15);
    rope.clear().lineStyle(2, 0xffffff, 0.7).lineBetween(startX, startY, endX, endY);

    if (caughtItem) {
        // ЖЕСТКАЯ ФИКСАЦИЯ МОНЕТКИ (запрещаем растягивание)
        caughtItem.setDisplaySize(50, 50);
        caughtItem.x = hook.x;
        caughtItem.y = hook.y + 15; 
        caughtItem.rotation = hook.rotation;
    }
}

function updateUI() {
    document.getElementById('money').innerText = money;
    document.getElementById('energy').innerText = energy;
}
</script>
</body>
</html>
