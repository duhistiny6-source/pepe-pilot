   <!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pepe Pilot Gold</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; touch-action: none; }
    </style>
</head>
<body>
<script>
// Прямые ссылки на твои файлы в GitHub
const ASSETS = {
    bg: 'https://raw.githubusercontent.com/duhistiny6/pepe-pilot/main/bg.jpg',
    pepe: 'https://raw.githubusercontent.com/duhistiny6/pepe-pilot/main/pepe.png',
    ton: 'https://raw.githubusercontent.com/duhistiny6/pepe-pilot/main/ton-ecosystem-removebe.png'
};

const config = {
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    physics: { default: 'arcade' },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);
let plane, clawGraphic, chain, targets, scoreText, timerText;
let isLaunching = false, isReturning = false, caughtItem = null;
let angle = 0, swingSpeed = 0.03, launchSpeed = 15;
let score = 0, timeLeft = 60;

function preload() {
    this.load.crossOrigin = 'anonymous';
    this.load.image('sky', ASSETS.bg);
    this.load.image('pepe', ASSETS.pepe);
    this.load.image('ton', ASSETS.ton);
}

function create() {
    // 1. ФОН
    if (this.textures.exists('sky')) {
        let bg = this.add.image(config.width/2, config.height/2, 'sky');
        let scale = Math.max(config.width / bg.width, config.height / bg.height);
        bg.setScale(scale).setScrollFactor(0);
    } else {
        this.add.rectangle(0, 0, config.width, config.height, 0x87CEEB).setOrigin(0);
    }
    
    // 2. САМОЛЕТ
    if (this.textures.exists('pepe') && this.textures.get('pepe').key !== '__MISSING') {
        plane = this.add.sprite(config.width / 2, 120, 'pepe');
    } else {
        // Запасной самолет, если картинка не нашла путь
        plane = this.add.container(config.width / 2, 120);
        plane.add(this.add.rectangle(0, 0, 100, 40, 0xffcc00).setStrokeStyle(2, 0x000));
    }
    plane.setDepth(10).setDisplaySize(200, 150);

    this.tweens.add({
        targets: plane, y: 135, duration: 2000, yoyo: true, loop: -1, ease: 'Sine.easeInOut'
    });
    
    chain = this.add.graphics().setDepth(5);
    clawGraphic = this.add.graphics().setDepth(6);
    this.clawPoint = this.add.circle(config.width/2, 220, 15);
    this.physics.add.existing(this.clawPoint);

    targets = this.physics.add.group();
    for(let i=0; i<6; i++) { spawnCoin(this); }

    scoreText = this.add.text(20, 30, 'Очки: 0', { fontSize: '28px', fill: '#fff', stroke: '#000', strokeThickness: 5 });
    timerText = this.add.text(config.width - 180, 30, 'Время: 60', { fontSize: '28px', fill: '#ff0', stroke: '#000', strokeThickness: 5 });

    this.time.addEvent({
        delay: 1000,
        callback: () => { if(timeLeft > 0) { timeLeft--; timerText.setText('Время: ' + timeLeft); } },
        loop: true
    });

    this.input.on('pointerdown', () => { 
        if(!isLaunching && !isReturning && timeLeft > 0) isLaunching = true; 
    });

    this.physics.add.overlap(this.clawPoint, targets, (c, target) => {
        if (isLaunching && !caughtItem) { 
            caughtItem = target; 
            isLaunching = false; 
            isReturning = true; 
        }
    });
}

function spawnCoin(scene) {
    let x = Phaser.Math.Between(50, config.width - 50);
    let y = Phaser.Math.Between(380, config.height - 100);
    let coin;
    if (scene.textures.exists('ton') && scene.textures.get('ton').key !== '__MISSING') {
        coin = targets.create(x, y, 'ton');
        coin.setDisplaySize(70, 70);
    } else {
        // Золотая монета вместо зеленого квадрата
        coin = scene.add.circle(x, y, 30, 0xffd700).setStrokeStyle(4, 0x000);
        targets.add(coin);
    }
    coin.setDepth(4);
}

function update() {
    if (timeLeft <= 0) return;

    let px = plane.x; 
    let py = plane.y + 40;

    if (!isLaunching && !isReturning) {
        angle += swingSpeed;
        if (Math.abs(angle) > 0.8) swingSpeed = -swingSpeed;
        this.clawPoint.x = px + Math.sin(angle) * 130;
        this.clawPoint.y = py + Math.cos(angle) * 130;
    } else if (isLaunching) {
        this.clawPoint.x += Math.sin(angle) * launchSpeed;
        this.clawPoint.y += Math.cos(angle) * launchSpeed;
        if (this.clawPoint.y > config.height || this.clawPoint.x < 0 || this.clawPoint.x > config.width) {
            isLaunching = false; isReturning = true;
        }
    } else if (isReturning) {
        let tx = px + Math.sin(angle) * 130;
        let ty = py + Math.cos(angle) * 130;
        let dist = Phaser.Math.Distance.Between(this.clawPoint.x, this.clawPoint.y, tx, ty);
        this.clawPoint.x += (tx - this.clawPoint.x) * 0.15;
        this.clawPoint.y += (ty - this.clawPoint.y) * 0.15;
        if (caughtItem) { caughtItem.x = this.clawPoint.x; caughtItem.y = this.clawPoint.y; }
        if (dist < 15) {
            isReturning = false;
            if (caughtItem) { 
                score += 100; scoreText.setText('Очки: ' + score); 
                caughtItem.destroy(); caughtItem = null; spawnCoin(this);
            }
        }
    }

    chain.clear().lineStyle(4, 0x4a2c0a).lineBetween(px, py, this.clawPoint.x, this.clawPoint.y);
    clawGraphic.clear().lineStyle(6, 0xffd700);
    let rot = Phaser.Math.Angle.Between(px, py, this.clawPoint.x, this.clawPoint.y) + Math.PI/2;
    let gap = caughtItem ? 0.2 : 0.8; 
    clawGraphic.beginPath().arc(this.clawPoint.x, this.clawPoint.y, 25, rot - gap, rot + gap).strokePath();
    clawGraphic.beginPath().arc(this.clawPoint.x, this.clawPoint.y, 25, rot + Math.PI - gap, rot + Math.PI + gap).strokePath();
}
</script>
</body>
</html>
