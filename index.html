<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pepe Pilot: Crypto Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        body { margin:0; overflow:hidden; background:#000; touch-action: none; font-family: Arial, sans-serif; }
        
        /* Компактная панель баланса в мешочке */
        #ui { 
            position:fixed; 
            top:10px; 
            left:10px; 
            z-index: 100; 
            pointer-events: none; 
        }
        
        .balance-container {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(15, 255, 15, 0.3);
            border-radius: 12px;
            padding: 8px 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            backdrop-filter: blur(4px);
        }

        .balance-line { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            color: #0f0; 
            font-weight: bold; 
            font-size: 14px; 
            text-shadow: 1px 1px 2px #000;
        }

        .coin-mini { width: 18px; height: 18px; object-fit: contain; }
        
        .energy-bar {
            margin-top: 5px;
            font-size: 12px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        #timer-display { color: #ff3333; font-size: 11px; margin-top: 2px; display: none; }
        #ad-button { display: none; pointer-events: auto; background: #ffcc00; color: #000; border: none; padding: 5px 10px; font-size: 10px; font-weight: bold; border-radius: 4px; cursor: pointer; margin-top: 5px; }
        
        #settings-btn { position: fixed; top: 10px; right: 10px; font-size: 24px; cursor: pointer; z-index: 1001; }
        
        /* Остальные стили (навигация, модалки) без изменений */
        #nav-bar { position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%); width: 85%; height: 50px; background: rgba(0, 0, 0, 0.9); border: 1px solid #333; border-radius: 12px; display: flex; justify-content: space-around; align-items: center; z-index: 200; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #fff; font: bold 8px Arial; flex: 1; cursor: pointer; text-transform: uppercase; }
        .nav-item span { font-size: 18px; margin-bottom: 2px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; color: #fff; justify-content: center; align-items: center; }
        .modal-content { background: #1a1a1a; border: 2px solid #0f0; padding: 25px; border-radius: 20px; text-align: center; min-width: 280px; }
        .task-item { background: #222; border: 1px solid #444; border-radius: 10px; padding: 10px; margin: 10px 0; display: flex; justify-content: space-between; align-items: center; }
        .task-btn { background: #0f0; color: #000; border: none; padding: 6px 12px; border-radius: 5px; font-weight: bold; }
        #ad-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 3000; color: #fff; justify-content: center; align-items: center; flex-direction: column; }
    </style>
</head>
<body>

<div id="settings-btn" onclick="toggleModal('settings-modal')">⚙️</div>

<div id="ui">
    <div class="balance-container">
        <div class="balance-line">
            <span>💰</span> <span id="money">0.0000</span>
        </div>
        <div class="balance-line">
            <img src="logo..png" class="coin-mini"> <span id="frog-money">0</span>
        </div>
        <div class="energy-bar">
            ⚡ <span id="energy">100</span>/100
        </div>
        <div id="timer-display"><span id="txt-recovery">Восстановление</span>: <span id="time-left">03:00:00</span></div>
        <button id="ad-button" onclick="startAd()">📺 AD RECOVERY</button>
    </div>
</div>

<div id="settings-modal" class="modal">
    <div class="modal-content">
        <h3 id="txt-settings-title">НАСТРОЙКИ</h3>
        <button style="width:100%; padding:10px; margin:5px 0;" onclick="changeLanguage('ru')">РУССКИЙ</button>
        <button style="width:100%; padding:10px; margin:5px 0;" onclick="changeLanguage('en')">ENGLISH</button>
        <div style="margin-top:15px; color:#888; cursor:pointer;" onclick="toggleModal('settings-modal')" id="txt-close">Закрыть</div>
    </div>
</div>

<div id="tasks-modal" class="modal">
    <div class="modal-content">
        <h3 id="txt-tasks-title">ЗАДАНИЯ</h3>
        <div class="task-item">
            <div style="text-align:left"><div style="font-size:13px">AD WATCH</div><div style="font-size:10px; color:#0f0">+100 ⚡</div></div>
            <button class="task-btn" onclick="doAdTask()">GO</button>
        </div>
        <div style="margin-top:15px; color:#888; cursor:pointer;" onclick="toggleModal('tasks-modal')">Закрыть</div>
    </div>
</div>

<div id="ad-overlay">
    <h2 id="txt-ad-watching">WATCHING AD...</h2>
    <p id="ad-timer">5 sec.</p>
</div>

<div id="nav-bar">
    <div class="nav-item"><span>🛒</span><div>МАГАЗИН</div></div>
    <div class="nav-item" onclick="toggleModal('tasks-modal')"><span>📜</span><div>ЗАДАНИЯ</div></div>
    <div class="nav-item"><span>👥</span><div>ДРУЗЬЯ</div></div>
    <div class="nav-item" onclick="connectWallet()"><span>👛</span><div>КОШЕЛЕК</div></div>
</div>

<script>
// Переменные и настройки
const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
    manifestUrl: 'https://duhistiny6-source.github.io/pepe-pilot/tonconnect-manifest.json',
    buttonRootId: null
});

async function connectWallet() {
    try { await tonConnectUI.connectWallet(); alert("Connected!"); } catch (e) {}
}

function toggleModal(id) {
    const m = document.getElementById(id);
    m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
}

function updateUI() {
    document.getElementById('money').innerText = money.toFixed(4);
    document.getElementById('frog-money').innerText = frogMoney;
    document.getElementById('energy').innerText = energy;
    document.getElementById('timer-display').style.display = energy <= 0 ? 'block' : 'none';
    document.getElementById('ad-button').style.display = energy <= 0 ? 'block' : 'none';
}

const config = {
    type: Phaser.AUTO, width: window.innerWidth, height: window.innerHeight,
    physics: { default: 'arcade' }, scene: { preload, create, update }
};

const game = new Phaser.Game(config);
let plane, hook, rope, targets, isLaunching = false, isReturning = false, caughtItem = null;
let angle = 0, swingSpeed = 0.03, distance = 25, money = 0, frogMoney = 0, energy = 100, recoveryTime = 0;

const USDT_VALUE = 0.0005;
const FROG_VALUE = 10;

function preload() {
    this.load.image('sky', 'pg.jpeg');
    this.load.image('hook', 'kleshn.png');
    this.load.image('usdt', 'usdt.png');
    this.load.image('pilot_coin', 'logo..png');
    this.load.image('plane', 'pepe.png');
}

function create() {
    this.add.image(config.width/2, config.height/2, 'sky').setDisplaySize(config.width, config.height);
    targets = this.physics.add.group();
    for(let i=0; i<6; i++) spawn(this);
    rope = this.add.graphics().setDepth(5);
    hook = this.add.sprite(0,0,'hook').setDepth(50).setDisplaySize(60,60);
    this.physics.add.existing(hook);
    plane = this.add.image(config.width/2, 120, 'plane').setDisplaySize(280, 180).setDepth(60);

    this.input.on('pointerdown', (p) => {
        if (p.y > 100 && !isLaunching && !isReturning && energy > 0) {
            isLaunching = true; energy--; if(energy<=0) recoveryTime=10800; updateUI();
        }
    });

    this.physics.add.overlap(hook, targets, (h, item) => {
        if (isLaunching && !caughtItem) {
            caughtItem = item; caughtItem.body.enable = false;
            isLaunching = false; isReturning = true;
        }
    });
    setInterval(() => {
        if(recoveryTime > 0) {
            recoveryTime--;
            let h=Math.floor(recoveryTime/3600), m=Math.floor((recoveryTime%3600)/60), s=recoveryTime%60;
            document.getElementById('time-left').innerText = `${h}:${m}:${s}`;
            if(recoveryTime===0) { energy=100; updateUI(); }
        }
    }, 1000);
}

function spawn(scene) {
    let x = Phaser.Math.Between(50, config.width-50);
    let y = Phaser.Math.Between(config.height*0.45, config.height-150);
    let random = Phaser.Math.Between(1, 100);
    let key = random <= 60 ? 'pilot_coin' : 'usdt';
    let coin = targets.create(x, y, key).setDepth(40).setScale(0.12);
    coin.pulse = scene.tweens.add({ targets: coin, scale: 0.14, duration: 1000, yoyo: true, repeat: -1 });
}

function update() {
    plane.y = 120 + Math.sin(this.time.now / 600) * 8;
    let startX = plane.x - 5, startY = plane.y + 15;
    if (!isLaunching && !isReturning) {
        angle += swingSpeed; if (angle > 0.8 || angle < -0.8) swingSpeed *= -1;
    } else if (isLaunching) {
        distance += 16; if (distance > config.height - 110) { isLaunching = false; isReturning = true; }
    } else if (isReturning) {
        distance -= 6;
        if (distance <= 25) {
            isReturning = false;
            if (caughtItem) {
                if (caughtItem.texture.key === 'pilot_coin') frogMoney += FROG_VALUE;
                else money += USDT_VALUE;
                caughtItem.destroy(); caughtItem = null; spawn(this.scene.scene); updateUI();
            }
        }
    }
    hook.x = startX + Math.sin(angle) * distance;
    hook.y = startY + Math.cos(angle) * distance;
    hook.rotation = -angle;
    rope.clear().lineStyle(2, 0xffffff, 0.7).lineBetween(startX, startY, hook.x, hook.y);
    if (caughtItem) { caughtItem.x = hook.x; caughtItem.y = hook.y + 15; }
}

function startAd() {
    document.getElementById('ad-overlay').style.display='flex';
    let c=5; let i=setInterval(()=>{
        c--; document.getElementById('ad-timer').innerText=c+' sec.';
        if(c<=0){ clearInterval(i); document.getElementById('ad-overlay').style.display='none'; energy=100; recoveryTime=0; updateUI(); }
    },1000);
}
</script>
</body>
</html>
