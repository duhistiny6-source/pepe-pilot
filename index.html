<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pepe Hook Fixed</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; touch-action: none; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>
<script>
const config = {
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    physics: { default: 'arcade' },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);
let plane, hook, targets, scoreText;
let isLaunching = false, isReturning = false, caughtItem = null;
let score = 0;

// Настройки
const SPEED = 16; 
const START_Y = 150; 
const MIN_HEIGHT = 260; // Размер картинки в покое

function preload() {
    this.load.crossOrigin = 'anonymous';
    this.load.image('sky', 'pg.jpeg'); 
    this.load.image('pepe', 'pepe.png'); // Твой основной спрайт
    this.load.image('ton', 'ton.png');
    this.load.image('usdt', 'usdt.png');
    this.load.image('not', 'not.png');
    this.load.image('dogs', 'dogs.png');
}

function create() {
    // Фон
    let bg = this.add.image(config.width/2, config.height/2, 'sky');
    let scale = Math.max(config.width / bg.width, config.height / bg.height);
    bg.setScale(scale).setScrollFactor(0);

    // 1. САМОЛЕТ (Визуальная база)
    plane = this.add.image(config.width / 2, START_Y, 'pepe');
    plane.setDisplaySize(320, 280).setDepth(20);
    // Обрезаем только до самого самолета
    plane.setCrop(0, 0, 1000, 500); 

    // 2. КРЮК-ЦЕПЬ (Тот же спрайт, который будет расти)
    hook = this.add.sprite(config.width / 2, START_Y + 30, 'pepe');
    hook.setOrigin(0.5, 0).setDepth(10); // Растем ОТ самолета ВНИЗ
    hook.setDisplaySize(320, MIN_HEIGHT);

    // Физический сенсор на кончике клешни
    this.clawSensor = this.add.circle(0, 0, 35, 0xffffff, 0);
    this.physics.add.existing(this.clawSensor);

    // Монетки
    targets = this.physics.add.group();
    for(let i=0; i<8; i++) { spawnCoin(this); }

    scoreText = this.add.text(25, 25, 'SCORE: 0', { 
        fontSize: '32px', fill: '#0f0', fontFamily: 'Courier New', fontWeight: 'bold'
    }).setDepth(30);

    // Нажатие на экран
    this.input.on('pointerdown', () => { 
        if(!isLaunching && !isReturning) {
            isLaunching = true;
        }
    });

    // Определение столкновения
    this.physics.add.overlap(this.clawSensor, targets, (sensor, target) => {
        if (isLaunching && !caughtItem) { 
            caughtItem = target; 
            isLaunching = false; 
            isReturning = true; 
        }
    });
}

function spawnCoin(scene) {
    let x = Phaser.Math.Between(80, config.width - 80);
    let y = Phaser.Math.Between(config.height * 0.6, config.height - 100);
    let type = Phaser.Utils.Array.GetRandom(['ton', 'usdt', 'not', 'dogs']);
    let coin = targets.create(x, y, type);
    coin.setDisplaySize(80, 80).setOrigin(0.5).setDepth(5); 
    coin.body.setCircle(35); 
}

function update() {
    // Сенсор всегда на самом низу растянутой картинки
    this.clawSensor.x = hook.x;
    this.clawSensor.y = hook.y + hook.displayHeight * 0.8;

    if (isLaunching) {
        // Удлиняем картинку вниз
        hook.displayHeight += SPEED;
        
        // Предел длины (если промахнулись)
        if (this.clawSensor.y > config.height - 50) {
            isLaunching = false;
            isReturning = true;
        }
    } 
    else if (isReturning) {
        // Уменьшаем длину (подтягиваем)
        hook.displayHeight -= SPEED;
        
        if (caughtItem) { 
            caughtItem.x = this.clawSensor.x; 
            caughtItem.y = this.clawSensor.y; 
        }
        
        // Когда цепь вернулась в исходное состояние
        if (hook.displayHeight <= MIN_HEIGHT) {
            hook.displayHeight = MIN_HEIGHT;
            isReturning = false;
            
            if (caughtItem) { 
                score += 100; 
                scoreText.setText('SCORE: ' + score); 
                caughtItem.destroy(); 
                caughtItem = null; 
                spawnCoin(this); 
            }
        }
    }
}
</script>
</body>
</html>
