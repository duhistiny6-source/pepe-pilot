<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pepe Pilot Elite</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>body { margin: 0; background-color: #050505; overflow: hidden; touch-action: none; }</style>
</head>
<body>
<script>
const config = {
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    backgroundColor: '#050508',
    physics: { default: 'arcade' },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);
let plane, claw, chain, targets, scoreText;
let isLaunching = false, isReturning = false;
let angle = 0; 

// Настройки как в Moonbix
let swingSpeed = 0.015; 
let launchSpeed = 6;    
let returnSpeed = 0.1;
let scoreTON = 0;

function preload() {
    // Чистый фон космоса
    this.load.image('sky', 'https://labs.phaser.io/assets/skies/space3.png');
    
    // Логотипы крипты (Прозрачные PNG)
    this.load.image('ton', 'https://raw.githubusercontent.com/itgoldio/smart-contract-ton/master/images/ton_logo.png');
    this.load.image('not', 'https://cryptologos.cc/logos/notcoin-not-logo.png?v=032');
    this.load.image('dogs', 'https://coin-images.coingecko.com/coins/images/39531/large/dogs.png?1722931455');
    
    // Пепе (пока используем эту, но она будет одна и четкая)
    this.load.image('pepe', 'https://labs.phaser.io/assets/sprites/ship.png');
}

function create() {
    this.add.image(config.width/2, config.height/2, 'sky').setAlpha(0.4);
    
    // Главный герой
    plane = this.add.sprite(config.width / 2, 80, 'pepe').setScale(1.5).setDepth(3);
    
    // Клешня и цепь
    chain = this.add.graphics().setDepth(1);
    claw = this.add.circle(config.width / 2, 140, 12, 0xffd700).setDepth(2);
    
    targets = this.physics.add.group();
    const assets = ['ton', 'not', 'dogs'];
    
    // Создаем 12 крупных, аккуратно расставленных монет
    for(let i=0; i<12; i++) {
        let x = Phaser.Math.Between(60, config.width - 60);
        let y = Phaser.Math.Between(250, config.height - 120);
        
        // Проверка, чтобы не спавнились друг в друге
        if (this.physics.overlapCirc(x, y, 50).length === 0) {
            let type = Phaser.Math.RND.pick(assets);
            let coin = targets.create(x, y, type);
            coin.setDisplaySize(55, 55); // Крупный размер как в Moonbix
            coin.setData('val', type === 'ton' ? 0.05 : 0.01);
        }
    }

    scoreText = this.add.text(25, 25, 'SCORE: 0 TON', { 
        fontSize: '28px', 
        fill: '#00ff00', 
        fontStyle: 'bold',
        fontFamily: 'Arial Black'
    }).setDepth(10);

    this.input.on('pointerdown', () => { if(!isLaunching && !isReturning) isLaunching = true; });
}

function update() {
    if (!isLaunching && !isReturning) {
        angle += swingSpeed;
        if (angle > 0.9 || angle < -0.9) swingSpeed = -swingSpeed;
        claw.x = plane.x + Math.sin(angle) * 100;
        claw.y = plane.y + Math.cos(angle) * 100;
    } else if (isLaunching) {
        claw.x += Math.sin(angle) * launchSpeed;
        claw.y += Math.cos(angle) * launchSpeed;
        
        targets.children.iterate(child => {
            if (child && child.active && Phaser.Geom.Intersects.CircleToCircle(claw, child)) {
                scoreTON += child.getData('val');
                scoreText.setText('SCORE: ' + scoreTON.toFixed(2) + ' TON');
                child.destroy();
                isLaunching = false;
                isReturning = true;
            }
        });

        if (claw.y > config.height || claw.x < 0 || claw.x > config.width) {
            isLaunching = false;
            isReturning = true;
        }
    } else if (isReturning) {
        let tx = plane.x + Math.sin(angle) * 100;
        let ty = plane.y + Math.cos(angle) * 100;
        claw.x += (tx - claw.x) * returnSpeed;
        claw.y += (ty - claw.y) * returnSpeed;
        if (Phaser.Math.Distance.Between(claw.x, claw.y, tx, ty) < 5) isReturning = false;
    }

    chain.clear();
    chain.lineStyle(3, 0xaaaaaa, 0.6);
    chain.lineBetween(plane.x, plane.y, claw.x, claw.y);
}
</script>
</body>
</html>
