<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pepe Pilot Relax</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>body { margin: 0; background-color: #1a3c1a; overflow: hidden; }</style>
</head>
<body>
<script>
const config = {
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    backgroundColor: '#2d5a27',
    physics: { default: 'arcade' },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);
let plane, claw, chain, targets, scoreText;
let isLaunching = false;
let isReturning = false;
let angle = 0; 

// --- НАСТРОЙКИ СКОРОСТИ ---
let swingSpeed = 0.008; // Было 0.015. Теперь качается ОЧЕНЬ плавно.
let grabSpeed = 2.5;    // Было 4. Теперь летит в два раза медленнее.
// --------------------------

let scoreTON = 0;

function preload() {
    this.load.image('plane', 'https://labs.phaser.io/assets/sprites/tinified/ship.png');
}

function create() {
    plane = this.add.sprite(config.width / 2, 60, 'plane').setScale(1.2).setDepth(3);
    chain = this.add.graphics().setDepth(1);
    claw = this.add.circle(config.width / 2, 120, 15, 0xffd700).setDepth(2);
    
    targets = this.physics.add.group();
    const types = ['TON', 'DOGS', 'NOT', 'HAMSTER', 'USDT', 'BEAR'];
    
    for(let i=0; i<18; i++) {
        let x = Phaser.Math.Between(40, config.width - 40);
        let y = Phaser.Math.Between(220, config.height - 100);
        let coin = this.add.circle(x, y, 18, 0xffff00);
        let label = Phaser.Math.RND.pick(types);
        if(label === 'BEAR') coin.setFillStyle(0x8b4513);
        coin.setData('type', label);
        targets.add(coin);
        this.add.text(x-12, y-8, label, {fontSize: '9px', color: '#000', fontWeight: 'bold'});
    }

    scoreText = this.add.text(20, 20, 'Balance: 0 TON', { fontSize: '22px', fill: '#fff', fontStyle: 'bold' });
    this.input.on('pointerdown', () => { if(!isLaunching && !isReturning) isLaunching = true; });
}

function update() {
    if (!isLaunching && !isReturning) {
        angle += swingSpeed;
        if (angle > 0.8 || angle < -0.8) swingSpeed = -swingSpeed;
        claw.x = plane.x + Math.sin(angle) * 120;
        claw.y = plane.y + Math.cos(angle) * 120;
    } else if (isLaunching) {
        claw.x += Math.sin(angle) * grabSpeed;
        claw.y += Math.cos(angle) * grabSpeed;
        
        targets.children.iterate(child => {
            if (child && child.active && Phaser.Geom.Intersects.CircleToCircle(claw, child)) {
                let type = child.getData('type');
                if(type === 'BEAR') scoreTON -= 0.05;
                else if(type === 'TON') scoreTON += 0.001;
                scoreText.setText('Balance: ' + scoreTON.toFixed(3) + ' TON');
                child.destroy();
                isLaunching = false;
                isReturning = true;
            }
        });

        if (claw.y > config.height || claw.x < 0 || claw.x > config.width) {
            isLaunching = false;
            isReturning = true;
        }
    } else if (isReturning) {
        let targetX = plane.x + Math.sin(angle) * 120;
        let targetY = plane.y + Math.cos(angle) * 120;
        let dx = targetX - claw.x;
        let dy = targetY - claw.y;
        let dist = Math.sqrt(dx*dx + dy*dy);
        
        if (dist > 5) {
            claw.x += dx * 0.15; // Скорость возврата чуть быстрее вылета
            claw.y += dy * 0.15;
        } else {
            isReturning = false;
        }
    }

    chain.clear();
    chain.lineStyle(4, 0xaaaaaa);
    chain.lineBetween(plane.x, plane.y, claw.x, claw.y);
}
</script>
</body>
</html>
