<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pepe Hook Master</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; touch-action: none; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>
<script>
const config = {
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    physics: { default: 'arcade' },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);
let plane, targets, scoreText;
let isLaunching = false, isReturning = false, caughtItem = null;
let baseHeight = 260; // Начальная высота спрайта
let currentHeight = 260; 
let extendSpeed = 15; 
let score = 0;

function preload() {
    this.load.crossOrigin = 'anonymous';
    this.load.image('sky', 'pg.jpeg'); 
    this.load.image('pepe', 'pepe.png'); // Твой спрайт
    this.load.image('ton', 'ton.png');
    this.load.image('usdt', 'usdt.png');
    this.load.image('not', 'not.png');
    this.load.image('dogs', 'dogs.png');
}

function create() {
    // Фон
    let bg = this.add.image(config.width/2, config.height/2, 'sky');
    let scale = Math.max(config.width / bg.width, config.height / bg.height);
    bg.setScale(scale).setScrollFactor(0);

    // САМОЛЕТ С ЦЕПЬЮ
    // Origin ставим в начало самолета (0.1), чтобы при изменении высоты росла только цепь вниз
    plane = this.add.sprite(config.width / 2, 150, 'pepe');
    plane.setOrigin(0.5, 0.1).setDepth(10);
    plane.setDisplaySize(300, baseHeight);

    // Невидимый сенсор для сбора монет
    this.clawSensor = this.add.circle(0, 0, 35, 0xffffff, 0);
    this.physics.add.existing(this.clawSensor);

    // Монетки
    targets = this.physics.add.group();
    for(let i=0; i<8; i++) { spawnCoin(this); }

    scoreText = this.add.text(25, 25, 'SCORE: 0', { 
        fontSize: '32px', fill: '#0f0', fontFamily: 'Courier New', fontWeight: 'bold',
        stroke: '#000', strokeThickness: 5
    }).setDepth(30);

    this.input.on('pointerdown', () => { 
        if(!isLaunching && !isReturning) isLaunching = true; 
    });

    this.physics.add.overlap(this.clawSensor, targets, (sensor, target) => {
        if (isLaunching && !caughtItem) { 
            caughtItem = target; 
            isLaunching = false; 
            isReturning = true; 
            if (window.navigator.vibrate) window.navigator.vibrate(50); 
        }
    });
}

function spawnCoin(scene) {
    let x = Phaser.Math.Between(80, config.width - 80);
    let y = Phaser.Math.Between(config.height * 0.65, config.height - 100);
    let type = Phaser.Utils.Array.GetRandom(['ton', 'usdt', 'not', 'dogs']);
    let coin = targets.create(x, y, type);
    coin.setDisplaySize(80, 80).setOrigin(0.5).setDepth(5); 
    coin.body.setCircle(35); 
}

function update() {
    // Сенсор всегда на самом кончике вытянутой картинки
    this.clawSensor.x = plane.x;
    this.clawSensor.y = plane.y + (plane.displayHeight * 0.85);

    if (!isLaunching && !isReturning) {
        // Самолет просто парит (небольшое покачивание по X для живости)
        plane.x = config.width / 2 + Math.sin(this.time.now / 600) * 5;
        currentHeight = baseHeight;
    } 
    else if (isLaunching) {
        // Увеличиваем высоту спрайта (цепь растет вниз)
        currentHeight += extendSpeed;
        plane.setDisplaySize(300, currentHeight);
        
        if (this.clawSensor.y > config.height - 50) {
            isLaunching = false; isReturning = true;
        }
    } 
    else if (isReturning) {
        // Уменьшаем высоту спрайта (цепь втягивается назад)
        currentHeight -= extendSpeed * 0.8;
        plane.setDisplaySize(300, currentHeight);
        
        if (caughtItem) { 
            caughtItem.x = this.clawSensor.x; 
            caughtItem.y = this.clawSensor.y; 
        }
        
        if (currentHeight <= baseHeight) {
            currentHeight = baseHeight;
            plane.setDisplaySize(300, baseHeight);
            isReturning = false;
            if (caughtItem) { 
                score += 100; scoreText.setText('SCORE: ' + score); 
                caughtItem.destroy(); caughtItem = null; spawnCoin(this); 
            }
        }
    }
}
</script>
</body>
</html>
