<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pepe Pilot: Crypto Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        body { margin:0; overflow:hidden; background:#000; touch-action: none; font-family: Arial, sans-serif; }
        
        /* Кнопка-мешочек (Баланс) */
        #balance-trigger { 
            position: fixed; top: 12px; left: 12px; z-index: 100; 
            background: rgba(0, 0, 0, 0.6); border: 1px solid #0f0; 
            border-radius: 50%; width: 50px; height: 50px; 
            display: flex; justify-content: center; align-items: center; 
            font-size: 24px; cursor: pointer; pointer-events: auto;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.3);
        }

        #energy-display {
            position: fixed; top: 65px; left: 15px; z-index: 100;
            color: #fff; font-weight: bold; font-size: 14px; text-shadow: 1px 1px 2px #000;
        }

        /* Окно баланса */
        .balance-modal-content {
            background: #1a1a1a; border: 2px solid #0f0; 
            padding: 20px; border-radius: 20px; text-align: center;
            min-width: 250px;
        }
        .balance-item { 
            display: flex; align-items: center; justify-content: center; 
            gap: 10px; font-size: 22px; margin: 15px 0; color: #0f0; font-weight: bold;
        }
        .coin-mini { width: 30px; height: 30px; }

        /* Общие стили модалок */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; color: #fff; justify-content: center; align-items: center; flex-direction: column; }
        
        #settings-btn { position: fixed; top: 12px; right: 12px; font-size: 28px; cursor: pointer; z-index: 1001; }
        #nav-bar { position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%); width: 85%; height: 50px; background: rgba(0, 0, 0, 0.9); border: 1px solid #333; border-radius: 12px; display: flex; justify-content: space-around; align-items: center; z-index: 200; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #fff; font-size: 8px; font-weight: bold; text-transform: uppercase; flex: 1; }
        .nav-item span { font-size: 18px; }
        #ad-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 3000; color: #fff; justify-content: center; align-items: center; flex-direction: column; }
    </style>
</head>
<body>

<div id="balance-trigger" onclick="toggleModal('balance-modal')">💰</div>
<div id="energy-display">⚡ <span id="energy">100</span>/100</div>

<div id="settings-btn" onclick="toggleModal('settings-modal')">⚙️</div>

<div id="balance-modal" class="modal">
    <div class="balance-modal-content">
        <h2 style="color: #fff; margin-bottom: 20px;">ВАШ БАЛАНС</h2>
        <div class="balance-item">
            <span>💰</span> <span id="money-modal">0.0000</span> <span style="font-size: 12px; color: #888;">USDT</span>
        </div>
        <div class="balance-item">
            <img src="logo..png" class="coin-mini"> <span id="frog-money-modal">0</span> <span style="font-size: 12px; color: #888;">FROG</span>
        </div>
        <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">
        <div style="color:#888; cursor:pointer;" onclick="toggleModal('balance-modal')">ЗАКРЫТЬ</div>
    </div>
</div>

<div id="settings-modal" class="modal">
    <div class="modal-content">
        <h3>НАСТРОЙКИ</h3>
        <button style="width:100%; padding:10px; margin:5px 0;" onclick="changeLanguage('ru')">РУССКИЙ</button>
        <button style="width:100%; padding:10px; margin:5px 0;" onclick="changeLanguage('en')">ENGLISH</button>
        <div style="margin-top:15px; color:#888; cursor:pointer;" onclick="toggleModal('settings-modal')">Закрыть</div>
    </div>
</div>

<div id="ad-overlay">
    <h2>СМОТРИМ РЕКЛАМУ...</h2>
    <p id="ad-timer">5 сек.</p>
</div>

<div id="nav-bar">
    <div class="nav-item"><span>🛒</span><div>МАГАЗИН</div></div>
    <div class="nav-item"><span>📜</span><div>ЗАДАНИЯ</div></div>
    <div class="nav-item"><span>👥</span><div>ДРУЗЬЯ</div></div>
    <div class="nav-item" onclick="connectWallet()"><span>👛</span><div>КОШЕЛЕК</div></div>
</div>

<script>
// Глобальные переменные
let money = 0, frogMoney = 0, energy = 100, recoveryTime = 0;
const USDT_VALUE = 0.0005, FROG_VALUE = 10;

// Звуковой контекст
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playBeep(freq, dur) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.frequency.value = freq; osc.type = 'sine';
    gain.gain.setValueAtTime(0.005, audioCtx.currentTime); 
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
    osc.start(); osc.stop(audioCtx.currentTime + dur);
}

// Функции UI
function toggleModal(id) {
    const m = document.getElementById(id);
    m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
}

function updateUI() {
    document.getElementById('money-modal').innerText = money.toFixed(4);
    document.getElementById('frog-money-modal').innerText = frogMoney;
    document.getElementById('energy').innerText = energy;
}

// Phaser Игра
const config = {
    type: Phaser.AUTO, width: window.innerWidth, height: window.innerHeight,
    physics: { default: 'arcade' }, scene: { preload, create, update }
};

const game = new Phaser.Game(config);
let plane, hook, rope, targets, bgMusic, isLaunching = false, isReturning = false, caughtItem = null;
let angle = 0, swingSpeed = 0.03, distance = 25;

function preload() {
    this.load.image('sky', 'pg.jpeg');
    this.load.image('hook', 'kleshn.png');
    this.load.image('usdt', 'usdt.png');
    this.load.image('pilot_coin', 'logo..png');
    this.load.image('plane', 'pepe.png');
    this.load.audio('theme', 'music.mp3');
}

function create() {
    this.add.image(config.width/2, config.height/2, 'sky').setDisplaySize(config.width, config.height);
    try { bgMusic = this.sound.add('theme', { volume: 0.004, loop: true }); } catch (e) {}
    this.input.once('pointerdown', () => { if (bgMusic && !bgMusic.isPlaying) bgMusic.play(); });

    targets = this.physics.add.group();
    for(let i=0; i<6; i++) spawn(this);

    rope = this.add.graphics().setDepth(5);
    hook = this.add.sprite(0, 0, 'hook').setDepth(50).setDisplaySize(60, 60);
    this.physics.add.existing(hook);
    plane = this.add.image(config.width/2, 120, 'plane').setDisplaySize(280, 180).setDepth(60);

    this.input.on('pointerdown', (p) => {
        // Проверка чтобы не стрелять при открытых окнах
        if (document.querySelector('.modal[style*="flex"]')) return;
        
        if (p.y > 100 && !isLaunching && !isReturning && energy > 0) {
            isLaunching = true; energy--; updateUI();
        }
    });

    this.physics.add.overlap(hook, targets, (h, item) => {
        if (isLaunching && !caughtItem) {
            caughtItem = item; caughtItem.body.enable = false;
            playBeep(400, 0.08);
            isLaunching = false; isReturning = true;
        }
    });
}

function spawn(scene) {
    let x = Phaser.Math.Between(50, config.width-50);
    let y = Phaser.Math.Between(config.height*0.45, config.height-150);
    let key = Phaser.Math.Between(1, 100) <= 60 ? 'pilot_coin' : 'usdt';
    let coin = targets.create(x, y, key).setDepth(40).setScale(0.12);
    coin.pulse = scene.tweens.add({ targets: coin, scale: 0.14, duration: 1000, yoyo: true, repeat: -1 });
}

function update() {
    plane.y = 120 + Math.sin(this.time.now / 600) * 8;
    let startX = plane.x - 5, startY = plane.y + 15;

    if (!isLaunching && !isReturning) {
        angle += swingSpeed; if (angle > 0.8 || angle < -0.8) swingSpeed *= -1;
    } else if (isLaunching) {
        distance += 16; if (distance > config.height - 110) { isLaunching = false; isReturning = true; }
    } else if (isReturning) {
        distance -= 6;
        if (distance <= 25) {
            isReturning = false;
            if (caughtItem) {
                if (caughtItem.texture.key === 'pilot_coin') frogMoney += FROG_VALUE;
                else money += USDT_VALUE;
                playBeep(900, 0.12);
                caughtItem.destroy(); caughtItem = null; spawn(this.scene.scene); updateUI();
            }
        }
    }

    hook.x = startX + Math.sin(angle) * distance;
    hook.y = startY + Math.cos(angle) * distance;
    hook.rotation = -angle;

    // Нить
    rope.clear().lineStyle(2, 0xffffff, 0.7).lineBetween(startX, startY, hook.x, hook.y);
    if (caughtItem) { caughtItem.x = hook.x; caughtItem.y = hook.y + 15; caughtItem.rotation = hook.rotation; }
}

function connectWallet() { alert("Connecting TON..."); }
</script>
</body>
</html>
