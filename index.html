<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pepe Pilot: Crypto Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        body { margin:0; overflow:hidden; background:#000; touch-action: none; font-family: Arial, sans-serif; }
        #ui { position:fixed; top:12px; left:12px; color:#0f0; font-weight:bold; z-index: 100; pointer-events: none; text-shadow: 1px 1px 2px #000; display: flex; flex-direction: column; gap: 8px; }
        
        /* Стили для кликабельных элементов баланса */
        .balance-item { 
            display: flex; 
            align-items: center; 
            gap: 5px; 
            font-size: 18px; 
            pointer-events: auto; /* Делаем мешочек и монету нажимаемыми */
            cursor: pointer;
            transition: transform 0.1s;
        }
        .balance-item:active { transform: scale(1.1); }
        .coin-icon { width: 22px; height: 22px; vertical-align: middle; }
        
        #timer-display { color: #ff3333; font-size: 13px; display: none; }
        #ad-button { display: none; pointer-events: auto; background: #ffcc00; color: #000; border: 1px solid #fff; padding: 4px 8px; font-size: 11px; font-weight: bold; border-radius: 4px; cursor: pointer; width: fit-content; margin-top: 5px; }
        #settings-btn { position: fixed; top: 12px; right: 12px; font-size: 28px; cursor: pointer; z-index: 1001; filter: drop-shadow(1px 1px 2px #000); }
        
        #nav-bar { position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%); width: 85%; height: 50px; background: rgba(0, 0, 0, 0.9); border: 1px solid #333; border-radius: 12px; display: flex; justify-content: space-around; align-items: center; z-index: 200; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #fff; font-weight: bold; flex: 1; opacity: 0.9; cursor: pointer; }
        .nav-item span { font-size: 18px; }
        .nav-text { font-size: 8px; margin-top: 1px; color: #bbb; text-transform: uppercase; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; color: #fff; justify-content: center; align-items: center; flex-direction: column; }
        .modal-content { background: #1a1a1a; border: 2px solid #0f0; padding: 25px; border-radius: 20px; text-align: center; min-width: 280px; max-width: 90%; }
        
        .task-item { background: #222; border: 1px solid #444; border-radius: 10px; padding: 10px; margin: 10px 0; display: flex; justify-content: space-between; align-items: center; }
        .task-info { text-align: left; }
        .task-title { font-size: 13px; font-weight: bold; color: #fff; }
        .task-reward { font-size: 11px; color: #0f0; }
        
        .lang-btn { background: #333; color: #0f0; border: 1px solid #0f0; padding: 12px 20px; margin: 10px 0; cursor: pointer; border-radius: 10px; font-weight: bold; width: 100%; }
        #ad-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 3000; color: #fff; justify-content: center; align-items: center; flex-direction: column; }
    </style>
</head>
<body>

<div id="settings-btn" onclick="toggleModal('settings-modal')">⚙️</div>

<div id="ui">
    <div class="balance-item" onclick="showFullBalance()">💰 <span id="money">0.0000</span></div>
    <div class="balance-item" onclick="showFullBalance()">
        <img src="logo..png" class="coin-icon"> <span id="frog-money">0</span>
    </div>
    <div>⚡ <span id="energy">100</span>/100</div>
    <div id="timer-display"><span id="txt-recovery">Восстановление</span>: <span id="time-left">03:00:00</span></div>
    <button id="ad-button" onclick="startAd()">📺 СМОТРЕТЬ РЕКЛАМУ</button>
</div>

<div id="balance-modal" class="modal">
    <div class="modal-content">
        <h3 id="txt-balance-title">МОИ МОНЕТЫ</h3>
        
        <div class="task-item">
            <div class="task-info">
                <div class="task-title">Frog Pilot</div>
                <div class="task-reward" style="font-size: 20px;"><span id="modal-frog">0</span> 🐸</div>
            </div>
        </div>

        <div class="task-item">
            <div class="task-info">
                <div class="task-title">USDT Balance</div>
                <div class="task-reward" style="font-size: 20px;">$<span id="modal-usdt">0.0000</span></div>
            </div>
        </div>

        <div style="margin-top:15px; color:#0f0; font-weight:bold; cursor:pointer;" onclick="toggleModal('balance-modal')">ОТЛИЧНО!</div>
    </div>
</div>

<div id="settings-modal" class="modal">
    <div class="modal-content">
        <h3 id="txt-settings-title">НАСТРОЙКИ</h3>
        <button class="lang-btn" onclick="changeLanguage('ru')">РУССКИЙ</button>
        <button class="lang-btn" onclick="changeLanguage('en')">ENGLISH</button>
        <div style="margin-top:15px; color:#888; cursor:pointer;" onclick="toggleModal('settings-modal')">Закрыть</div>
    </div>
</div>

<div id="tasks-modal" class="modal">
    <div class="modal-content">
        <h3 id="txt-tasks-title">ЗАДАНИЯ</h3>
        <div class="task-item">
            <div class="task-info">
                <div class="task-title">Посмотреть рекламу</div>
                <div class="task-reward">+100 ⚡ Энергии</div>
            </div>
            <button class="task-btn" onclick="doAdTask()">📺 СМОТРЕТЬ</button>
        </div>
        <div style="margin-top:15px; color:#888; cursor:pointer;" onclick="toggleModal('tasks-modal')">Закрыть</div>
    </div>
</div>

<div id="ad-overlay">
    <h2 id="txt-ad-watching">СМОТРИМ РОЛИК...</h2>
    <p id="ad-timer">Осталось: 5 сек.</p>
</div>

<div id="nav-bar">
    <div class="nav-item"><span>🛒</span><div class="nav-text" id="nav-shop">МАГАЗИН</div></div>
    <div class="nav-item" onclick="toggleModal('tasks-modal')"><span>📜</span><div class="nav-text" id="nav-tasks">ЗАДАНИЯ</div></div>
    <div class="nav-item"><span>👥</span><div class="nav-text" id="nav-friends">ДРУЗЬЯ</div></div>
    <div class="nav-item" onclick="connectWallet()"><span>👛</span><div class="nav-text" id="nav-wallet">КОШЕЛЕК</div></div>
</div>

<script>
// --- Основные переменные ---
let money = 0, frogMoney = 0, energy = 100, recoveryTime = 0;
const USDT_VALUE = 0.0005, FROG_VALUE = 10;

// Функция для показа баланса при нажатии на мешочек
function showFullBalance() {
    document.getElementById('modal-frog').innerText = frogMoney;
    document.getElementById('modal-usdt').innerText = money.toFixed(4);
    toggleModal('balance-modal');
}

function toggleModal(id) {
    const m = document.getElementById(id);
    m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
}

const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
    manifestUrl: 'https://duhistiny6-source.github.io/pepe-pilot/tonconnect-manifest.json',
    buttonRootId: null
});

async function connectWallet() {
    try { await tonConnectUI.connectWallet(); alert("Кошелек успешно подключен!"); } catch (e) { console.error(e); }
}

function startAd() {
    document.getElementById('ad-overlay').style.display = 'flex';
    let c = 5;
    let i = setInterval(() => {
        c--; document.getElementById('ad-timer').innerText = `Осталось: ${c} сек.`;
        if (c <= 0) { clearInterval(i); document.getElementById('ad-overlay').style.display = 'none'; energy = 100; updateUI(); }
    }, 1000);
}

function doAdTask() { toggleModal('tasks-modal'); startAd(); }

// --- Phaser игра ---
const config = {
    type: Phaser.AUTO, width: window.innerWidth, height: window.innerHeight,
    physics: { default: 'arcade' }, scene: { preload, create, update }
};
const game = new Phaser.Game(config);
let plane, hook, rope, targets, isLaunching = false, isReturning = false, caughtItem = null;
let angle = 0, swingSpeed = 0.03, distance = 25;

function preload() {
    this.load.image('sky', 'pg.jpeg');
    this.load.image('hook', 'kleshn.png');
    this.load.image('usdt', 'usdt.png');
    this.load.image('pilot_coin', 'logo..png');
    this.load.image('plane', 'pepe.png');
}

function create() {
    this.add.image(config.width / 2, config.height / 2, 'sky').setDisplaySize(config.width, config.height);
    targets = this.physics.add.group();
    for(let i = 0; i < 6; i++) spawn(this);
    rope = this.add.graphics().setDepth(5);
    hook = this.add.sprite(0, 0, 'hook').setDepth(50).setDisplaySize(60, 60); 
    this.physics.add.existing(hook);
    plane = this.add.image(config.width / 2, 120, 'plane').setDisplaySize(280, 180).setDepth(60);

    this.input.on('pointerdown', (p) => {
        // Чтобы не стрелять крюком, если нажали на баланс или кнопки
        if (p.y < 130 || p.y > config.height - 80) return;
        if (!isLaunching && !isReturning && energy > 0) {
            isLaunching = true; energy--; updateUI();
        }
    });

    this.physics.add.overlap(hook, targets, (h, item) => {
        if (isLaunching && !caughtItem) {
            caughtItem = item; caughtItem.body.enable = false;
            isLaunching = false; isReturning = true;
        }
    });
}

function spawn(scene) {
    let x = Phaser.Math.Between(50, config.width - 50);
    let y = Phaser.Math.Between(config.height * 0.45, config.height - 150);
    let key = (Phaser.Math.Between(1, 100) <= 60) ? 'pilot_coin' : 'usdt';
    let coin = targets.create(x, y, key).setDepth(40).setScale(0.12);
}

function update() {
    plane.y = 120 + Math.sin(this.time.now / 600) * 8;
    if (!isLaunching && !isReturning) {
        angle += swingSpeed; if (angle > 0.8 || angle < -0.8) swingSpeed *= -1;
    } else if (isLaunching) {
        distance += 16; if (distance > config.height - 110) { isLaunching = false; isReturning = true; }
    } else if (isReturning) {
        distance -= 8; 
        if (distance <= 25) {
            isReturning = false;
            if (caughtItem) {
                if (caughtItem.texture.key === 'pilot_coin') frogMoney += FROG_VALUE;
                else money += USDT_VALUE;
                caughtItem.destroy(); caughtItem = null; spawn(this.scene.scene); updateUI();
            }
        }
    }
    hook.x = plane.x - 5 + Math.sin(angle) * distance;
    hook.y = plane.y + 15 + Math.cos(angle) * distance;
    hook.rotation = -angle;
    rope.clear().lineStyle(2, 0xffffff, 0.7).lineBetween(plane.x - 5, plane.y + 15, hook.x, hook.y);
    if (caughtItem) { caughtItem.x = hook.x; caughtItem.y = hook.y + 15; }
}

function updateUI() {
    document.getElementById('money').innerText = money.toFixed(4);
    document.getElementById('frog-money').innerText = frogMoney;
    document.getElementById('energy').innerText = energy;
}
</script>
</body>
</html>
