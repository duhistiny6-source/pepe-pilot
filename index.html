<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pepe Pilot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        body { margin:0; padding:0; overflow:hidden; background:#000; touch-action: none; font-family: sans-serif; }
        #top-bar { position: fixed; top: 0; left: 0; width: 100%; height: 50px; background: rgba(0,0,0,0.4); z-index: 1000; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; box-sizing: border-box; }
        
        #energy-section { display: flex; align-items: center; min-width: 60px; }
        #energy-active { color: #0f0; font-size: 14px; font-weight: bold; }
        #energy-depleted { display: none; flex-direction: column; align-items: flex-start; }
        #energy-timer { color: #aaa; font-size: 8px; font-family: monospace; line-height: 1; }
        #ad-btn { background: #ffcc00; color: #000; font-size: 7px; padding: 1px 4px; border-radius: 3px; font-weight: bold; cursor: pointer; border: 1px solid #fff; margin-top: 1px; }

        #balance-section { display: flex; gap: 15px; color: #fff; font-size: 12px; font-weight: bold; }
        #settings-btn { font-size: 20px; cursor: pointer; color: #fff; opacity: 0.8; }
        
        #nav-bar { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); width: 90%; height: 55px; background: rgba(0,0,0,0.9); border-radius: 15px; display: flex; justify-content: space-around; align-items: center; z-index: 500; border: 1px solid #333; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #fff; cursor: pointer; }
        .nav-text { font-size: 8px; color: #bbb; margin-top: 2px; font-weight: bold; text-transform: uppercase; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: #1a1a1a; border: 2px solid #0f0; padding: 20px; border-radius: 20px; text-align: center; width: 85%; color: #fff; }
        .lot { background: #222; border: 1px solid #444; border-radius: 12px; padding: 10px; margin: 10px 0; display: flex; align-items: center; justify-content: space-between; }
        .buy-btn { background: #0f0; color: #000; border: none; padding: 6px 12px; border-radius: 6px; font-weight: bold; }
    </style>
</head>
<body>

<div id="top-bar">
    <div id="energy-section">
        <div id="energy-active">⚡ <span id="en-val">100</span></div>
        <div id="energy-depleted">
            <div id="energy-timer">02:00:00</div>
            <div id="ad-btn" onclick="watchAd()">AD ⚡</div>
        </div>
    </div>
    <div id="balance-section">
        <div>USDT: <span id="money" style="color:#0f0">0.00004</span></div>
        <div>PLT: <span id="frog-money" style="color:#ffcc00">3</span></div>
    </div>
    <div id="settings-btn" onclick="toggleModal('settings-modal')">⚙️</div>
</div>

<div id="nav-bar">
    <div class="nav-item" onclick="toggleModal('shop-modal')"><span>🛒</span><div class="nav-text">АНГАР</div></div>
    <div class="nav-item"><span>📜</span><div class="nav-text">ЗАДАНИЯ</div></div>
    <div class="nav-item"><span>👥</span><div class="nav-text">ДРУЗЬЯ</div></div>
    <div class="nav-item" onclick="connectWallet()"><span>👛</span><div class="nav-text">КОШЕЛЕК</div></div>
</div>

<div id="settings-modal" class="modal"><div class="modal-content">
    <h3>SETTINGS / НАСТРОЙКИ</h3>
    <button onclick="setLang('ru')" style="width:100%; padding:10px; margin-bottom:5px;">РУССКИЙ</button>
    <button onclick="setLang('en')" style="width:100%; padding:10px;">ENGLISH</button>
    <p onclick="toggleModal('settings-modal')" style="cursor:pointer; color:#888; margin-top:15px;">Close</p>
</div></div>

<div id="shop-modal" class="modal"><div class="modal-content">
    <h3>АНГАР</h3>
    <div class="lot"><img src="plane_copper.png" width="40"><div><b>МЕДНЫЙ</b><br><small>+5 PLT | +0.00005 USDT</small></div><button class="buy-btn" onclick="pay(10)">10T</button></div>
    <div class="lot"><img src="plane_bronze.png" width="40"><div><b>БРОНЗОВЫЙ</b><br><small>+10 PLT | +0.0001 USDT</small></div><button class="buy-btn" onclick="pay(25)">25T</button></div>
    <div class="lot"><img src="plane_gold.png" width="40"><div><b>ЗОЛОТОЙ</b><br><small>+25 PLT | +0.001 USDT</small></div><button class="buy-btn" onclick="pay(50)">50T</button></div>
    <p onclick="toggleModal('shop-modal')" style="cursor:pointer; color:#888;">Закрыть</p>
</div></div>

<script>
    window.energy = 100; window.plt = 3; window.usdt = 0.00004;
    const MY_WALLET = "UQBZ-j9v-Y20h8yrtlahvFOTvaTK8rR1577NBZjK1GKE16_V";
    const tg = window.Telegram.WebApp; tg.expand();

    function updateUI() {
        document.getElementById('en-val').innerText = window.energy;
        document.getElementById('frog-money').innerText = window.plt;
        document.getElementById('money').innerText = window.usdt.toFixed(5);
        if(window.energy <= 0) {
            document.getElementById('energy-active').style.display = 'none';
            document.getElementById('energy-depleted').style.display = 'flex';
        } else {
            document.getElementById('energy-active').style.display = 'block';
            document.getElementById('energy-depleted').style.display = 'none';
        }
    }

    function watchAd() { window.energy = 100; updateUI(); }
    function toggleModal(id) { let m = document.getElementById(id); m.style.display = (m.style.display === 'flex') ? 'none' : 'flex'; }
    async function connectWallet() { /* TonConnect logic here */ }

    // --- PHASER ENGINE ---
    const config = { type: Phaser.AUTO, width: window.innerWidth, height: window.innerHeight, physics: { default: 'arcade' }, scene: { preload, create, update } };
    const game = new Phaser.Game(config);
    let plane, hook, rope, targets, bgMusic, beep, isLaunching = false, isReturning = false, caughtItem = null;
    let angle = 0, swingSpeed = 0.02, distance = 25;

    function preload() {
        this.load.image('sky', 'pg.jpeg'); this.load.image('hook', 'kleshn.png');
        this.load.image('usdt', 'usdt.png'); this.load.image('plt', 'logo..png');
        this.load.image('plane', 'pepe.png');
        this.load.audio('music', 'music.mp3'); this.load.audio('beep', 'beep.mp3');
    }

    function create() {
        this.add.image(config.width/2, config.height/2, 'sky').setDisplaySize(config.width, config.height);
        try { 
            bgMusic = this.sound.add('music', { volume: 0.05, loop: true }); 
            beep = this.sound.add('beep', { volume: 0.4 });
        } catch(e){}

        targets = this.physics.add.group();
        for(let i=0; i<6; i++) spawnItem(this);

        rope = this.add.graphics();
        hook = this.add.sprite(0, 0, 'hook').setDisplaySize(60, 60).setDepth(10);
        this.physics.add.existing(hook);
        plane = this.add.image(config.width/2, 120, 'plane').setDisplaySize(260, 170).setDepth(5);

        this.physics.add.overlap(hook, targets, (h, item) => {
            if (isLaunching && !caughtItem) {
                caughtItem = item; item.body.enable = false;
                isLaunching = false; isReturning = true;
                if(beep) beep.play(); // Звук захвата
            }
        });

        this.input.on('pointerdown', () => {
            if (!isLaunching && !isReturning && window.energy > 0) {
                isLaunching = true; window.energy--; updateUI();
                if(bgMusic && !bgMusic.isPlaying) bgMusic.play();
            }
        });
    }

    function spawnItem(scene) {
        let x = Phaser.Math.Between(50, config.width - 50);
        let y = Phaser.Math.Between(config.height * 0.5, config.height - 150);
        let type = (Math.random() > 0.7) ? 'plt' : 'usdt';
        let item = targets.create(x, y, type).setScale(0.12);
        scene.tweens.add({ targets: item, scale: 0.14, duration: 800, yoyo: true, repeat: -1 });
    }

    function update() {
        plane.y = 120 + Math.sin(this.time.now / 600) * 5;
        let startX = plane.x, startY = plane.y + 20;

        if (!isLaunching && !isReturning) {
            angle += swingSpeed; if (angle > 0.5 || angle < -0.5) swingSpeed *= -1;
        } else if (isLaunching) {
            distance += 12; if (distance > config.height - 120) { isLaunching = false; isReturning = true; }
        } else if (isReturning) {
            distance -= 4; 
            if (distance <= 25) {
                isReturning = false;
                if (caughtItem) {
                    // ЦИФРЫ ВЫЛЕТАЮТ ПРИ УДАРЕ ОБ САМОЛЕТ (ДОСТАВКА)
                    let isP = caughtItem.texture.key === 'plt';
                    let txt = this.add.text(plane.x, plane.y, isP ? "+1 PLT" : "+0.00001 USDT", {
                        fontSize:'22px', fill: isP?'#ffcc00':'#0f0', fontWeight:'bold', stroke: '#000', strokeThickness: 3
                    }).setOrigin(0.5);
                    this.tweens.add({targets: txt, y: plane.y - 100, alpha: 0, duration: 1000, onComplete: () => txt.destroy()});
                    
                    if(isP) window.plt += 1; else window.usdt += 0.00001;
                    updateUI(); caughtItem.destroy(); caughtItem = null; spawnItem(this);
                }
            }
        }
        hook.x = startX + Math.sin(angle) * distance;
        hook.y = startY + Math.cos(angle) * distance;
        hook.rotation = -angle;
        rope.clear().lineStyle(2, 0xffffff, 0.5).lineBetween(startX, startY, hook.x, hook.y);
        if (caughtItem) { caughtItem.x = hook.x; caughtItem.y = hook.y + 10; }
    }
</script>
</body>
</html>
