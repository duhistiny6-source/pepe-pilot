<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pepe Hook Only</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; touch-action: none; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>
<script>
const config = {
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    physics: { default: 'arcade' },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);
let plane, hook, targets, scoreText;
let isLaunching = false, isReturning = false, caughtItem = null;
let angle = 0, swingSpeed = 0.04, score = 0;

const HOOK_SPEED = 22; 
const PLANE_Y = 160; 

function preload() {
    this.load.crossOrigin = 'anonymous';
    this.load.image('sky', 'pg.jpeg'); 
    this.load.image('pepe', 'pepe.png'); //
    this.load.image('ton', 'ton.png');
    this.load.image('usdt', 'usdt.png');
    this.load.image('not', 'not.png');
    this.load.image('dogs', 'dogs.png');
}

function create() {
    // Фон
    this.add.image(config.width/2, config.height/2, 'sky').setDisplaySize(config.width, config.height);

    // 1. САМОЛЕТ (Неподвижен)
    plane = this.add.image(config.width / 2, PLANE_Y, 'pepe');
    plane.setDisplaySize(300, 260).setDepth(30);
    plane.setCrop(0, 0, 1000, 480); // Отрезаем всё лишнее снизу

    // 2. КЛЕШНЯ (Единственный активный объект)
    hook = this.add.sprite(config.width / 2, PLANE_Y + 50, 'pepe');
    hook.setDepth(40).setDisplaySize(120, 110);
    // Вырезаем только желтую клешню
    hook.setCrop(300, 600, 400, 400); 

    this.physics.add.existing(hook);
    hook.body.setCircle(35, 20, 20); // Настраиваем зону захвата монетки

    // Монетки
    targets = this.physics.add.group();
    for(let i=0; i<8; i++) { spawnCoin(this); }

    scoreText = this.add.text(25, 25, 'SCORE: 0', { 
        fontSize: '32px', fill: '#0f0', fontWeight: 'bold' 
    }).setDepth(50);

    // Клик для запуска
    this.input.on('pointerdown', () => { 
        if(!isLaunching && !isReturning) isLaunching = true; 
    });

    // Ловим монетки КЛЕШНЕЙ
    this.physics.add.overlap(hook, targets, (h, target) => {
        if (isLaunching && !caughtItem) { 
            caughtItem = target; 
            isLaunching = false; 
            isReturning = true; 
        }
    });
}

function spawnCoin(scene) {
    let x = Phaser.Math.Between(100, config.width - 100);
    let y = Phaser.Math.Between(config.height * 0.6, config.height - 100);
    let type = Phaser.Utils.Array.GetRandom(['ton', 'usdt', 'not', 'dogs']);
    let coin = targets.create(x, y, type).setDisplaySize(75, 75);
    coin.body.setCircle(30);
}

function update() {
    let pivotX = config.width / 2;
    let pivotY = PLANE_Y + 50;

    if (!isLaunching && !isReturning) {
        // Клешня качается сама по себе под самолетом
        angle += swingSpeed;
        if (angle > 1.1 || angle < -1.1) swingSpeed = -swingSpeed;
        
        hook.x = pivotX + Math.sin(angle) * 85;
        hook.y = pivotY + Math.cos(angle) * 85;
        hook.rotation = -angle; 
    } 
    else if (isLaunching) {
        // Клешня летит вперед (без палок!)
        hook.x += Math.sin(angle) * HOOK_SPEED;
        hook.y += Math.cos(angle) * HOOK_SPEED;

        if (hook.y > config.height || hook.x < 0 || hook.x > config.width) {
            isLaunching = false; 
            isReturning = true;
        }
    } 
    else if (isReturning) {
        // Клешня тянет монету обратно к самолету
        let moveAngle = Phaser.Math.Angle.Between(hook.x, hook.y, pivotX, pivotY);
        hook.x += Math.cos(moveAngle) * (HOOK_SPEED + 6);
        hook.y += Math.sin(moveAngle) * (HOOK_SPEED + 6);

        if (caughtItem) { 
            caughtItem.x = hook.x; 
            caughtItem.y = hook.y + 25; 
        }

        if (Phaser.Math.Distance.Between(hook.x, hook.y, pivotX, pivotY) < 30) {
            isReturning = false;
            if (caughtItem) {
                score += 100; scoreText.setText('SCORE: ' + score);
                caughtItem.destroy(); caughtItem = null; spawnCoin(this);
            }
        }
    }
    
    // Плавное движение самолета
    plane.y = PLANE_Y + Math.sin(this.time.now / 600) * 10;
}
</script>
</body>
</html>
