<div id="shop-modal" class="modal">
    <div class="modal-content" style="max-height: 85vh; overflow-y: auto;">
        <h3 id="txt-shop-title" style="margin-top:0; font-size:20px; text-transform:uppercase;">АНГАР</h3>
        
        <div class="task-item" style="border: 1px solid #cd7f32; background: rgba(205, 127, 50, 0.1); display: flex; align-items: center; justify-content: space-between; padding: 10px; margin: 10px 0;">
            <img src="plane_copper.png" style="width: 50px; height: auto;">
            <div class="task-info" style="flex-grow: 1; text-align: center; padding: 0 10px;">
                <div id="txt-plane-copper" class="task-title" style="color:#cd7f32; font-weight: bold;">МЕДНЫЙ</div>
                <div style="font-size: 11px; color: #fff;"><span class="txt-price">Цена</span>: 10 USDT</div>
                <div style="font-size: 10px; color: #0f0; margin-top: 2px;">+10 PLT | +0.00005 USDT</div>
            </div>
            <button class="task-btn buy-btn-text" onclick="buyPlane('copper', 10)" style="min-width: 70px;">КУПИТЬ</button>
        </div>

        <div class="task-item" style="border: 1px solid #b08d57; background: rgba(176, 141, 87, 0.1); display: flex; align-items: center; justify-content: space-between; padding: 10px; margin: 10px 0;">
            <img src="plane_bronze.png" style="width: 50px; height: auto;">
            <div class="task-info" style="flex-grow: 1; text-align: center; padding: 0 10px;">
                <div id="txt-plane-bronze" class="task-title" style="color:#b08d57; font-weight: bold;">БРОНЗОВЫЙ</div>
                <div style="font-size: 11px; color: #fff;"><span class="txt-price">Цена</span>: 25 USDT</div>
                <div style="font-size: 10px; color: #0f0; margin-top: 2px;">+25 PLT | +0.0005 USDT</div>
            </div>
            <button class="task-btn buy-btn-text" onclick="buyPlane('bronze', 25)" style="min-width: 70px;">КУПИТЬ</button>
        </div>

        <div class="task-item" style="border: 1px solid #ffd700; background: rgba(255, 215, 0, 0.1); display: flex; align-items: center; justify-content: space-between; padding: 10px; margin: 10px 0;">
            <img src="plane_gold.png" style="width: 50px; height: auto;">
            <div class="task-info" style="flex-grow: 1; text-align: center; padding: 0 10px;">
                <div id="txt-plane-gold" class="task-title" style="color:#ffd700; font-weight: bold;">ЗОЛОТОЙ</div>
                <div style="font-size: 11px; color: #fff;"><span class="txt-price">Цена</span>: 50 USDT</div>
                <div style="font-size: 10px; color: #0f0; margin-top: 2px;">+50 PLT | +0.005 USDT</div>
            </div>
            <button class="task-btn buy-btn-text" onclick="buyPlane('gold', 50)" style="min-width: 70px;">КУПИТЬ</button>
        </div>

        <div style="margin-top:20px; color:#888; cursor:pointer;" onclick="toggleModal('shop-modal')" class="txt-close-all">Закрыть</div>
    </div>
</div>
