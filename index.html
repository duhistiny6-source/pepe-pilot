<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pepe Pilot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        body { margin:0; padding:0; overflow:hidden; background:#000; touch-action: none; font-family: sans-serif; }
        #top-bar { position: fixed; top: 0; left: 0; width: 100%; height: 35px; background: rgba(0,0,0,0.5); z-index: 1000; display: flex; align-items: center; }
        #energy-container { position: absolute; left: 10px; color: #0f0; font-size: 14px; font-weight: bold; }
        #balance-container { width: 100%; display: flex; justify-content: center; gap: 15px; color: #fff; font-size: 12px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; color: #fff; justify-content: center; align-items: center; flex-direction: column; }
        .modal-content { background: #1a1a1a; border: 2px solid #0f0; padding: 20px; border-radius: 15px; text-align: center; width: 80%; }
        #nav-bar { position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%); width: 90%; height: 50px; background: #000; border: 1px solid #333; border-radius: 10px; display: flex; justify-content: space-around; align-items: center; z-index: 500; }
        .nav-item { color: #fff; font-size: 10px; text-align: center; cursor: pointer; }
        .lang-btn { background: #222; color: #0f0; border: 1px solid #0f0; padding: 10px; margin: 5px; width: 100%; border-radius: 8px; }
    </style>
</head>
<body>

<div id="top-bar">
    <div id="energy-container">⚡ <span id="energy">100</span></div>
    <div id="balance-container">
        <div>USDT: <span id="money">0.00000</span></div>
        <div>PLT: <span id="frog-money">0</span></div>
    </div>
</div>

<div id="energy-modal" class="modal">
    <div class="modal-content">
        <h3 id="txt-en-title">НЕТ ЭНЕРГИИ</h3>
        <p>Восстановление через:</p>
        <div id="timer-display" style="font-size: 20px; color: #0f0; margin: 10px;">02:00:00</div>
        <button class="lang-btn" onclick="watchAd()">📺 СМОТРЕТЬ РЕКЛАМУ (+100 ⚡)</button>
        <div onclick="toggleModal('energy-modal')" style="color: #888; margin-top: 10px;">Закрыть</div>
    </div>
</div>

<div id="nav-bar">
    <div class="nav-item" onclick="toggleModal('shop-modal')">🛒<br>АНГАР</div>
    <div class="nav-item" onclick="connectWallet()">👛<br>КОШЕЛЕК</div>
</div>

<script src="api.js"></script>
<script src="game.js"></script>

</body>
</html>
