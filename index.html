<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pepe Pilot Fixed Chain</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; touch-action: none; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>
<script>
const config = {
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    physics: { default: 'arcade' },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);
let plane, targets, scoreText, chainGraphics;
let isLaunching = false, isReturning = false, caughtItem = null;
let angle = 0, swingSpeed = 0.035; 
let launchSpeed = 16; 
let returnSmoothness = 0.1; 
let score = 0;

function preload() {
    this.load.crossOrigin = 'anonymous';
    this.load.image('sky', 'pg.jpeg'); 
    this.load.image('pepe', 'pepe.png');
    this.load.image('ton', 'ton.png');
    this.load.image('usdt', 'usdt.png');
    this.load.image('not', 'not.png');
    this.load.image('dogs', 'dogs.png');
    this.load.image('claw', 'cep.png'); // Используем твою картинку как саму клешню
}

function create() {
    // Фон
    let bg = this.add.image(config.width/2, config.height/2, 'sky');
    let scale = Math.max(config.width / bg.width, config.height / bg.height);
    bg.setScale(scale).setScrollFactor(0);

    // Графика для рисования цепи
    chainGraphics = this.add.graphics().setDepth(5);
    
    // Клешня (теперь это спрайт, который летает)
    this.claw = this.physics.add.sprite(config.width/2, 400, 'claw');
    this.claw.setDisplaySize(60, 60).setDepth(6);

    // Самолет
    plane = this.add.sprite(config.width / 2, 170, 'pepe');
    plane.setDepth(10).setDisplaySize(220, 160);

    // Анимация самолета
    this.tweens.add({
        targets: plane, y: 200, duration: 1500, yoyo: true, loop: -1, ease: 'Sine.easeInOut'
    });

    // Монетки
    targets = this.physics.add.group();
    for(let i=0; i<8; i++) { spawnCoin(this); }

    scoreText = this.add.text(25, 25, 'SCORE: 0', { 
        fontSize: '28px', fill: '#0f0', fontFamily: 'Courier New', fontWeight: 'bold'
    }).setDepth(30);

    this.input.on('pointerdown', () => { 
        if(!isLaunching && !isReturning) isLaunching = true; 
    });

    // Захват
    this.physics.add.overlap(this.claw, targets, (claw, target) => {
        if (isLaunching && !caughtItem) { 
            caughtItem = target; 
            isLaunching = false; 
            isReturning = true; 
            if (navigator.vibrate) navigator.vibrate(50); 
        }
    });
}

function spawnCoin(scene) {
    let x = Phaser.Math.Between(70, config.width - 70);
    let y = Phaser.Math.Between(config.height * 0.55, config.height - 120);
    let type = Phaser.Utils.Array.GetRandom(['ton', 'usdt', 'not', 'dogs']);
    let coin = targets.create(x, y, type);
    coin.setDisplaySize(75, 75).setOrigin(0.5).setDepth(4); 
    coin.body.setCircle(30); 
}

function update() {
    // Точка выхода цепи (в центре самолета)
    let anchorX = plane.x; 
    let anchorY = plane.y + 60; 

    if (!isLaunching && !isReturning) {
        angle += swingSpeed;
        if (Math.abs(angle) > 0.8) swingSpeed = -swingSpeed;
        this.claw.x = anchorX + Math.sin(angle) * 150;
        this.claw.y = anchorY + Math.cos(angle) * 150;
        this.claw.rotation = -angle; // Клешня смотрит по направлению качания
    } else if (isLaunching) {
        this.claw.x += Math.sin(angle) * launchSpeed;
        this.claw.y += Math.cos(angle) * launchSpeed;
        if (this.claw.y > config.height || this.claw.x < 0 || this.claw.x > config.width) {
            isLaunching = false; isReturning = true;
        }
    } else if (isReturning) {
        let dist = Phaser.Math.Distance.Between(this.claw.x, this.claw.y, anchorX, anchorY);
        this.claw.x += (anchorX - this.claw.x) * returnSmoothness;
        this.claw.y += (anchorY - this.claw.y) * returnSmoothness;
        
        if (caughtItem) { 
            caughtItem.x = this.claw.x; 
            caughtItem.y = this.claw.y; 
        }
        
        if (dist < 40) {
            isReturning = false;
            if (caughtItem) { 
                score += 100; scoreText.setText('SCORE: ' + score); 
                caughtItem.destroy(); caughtItem = null; spawnCoin(this); 
            }
        }
    }

    // РИСУЕМ ЦЕПЬ: Очищаем старую и рисуем новую линию каждый кадр
    chainGraphics.clear();
    chainGraphics.lineStyle(3, 0x555555, 1); // Толщина 3 пикселя, серый цвет
    chainGraphics.beginPath();
    chainGraphics.moveTo(anchorX, anchorY);
    chainGraphics.lineTo(this.claw.x, this.claw.y);
    chainGraphics.strokePath();
}
</script>
</body>
</html>
