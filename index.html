<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pepe Pilot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        body { margin:0; padding:0; overflow:hidden; background:#000; font-family: sans-serif; }
        
        /* Верхняя панель */
        #top-bar { position: fixed; top: 10px; left: 0; width: 100%; z-index: 1000; display: flex; justify-content: space-between; padding: 0 15px; box-sizing: border-box; pointer-events: none; }
        .stat-box { background: rgba(0,0,0,0.6); padding: 5px 10px; border-radius: 8px; color: #fff; font-size: 12px; display: flex; align-items: center; gap: 5px; pointer-events: auto; }
        
        /* Шестеренка */
        #settings-btn { position: fixed; top: 10px; right: 10px; z-index: 1001; cursor: pointer; font-size: 20px; filter: drop-shadow(0 0 2px #000); }

        /* Нижнее меню */
        #nav-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; height: 65px; background: rgba(0, 0, 0, 0.85); border: 1px solid #444; border-radius: 18px; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #fff; cursor: pointer; flex: 1; }
        .nav-item img { width: 24px; height: 24px; margin-bottom: 4px; }
        .nav-text { font-size: 9px; text-transform: uppercase; color: #aaa; }

        /* Окна */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: #1a1a1a; border: 2px solid #0f0; padding: 20px; border-radius: 25px; width: 85%; color: white; text-align: center; }
        .shop-row { display: flex; align-items: center; background: #252525; margin: 10px 0; padding: 10px; border-radius: 15px; border: 1px solid #444; }
        .buy-btn { background: #0f0; color: #000; border: none; padding: 8px 15px; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="settings-btn" onclick="toggleModal('settings-modal')">⚙️</div>

<div id="top-bar">
    <div class="stat-box" style="color:#0f0">⚡ <span id="energy">100</span></div>
    <div style="display:flex; gap:10px">
        <div class="stat-box">USDT: <span id="money" style="color:#0f0">0.00000</span></div>
        <div class="stat-box"><img src="logo..png" style="width:14px"> <span id="frog-money" style="color:#ffcc00">0</span></div>
    </div>
</div>

<div id="shop-modal" class="modal">
    <div class="modal-content">
        <h2 id="txt-shop-title">АНГАР</h2>
        <div class="shop-row" style="border-color:#cd7f32">
            <img src="plane_copper.png" width="50">
            <div style="flex:1; text-align:left; padding-left:10px">
                <b id="txt-copper">МЕДНЫЙ</b><br><small>10 USDT</small>
            </div>
            <button class="buy-btn" onclick="buyPlane('copper', 10)">КУПИТЬ</button>
        </div>
        <div class="shop-row" style="border-color:#ffd700">
            <img src="plane_gold.png" width="50">
            <div style="flex:1; text-align:left; padding-left:10px">
                <b id="txt-gold">ЗОЛОТОЙ</b><br><small>50 USDT</small>
            </div>
            <button class="buy-btn" onclick="buyPlane('gold', 50)">КУПИТЬ</button>
        </div>
        <p onclick="toggleModal('shop-modal')" style="color:#888; cursor:pointer" id="txt-close">Закрыть</p>
    </div>
</div>

<div id="nav-bar">
    <div class="nav-item" onclick="toggleModal('shop-modal')"><span>🛒</span><div class="nav-text">Магазин</div></div>
    <div class="nav-item" onclick="tg.showAlert('Задания скоро!')"><span>📜</span><div class="nav-text">Задания</div></div>
    <div class="nav-item" onclick="openFriends()"><span>👥</span><div class="nav-text">Друзья</div></div>
    <div class="nav-item" onclick="tonConnectUI.openModal()"><span>👛</span><div class="nav-text">Кошелек</div></div>
</div>

<script src="api.js"></script>
<script src="game.js"></script>
</body>
</html>
