<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pepe Pilot: Final Polish</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin:0; overflow:hidden; background:#000; touch-action: none; font-family: Arial, sans-serif; }
        #ui { position:fixed; top:12px; left:12px; color:#0f0; font-weight:bold; z-index: 100; pointer-events: none; text-shadow: 1px 1px 2px #000; display: flex; flex-direction: column; gap: 5px; }
        #settings-btn { position: fixed; top: 12px; right: 12px; font-size: 28px; cursor: pointer; z-index: 1001; }
        #settings-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; color: #fff; justify-content: center; align-items: center; flex-direction: column; }
        .modal-content { background: #1a1a1a; border: 2px solid #0f0; padding: 25px; border-radius: 20px; text-align: center; min-width: 240px; }
        .lang-btn { background: #333; color: #0f0; border: 1px solid #0f0; padding: 12px 20px; margin: 10px 0; cursor: pointer; border-radius: 10px; font-weight: bold; width: 100%; }
        #nav-bar { 
            position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%); 
            width: 90%; height: 50px; background: rgba(0, 0, 0, 0.95); 
            border: 1px solid #0f0; border-radius: 12px; 
            display: flex; justify-content: space-around; align-items: center; z-index: 200; 
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #0f0; font-weight: bold; flex: 1; }
        .nav-item span { font-size: 18px; }
        .nav-text { font-size: 8px; text-transform: uppercase; }
    </style>
</head>
<body>

<div id="settings-btn" onclick="toggleSettings()">⚙️</div>

<div id="ui">
    <div>💰 <span id="money">0.0000</span></div>
    <div>⚡ <span id="energy">100</span>/100</div>
</div>

<div id="settings-modal">
    <div class="modal-content">
        <h3>НАСТРОЙКИ</h3>
        <button class="lang-btn" onclick="changeLanguage('ru')">РУССКИЙ</button>
        <button class="lang-btn" onclick="changeLanguage('en')">ENGLISH</button>
        <div style="margin-top:15px; color:#888; cursor:pointer;" onclick="toggleSettings()">Закрыть</div>
    </div>
</div>

<div id="nav-bar">
    <div class="nav-item"><span>🛒</span><div class="nav-text">МАГАЗИН</div></div>
    <div class="nav-item"><span>📜</span><div class="nav-text">ЗАДАНИЯ</div></div>
    <div class="nav-item"><span>👥</span><div class="nav-text">ДРУЗЬЯ</div></div>
    <div class="nav-item"><span>👛</span><div class="nav-text">КОШЕЛЕК</div></div>
</div>

<script>
function toggleSettings() {
    const m = document.getElementById('settings-modal');
    m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
}

const config = {
    type: Phaser.AUTO, width: window.innerWidth, height: window.innerHeight,
    backgroundColor: '#002200',
    physics: { default: 'arcade' },
    scene: { preload, create, update }
};

const game = new Phaser.Game(config);
let plane, hook, rope, targets, bgMusic, isLaunching = false, isReturning = false, caughtItem = null;
let angle = 0, swingSpeed = 0.03, distance = 35, money = 0;
const COIN_VALUE = 0.0005;

function preload() {
    this.load.image('sky', 'pg.jpeg');
    this.load.image('hook', 'kleshn.png');
    this.load.image('usdt', 'usdt.png');
    this.load.image('plane', 'pepe.png');
    this.load.audio('theme', 'music.mp3');
}

function create() {
    this.add.image(config.width / 2, config.height / 2, 'sky').setDisplaySize(config.width, config.height);
    
    // Звук (активация по клику)
    bgMusic = this.sound.add('theme', { volume: 0.1, loop: true });
    this.input.once('pointerdown', () => { if (!bgMusic.isPlaying) bgMusic.play(); });

    targets = this.physics.add.group();
    for(let i = 0; i < 6; i++) spawnCoin(this);

    rope = this.add.graphics().setDepth(5);
    hook = this.physics.add.sprite(0, 0, 'hook').setDisplaySize(65, 65).setDepth(10);
    plane = this.add.image(config.width / 2, 120, 'plane').setDisplaySize(280, 180).setDepth(20);

    this.input.on('pointerdown', (p) => {
        if (p.y > 100 && p.y < config.height - 100 && !isLaunching && !isReturning) {
            isLaunching = true;
            this.sound.play('theme', { volume: 0.05, seek: 0.5, duration: 0.1 }); // Короткий звук запуска
        }
    });

    this.physics.add.overlap(hook, targets, (h, item) => {
        if (isLaunching && !caughtItem) {
            caughtItem = item;
            caughtItem.body.enable = false;
            if (caughtItem.pulse) caughtItem.pulse.stop();
            isLaunching = false;
            isReturning = true;
        }
    });
}

function spawnCoin(scene) {
    let x = Phaser.Math.Between(50, config.width - 50);
    let y = Phaser.Math.Between(config.height * 0.45, config.height - 150);
    let coin = targets.create(x, y, 'usdt').setScale(0.12).setDepth(15);
    
    // ПУЛЬСАЦИЯ МОНЕТОК
    coin.pulse = scene.tweens.add({
        targets: coin,
        scale: 0.15,
        duration: 800,
        yoyo: true,
        repeat: -1,
        ease: 'Sine.easeInOut'
    });
}

function update() {
    plane.y = 120 + Math.sin(this.time.now / 600) * 8;
    // Точка старта нитки смещена вниз под фюзеляж
    let startX = plane.x - 5; 
    let startY = plane.y + 40; 

    if (!isLaunching && !isReturning) {
        angle += swingSpeed;
        if (angle > 0.7 || angle < -0.7) swingSpeed *= -1;
        distance = 35; // Клешня не прячется глубоко
    } else if (isLaunching) {
        distance += 12;
        if (distance > config.height - 150) { isLaunching = false; isReturning = true; }
    } else if (isReturning) {
        distance -= 9;
        if (distance <= 35) {
            isReturning = false;
            if (caughtItem) {
                money += COIN_VALUE;
                document.getElementById('money').innerText = money.toFixed(4);
                caughtItem.destroy();
                caughtItem = null;
                spawnCoin(this);
            }
        }
    }

    hook.x = startX + Math.sin(angle) * distance;
    hook.y = startY + Math.cos(angle) * distance;
    hook.rotation = -angle;

    // НИТКА: Тёмно-серая и тонкая
    rope.clear().lineStyle(2, 0x444444, 0.8);
    rope.lineBetween(startX, startY, hook.x, hook.y);

    if (caughtItem) {
        caughtItem.x = hook.x;
        caughtItem.y = hook.y + 15;
        caughtItem.rotation = hook.rotation;
    }
}
</script>
</body>
</html>
