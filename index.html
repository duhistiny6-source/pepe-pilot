<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pepe Pilot</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; touch-action: none; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>
<script>
const config = {
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    physics: { default: 'arcade' },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);
let plane, chainSprite, targets, scoreText, timerText;
let isLaunching = false, isReturning = false, caughtItem = null;
let angle = 0, swingSpeed = 0.025, launchSpeed = 15; 
let score = 0, timeLeft = 60, isGameOver = false;

function preload() {
    this.load.crossOrigin = 'anonymous';
    this.load.image('sky', 'bg.jpg'); // Твой фон
    this.load.image('pepe', 'pepe.png');
    this.load.image('chain', 'cep.png'); 
    this.load.image('ton', 'ton.png');
    this.load.image('usdt', 'usdt.png');
    this.load.image('not', 'not.png');
    this.load.image('dogs', 'dogs.png');
}

function create() {
    // 1. ФОН
    if (this.textures.exists('sky')) {
        let bg = this.add.image(config.width/2, config.height/2, 'sky');
        let scale = Math.max(config.width / bg.width, config.height / bg.height);
        bg.setScale(scale).setScrollFactor(0);
    }

    // 2. ЦЕПЬ (привязка будет в центре)
    chainSprite = this.add.sprite(0, 0, 'chain').setOrigin(0.5, 0).setDepth(5);
    
    // Невидимая точка захвата
    this.clawPoint = this.add.circle(config.width/2, 300, 30, 0xff0000, 0); 
    this.physics.add.existing(this.clawPoint);

    // 3. САМОЛЕТ
    plane = this.add.sprite(config.width / 2, 150, 'pepe');
    plane.setDepth(10).setDisplaySize(220, 160);

    // Покачивание самолета
    this.tweens.add({
        targets: plane, y: 180, duration: 2000, yoyo: true, loop: -1, ease: 'Sine.easeInOut'
    });

    // 4. МОНЕТКИ (Все 90x90)
    targets = this.physics.add.group();
    for(let i=0; i<7; i++) { spawnCoin(this); }

    // 5. МАТРИЧНЫЙ ТАЙМЕР
    scoreText = this.add.text(30, 30, 'SCORE: 0', { 
        fontSize: '28px', fill: '#0f0', fontFamily: 'Courier New', fontWeight: 'bold' 
    }).setDepth(30);
    
    timerText = this.add.text(config.width - 180, 30, 'TIME: 60', { 
        fontSize: '28px', fill: '#0f0', fontFamily: 'Courier New', fontWeight: 'bold' 
    }).setDepth(30);

    // Логика времени
    this.time.addEvent({
        delay: 1000,
        callback: () => { 
            if(timeLeft > 0) { 
                timeLeft--; 
                timerText.setText('TIME: ' + timeLeft); 
            } else if (!isGameOver) {
                isGameOver = true;
                this.physics.pause();
                this.add.rectangle(config.width/2, config.height/2, config.width, config.height, 0x000000, 0.7).setDepth(40);
                this.add.text(config.width/2, config.height/2, 'TIME OVER', { 
                    fontSize: '50px', fill: '#0f0', fontFamily: 'Courier New' 
                }).setOrigin(0.5).setDepth(41);
            }
        },
        loop: true
    });

    this.input.on('pointerdown', () => { 
        if(!isLaunching && !isReturning && !isGameOver) isLaunching = true; 
    });

    this.physics.add.overlap(this.clawPoint, targets, (c, target) => {
        if (isLaunching && !caughtItem) { 
            caughtItem = target; 
            isLaunching = false; 
            isReturning = true; 
        }
    });
}

function spawnCoin(scene) {
    let x = Phaser.Math.Between(50, config.width - 50);
    let y = Phaser.Math.Between(config.height * 0.6, config.height - 100);
    let type = Phaser.Utils.Array.GetRandom(['ton', 'usdt', 'not', 'dogs']);
    let coin = targets.create(x, y, type);
    coin.setDisplaySize(90, 90).setDepth(4); 
}

function update() {
    if (isGameOver) return;

    // ТОЧКА ВЫХОДА ЦЕПИ: Ровно ПОСЕРЕДИНЕ самолета
    let anchorX = plane.x; 
    let anchorY = plane.y + 40; 

    if (!isLaunching && !isReturning) {
        angle += swingSpeed;
        if (Math.abs(angle) > 0.7) swingSpeed = -swingSpeed;
        this.clawPoint.x = anchorX + Math.sin(angle) * 150;
        this.clawPoint.y = anchorY + Math.cos(angle) * 150;
    } else if (isLaunching) {
        this.clawPoint.x += Math.sin(angle) * launchSpeed;
        this.clawPoint.y += Math.cos(angle) * launchSpeed;
        if (this.clawPoint.y > config.height || this.clawPoint.x < 0 || this.clawPoint.x > config.width) {
            isLaunching = false; isReturning = true;
        }
    } else if (isReturning) {
        let dist = Phaser.Math.Distance.Between(this.clawPoint.x, this.clawPoint.y, anchorX, anchorY);
        this.clawPoint.x += (anchorX - this.clawPoint.x) * 0.12;
        this.clawPoint.y += (anchorY - this.clawPoint.y) * 0.12;
        
        if (caughtItem) { caughtItem.x = this.clawPoint.x; caughtItem.y = this.clawPoint.y; }
        if (dist < 40) {
            isReturning = false;
            if (caughtItem) { 
                score += 100; scoreText.setText('SCORE: ' + score); 
                caughtItem.destroy(); caughtItem = null; spawnCoin(this); 
            }
        }
    }

    // РИСУЕМ ЦЕПЬ ИЗ ЦЕНТРА
    chainSprite.x = anchorX;
    chainSprite.y = anchorY;
    chainSprite.rotation = Phaser.Math.Angle.Between(anchorX, anchorY, this.clawPoint.x, this.clawPoint.y) - Math.PI / 2;
    chainSprite.displayWidth = 140; // Жирность
    chainSprite.displayHeight = Phaser.Math.Distance.Between(anchorX, anchorY, this.clawPoint.x, this.clawPoint.y);
}
</script>
</body>
</html>
