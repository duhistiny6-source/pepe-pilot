<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pepe Pilot: Pro Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin:0; overflow:hidden; background:#111; touch-action: none; user-select: none; }
        #ui { position:fixed; top:12px; left:12px; color:#0f0; font-family: 'Courier New', Courier, monospace; font-weight:bold; z-index: 100; pointer-events: none; text-shadow: 2px 2px #000; }
        #energy-bar-container { width: 100px; height: 10px; background: #333; border: 1px solid #0f0; margin-top: 5px; }
        #energy-fill { width: 100%; height: 100%; background: #0f0; transition: width 0.3s; }
        #timer-display { color: #ff3333; font-size: 14px; margin-top: 5px; font-style: italic; }
        
        #nav-bar { 
            position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%); 
            width: 90%; height: 60px; background: rgba(0, 0, 0, 0.85); 
            border: 2px solid #0f0; border-radius: 15px; display: flex; 
            justify-content: space-around; align-items: center; z-index: 200;
            backdrop-filter: blur(5px);
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #0f0; font-size: 10px; cursor: pointer; }
        .nav-item span { font-size: 22px; margin-bottom: 2px; }
    </style>
</head>
<body>

<div id="ui">
    💰 <span id="money">0.000</span><br>
    ⚡ <span id="energy-text">100/100</span>
    <div id="energy-bar-container"><div id="energy-fill"></div></div>
    <div id="timer-display" style="display: none;">REGEN: <span id="time-left">03:00:00</span></div>
</div>

<div id="nav-bar">
    <div class="nav-item"><span>🛒</span>SHOP</div>
    <div class="nav-item"><span>📜</span>TASKS</div>
    <div class="nav-item"><span>👥</span>FRIENDS</div>
    <div class="nav-item"><span>👛</span>WALLET</div>
</div>

<script>
const config = {
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    physics: { default: 'arcade', arcade: { gravity: { y: 0 } } },
    scene: { preload, create, update }
};

const game = new Phaser.Game(config);

let plane, hook, rope, targets, bgMusic;
let isLaunching = false, isReturning = false, caughtItem = null;
let angle = 0, swingSpeed = 0.025, distance = 30; 
let money = 0, energy = 100;
let recoveryTime = 0;
let returnSpeed = 6; // Базовая скорость возврата

// Звуковой движок
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(freq, duration, type = 'sine') {
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = type;
    osc.connect(g);
    g.connect(audioCtx.destination);
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    g.gain.setValueAtTime(0.1, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}

function preload() {
    // В реальном проекте замени заглушки на свои файлы
    this.load.image('sky', 'pg.jpeg'); 
    this.load.image('hook', 'kleshn.png');
    this.load.image('usdt', 'usdt.png');
    this.load.image('plane', 'pepe.png');
    this.load.image('stone', 'https://labs.phaser.io/assets/sprites/asteroid.png'); // Временный камень
}

function create() {
    this.add.image(config.width / 2, config.height / 2, 'sky').setDisplaySize(config.width, config.height);

    targets = this.physics.add.group();
    // Спавним 4 монетки и 2 камня для интереса
    for(let i = 0; i < 4; i++) spawnItem(this, 'usdt');
    for(let i = 0; i < 2; i++) spawnItem(this, 'stone');

    rope = this.add.graphics().setDepth(30);
    hook = this.add.sprite(0, 0, 'hook').setDepth(50).setDisplaySize(50, 50); 
    this.physics.add.existing(hook);
    hook.body.setCircle(20); 

    plane = this.add.image(config.width / 2, 120, 'plane').setDisplaySize(200, 130).setDepth(60);

    this.input.on('pointerdown', (p) => {
        if (p.y < config.height - 100 && !isLaunching && !isReturning && energy > 0) {
            isLaunching = true;
            energy--;
            if (energy === 0) startRecovery();
            updateUI();
            playSound(400, 0.1, 'square');
        }
    });

    this.physics.add.overlap(hook, targets, (h, item) => {
        if (isLaunching && !caughtItem) {
            caughtItem = item;
            caughtItem.body.enable = false;
            isLaunching = false;
            isReturning = true;
            
            // Если поймали тяжелый камень — возвращаемся медленно
            returnSpeed = (item.texture.key === 'stone') ? 2 : 8;
            playSound(600, 0.2);
        }
    });

    setInterval(tick, 1000);
}

function spawnItem(scene, type) {
    let x = Phaser.Math.Between(50, config.width - 50);
    let y = Phaser.Math.Between(config.height * 0.4, config.height - 150);
    let item = targets.create(x, y, type).setDepth(40);
    
    if (type === 'usdt') {
        item.setScale(0.12);
        item.goldValue = 0.001;
    } else {
        item.setScale(0.4); // Камень больше
        item.goldValue = 0.0001; // Камень почти ничего не дает
        item.setTint(0x888888);
    }
}

function tick() {
    if (recoveryTime > 0) {
        recoveryTime--;
        let h = Math.floor(recoveryTime / 3600).toString().padStart(2, '0');
        let m = Math.floor((recoveryTime % 3600) / 60).toString().padStart(2, '0');
        let s = (recoveryTime % 60).toString().padStart(2, '0');
        document.getElementById('time-left').innerText = `${h}:${m}:${s}`;
        if (recoveryTime === 0) { energy = 100; document.getElementById('timer-display').style.display = 'none'; updateUI(); }
    }
}

function update() {
    plane.x = config.width / 2 + Math.sin(this.time.now / 1000) * 10;
    plane.y = 120 + Math.cos(this.time.now / 600) * 5;
    
    let startX = plane.x; 
    let startY = plane.y + 20; 

    if (!isLaunching && !isReturning) {
        angle += swingSpeed;
        if (Math.abs(angle) > 0.7) swingSpeed *= -1;
        distance = 30;
    } else if (isLaunching) {
        distance += 12; 
        if (distance > config.height - 120) { isLaunching = false; isReturning = true; returnSpeed = 5; }
    } else if (isReturning) {
        distance -= returnSpeed; 
        if (distance <= 30) {
            isReturning = false;
            if (caughtItem) {
                money += caughtItem.goldValue;
                showPopUp(this, plane.x, plane.y, caughtItem.goldValue);
                let type = caughtItem.texture.key;
                caughtItem.destroy();
                caughtItem = null;
                spawnItem(this, type);
                updateUI();
                playSound(900, 0.1);
            }
        }
    }

    hook.x = startX + Math.sin(angle) * distance;
    hook.y = startY + Math.cos(angle) * distance;
    hook.rotation = -angle;

    rope.clear().lineStyle(3, 0x555555, 1).lineBetween(startX, startY, hook.x, hook.y);

    if (caughtItem) {
        caughtItem.x = hook.x;
        caughtItem.y = hook.y + 10;
    }
}

function showPopUp(scene, x, y, val) {
    let txt = scene.add.text(x, y, `+${val.toFixed(4)}`, { 
        font: 'bold 28px Arial', fill: '#0f0', stroke: '#000', strokeThickness: 5
    }).setOrigin(0.5).setDepth(100);
    scene.tweens.add({ targets: txt, y: y - 120, alpha: 0, duration: 800, onComplete: () => txt.destroy() });
}

function startRecovery() {
    recoveryTime = 3 * 60 * 60;
    document.getElementById('timer-display').style.display = 'block';
}

function updateUI() {
    document.getElementById('money').innerText = money.toFixed(3);
    document.getElementById('energy-text').innerText = `${energy}/100`;
    document.getElementById('energy-fill').style.width = `${energy}%`;
    // Цвет полоски меняется, когда энергии мало
    document.getElementById('energy-fill').style.background = energy < 20 ? '#f00' : '#0f0';
}
</script>
</body>
</html>
