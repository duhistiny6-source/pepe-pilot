<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pepe Hook Fixed</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; touch-action: none; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>
<script>
const config = {
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    physics: { default: 'arcade' },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);
let plane, hookBody, targets, scoreText;
let isLaunching = false, isReturning = false, caughtItem = null;
let score = 0;

const SPEED = 15; 
const START_Y = 160; 

function preload() {
    this.load.crossOrigin = 'anonymous';
    this.load.image('sky', 'pg.jpeg'); 
    this.load.image('pepe', 'pepe.png'); //
    this.load.image('ton', 'ton.png');
    this.load.image('usdt', 'usdt.png');
    this.load.image('not', 'not.png');
    this.load.image('dogs', 'dogs.png');
}

function create() {
    // Фон
    this.add.image(config.width/2, config.height/2, 'sky').setDisplaySize(config.width, config.height);

    // 1. САМОЛЕТ (База)
    plane = this.add.image(config.width / 2, START_Y, 'pepe');
    plane.setDisplaySize(300, 260).setDepth(50);
    plane.setCrop(0, 0, 1000, 480); // Отрезаем нижнюю часть, чтобы она не мешала

    // 2. ВЫДВИЖНАЯ КЛЕШНЯ
    // Используем тот же спрайт, но будем менять его высоту
    hookBody = this.add.sprite(config.width / 2, START_Y + 40, 'pepe');
    hookBody.setOrigin(0.5, 0); // Фиксируем верх под самолетом
    hookBody.setDisplaySize(120, 100); 
    hookBody.setDepth(40);
    // Показываем только клешню из спрайта
    hookBody.setCrop(300, 600, 400, 400); 

    this.physics.add.existing(hookBody);
    hookBody.body.setCircle(30, 20, 20); // Зона захвата на кончике

    // Монетки
    targets = this.physics.add.group();
    for(let i=0; i<8; i++) { spawnCoin(this); }

    scoreText = this.add.text(25, 25, 'SCORE: 0', { fontSize: '32px', fill: '#0f0', fontWeight: 'bold' }).setDepth(60);

    // Клик на экран
    this.input.on('pointerdown', () => { 
        if(!isLaunching && !isReturning) isLaunching = true; 
    });

    // Захват монетки кончиком клешни
    this.physics.add.overlap(hookBody, targets, (h, target) => {
        if (isLaunching && !caughtItem) { 
            caughtItem = target; 
            isLaunching = false; 
            isReturning = true; 
        }
    });
}

function spawnCoin(scene) {
    let x = Phaser.Math.Between(100, config.width - 100);
    let y = Phaser.Math.Between(config.height * 0.6, config.height - 120);
    let type = Phaser.Utils.Array.GetRandom(['ton', 'usdt', 'not', 'dogs']);
    let coin = targets.create(x, y, type).setDisplaySize(70, 70);
}

function update() {
    if (isLaunching) {
        // КЛЕШНЯ ВЫДВИГАЕТСЯ ВНИЗ
        hookBody.displayHeight += SPEED;
        
        // Предел длины
        if (hookBody.displayHeight > config.height - START_Y - 100) {
            isLaunching = false;
            isReturning = true;
        }
    } 
    else if (isReturning) {
        // КЛЕШНЯ ВТЯГИВАЕТСЯ ОБРАТНО
        hookBody.displayHeight -= SPEED;
        
        if (caughtItem) {
            caughtItem.x = hookBody.x;
            caughtItem.y = hookBody.y + hookBody.displayHeight - 20;
        }
        
        if (hookBody.displayHeight <= 100) {
            hookBody.displayHeight = 100;
            isReturning = false;
            if (caughtItem) {
                score += 100;
                scoreText.setText('SCORE: ' + score);
                caughtItem.destroy();
                caughtItem = null;
                spawnCoin(this);
            }
        }
    }
    
    // Самолет слегка покачивается для жизни
    plane.y = START_Y + Math.sin(this.time.now / 600) * 5;
}
</script>
</body>
</html>
