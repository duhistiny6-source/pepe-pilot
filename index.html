<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pepe Pilot</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin:0; padding:0; overflow:hidden; background:#000; touch-action: none; font-family: 'Segoe UI', Arial, sans-serif; }
        
        /* Верхняя панель */
        #top-bar { 
            position: fixed; top: 0; left: 0; width: 100%; height: 35px; 
            background: rgba(0, 0, 0, 0.4); z-index: 1000; backdrop-filter: blur(2px);
            display: flex; align-items: center;
        }
        #energy-container { position: absolute; left: 12px; color: #0f0; font-size: 13px; font-weight: bold; }
        #balance-container { width: 100%; display: flex; justify-content: center; gap: 15px; color: #fff; font-size: 11px; }
        .coin-icon { width: 14px; height: 14px; vertical-align: middle; }

        /* Таймер и Реклама слева */
        #recovery-block {
            display: none; position: fixed; top: 40px; left: 12px; z-index: 1001;
            flex-direction: column; gap: 4px; align-items: flex-start;
        }
        #timer-display { color: #ff3333; font-size: 10px; text-shadow: 1px 1px 1px #000; }
        #ad-button { background: #ffcc00; color: #000; border: none; padding: 2px 8px; font-size: 10px; font-weight: bold; border-radius: 4px; cursor: pointer; }
        
        /* Кнопка настроек */
        #settings-btn { position: fixed; top: 7px; right: 10px; font-size: 18px; cursor: pointer; z-index: 1001; opacity: 0.8; }
        
        /* Нижнее меню */
        #nav-bar { 
            position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%); 
            width: 85%; height: 50px; background: rgba(0, 0, 0, 0.9); border: 1px solid #333; 
            border-radius: 12px; display: flex; justify-content: space-around; align-items: center; z-index: 200; 
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #fff; cursor: pointer; }
        .nav-text { font-size: 8px; margin-top: 1px; color: #bbb; text-transform: uppercase; }

        /* Модальные окна */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; justify-content: center; align-items: center; flex-direction: column; }
        .modal-content { background: #1a1a1a; border: 2px solid #0f0; padding: 25px; border-radius: 20px; text-align: center; color: #fff; width: 260px; }
        .task-item { background: #222; border: 1px solid #444; border-radius: 10px; padding: 10px; margin: 10px 0; display: flex; justify-content: space-between; align-items: center; }
        .lang-btn { background: #333; color: #0f0; border: 1px solid #0f0; padding: 10px; margin: 5px 0; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; }
        
        #ad-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 3000; color: #fff; justify-content: center; align-items: center; flex-direction: column; }
    </style>
</head>
<body>

<div id="settings-btn" onclick="toggleModal('settings-modal')">⚙️</div>

<div id="top-bar">
    <div id="energy-container">⚡ <span id="energy">100</span></div>
    <div id="balance-container">
        <div>USDT: <span id="money" style="color:#0f0">0.0000</span></div>
        <div><img src="logo..png" class="coin-icon"> PLT: <span id="frog-money" style="color:#ffcc00">0</span></div>
    </div>
</div>

<div id="recovery-block">
    <button id="ad-button" onclick="startAd()">📺 РЕКЛАМА</button>
    <div id="timer-display">Rec: <span id="time-left">02:00:00</span></div>
</div>

<div id="settings-modal" class="modal">
    <div class="modal-content">
        <h3>НАСТРОЙКИ</h3>
        <button class="lang-btn" onclick="toggleModal('settings-modal')">РУССКИЙ</button>
        <button class="lang-btn" onclick="toggleModal('settings-modal')">ENGLISH</button>
        <div style="margin-top:10px; color:#666;" onclick="toggleModal('settings-modal')">Закрыть</div>
    </div>
</div>

<div id="friends-modal" class="modal">
    <div class="modal-content">
        <h3>ДРУЗЬЯ</h3>
        <p style="font-size: 11px;">Бонус 10% от их добычи!</p>
        <div id="ref-link" style="background:#000; padding:8px; font-size:9px; color:#0f0; margin:10px 0;">Загрузка...</div>
        <button class="lang-btn" onclick="copyRef()">КОПИРОВАТЬ</button>
        <div style="margin-top:10px; color:#666;" onclick="toggleModal('friends-modal')">Закрыть</div>
    </div>
</div>

<div id="tasks-modal" class="modal">
    <div class="modal-content">
        <h3>ЗАДАНИЯ</h3>
        <div class="task-item">
            <div style="text-align:left; font-size:12px;">Реклама<br><span style="color:#0f0">+100 ⚡</span></div>
            <button onclick="doAdTask()" style="background:#0f0; border:none; padding:5px 10px; border-radius:5px;">GO</button>
        </div>
        <div style="margin-top:10px; color:#666;" onclick="toggleModal('tasks-modal')">Закрыть</div>
    </div>
</div>

<div id="ad-overlay">
    <h2>СМОТРИМ РЕКЛАМУ...</h2>
    <p id="ad-timer">5 сек.</p>
</div>

<div id="nav-bar">
    <div class="nav-item"><span>🛒</span><div class="nav-text">SHOP</div></div>
    <div class="nav-item" onclick="toggleModal('tasks-modal')"><span>📜</span><div class="nav-text">TASKS</div></div>
    <div class="nav-item" onclick="toggleModal('friends-modal')"><span>👥</span><div class="nav-text">FRIENDS</div></div>
    <div class="nav-item" onclick="connectWallet()"><span>👛</span><div class="nav-text">WALLET</div></div>
</div>

<script>
const webapp = window.Telegram?.WebApp;
if (webapp) webapp.expand();

const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
    manifestUrl: 'https://duhistiny6-source.github.io/pepe-pilot/tonconnect-manifest.json',
    buttonRootId: null
});

async function connectWallet() { try { await tonConnectUI.connectWallet(); } catch(e){} }

function toggleModal(id) {
    const m = document.getElementById(id);
    m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
    if(id === 'friends-modal') {
        const uid = webapp?.initDataUnsafe?.user?.id || "12345";
        document.getElementById('ref-link').innerText = `https://t.me/PepePilotBot?start=${uid}`;
    }
}

function copyRef() {
    navigator.clipboard.writeText(document.getElementById('ref-link').innerText);
    alert("Скопировано!");
}

function doAdTask() { toggleModal('tasks-modal'); startAd(); }

// Phaser Игра
const config = {
    type: Phaser.AUTO, width: window.innerWidth, height: window.innerHeight,
    physics: { default: 'arcade' }, scene: { preload, create, update }
};

const game = new Phaser.Game(config);
let plane, hook, rope, targets, bgMusic, isLaunching = false, isReturning = false, caughtItem = null;
let angle = 0, swingSpeed = 0.025, distance = 30, energy = 100, money = 0, frogMoney = 0, recoveryTime = 0;

function preload() {
    this.load.image('sky', 'pg.jpeg');
    this.load.image('hook', 'kleshn.png');
    this.load.image('usdt', 'usdt.png');
    this.load.image('plt', 'logo..png');
    this.load.image('plane', 'pepe.png');
    this.load.audio('theme', 'music.mp3');
}

function create() {
    this.add.image(config.width/2, config.height/2, 'sky').setDisplaySize(config.width, config.height);
    try { bgMusic = this.sound.add('theme', { volume: 0.005, loop: true }); } catch(e){}
    this.input.once('pointerdown', () => { if(bgMusic) bgMusic.play(); });

    targets = this.physics.add.group();
    for(let i=0; i<6; i++) spawn(this);
    
    rope = this.add.graphics().setDepth(5);
    plane = this.add.image(config.width/2, 120, 'plane').setDisplaySize(280, 180).setDepth(60);
    hook = this.add.sprite(0, 0, 'hook').setDisplaySize(60, 60).setDepth(50);
    this.physics.add.existing(hook);

    this.input.on('pointerdown', (p) => {
        if (p.y < 40 || p.y > config.height - 70 || isLaunching || isReturning || energy <= 0) return;
        isLaunching = true; energy--;
        if(energy <= 0) recoveryTime = 7200;
        updateUI();
    });

    this.physics.add.overlap(hook, targets, (h, item) => {
        if (isLaunching && !caughtItem) {
            caughtItem = item;
            if(caughtItem.pulse) caughtItem.pulse.stop();
            isLaunching = false; isReturning = true;
        }
    });
    setInterval(tick, 1000);
}

function spawn(scene) {
    let x = Phaser.Math.Between(50, config.width - 50);
    let y = Phaser.Math.Between(config.height * 0.45, config.height - 150);
    let type = Math.random() < 0.7 ? 'plt' : 'usdt';
    let coin = targets.create(x, y, type).setDepth(40);
    
    if(type === 'plt') { coin.setScale(0.10).setTint(0xffffff); } 
    else { coin.setScale(0.12); }

    // Пульсация
    coin.pulse = scene.tweens.add({
        targets: coin,
        scale: type === 'plt' ? 0.11 : 0.14,
        duration: 1000,
        yoyo: true,
        repeat: -1,
        ease: 'Sine.easeInOut'
    });
}

function update() {
    let startX = plane.x - 5; let startY = plane.y + 20;

    if (!isLaunching && !isReturning) {
        angle += swingSpeed;
        if (angle > 0.8 || angle < -0.8) swingSpeed *= -1;
        distance = 30;
    } else if (isLaunching) {
        distance += 15;
        if (distance > config.height - 100) { isLaunching = false; isReturning = true; }
    } else if (isReturning) {
        distance -= 8;
        if (distance <= 30) {
            isReturning = false;
            if (caughtItem) {
                if(caughtItem.texture.key === 'plt') frogMoney += 10; else money += 0.0005;
                caughtItem.destroy(); caughtItem = null; spawn(this.scene.scene); updateUI();
            }
        }
    }

    hook.x = startX + Math.sin(angle) * distance;
    hook.y = startY + Math.cos(angle) * distance;
    hook.rotation = -angle;

    // Трос (аккуратно к верху клешни)
    rope.clear().lineStyle(2, 0xffffff, 0.4);
    rope.lineBetween(startX, startY, hook.x - Math.sin(angle)*15, hook.y - Math.cos(angle)*15);

    if (caughtItem) {
        caughtItem.x = hook.x; caughtItem.y = hook.y + 15;
        caughtItem.rotation = hook.rotation;
    }
}

function updateUI() {
    document.getElementById('money').innerText = money.toFixed(4);
    document.getElementById('frog-money').innerText = frogMoney;
    document.getElementById('energy').innerText = energy;
    document.getElementById('recovery-block').style.display = energy <= 0 ? 'flex' : 'none';
}

function tick() {
    if(recoveryTime > 0) {
        recoveryTime--;
        let h = Math.floor(recoveryTime / 3600);
        let m = Math.floor((recoveryTime % 3600) / 60);
        let s = recoveryTime % 60;
        document.getElementById('time-left').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        if(recoveryTime === 0) { energy = 100; updateUI(); }
    }
}

function startAd() {
    document.getElementById('ad-overlay').style.display = 'flex';
    let c = 5;
    let i = setInterval(() => {
        c--; document.getElementById('ad-timer').innerText = c + " сек.";
        if(c <= 0) {
            clearInterval(i);
            document.getElementById('ad-overlay').style.display = 'none';
            energy = 100; recoveryTime = 0; updateUI();
        }
    }, 1000);
}
</script>
</body>
</html>
