<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pepe Pilot: Crypto Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        /* Твои оригинальные стили */
        body { margin:0; padding:0; overflow:hidden; background:#000; touch-action: none; font-family: 'Segoe UI', Arial, sans-serif; }
        #top-bar { position: fixed; top: 0; left: 0; width: 100%; height: 35px; background: rgba(0, 0, 0, 0.4); z-index: 1000; backdrop-filter: blur(2px); display: flex; align-items: center; }
        #energy-container { position: absolute; left: 12px; display: flex; flex-direction: column; }
        #energy-main { color: #0f0; font-size: 13px; font-weight: bold; text-shadow: 1px 1px 1px #000; }
        #energy-info-extra { display: none; margin-top: 1px; } 
        #energy-timer { color: #aaa; font-size: 8px; font-family: monospace; }
        #ad-btn { background: #ffcc00; color: #000; font-size: 7px; padding: 1px 4px; border-radius: 3px; cursor: pointer; font-weight: bold; border: 1px solid #fff; width: fit-content; }
        
        #balance-container { width: 100%; display: flex; align-items: center; justify-content: center; gap: 15px; color: #fff; font-size: 11px; }
        .balance-item { display: flex; align-items: center; gap: 4px; }
        .coin-icon { width: 14px; height: 14px; }
        #settings-btn { position: fixed; top: 7px; right: 10px; font-size: 18px; cursor: pointer; z-index: 1001; color: white; }

        #nav-bar { position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%); width: 85%; height: 50px; background: rgba(0, 0, 0, 0.9); border: 1px solid #333; border-radius: 12px; display: flex; justify-content: space-around; align-items: center; z-index: 200; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #fff; font-weight: bold; flex: 1; cursor: pointer; }
        .nav-text { font-size: 8px; margin-top: 1px; color: #bbb; text-transform: uppercase; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; color: #fff; justify-content: center; align-items: center; }
        .modal-content { background: #1a1a1a; border: 2px solid #0f0; padding: 25px; border-radius: 20px; text-align: center; min-width: 280px; }
        .task-item { background: #222; border: 1px solid #444; border-radius: 10px; padding: 10px; margin: 10px 0; display: flex; justify-content: space-between; align-items: center; }
        .task-btn { background: #0f0; color: #000; border: none; padding: 6px 12px; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="settings-btn" onclick="toggleModal('settings-modal')">⚙️</div>

<div id="top-bar">
    <div id="energy-container">
        <div id="energy-main">⚡ <span id="energy">100</span></div>
        <div id="energy-info-extra">
            <div id="energy-timer">02:00:00</div>
            <div id="ad-btn" onclick="restoreEnergy()">AD</div>
        </div>
    </div>
    <div id="balance-container">
        <div class="balance-item"><span>USDT:</span> <span id="money" style="color:#0f0">0.0000</span></div>
        <div class="balance-item"><img src="logo..png" class="coin-icon"> <span>PLT:</span> <span id="frog-money" style="color:#ffcc00">0</span></div>
    </div>
</div>

<div id="nav-bar">
    <div class="nav-item" onclick="toggleModal('shop-modal')"><span>🛒</span><div class="nav-text">АНГАР</div></div>
    <div class="nav-item" onclick="toggleModal('tasks-modal')"><span>📜</span><div class="nav-text">ЗАДАНИЯ</div></div>
    <div class="nav-item" onclick="toggleModal('friends-modal')"><span>👥</span><div class="nav-text">ДРУЗЬЯ</div></div>
    <div class="nav-item" onclick="connectWallet()"><span>👛</span><div class="nav-text">КОШЕЛЕК</div></div>
</div>

<div id="shop-modal" class="modal"><div class="modal-content">
    <h3 id="txt-shop-title">АНГАР</h3>
    <div class="task-item">
        <img src="plane_copper.png" style="width: 50px;">
        <div style="flex:1; text-align:left; margin-left:10px;">МЕДНЫЙ<br><small>10 TON</small></div>
        <button class="task-btn" onclick="buyPlane('copper', 10)">BUY</button>
    </div>
    <div onclick="toggleModal('shop-modal')" style="color:#888; margin-top:15px;">Закрыть</div>
</div></div>

<script>
// --- ТВОЯ API ЛОГИКА ---
const tg = window.Telegram.WebApp;
tg.expand();
window.energy = 100;
window.currentPlane = 'default';

const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
    manifestUrl: 'https://duhistiny6-source.github.io/pepe-pilot/tonconnect-manifest.json'
});

async function connectWallet() {
    try { await tonConnectUI.openModal(); } catch(e) { console.error(e); }
}

async function buyPlane(type, amount) {
    if(!tonConnectUI.connected) { await connectWallet(); return; }
    const tx = { validUntil: Math.floor(Date.now()/1000)+60, messages: [{address: "ТВОЙ_АДРЕС", amount: (amount*1000000000).toString()}] };
    try { await tonConnectUI.sendTransaction(tx); window.currentPlane = type; toggleModal('shop-modal'); } catch(e) {}
}

function toggleModal(id) {
    const m = document.getElementById(id);
    m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
}

window.updateUI = function() {
    document.getElementById('energy').innerText = window.energy;
    document.getElementById('energy-info-extra').style.display = (window.energy < 100) ? "block" : "none";
};

function restoreEnergy() { window.energy = 100; window.updateUI(); }

// --- ТВОЙ ОРИГИНАЛЬНЫЙ КОД ИГРЫ (НЕ ТРОГАЛ НИТКУ И ЗВУКИ) ---
const config = {
    type: Phaser.AUTO, width: window.innerWidth, height: window.innerHeight,
    physics: { default: 'arcade' }, scene: { preload, create, update }
};
const game = new Phaser.Game(config);
let plane, hook, rope, targets, bgMusic, isLaunching = false, isReturning = false, caughtItem = null;
let angle = 0, swingSpeed = 0.015, distance = 25;

function preload() {
    this.load.image('sky', 'pg.jpeg');
    this.load.image('hook', 'kleshn.png');
    this.load.image('usdt', 'usdt.png');
    this.load.image('pilot_coin', 'logo..png');
    this.load.image('plane', 'pepe.png');
    this.load.image('plane_copper', 'plane_copper.png');
    this.load.audio('theme', 'music.mp3');
}

function create() {
    this.add.image(config.width/2, config.height/2, 'sky').setDisplaySize(config.width, config.height);
    try { bgMusic = this.sound.add('theme', { volume: 0.01, loop: true }); } catch (e) {}
    this.input.once('pointerdown', () => { if (bgMusic && !bgMusic.isPlaying) bgMusic.play(); });

    targets = this.physics.add.group();
    for(let i=0; i<6; i++) spawn(this);
    rope = this.add.graphics().setDepth(5);
    hook = this.add.sprite(0, 0, 'hook').setDepth(50).setDisplaySize(65, 65);
    this.physics.add.existing(hook);

    let tex = (window.currentPlane === 'copper') ? 'plane_copper' : 'plane';
    plane = this.add.image(config.width/2, 120, tex).setDisplaySize(280, 180).setDepth(60);

    this.physics.add.overlap(hook, targets, (h, item) => {
        if (isLaunching && !caughtItem) {
            caughtItem = item; caughtItem.body.enable = false;
            isLaunching = false; isReturning = true;
        }
    });

    this.input.on('pointerdown', () => {
        if (!isLaunching && !isReturning && window.energy > 0) {
            isLaunching = true; window.energy--; window.updateUI();
        }
    });
}

function spawn(scene) {
    let x = Phaser.Math.Between(60, config.width - 60);
    let y = Phaser.Math.Between(config.height * 0.5, config.height - 130);
    let type = (Math.random() > 0.7) ? 'pilot_coin' : 'usdt';
    targets.create(x, y, type).setScale(0.12).setDepth(40);
}

function update() {
    plane.y = 120 + Math.sin(this.time.now / 600) * 8;
    let startX = plane.x - 5, startY = plane.y + 20;
    if (!isLaunching && !isReturning) {
        angle += swingSpeed; if (angle > 0.4 || angle < -0.4) swingSpeed *= -1; distance = 25;
    } else if (isLaunching) {
        distance += 14; if (distance > config.height - 110) { isLaunching = false; isReturning = true; }
    } else if (isReturning) {
        distance -= 6;
        if (distance <= 25) {
            isReturning = false;
            if (caughtItem) { caughtItem.destroy(); caughtItem = null; spawn(this); }
        }
    }
    hook.x = startX + Math.sin(angle) * distance; hook.y = startY + Math.cos(angle) * distance; hook.rotation = -angle;
    
    // ТВОЯ ОРИГИНАЛЬНАЯ НИТКА
    rope.clear().lineStyle(2, 0xffffff, 0.6).lineBetween(startX, startY, startX + Math.sin(angle) * (distance - 20), startY + Math.cos(angle) * (distance - 20));
    
    if (caughtItem) { caughtItem.x = hook.x; caughtItem.y = hook.y + 15; }
}
</script>
</body>
</html>
