<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pepe Pilot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        /* Возвращаем магию верстки */
        body { margin:0; padding:0; overflow:hidden; background:#000; touch-action: none; font-family: sans-serif; }
        #top-bar { position: fixed; top: 0; left: 0; width: 100%; height: 40px; background: rgba(0, 0, 0, 0.5); z-index: 1000; display: flex; align-items: center; }
        #energy-container { position: absolute; left: 10px; color: #0f0; font-weight: bold; }
        #balance-container { width: 100%; display: flex; justify-content: center; gap: 20px; color: #fff; font-size: 14px; }
        .coin-icon { width: 16px; height: 16px; vertical-align: middle; }
        
        #nav-bar { position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%); width: 90%; height: 60px; 
                   background: rgba(0, 0, 0, 0.8); border: 1px solid #444; border-radius: 15px; 
                   display: flex; justify-content: space-around; align-items: center; z-index: 2000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #fff; font-size: 10px; cursor: pointer; }
        .nav-item span { font-size: 20px; }

        /* Чтобы монета не была на пол-экрана */
        canvas { display: block; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
                 background: rgba(0,0,0,0.9); z-index: 3000; color: #fff; justify-content: center; align-items: center; flex-direction: column; }
    </style>
</head>
<body>

<div id="top-bar">
    <div id="energy-container">⚡ <span id="energy">100</span></div>
    <div id="balance-container">
        <div>USDT: <span id="money" style="color:#0f0">0.0000</span></div>
        <div><img src="logo..png" class="coin-icon"> PLT: <span id="frog-money" style="color:#ffcc00">0</span></div>
    </div>
</div>

<div id="nav-bar">
    <div class="nav-item"><span>🛒</span><div>МАГАЗИН</div></div>
    <div class="nav-item" onclick="toggleModal('tasks-modal')"><span>📜</span><div>ЗАДАНИЯ</div></div>
    <div class="nav-item" onclick="openFriends()"><span>👥</span><div>ДРУЗЬЯ</div></div>
    <div class="nav-item"><span>👛</span><div>КОШЕЛЕК</div></div>
</div>

<script src="api.js"></script>
<script src="game.js"></script>

</body>
</html>
