<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pepe Pilot Gold</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; touch-action: none; }
    </style>
</head>
<body>
<script>
const config = {
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    physics: { default: 'arcade' },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);
let plane, clawGraphic, chain, targets, scoreText;
let isLaunching = false, isReturning = false, caughtItem = null;
let angle = 0, swingSpeed = 0.02, launchSpeed = 12, returnSpeed = 8;
let score = 0;

function preload() {
    this.load.image('sky', 'https://labs.phaser.io/assets/skies/space3.png');
    // Используем ПРЯМЫЕ ссылки на твои картинки в GitHub (на основе твоих скринов)
    this.load.image('pepe', 'images__32_-removebg-preview.png');
    this.load.image('ton', 'ton-ecosystem-removebg-preview.png');
    this.load.image('not', 'images__35_-removebg-preview.png');
    this.load.image('dogs', 'images__33_-removebg-preview.png');
}

function create() {
    this.add.image(config.width/2, config.height/2, 'sky').setAlpha(0.4).setScale(2);
    
    // ПЕПЕ (Крупное лицо)
    plane = this.add.sprite(config.width / 2, 100, 'pepe').setDepth(10);
    plane.setDisplaySize(240, 240); 
    
    // ГРАФИКА КЛЕШНИ И ЦЕПИ
    chain = this.add.graphics().setDepth(5);
    clawGraphic = this.add.graphics().setDepth(6);
    
    // Невидимая физическая точка для столкновений
    this.clawPoint = this.add.circle(config.width / 2, 200, 15);
    this.physics.add.existing(this.clawPoint);

    targets = this.physics.add.group();
    const assets = ['ton', 'dogs', 'not'];

    for(let i=0; i<12; i++) {
        let x = Phaser.Math.Between(50, config.width - 50);
        let y = Phaser.Math.Between(350, config.height - 100);
        let type = Phaser.Math.RND.pick(assets);
        let coin = targets.create(x, y, type);
        coin.setDisplaySize(80, 80).setDepth(4);
    }

    scoreText = this.add.text(20, 20, 'Score: 0', { fontSize: '32px', fill: '#fff', fontStyle: 'bold' });

    this.input.on('pointerdown', () => { 
        if(!isLaunching && !isReturning) isLaunching = true; 
    });

    this.physics.add.overlap(this.clawPoint, targets, (c, target) => {
        if (isLaunching && !caughtItem) {
            caughtItem = target;
            isLaunching = false;
            isReturning = true;
        }
    });
}

function update() {
    let pivotX = plane.x;
    let pivotY = plane.y + 40;

    if (!isLaunching && !isReturning) {
        angle += swingSpeed;
        if (angle > 0.8 || angle < -0.8) swingSpeed = -swingSpeed;
        this.clawPoint.x = pivotX + Math.sin(angle) * 140;
        this.clawPoint.y = pivotY + Math.cos(angle) * 140;
    } else if (isLaunching) {
        this.clawPoint.x += Math.sin(angle) * launchSpeed;
        this.clawPoint.y += Math.cos(angle) * launchSpeed;

        if (this.clawPoint.y > config.height || this.clawPoint.x < 0 || this.clawPoint.x > config.width) {
            isLaunching = false;
            isReturning = true;
        }
    } else if (isReturning) {
        let dist = Phaser.Math.Distance.Between(this.clawPoint.x, this.clawPoint.y, pivotX + Math.sin(angle) * 140, pivotY + Math.cos(angle) * 140);
        let tx = pivotX + Math.sin(angle) * 140;
        let ty = pivotY + Math.cos(angle) * 140;

        this.clawPoint.x += (tx - this.clawPoint.x) * 0.2;
        this.clawPoint.y += (ty - this.clawPoint.y) * 0.2;

        if (caughtItem) {
            caughtItem.x = this.clawPoint.x;
            caughtItem.y = this.clawPoint.y;
        }

        if (dist < 10) {
            isReturning = false;
            if (caughtItem) {
                score += 100;
                scoreText.setText('Score: ' + score);
                caughtItem.destroy();
                caughtItem = null;
            }
        }
    }

    // ОТРИСОВКА ЦЕПИ И КЛЕШНИ
    chain.clear();
    chain.lineStyle(3, 0xaaaaaa, 1);
    chain.lineBetween(pivotX, pivotY, this.clawPoint.x, this.clawPoint.y);

    clawGraphic.clear();
    clawGraphic.lineStyle(5, 0xffd700, 1);
    
    // Рисуем две створки клешни
    let openAngle = caughtItem ? 0.2 : 0.8; // Если схватили - закрываем
    clawGraphic.beginPath();
    clawGraphic.arc(this.clawPoint.x, this.clawPoint.y, 25, angle - openAngle, angle + openAngle, true);
    clawGraphic.strokePath();
    clawGraphic.beginPath();
    clawGraphic.arc(this.clawPoint.x, this.clawPoint.y, 25, angle + Math.PI - openAngle, angle + Math.PI + openAngle, true);
    clawGraphic.strokePath();
}
</script>
</body>
</html>
