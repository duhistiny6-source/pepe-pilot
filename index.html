<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pepe Pilot</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; touch-action: none; }
    </style>
</head>
<body>
<script>
const config = {
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    physics: { default: 'arcade' },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);
let plane, claw, chain, targets, scoreText, timerText;
let isLaunching = false, isReturning = false;
let angle = 0, score = 0, timeLeft = 60;

function preload() {
    this.load.image('sky', 'https://labs.phaser.io/assets/skies/space3.png');
    
    // ИСПОЛЬЗУЕМ ТВОИ НАЗВАНИЯ ИЗ GITHUB (как на скрине 1000004101.jpg)
    // Если ты переименовал их в pepe.png и т.д. — просто поменяй названия в кавычках ниже
    this.load.image('pepe', 'images (32).jpeg'); 
    this.load.image('ton', 'ton-ecosystem.jpg'); 
    this.load.image('dogs', 'images (33).jpeg'); 
    this.load.image('not', 'images (35).jpeg');
}

function create() {
    this.add.image(config.width/2, config.height/2, 'sky').setAlpha(0.4).setScale(2);
    
    // Пепе (размер 100 пикселей)
    plane = this.add.sprite(config.width / 2, 80, 'pepe');
    plane.setDisplaySize(100, 100); 
    plane.setDepth(5);
    
    claw = this.add.circle(config.width / 2, 150, 20, 0xffd700).setDepth(4);
    chain = this.add.graphics().setDepth(3);
    
    targets = this.physics.add.group();
    const coins = ['ton', 'dogs', 'not'];

    for(let i=0; i<15; i++) {
        let x = Phaser.Math.Between(40, config.width - 40);
        let y = Phaser.Math.Between(250, config.height - 100);
        let type = Phaser.Math.RND.pick(coins);
        let coin = targets.create(x, y, type);
        
        // Масштабируем
        if (type === 'ton') {
            coin.setDisplaySize(45, 45);
            coin.setData('p', 50);
        } else {
            coin.setDisplaySize(60, 60); 
            coin.setData('p', 10);
        }
    }

    scoreText = this.add.text(20, 20, 'Score: 0', { fontSize: '24px', fill: '#fff', fontStyle: 'bold' });
    timerText = this.add.text(config.width - 130, 20, 'Time: 60', { fontSize: '24px', fill: '#ff0', fontStyle: 'bold' });

    this.time.addEvent({
        delay: 1000,
        callback: () => { if(timeLeft > 0) timeLeft--; timerText.setText('Time: ' + timeLeft); },
        loop: true
    });

    this.input.on('pointerdown', () => { if(!isLaunching && !isReturning && timeLeft > 0) isLaunching = true; });
}

function update() {
    if (timeLeft <= 0) return;

    if (!isLaunching && !isReturning) {
        angle += 0.02;
        if (angle > 0.7 || angle < -0.7) angle = -angle;
        claw.x = plane.x + Math.sin(angle) * 100;
        claw.y = plane.y + Math.cos(angle) * 100;
    } else if (isLaunching) {
        claw.x += Math.sin(angle) * 10;
        claw.y += Math.cos(angle) * 10;
        
        targets.children.iterate(child => {
            if (child && child.active && Phaser.Geom.Intersects.CircleToCircle(claw, child)) {
                score += child.getData('p');
                scoreText.setText('Score: ' + score);
                child.destroy();
                isLaunching = false;
                isReturning = true;
            }
        });

        if (claw.y > config.height || claw.x < 0 || claw.x > config.width) {
            isLaunching = false;
            isReturning = true;
        }
    } else if (isReturning) {
        let tx = plane.x + Math.sin(angle) * 100;
        let ty = plane.y + Math.cos(angle) * 100;
        claw.x += (tx - claw.x) * 0.2;
        claw.y += (ty - claw.y) * 0.2;
        if (Phaser.Math.Distance.Between(claw.x, claw.y, tx, ty) < 10) isReturning = false;
    }

    chain.clear();
    chain.lineStyle(4, 0xffd700, 1); 
    chain.lineBetween(plane.x, plane.y + 20, claw.x, claw.y);
}
</script>
</body>
</html>
